display_name: "Offerte anomale e verifica di congruita' (D.Lgs 36/2023 artt. 110, 54)"
short_description: Supporto documentale al RUP e alla commissione giudicatrice/seggio di gara per l'inquadramento della verifica delle offerte anormalmente basse (giudizio di congruita') e dell'esclusione automatica delle offerte anomale nei contratti pubblici, ai sensi del D.Lgs. 31 marzo 2023, n. 36 (Codice dei contratti pubblici), artt. 110 e 54, con l'art. 108, comma 9. Inquadra il presupposto della verifica di congruita' - valutazione di congruita', serieta', sostenibilita' e realizzabilita' della migliore offerta che appaia anormalmente bassa in base a elementi specifici indicati nel bando, inclusi i costi dichiarati - la richiesta scritta di spiegazioni con termine non superiore a quindici giorni, l'oggetto ammissibile delle spiegazioni (economia del processo, soluzioni tecniche o condizioni favorevoli, originalita'), le giustificazioni non ammesse su minimi salariali e costi di sicurezza, e i casi di esclusione per violazione degli obblighi ambientali, sociali e del lavoro (allegato X della direttiva 2014/24/UE), dell'articolo 119 sul subappalto, per oneri di sicurezza incongrui o per costo del personale inferiore alle tabelle dell'articolo 41 comma 13, oltre alla disciplina degli aiuti di Stato; l'esclusione automatica delle offerte anomale nei contratti sotto la soglia europea con il criterio del prezzo piu' basso, senza interesse transfrontaliero, per lavori o servizi, se le offerte ammesse sono almeno cinque, in deroga all'articolo 110 e con il metodo dell'Allegato II.2 scelto o sorteggiato, esclusi gli affidamenti diretti; e l'indicazione a pena di esclusione dei costi della manodopera e degli oneri di sicurezza nell'offerta economica (art. 108 comma 9). NON calcola la soglia di anomalia ne' applica i metodi dell'Allegato II.2, non redige la richiesta di spiegazioni ne' il verbale di congruita', non valuta nel merito le giustificazioni e non sostituisce il RUP ne' la stazione appaltante.
default_prompt: |
  In una gara di appalto devo gestire un'offerta che sembra anormalmente bassa: come inquadro la verifica
  secondo il D.Lgs. 36/2023? Quando si applica la verifica di congruita' dell'art. 110 e quando
  l'esclusione automatica dell'art. 54, con quali termini e in quali casi si esclude l'offerta? Cita gli
  articoli.
