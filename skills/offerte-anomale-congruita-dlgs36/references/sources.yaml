# Fonte per l'inquadramento della VERIFICA DELLE OFFERTE ANORMALMENTE BASSE (giudizio di congruita') e
# dell'ESCLUSIONE AUTOMATICA delle offerte anomale nei contratti pubblici: valutazione, richiesta di
# spiegazioni, giustificazioni non ammesse, casi di esclusione, esclusione automatica sotto soglia e
# indicazione dei costi della manodopera e degli oneri di sicurezza. Fonte: Codice dei contratti pubblici
# (D.Lgs. 36/2023), artt. 110, 54 e 108 (comma 9).

