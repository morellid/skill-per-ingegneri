    title: "D.Lgs. 31 marzo 2023, n. 36 (Codice dei contratti pubblici) - artt. 110, 54 e 108 c.9 (offerte anormalmente basse ed esclusione automatica) (testo vigente al 2026-07-17)"
    type: decreto-legislativo
    # URL pinnata con !vig=YYYY-MM-DD per riproducibilita' dell'hash sotto CI (stesso indice del D.Lgs.
    # 36/2023 usato dalle altre skill appalti: RUP, subappalto, direzione lavori, collaudo, varianti,
    # verifica della progettazione, garanzie).
