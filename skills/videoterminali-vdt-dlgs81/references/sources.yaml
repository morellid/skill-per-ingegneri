    notes: |
      Codice redazionale 008G0104, GU n. 101 del 30/4/2008 - S.O. n. 108 (in vigore
      dal 15/5/2008). Il binario e' la pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: 18fbc542...; e' lo stesso indice
      usato dalle altre skill D.Lgs. 81). Gli articoli del Titolo VII "Attrezzature
      munite di videoterminali" - 172 (campo di applicazione), 173 (definizioni), 174
      (obblighi del datore), 175 (svolgimento quotidiano - pause), 176 (sorveglianza
      sanitaria), 177 (informazione e formazione) - sono caricati via AJAX
      (caricaArticolo: idGruppo 32 per 172-173, idGruppo 33 per 174-177,
      flagTipoArticolo 0, codiceRedazionale 008G0104, dataPubblicazioneGazzetta
      2008-04-30) e trascritti verbatim in references/fonti/dlgs-81-2008-vdt.md.
      L'Allegato XXXIV (requisiti minimi tecnici del posto: schermo, tastiera, piano di
      lavoro, sedile, ambiente, interfaccia elaboratore/uomo) richiamato dagli artt.
      174 c. 3 / 173 e' citato come rinvio e NON riprodotto. Gli artt. 41 (sorveglianza
      sanitaria), 28 (valutazione dei rischi) e 18 (obblighi del datore) sono citati.
