display_name: "Denuncia dei lavori e collaudo statico opere in c.a. (DPR 380/2001)"
short_description: Supporto documentale al progettista strutturale, al direttore dei lavori e al collaudatore statico per le opere in conglomerato cementizio armato (normale e precompresso) e a struttura metallica, ai sensi del D.P.R. 6 giugno 2001, n. 380 (Testo unico edilizia), Parte II, Capo I, artt. 64-67. Inquadra i soggetti e le responsabilita' - progetto esecutivo e direzione da tecnico abilitato iscritto all'albo, responsabilita' di progettista, direttore dei lavori e costruttore (art. 64); la denuncia dei lavori presentata dal costruttore allo sportello unico via PEC prima dell'inizio, con progetto firmato e relazione sui materiali, le varianti, la relazione a struttura ultimata depositata dal direttore dei lavori entro 60 giorni con i certificati dei laboratori dell'art. 59 e le prove di carico, l'attestazione di deposito e la trasmissione all'ufficio tecnico regionale (art. 65); i documenti in cantiere e il giornale dei lavori (art. 66); il collaudo statico obbligatorio per le costruzioni che interessano la pubblica incolumita', eseguito da un ingegnere o architetto iscritto da almeno dieci anni e indipendente, la nomina contestuale alla denuncia, la terna dell'ordine quando il costruttore esegue in proprio, i 60 giorni per il collaudo dalla copertura, il certificato di collaudo via PEC equivalente al certificato di rispondenza alle norme tecniche dell'art. 62, e la dichiarazione di regolare esecuzione del direttore dei lavori che sostituisce il collaudo per gli interventi di riparazione e locali (art. 67). NON redige il progetto/relazione/certificato di collaudo, non esegue il calcolo ne' il collaudo, non riproduce le NTC 2018 ne' gli artt. 53/59/62/94-bis e non sostituisce il tecnico abilitato, il direttore dei lavori, il collaudatore o gli uffici competenti.
default_prompt: |
  Sto avviando i lavori strutturali di un edificio in cemento armato: come inquadro gli adempimenti
  del DPR 380/2001? Chi presenta la denuncia dei lavori e con quali allegati, cosa tenere in cantiere,
  quando serve il collaudo statico e chi puo' farlo, e cosa deposita il direttore dei lavori a
  struttura ultimata? Cita gli articoli.
