# Fonte per l'inquadramento degli adempimenti sulle OPERE IN CONGLOMERATO CEMENTIZIO ARMATO (normale e
# precompresso) E A STRUTTURA METALLICA: progettazione/direzione/esecuzione e responsabilita', denuncia
# dei lavori allo sportello unico, documenti in cantiere, relazione a struttura ultimata e collaudo
# statico. Fonte: Testo unico edilizia (DPR 380/2001), Parte II, Capo I, artt. 64-67.

sources:
  - id: dpr-380-2001-64-67
    title: "D.P.R. 6 giugno 2001, n. 380 - artt. 64-67 (opere in c.a./c.a.p. e acciaio: denuncia lavori e collaudo statico) (testo vigente al 2026-07-17)"
    type: decreto-del-presidente-della-repubblica
    # URL pinnata con !vig=YYYY-MM-DD per riproducibilita' dell'hash sotto CI (stesso indice del DPR
    # 380/2001 usato dalle altre skill edilizia: permesso di costruire, agibilita', abusi, sismica).
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.del.presidente.della.repubblica:2001-06-06;380!vig=2026-07-17
    accessed: 2026-07-17
    sha256: bac3f7b170cfd122936873c835b3f728e7880d058bd98ad45f55b94ba89a632f
    license: public-domain
    binary_path: not_in_repo/dpr380-castat-idx.html
    md_path: references/fonti/dpr-380-2001-64-67.md
    excerpt_path: references/estratti/denuncia-collaudo-statico-checklist.md
    notes: |
      Codice redazionale 001G0429, idGruppo 12 (Parte II, Capo I - opere in conglomerato cementizio
      armato, normale e precompresso ed a struttura metallica). Pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: bac3f7b1...; e' lo stesso indice usato dalle
      altre skill DPR 380/2001). Articoli 64 (v1), 65 (v4), 66 (v1), 67 (v3) caricati via AJAX
      (caricaArticolo), formato AKN, e trascritti verbatim in references/fonti/dpr-380-2001-64-67.md:
      progettazione/direzione/esecuzione da tecnico abilitato iscritto all'albo e responsabilita' di
      progettista, direttore dei lavori e costruttore (64); denuncia dei lavori allo sportello unico via
      PEC prima dell'inizio, con progetto e relazione sui materiali, varianti, relazione a struttura
      ultimata entro 60 giorni con certificati dei laboratori ex art. 59 e prove di carico,
      attestazione di deposito e trasmissione all'ufficio tecnico regionale (65); documenti in cantiere
      e giornale dei lavori sotto responsabilita' del direttore dei lavori (66); collaudo statico
      obbligatorio, eseguito da ingegnere o architetto iscritto da almeno dieci anni e indipendente,
      nomina contestuale alla denuncia, terna dell'ordine se il costruttore esegue in proprio, 60 giorni
      per il collaudo, certificato di collaudo via PEC equivalente al certificato di rispondenza ex art.
      62, dichiarazione di regolare esecuzione del direttore dei lavori per interventi locali/riparazioni
      (67). Il testo tra doppi tondi (( )) segnala le modifiche successive.
      LIMITE DI RESA: la skill inquadra obblighi, soggetti, documenti e termini; NON redige il progetto
      strutturale, la relazione o il certificato di collaudo, NON esegue il calcolo ne' il collaudo, NON
      riproduce le NTC 2018 (D.M. 17/1/2018) ne' gli artt. 53/59/62/94-bis se non nei richiami, e NON
      sostituisce il tecnico abilitato, il direttore dei lavori, il collaudatore ne' gli uffici
      competenti.
