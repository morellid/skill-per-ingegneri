display_name: "Controlli di accettazione in cantiere: cls e acciaio (NTC 2018)"
short_description: Supporto documentale al Direttore dei Lavori e al collaudatore per l'inquadramento dei controlli di accettazione in cantiere del calcestruzzo (paragrafi 11.2.4-11.2.5) e dell'acciaio da cemento armato (paragrafo 11.3.2.12) secondo le NTC 2018 (D.M. 17 gennaio 2018), Capitolo 11. Per il calcestruzzo aiuta a inquadrare il prelievo (due provini per prelievo confezionati alla posa in opera alla presenza del Direttore dei Lavori, resistenza di prelievo pari alla media dei due, prelievo non accettato se la differenza fra i due provini supera il 20 per cento del valore inferiore), la scelta fra controllo di tipo A (quantitativo non maggiore di 300 metri cubi, tre prelievi ciascuno su massimo 100 metri cubi, almeno un prelievo al giorno) e controllo di tipo B statistico (obbligatorio oltre 1500 metri cubi, almeno un controllo ogni 1500 metri cubi, almeno 15 prelievi, coefficiente di variazione non superiore a 0,3) e i criteri della Tab. 11.2.I (tipo A: resistenza media maggiore o uguale a Rck piu' 3,5 e resistenza minima maggiore o uguale a Rck meno 3,5; tipo B: resistenza media maggiore o uguale a Rck piu' 1,48 per lo scarto quadratico medio e resistenza minima maggiore o uguale a Rck meno 3,5), con le prescrizioni comuni (verbale di prelievo, laboratorio ai sensi dell'articolo 59 del DPR 380/2001, prove tra il 28esimo e il 30esimo giorno). Per l'acciaio da cemento armato aiuta a inquadrare i controlli obbligatori entro 30 giorni dalla consegna a cura di un laboratorio ai sensi dell'articolo 59 del DPR 380/2001, in ragione di tre campioni ogni 30 tonnellate della stessa classe e stabilimento, e i valori di accettazione della Tab. 11.3.VII (fy minimo 425 e massimo 572 N/mm quadro, allungamento Agt minimo 6,0 per cento per B450C e 2,0 per cento per B450A, rapporto ft su fy fra 1,13 e 1,37 per B450C e maggiore o uguale a 1,03 per B450A, piegamento senza cricche), con la gestione delle non conformita' (ripetizione su 6 campioni, poi estensione a 25 campioni, inidoneita' della partita). NON esegue le prove ne' valuta la resistenza (compito del laboratorio), non sostituisce il Direttore dei Lavori o il collaudatore, e non copre i controlli in stabilimento e la qualificazione (paragrafi 11.3.2.10-11), i carotaggi e la resistenza in opera (paragrafi 11.2.6-11.2.7) ne' gli altri materiali. Copre il compito di cantiere rinviato al Capitolo 11 dalle skill costruzioni di calcestruzzo e acciaio.
default_prompt: |
  Devo impostare i controlli di accettazione in cantiere secondo le NTC 2018 (Cap. 11). Per il calcestruzzo:
  dato il volume di getto e la Rck, quale controllo (tipo A o tipo B) applico, con quanti prelievi, e quali
  disuguaglianze devo verificare (Tab. 11.2.I)? Per l'acciaio da c.a.: quanti campioni devo far provare (3 ogni
  30 t), entro quali tempi e quali valori di accettazione (Tab. 11.3.VII) valgono? Cita i paragrafi e le tabelle.
