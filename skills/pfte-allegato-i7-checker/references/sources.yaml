# Fonti normative principali per la skill di verifica PFTE secondo
# D.Lgs. 36/2023 art. 41 + Allegato I.7, integrato dal correttivo
# D.Lgs. 209/2024.
#
# Nota: il testo principale del D.Lgs. 36/2023 (artt. 1-229, incluso art. 41)
# e' nella GU n. 87/SO n. 14 del 13/04/2023.
# L'Allegato I.7 e' nella GU n. 77/SO n. 12/L del 31/03/2023 (originale
# pubblicazione). La GU n. 87 (riedizione) esplicita: "Si omettono gli Allegati
# e Tabelle, gia' pubblicati nel Supplemento ordinario n. 12/L alla Gazzetta
# Ufficiale - Serie generale - n. 77 del 31 marzo 2023."
# Per la skill sono stati scaricati entrambi i PDF.

sources:
  - id: dlgs-36-2023-originale-gu-2023
    title: "D.Lgs. 31 marzo 2023 n. 36 - Codice dei contratti pubblici - Art. 41: GU n. 87 del 13/04/2023 SO n. 14; Allegato I.7: GU n. 77 del 31/03/2023 SO n. 12/L"
    type: decreto-legislativo
    url: https://www.gazzettaufficiale.it/eli/gu/2023/04/13/87/so/14/sg/pdf
    url_allegati: https://www.gazzettaufficiale.it/eli/gu/2023/03/31/77/so/12/sg/pdf
    accessed: 2026-05-10
    sha256: b139f0515a8aa018a25b7a31acce39fc39329cdc07aedd17e870dd9dc91025ff
    sha256_allegati: 1604cafa9bbd258ada08978b9ca0376d929017a0ce18c78ee89ea68cd8f07702
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-36-2023-gu87-so14.pdf
    binary_path_allegati: not_in_repo/dlgs-36-2023-gu77-so12.pdf
    md_path: references/fonti/dlgs-36-2023-allegato-i7.md
    excerpt_paths:
      - references/estratti/dlgs-36-art-41.md
      - references/estratti/allegato-i7-pfte.md
      - references/estratti/allegato-i7-esecutivo.md
    notes: |
      Codice dei contratti pubblici, in vigore dal 1 aprile 2023, efficace dal
      1 luglio 2023. Il testo principale (art. 41) e' nel SO n. 14 alla GU n. 87
      del 13/04/2023 (sha256: b139f051...). L'Allegato I.7 completo (artt. 1-44)
      e' nel SO n. 12/L alla GU n. 77 del 31/03/2023 (sha256: 1604cafa...).
      Entrambi i PDF sono stati scaricati, estratti via pdftotext e letti verbatim
      per la produzione di references/fonti/dlgs-36-2023-allegato-i7.md.
      Riferimento principale per la skill: art. 41 (Livelli e contenuti della
      progettazione) e Allegato I.7 (Contenuti minimi del quadro esigenziale,
      del DOCFAP, del DIP, del PFTE e del progetto esecutivo).
      Testo legislativo italiano riproducibile liberamente ai sensi
      dell'art. 5 L. 633/1941 (atti ufficiali dello Stato).

  - id: dlgs-209-2024-correttivo-gu-2025
    title: "D.Lgs. 31 dicembre 2024 n. 209 - Disposizioni integrative e correttive al codice dei contratti pubblici di cui al D.Lgs. 36/2023 - GU n. 17 del 22/01/2025 Suppl. Ordinario n. 3"
    type: decreto-legislativo
    url: https://www.gazzettaufficiale.it/eli/gu/2025/01/22/17/so/3/sg/pdf
    accessed: 2026-05-10
    sha256: 55b6f60ed930f29cc12f2e92e468a60152b428bde7e2977423f99be4341b0df9
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-209-2024-correttivo.pdf
    md_path: references/fonti/dlgs-209-2024-correttivo.md
    excerpt_paths:
      - references/estratti/dlgs-209-2024-modifiche.md
    notes: |
      Decreto correttivo entrato in vigore il 31/12/2024, pubblicato in GU
      del 22/01/2025 (SO n. 3, non n. 4 come inizialmente dichiarato: la pagina
      GU rimanda al SO n. 3). Il PDF e' stato scaricato, estratto via pdftotext
      e letto verbatim per la produzione di references/fonti/dlgs-209-2024-correttivo.md.
      Per la skill rilevano: art. 14 (modifiche art. 41) e art. 78 (modifiche
      Allegato I.7), in particolare: co. 5-bis e art. 6 co. 8-bis (manutenzione
      su PFTE), nuova lettera p art. 6 co. 7 (capitolato informativo solo per
      appalto integrato), art. 4-bis, artt. 13-bis e 13-ter, lett. p-bis e p-ter
      all'art. 22 co. 4 (esecutivo BIM), abrogazione art. 22 co. 5.

