    notes: |
      Estensione futura (vedi catalog PR.2): integrazione con bandi-tipo ANAC
      per verifica conformita' della documentazione di gara associata al PFTE.

  - id: cni-linee-guida-pfte
    title: "CNI - Linee guida operative redazione PFTE"
    url: https://www.cni.it/
    notes: |
      Da consultare archivio CNI per eventuali linee guida operative su
      redazione PFTE post D.Lgs. 36/2023. Non pubblicate in formato citabile
      al momento dell'ultima verifica.
