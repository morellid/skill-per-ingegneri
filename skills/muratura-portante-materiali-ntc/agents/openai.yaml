display_name: "Muratura portante: qualificazione materiali e parametri (NTC 2018 par. 11.10)"
short_description: Supporto documentale al progettista strutturale e al Direttore dei Lavori per la qualificazione dei materiali e la determinazione dei parametri meccanici della muratura portante secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 11.10. Aiuta a inquadrare gli elementi per muratura del par. 11.10.1 (conformita' alla serie UNI EN 771 e Marcatura CE; Tab. 11.10.I con Categoria I al sistema 2+ e Categoria II al sistema 4; gli elementi di Categoria I hanno probabilita' di insuccesso non oltre il 5 per cento; coefficiente gamma_M secondo la categoria, par. 4.5.6); le prove di accettazione del par. 11.10.1.1 (laboratorio art. 59 del DPR 380/2001; un campione ogni 350 mc per la Categoria II e 650 mc per la Categoria I; n elementi con n non inferiore a 6; media almeno pari a fbm e f1 almeno 0,80 fbm, oppure f1 almeno pari a fbk); le malte del par. 11.10.2 (classe M con fm in N/mm2 dalla Tab. 11.10.II M2,5-M20; non ammesse malte con fm inferiore a 2,5; a prestazione garantita, a composizione prescritta con Tab. 11.10.V, o prodotte in cantiere; accettazione con 3 provini 40x40x160 ogni 350 o 700 mc); e la determinazione dei parametri meccanici del par. 11.10.3 (resistenza a compressione fk sperimentale su n muretti oppure stimata dalle Tab. 11.10.VI e 11.10.VII con fbk pari a 0,8 fbm per gli elementi artificiali e 0,75 fbm per i naturali, valida per giunti di spessore 5-15 mm; resistenza caratteristica a taglio fvk0 dalla Tab. 11.10.VIII). NON esegue le verifiche di progetto (fd = fk/gamma_M) e non sostituisce il progettista ne' il Direttore dei Lavori. E' distinta dalla skill sul progetto della muratura (par. 4.5), da quella sulla muratura sismica (par. 7.8.1) e da quella sull'accettazione di cls e acciaio (par. 11.2 e 11.3).
default_prompt: |
  Devo qualificare i materiali per una muratura portante secondo le NTC 2018 (par. 11.10). Quale categoria (I/II)
  e quale sistema di marcatura CE hanno gli elementi, e come faccio le prove di accettazione in cantiere (350/650
  mc, media >= fbm, f1 >= 0,80 fbm)? Quale classe di malta posso usare? Come stimo la resistenza a compressione fk
  (Tab. 11.10.VI, fbk = 0,8 fbm) e la resistenza a taglio fvk0 (Tab. 11.10.VIII)? Cita i paragrafi e le tabelle.
