# Fonte normativa per la qualificazione dei materiali (elementi resistenti e
# malte) e la determinazione dei parametri meccanici (resistenza a compressione
# fk e a taglio fvk0) della muratura portante secondo le NTC 2018 (DM
# 17/01/2018), par. 11.10 (Cap. 11 «Materiali e prodotti per uso strutturale»).
# La skill inquadra la qualificazione dei materiali e la determinazione dei
# parametri; non esegue le verifiche di progetto (fd = fk/gamma_M).

