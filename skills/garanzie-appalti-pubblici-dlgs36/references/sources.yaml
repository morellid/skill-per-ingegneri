    notes: |
      Codice redazionale 23G00044, GU n. 77 del 31/3/2023 - S.O. n. 12 (in vigore
      dal 1/4/2023). Il binario e' la pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: 0e9a1938...). Gli articoli
      106 (Garanzie per la partecipazione alla procedura - garanzia provvisoria) e
      117 (Garanzie definitive) sono caricati via AJAX (caricaArticolo: art. 106
      versione 2, idGruppo 16; art. 117 versione 1, idGruppo 18; flagTipoArticolo
      2; dataPubblicazioneGazzetta 2023-03-31) e trascritti verbatim in
      references/fonti/dlgs-36-2023-artt-106-117.md. Le porzioni tra (( )) sono le
      modifiche successive gia' consolidate nel testo vigente (es. correttivo
      D.Lgs. 31 dicembre 2024, n. 209). Rinvii NON riprodotti perche' fuori scope o
      coperti da altre fonti/skill: l'allegato II.13 (certificazioni/marchi per la
      riduzione fino al 20%), gli schemi tipo di garanzia (DM ex art. 117 c. 12,
      fonte separata), l'art. 1957 c.c. e il codice antimafia (D.Lgs. 159/2011)
      sono citati come rinvio e non trascritti.
