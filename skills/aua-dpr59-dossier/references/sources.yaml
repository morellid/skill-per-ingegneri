    notes: |
      Pubblicato in GU n.124 del 29-05-2013 - Supplemento Ordinario n. 42
      (codice redazionale 13G00101). Entrata in vigore: 13 giugno 2013.
      Testo vigente fetchato da Normattiva il 2026-05-19 concatenando il main
      e le risposte AJAX per ciascuno dei 12 articoli (Capi I-V).
      L'art. 3 e' stato letto nella "versione 3" (vigente, post aggiornamento
      D.Lgs. 203/2022 che ha aggiunto lett. g-bis e g-ter relative al D.Lgs.
      101/2020 - radiazioni ionizzanti); l'art. 4 nella "versione 2" (post
      D.Lgs. 127/2016 che ha soppresso due periodi nei commi 4 e 5).
      L'Allegato I (tipologie di impianti soggetti ad autorizzazione di
      carattere generale ex art. 272 D.Lgs. 152/2006) e' presente solo come
      riassunto nel md committato: il testo integrale e' su Normattiva ma
      contiene tabelle pubblicate "in formato grafico" non navigabili come
      testo, e per la consultazione di una specifica tipologia di impianto
      l'utente deve riferirsi alla GU.
