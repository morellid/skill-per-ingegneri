# Fonti normative per la skill aua-dpr59-dossier.
# Fonte principale: D.P.R. 13 marzo 2013, n. 59 (Regolamento AUA), testo vigente
# pubblicato su Normattiva. Il D.P.R. e' atto del Governo italiano in pubblico
# dominio (art. 5 L. 633/1941).
#
# Nota sulla riproducibilita' dell'hash (URL pinnata con !vig=YYYY-MM-DD):
# Normattiva ri-genera il testo coordinato ad ogni atto modificativo entrato in
# vigore, quindi la URL "bare" (senza ?!vig=) drifta in continuazione (l'hash
# calcolato dalla CI cambia anche solo per timestamp di build della pagina o ELI
# version_date, indipendentemente da modifiche sostanziali). Pinnando alla data
# di vigenza congelata `!vig=2026-05-19` il binario serve la pagina indice
# dell'atto valida a quella data, l'hash diventa stabile e la CI lo verifica
# byte-per-byte. Lo snapshot 2026-05-19 e' source-grounding valido perche'
# successivo all'ultimo aggiornamento citato nella pagina ("pubblicato il
# 03/04/2023", relativo a D.Lgs. 203/2022 che ha aggiunto lett. g-bis e g-ter
# all'art. 3 co. 2: gia' presenti nel MD committato). Nessuna ulteriore
# modifica agli artt. 1-12 e' intervenuta tra il 03/04/2023 e il 2026-05-19.
#
# Nota: la pagina indice Normattiva non contiene inline il testo degli articoli
# (caricati via AJAX al click), ma serve come "ancora" verificabile della
# vigenza dell'atto e dei suoi aggiornamenti. Il testo verbatim degli articoli
# 1-12 nella forma vigente al 2026-05-19 e' trascritto in
# references/fonti/dpr-59-2013-articoli-1-12.md (lettura di ciascun articolo
# via AJAX di Normattiva, idGruppo 1-5, fetchato il 2026-05-19): quello e' il
# MD non falsificabile che alimenta la skill.
#
# Fonti collegate (citate nel md della fonte ma non scaricate come binario):
# - D.Lgs. 152/2006 (Codice dell'Ambiente): citato per art. 19, 20, 26, 108, 112, 215, 216, 269, 272.
# - L. 447/1995 (legge quadro inquinamento acustico): citato per art. 8 co. 4 e 6.
# - L. 241/1990 (procedimento amministrativo): citato per art. 2, 14-ter, 14-quinquies.
# - D.P.R. 160/2010 (SUAP): citato per art. 2, 7.
# - D.L. 5/2012 art. 23 (norma primaria di delega del regolamento AUA).
# Queste fonti non sono scaricate localmente perche' il regolamento AUA le richiama
# ma non le riproduce; la skill cita gli articoli del regolamento AUA, non gli atti
# richiamati. Per il testo letterale degli articoli richiamati l'utente deve
# consultare Normattiva.

