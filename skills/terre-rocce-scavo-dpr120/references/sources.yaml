# Fonte per la gestione delle terre e rocce da scavo: qualificazione come sottoprodotto
# (anziche' rifiuto), gestione nei cantieri di piccole e grandi dimensioni (dichiarazione /
# piano di utilizzo), utilizzo nel sito di produzione (escluse dalla disciplina rifiuti).
# D.P.R. 120/2017, coordinato con la Parte IV del D.Lgs. 152/2006.

