    excerpt_path: references/estratti/dlgs-26-2016-classificazione-moduli.md
    notes: |
      Il PDF scaricato e' la Gazzetta Ufficiale Serie Generale n.53 del
      04/03/2016 (codice atto 16G00034 per il D.Lgs 26/2016). Il decreto e'
      contenuto nelle pagine iniziali della GU. Il D.Lgs 26/2016 e' un
      decreto modificativo del D.Lgs 25 febbraio 2000, n. 93 (originario
      recepimento della direttiva 97/23/CE): l'art. 1 sostituisce o aggiunge
      gli articoli 2, 4, 4-bis-4-septies, 5, 7, 8, 8-bis-8-quinquies, 9, 10,
      11, 12, 13, 14, 14-bis-14-sexies, 15 del D.Lgs 93/2000; l'art. 2
      apporta ulteriori modifiche (sanzioni in euro, denominazioni ministeri);
      l'art. 3 fissa la decorrenza al 19 luglio 2016 (con eccezione per
      l'art. 1, comma 1, lettera t)); l'art. 4 e' clausola di invarianza
      finanziaria. L'Allegato A del decreto contiene il testo integrale dei
      nuovi Allegato I (Requisiti essenziali di sicurezza), Allegato II
      (Tabelle di valutazione della conformita') e Allegato III (Procedure
      di valutazione della conformita' - moduli) da sostituire nel D.Lgs
      93/2000. L'Allegato B contiene il nuovo Allegato VII (Dichiarazione UE
      di conformita' / Esame UE del tipo). Le tabelle 1-9 dell'Allegato II
      sono diagrammi grafici PS/V o PS/DN con linee di demarcazione fra le
      categorie I-IV: nel PDF della GU sono immagini, non testo, e quindi
      la lettura puntuale dei valori soglia richiede consultazione visiva
      del PDF. La Direttiva 2014/68/UE (CELEX 32014L0068) non e' inclusa
      come fonte separata: il D.Lgs 26/2016 ne riproduce il contenuto
      tecnico in lingua italiana e costituisce la norma vincolante
      nell'ordinamento italiano. Per finalita' di concordanza articolo-per-
      articolo direttiva-decreto, l'art. 3 c.3 del D.Lgs 26/2016 rinvia
      esplicitamente alla tavola di concordanza di cui all'allegato VI
      della direttiva 2014/68/UE.
