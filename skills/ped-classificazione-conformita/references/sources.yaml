# Fonte unica autoritativa: il D.Lgs 26/2016, pubblicato nella Gazzetta
# Ufficiale Serie Generale n.53 del 04/03/2016, e' il decreto che, modificando
# il D.Lgs 93/2000, recepisce in Italia la Direttiva 2014/68/UE (PED -
# Pressure Equipment Directive). E' la norma vincolante nell'ordinamento
# italiano per la classificazione, valutazione di conformita' e marcatura CE
# delle attrezzature a pressione. Il decreto modificativo include nei suoi
# allegati il testo integrale dei nuovi Allegato I (RES), Allegato II
# (tabelle di valutazione della conformita') e Allegato III (procedure /
# moduli di valutazione) come sostituiti nel D.Lgs 93/2000.
#
