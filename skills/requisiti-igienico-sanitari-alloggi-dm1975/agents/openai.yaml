display_name: "Requisiti igienico-sanitari minimi degli alloggi (DM 5 luglio 1975)"
short_description: Supporto documentale al tecnico (geometra, ingegnere, architetto) per inquadrare i requisiti igienico-sanitari minimi dei locali di abitazione secondo il DM 5 luglio 1975 (Ministero della sanita'), nella progettazione degli alloggi, nei frazionamenti o cambi di destinazione e nella verifica di agibilita'. Aiuta a inquadrare l'altezza minima interna utile dell'art. 1 (2,70 m, riducibile a 2,40 m per corridoi, disimpegni, bagni, gabinetti e ripostigli; 2,55 m per i comuni montani oltre i 1000 m sul livello del mare); le superfici minime dell'art. 2 (almeno 14 mq per abitante per i primi 4 abitanti e 10 mq per ciascuno dei successivi, stanze da letto di almeno 9 mq per una persona e 14 mq per due, soggiorno di almeno 14 mq, con finestra apribile per letto, soggiorno e cucina); l'alloggio monostanza dell'art. 3 (almeno 28 mq per una persona e 38 mq per due, comprensivo dei servizi); il riscaldamento e la temperatura di progetto dell'aria interna tra 18 e 20 gradi dell'art. 4; l'illuminazione naturale diretta, il fattore di luce diurna medio non inferiore al 2 per cento e la superficie finestrata apribile non inferiore a 1/8 della superficie del pavimento dell'art. 5; la ventilazione naturale o meccanica e l'aspirazione di fumi e vapori dell'art. 6; la stanza da bagno con la sua dotazione minima (vaso, bidet, vasca da bagno o doccia, lavabo) dell'art. 7; e la protezione acustica dei materiali dell'art. 8. NON redige il progetto, non esegue calcoli illuminotecnici o termotecnici di dettaglio, non riproduce i regolamenti edilizi regionali o comunali ne' le deroghe per il recupero dei sottotetti, e non sostituisce il progettista. E' distinta dalla skill sui requisiti acustici passivi (DPCM 5 dicembre 1997) e da quella sull'accessibilita' (DM 236/1989).
default_prompt: |
  Devo verificare i requisiti igienico-sanitari minimi di un alloggio secondo il DM 5 luglio 1975. Quali sono
  le altezze minime interne (art. 1: 2,70 m) e le superfici minime per abitante, per le stanze da letto e per
  l'alloggio monostanza (artt. 2-3)? Come si verifica l'aeroilluminazione (art. 5: superficie finestrata >= 1/8
  del pavimento) e quali dotazioni deve avere il bagno (art. 7)? Cita gli articoli.
