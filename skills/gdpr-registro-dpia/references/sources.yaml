      per identificare trattamenti "ad alto rischio" che richiedono DPIA.
      Adottato il 4 aprile 2017, rivisto il 4 ottobre 2017 (rev. 01).
      SHA256 calcolato in data 2026-05-10 scaricando da download_url.

  - id: dlgs-196-2003-101-2018
