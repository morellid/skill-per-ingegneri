    notes: |
      Codice Privacy italiano coordinato con il GDPR dopo il D.Lgs. 101/2018.
      Rilevante per: norme di adattamento nazionale, particolarita' italiane
      sui dati relativi a salute/genetici (art. 2-septies), DPO settore pubblico
      (art. 154-bis), regime sanzionatorio nazionale. Per la maggior parte
      delle questioni operative su Registro e DPIA, il GDPR + Provv. Garante 467/2018
      sono sufficienti.

