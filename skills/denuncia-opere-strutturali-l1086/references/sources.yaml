# Fonti normative per la skill "denuncia opere strutturali / autorizzazione sismica".
#
# Inquadramento: il DPR 380/2001 (Testo unico edilizia) consolidato Normattiva e' la
# fonte primaria. Le L. 1086/1971 (opere in conglomerato cementizio armato e metalliche)
# e L. 64/1974 (provvedimenti per le costruzioni in zone sismiche) sono state abrogate
# o assorbite: i loro contenuti sono ora codificati negli artt. 64-76 (Parte II Capo II)
# e artt. 83-106 (Parte II Capo IV) del DPR 380/2001 (art. 137 DPR 380 - L. norme
# abrogate). Per questa ragione la skill cita direttamente il testo vigente del DPR 380
# e non i testi storici delle due leggi.
#
# Nota su art. 94-bis DPR 380: introdotto dal DL 32/2019 (cd. Sblocca Cantieri) conv.
# L. 55/2019, fissa al livello nazionale la cornice della classificazione delle opere
# in zona sismica (rilevante / minore rilevanza / privi di rilevanza) ma rinvia ad
# atti regionali per la classificazione puntuale. La skill copre il quadro statale.
# Il dettaglio per ciascuna regione richiede l'esame della delibera regionale (es.
# per la Toscana LR 65/2014 art. 170-bis, gia' coperto dalla skill
# `pratiche-edilizie-lr65-2014-toscana`).

