    notes: |
      Testo Unico Edilizia. Per questa skill rilevano:
      - Parte II Capo II "Normativa tecnica per l'edilizia" (artt. 52-76), in particolare:
        - art. 52 (tipologie di interventi e materiali ricompresi)
        - art. 53 (definizioni)
        - art. 64 (progettazione, direzione lavori, esecuzione - obblighi soggetti)
        - art. 65 (denuncia dei lavori in opere in conglomerato cementizio armato,
          normale e precompresso, e a struttura metallica; deposito relazione strutture)
        - art. 67 (collaudo statico)
      - Parte II Capo IV "Provvedimenti per le costruzioni con particolari prescrizioni
        per le zone sismiche" (artt. 83-106), in particolare:
        - art. 83 (oggetto e ambito; classificazione sismica del territorio nazionale)
        - art. 93 (denuncia dei lavori e presentazione progetti)
        - art. 94 (autorizzazione preventiva all'inizio dei lavori nelle zone a piu'
          elevato rischio sismico)
        - art. 94-bis (varianti, classificazione "interventi rilevanti", "di minore
          rilevanza" e "privi di rilevanza"; introdotto da DL 32/2019 conv. L. 55/2019)
      Artefatto verificato: pagina ufficiale Normattiva versione multivigente congelata
      alla data di vigenza 2026-05-22, concatenata in sequenza con i 6 frammenti
      HTML autoritativi delle singole pagine "caricaArticolo" per artt. 65, 67, 83, 93,
      94 e 94-bis (URL di tipo /atto/caricaArticolo?...codiceRedazionale=001G0429&...
      &dataPubblicazioneGazzetta=2001-10-20 - i parametri esatti di ogni frammento sono
      consultabili nel sorgente HTML dell'indice consolidato Normattiva referenziato dal
      campo url). Lo SHA256 si riferisce a tale concatenazione. Il file md_path
      contiene la trascrizione fedele dei sei articoli a partire da questi frammenti.
      Testo legislativo italiano riproducibile liberamente ai sensi dell'art. 5
      L. 633/1941 (atti ufficiali dello Stato).
