# Fonte normativa per l'inquadramento della progettazione degli interventi di
# consolidamento geotecnico di opere esistenti ai sensi delle NTC 2018 (DM
# 17/01/2018), par. 6.10. La skill inquadra criteri, indagini, tipi di
# consolidamento e controlli/monitoraggio; non calcola ne' dimensiona gli
# interventi.

