display_name: "Consolidamento geotecnico di opere esistenti (NTC 2018 par. 6.10)"
short_description: Supporto documentale al progettista geotecnico e strutturale per l'inquadramento della progettazione degli interventi di consolidamento geotecnico di opere esistenti (sottofondazioni, rinforzo delle fondazioni, miglioramento del terreno di fondazione) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.10. Aiuta a inquadrare l'ambito (provvedimenti tecnici sul sistema manufatto-terreno per eliminare o mitigare difetti di comportamento di un'opera esistente); i criteri generali di progetto (individuazione delle cause del comportamento anomalo riguardanti la sovrastruttura, le strutture di fondazione o il terreno di fondazione; cause di anomali spostamenti del terreno da modifiche del manufatto, variazioni delle pressioni interstiziali, manufatti adiacenti, modifiche del profilo topografico o movimenti di massa, e deterioramento dei materiali; progetto sviluppato unitariamente con quello strutturale e congiuntamente al risanamento della struttura in elevazione; modalita' esecutive e opere provvisionali parte integrante del progetto; metodo osservazionale ammesso quando la complessita' del sottosuolo e' documentata); le indagini geotecniche e la caratterizzazione (indagini su terreno e fondazioni esistenti basate sulla documentazione disponibile, cautele per manufatti sensibili agli spostamenti, misura dei caratteri cinematici dei movimenti in atto e della variazione nel tempo di pressioni interstiziali e spostamenti nel volume significativo, misure protratte per fenomeni stagionali); i tipi di consolidamento geotecnico (miglioramento e rinforzo dei terreni di fondazione, miglioramento e rinforzo dei materiali costituenti la fondazione, ampliamento della base della fondazione se superficiale, trasferimento del carico a strati piu' profondi, introduzione di sostegni laterali, rettifica degli spostamenti del piano di posa; valutazione della ridistribuzione delle sollecitazioni a breve e lungo termine; particolari cautele per interventi con variazioni di volume come congelamento, iniezioni e gettiniezione); e i controlli e il monitoraggio (controllo dell'efficacia obbligatorio quando l'intervento comporta una ridistribuzione delle sollecitazioni al contatto terreno-manufatto, ampiezza commisurata a importanza dell'opera, tipo di difetto e danni possibili; monitoraggio previsto in progetto con esiti come elemento di collaudo). NON calcola ne' dimensiona gli interventi, non definisce il modello geotecnico ne' progetta il risanamento strutturale, non tratta il miglioramento/rinforzo dei terreni in generale (par. 6.9), la classificazione sismica dell'esistente (Cap. 8) ne' la progettazione sismica, e non sostituisce il progettista. Complementa le skill sulle costruzioni esistenti (Cap. 8) e sulla relazione geologica e geotecnica.
default_prompt: |
  Devo inquadrare la progettazione di un intervento di consolidamento geotecnico di un'opera esistente
  (sottofondazioni/rinforzo delle fondazioni) secondo le NTC 2018 (par. 6.10): come si individuano le cause del
  comportamento anomalo e perche' il progetto va sviluppato unitariamente con quello strutturale? Quali sono i
  tipi di consolidamento previsti e quali interventi richiedono particolari cautele (iniezioni, congelamento,
  gettiniezione)? Quando e' obbligatorio il controllo dell'efficacia? Cita i paragrafi.
