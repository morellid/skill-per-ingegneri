schema_version: 1
skill: verifiche-geotecniche-slu-ntc
last_verified: 2026-07-22

# Fonte normativa per l'inquadramento del framework semiprobabilistico delle
# verifiche geotecniche agli stati limite ultimi - approcci progettuali 1 e 2,
# coefficienti parziali su azioni (A1/A2), parametri geotecnici (M1/M2) e
# resistenze (R1/R2/R3), stati limite EQU/STR/GEO - secondo le NTC 2018 (DM
# 17/01/2018), par. 6.2.2 (valori caratteristici) e 6.2.4. La skill inquadra il
# framework generale; non esegue le verifiche, non riproduce i coefficienti R
# specifici di ciascuna opera (par. 6.3-6.11), ne' le SLE (par. 6.2.4.2).

sources:
  - id: ntc2018-par-6-2-4
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018) - par. 6.2.2 (valori caratteristici) e 6.2.4 (verifiche geotecniche SLU, approcci progettuali e coefficienti parziali)"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/gu/2018/02/20/42/so/8/sg/pdf
    accessed: 2026-07-22
    sha256: dda1e397d56d71aa0f5bc457c3ba9b77064a468699dfc37bd056ac6c47105a46
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    md_path: references/fonti/ntc2018-par-6-2-4.md
    excerpt_path: references/estratti/verifiche-geotecniche-slu-checklist.md
    notes: |
      Pubblicato in GU n. 42 del 20/02/2018 - Suppl. Ord. n. 8.
      SHA256 calcolato su not_in_repo/ntc2018-gu42.pdf il 2026-07-22 con doppio
      download riproducibile (stessa fonte GU delle altre skill NTC del repo);
      hash validato live dalla CI del repo su ogni PR.
      Par. 6.2.2 e 6.2.4 (p. GU 185-186, pagine PDF 189-190) estratti con
      `pdftotext -layout` e trascritti verbatim in
      references/fonti/ntc2018-par-6-2-4.md. Le Tab. 6.2.I e 6.2.II sono state
      verificate sull'immagine renderizzata della pagina PDF 190 (pdftoppm -r
      150 -png), perche' pdftotext altera pedici, operatori e la notazione delle
      combinazioni. Contenuti rilevanti:
      - valore caratteristico (par. 6.2.2): stima ragionata e cautelativa del
        parametro geotecnico per ogni stato limite considerato.
      - SLU geotecnici (par. 6.2.4.1): EQU (perdita di equilibrio, Einst,d <=
        Estb,d, coeff. colonna EQU Tab. 6.2.I); STR (resistenza elemento
        strutturale) e GEO (resistenza del terreno), Ed <= Rd [6.2.1].
      - approcci progettuali (par. 6.2.4): Approccio 1 (due combinazioni),
        Approccio 2 (una combinazione); default per SLU non trattati nei par.
        6.3-6.11: Approccio 1 con (A1+M1+R1) e (A2+M2+R2); R1 sempre unitari; R2
        >= 1. Gruppi: azioni A1/A2, parametri M1/M2, resistenze R1/R2/R3.
      - Tab. 6.2.I (azioni, EQU/A1/A2): G1 fav 0,9/1,0/1,0, sfav 1,1/1,3/1,0; G2
        fav 0,8/0,8/0,8, sfav 1,5/1,5/1,3; Q fav 0,0, sfav 1,5/1,5/1,3.
      - Tab. 6.2.II (parametri geotecnici, M1/M2): tan phi'k 1,0/1,25; c'k
        1,0/1,25; cuk 1,0/1,4; peso unita' di volume 1,0/1,0. Rd analitico da
        Xk/gamma_M (Tab. 6.2.II) con gamma_R per opera.
      Restano fuori scope: i coefficienti gamma_R (gruppi R1/R2/R3) specifici di
      ciascuna opera (par. 6.3-6.11), le verifiche SLE geotecniche in dettaglio
      (par. 6.2.4.2), il calcolo effettivo di Ed/Rd e delle verifiche.
