    notes: |
      Codice redazionale 23G00044, GU n. 77 del 31/3/2023 - S.O. n. 12 (in vigore dal
      1/4/2023). Il binario e' la pagina indice Normattiva pinnata a !vig=2026-07-17
      (hash stabile, doppio download: 0e9a1938...; e' lo stesso indice usato dalle
      altre skill D.Lgs. 36). L'articolo 116 (Collaudo e verifica di conformita') e'
      caricato via AJAX (caricaArticolo: versione 2, idGruppo 18, flagTipoArticolo 0,
      codiceRedazionale 23G00044, dataPubblicazioneGazzetta 2023-03-31) e trascritto
      verbatim in references/fonti/dlgs-36-2023-art-116.md. Le porzioni tra (( )) sono
      le modifiche successive gia' consolidate nel testo vigente (es. correttivo
      D.Lgs. 31 dicembre 2024, n. 209). Riferimenti citati come rinvio e NON riprodotti:
      l'allegato II.14 (modalita' tecniche/tempi del collaudo, casi di certificato di
      regolare esecuzione - CRE, compensi), l'allegato II.15 (costi degli accertamenti
      di laboratorio), gli artt. 29/45 (incentivi/compensi), l'art. 16 (conflitto di
      interesse), l'art. 43 (BIM) e l'art. 1669 del codice civile. Il collaudo statico
      strutturale (DPR 380 art. 67) e' coperto da altra skill (denuncia-opere-strutturali-l1086).
