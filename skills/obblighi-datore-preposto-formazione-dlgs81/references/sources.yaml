# Fonte per gli OBBLIGHI del datore di lavoro e del dirigente (art. 18), del PREPOSTO (art. 19) e per
# la FORMAZIONE dei lavoratori e dei loro rappresentanti (art. 37). Fonte: D.Lgs. 9 aprile 2008, n.
# 81 (Testo unico salute e sicurezza sul lavoro).

sources:
