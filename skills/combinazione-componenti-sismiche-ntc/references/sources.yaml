    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018) - par. 7.3.5 Risposta alle diverse componenti dell'azione sismica ed alla variabilita' spaziale del moto"
    type: decreto
