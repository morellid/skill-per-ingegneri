# Fonte normativa per l'inquadramento della combinazione delle componenti
# dell'azione sismica e della risposta alla variabilita' spaziale del moto
# secondo le NTC 2018 (DM 17/01/2018), par. 7.3.5. La skill inquadra la regola;
# non esegue l'analisi ne' calcola gli effetti.

