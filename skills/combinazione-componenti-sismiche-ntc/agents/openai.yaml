display_name: "Combinazione delle componenti dell'azione sismica (NTC 2018 par. 7.3.5)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della combinazione delle componenti dell'azione sismica e della risposta alla variabilita' spaziale del moto secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.3.5. Aiuta a inquadrare la combinazione delle tre componenti dell'azione sismica nell'analisi dinamica o statica, lineare o non lineare (la risposta e' calcolata unitariamente applicando l'espressione 1,00 per Ex piu' 0,30 per Ey piu' 0,30 per Ez, formula 7.3.10; gli effetti piu' gravosi si ricavano dal confronto tra le tre combinazioni ottenute permutando circolarmente i coefficienti moltiplicativi, assegnando a turno il coefficiente unitario a ciascuna componente e 0,30 alle altre due); la considerazione della componente verticale unicamente nei casi previsti al paragrafo 7.2.2; la combinazione con gli effetti pseudo-statici indotti dagli spostamenti relativi prodotti dalla variabilita' spaziale del moto unicamente nei casi previsti al paragrafo 3.2.4.1, mediante la radice quadrata della somma dei quadrati (SRSS), salvo quanto indicato al paragrafo 7.2.2 per gli appoggi mobili; e l'analisi dinamica con integrazione al passo (applicazione simultanea delle due componenti orizzontali della storia temporale, e della verticale ove necessario; con almeno 3 storie temporali si utilizzano i valori piu' sfavorevoli, con almeno 7 diverse storie temporali gli effetti sono la media dei valori piu' sfavorevoli; per la variabilita' spaziale, storie temporali differenziate ma coerenti per ciascun vincolo oppure analisi con moto sincrono e effetti pseudo-statici del paragrafo 3.2.4). NON esegue l'analisi ne' calcola gli effetti, non genera le storie temporali, non tratta i casi che richiedono la componente verticale (par. 7.2.2) ne' la variabilita' spaziale del moto (par. 3.2.4), e non sostituisce il progettista. Complementa le skill sulle combinazioni di carico (par. 2.5.3), sui criteri di modellazione sismica (par. 7.2.6), sulla regolarita' strutturale (par. 7.2.1), sugli spostamenti di interpiano allo SLD (par. 7.3.6.1) e sullo spettro di risposta (par. 3.2).
default_prompt: |
  Devo combinare le componenti dell'azione sismica secondo le NTC 2018 (par. 7.3.5): come si applica la formula
  [7.3.10] 1,00 Ex + 0,30 Ey + 0,30 Ez e quante combinazioni servono con la permutazione circolare? Quando va
  inclusa la componente verticale (par. 7.2.2)? Come si tiene conto della variabilita' spaziale del moto (SRSS,
  casi par. 3.2.4.1)? Nell'analisi con integrazione al passo, quante storie temporali servono e come si valutano
  gli effetti con 3 (valori piu' sfavorevoli) o 7 (media)? Cita il paragrafo e la formula.
