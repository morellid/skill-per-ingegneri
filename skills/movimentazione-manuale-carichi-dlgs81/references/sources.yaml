    notes: |
      Codice redazionale 008G0104, GU n. 101 del 30/4/2008 - S.O. n. 108 (in vigore
      dal 15/5/2008). Il binario e' la pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: 18fbc542...; e' lo stesso indice
      usato dalle altre skill D.Lgs. 81). Gli articoli del Titolo VI "Movimentazione
      manuale dei carichi" - 167 (campo di applicazione e definizioni), 168 (obblighi
      del datore di lavoro), 169 (informazione, formazione e addestramento) - sono
      caricati via AJAX (caricaArticolo: idGruppo 30, flagTipoArticolo 0,
      codiceRedazionale 008G0104, dataPubblicazioneGazzetta 2008-04-30) e trascritti
      verbatim in references/fonti/dlgs-81-2008-mmc.md. L'Allegato XXXIII (elementi di
      riferimento: caratteristiche del carico, sforzo fisico, ambiente di lavoro,
      esigenze dell'attivita', fattori individuali di rischio) e le norme tecniche
      ISO 11228-1/2/3 richiamate dagli artt. 168-169 sono citate come rinvio e NON
      riprodotte (allegato = elenco di elementi; ISO a pagamento). L'art. 41
      (sorveglianza sanitaria) richiamato dall'art. 168 c. 2 lett. d e' citato.
