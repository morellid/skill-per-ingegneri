    notes: |
      Codice redazionale 001G0429 (G.U. 20 ottobre 2001). Pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: bac3f7b1...). Articoli caricati via AJAX
      (caricaArticolo, dataPubblicazioneGazzetta 2001-10-20) e trascritti verbatim in
      references/fonti/dpr-380-2001-artt-27-31-33-34-44.md:
      - Art. 27 (idGruppo 8, v3): vigilanza sull'attività urbanistico-edilizia; sospensione dei lavori
        con provvedimenti definitivi entro 45 gg e possibile sequestro del cantiere entro 15 gg su
        ordinanza del sindaco; demolizione/ripristino d'ufficio in aree vincolate (Soprintendente
        decorsi 180 gg).
      - Art. 31 (idGruppo 9, v8): interventi in assenza/totale difformità/variazioni essenziali;
        ingiunzione a demolire, termine 90 gg (proroga fino a 240 gg in casi tassativi), acquisizione
        gratuita al patrimonio comunale (area non oltre 10 volte la superficie utile abusiva),
        sanzione amministrativa 2.000-20.000 euro (c. 4-bis, sempre massima nelle aree del c. 2 art.
        27 e a rischio idrogeologico), demolizione a spese dei responsabili, ordine di demolizione del
        giudice con la condanna ex art. 44.
      - Art. 33 (idGruppo 9, v4): ristrutturazione edilizia (art. 10) in assenza/totale difformità:
        rimozione/demolizione o, se il ripristino non è possibile, sanzione pari al doppio dell'aumento
        di valore; contributo di costruzione comunque dovuto; regimi per immobili vincolati/zone A.
      - Art. 34 (idGruppo 9, v8): parziale difformità: rimozione/demolizione o, quando non possibile
        senza pregiudizio della parte conforme, sanzione pari al triplo del costo di produzione (uso
        residenziale) o del valore venale (usi diversi).
      - Art. 44 (idGruppo 9, v5): sanzioni penali (ammenda fino a 10.329 euro; arresto fino a 2 anni e
        ammenda 5.164-51.645 euro per totale difformità/assenza; lottizzazione abusiva e confisca).
      LIMITE DI RESA (Regola zero): la SANATORIA / accertamento di conformità (artt. 36, 36-bis) e le
      tolleranze (art. 34-bis) NON sono trattate (cfr. modulistica-edilizia-unificata, Salva Casa); gli
      artt. 30 (lottizzazione), 32 (variazioni essenziali) e la disciplina regionale sono citati e non
      trascritti. La skill inquadra il regime e i termini, non adotta i provvedimenti né quantifica le
      sanzioni.
