# Fonte per il regime REPRESSIVO degli abusi edilizi: vigilanza, ordine di demolizione e acquisizione
# gratuita, ristrutturazione abusiva, parziale difformità, sanzioni penali. Fonte: D.P.R. 6 giugno
# 2001, n. 380, Titolo IV, artt. 27, 31, 33, 34, 44. NON copre la sanatoria (artt. 36/36-bis).

