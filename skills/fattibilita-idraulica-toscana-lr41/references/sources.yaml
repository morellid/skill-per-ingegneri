    url: "https://raccoltanormativa.consiglio.regione.toscana.it/articolo?urndoc=urn:nir:regione.toscana:legge:2018-07-24;41&pr=idx,0;artic,1;articparziale,0"
    accessed: 2026-07-14
    sha256: 4b75a5008ccef7ce46ad99e3638fdb2d2a588372deedfc753e03f232713ca481
    license: public-domain
    binary_path: not_in_repo/lr-toscana-41-2018-vig-2026-07-14.html
    md_path: references/fonti/lr-toscana-41-2018.md
