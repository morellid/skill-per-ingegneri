# Fonte per la fattibilita' delle trasformazioni nelle aree a pericolosita' per
# alluvioni in Toscana: magnitudo idraulica, opere per la gestione del rischio,
# limitazioni e condizioni per la nuova costruzione e per il patrimonio esistente.

