    title: "Legge regionale Toscana 24 luglio 2018, n. 41 - Disposizioni in materia di rischio di alluvioni e di tutela dei corsi d'acqua (attuazione d.lgs. 49/2010, dir. 2007/60/CE), testo vigente al 2026-07-14"
    type: legge-regionale
    # URL della Raccolta Normativa del Consiglio regionale toscano, con il
    # parametro pr=idx,0;artic,1 che restituisce l'ARTICOLATO COMPLETO (il link
