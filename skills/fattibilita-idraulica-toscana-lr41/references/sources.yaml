    notes: |
      B.U.R.T. n. 39, parte prima, del 30/7/2018. Il binario e' la pagina a testo
      completo (pr=idx,0;artic,1) della Raccolta Normativa toscana (hash stabile,
      doppio download: 4b75a500...). Articoli 1, 2 (definizioni: magnitudo
      idraulica h1/h2/h3, battente, aree a pericolosita', opere idrauliche/
      sopraelevazione/difesa locale), 7, 8 (opere per la gestione del rischio),
      10 (limitazioni), 11 (nuova costruzione), 12 (patrimonio esistente), 23, 25
      letti e trascritti verbatim in references/fonti/lr-toscana-41-2018.md. Le
      mappe di pericolosita' dei Piani di gestione del rischio di alluvioni
      (PGRA) / Piani di bacino, il DPGR 5/R/2020 (indagini geologiche, idrauliche
      e sismiche) e le DGR attuative sono citati come riferimento e NON riprodotti.
    correzione_scheda: |
      La issue #49 cita come fonte il DPGR Toscana 5/R/2020, che in realta'
      disciplina il deposito e il controllo delle indagini geologiche, idrauliche
      e sismiche (attuazione art. 104 l.r. 65/2014), NON l'invarianza/rischio
      idraulico. La disciplina della fattibilita' idraulica delle trasformazioni
      (classi di magnitudo, opere di messa in sicurezza) e' invece nella L.R.
      41/2018, usata qui come fonte corretta.
