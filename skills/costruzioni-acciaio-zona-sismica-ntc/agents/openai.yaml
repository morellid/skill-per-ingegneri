# Not used by Claude Code (which reads SKILL.md frontmatter directly).
display_name: "Acciaio in zona sismica: regole generali (NTC 2018 par. 7.5)"
short_description: Supporto documentale al progettista strutturale per inquadrare le regole generali delle costruzioni di acciaio in zona sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.5. Aiuta a inquadrare le caratteristiche dei materiali del par. 7.5.1 (acciaio conforme al par. 11.3.4.9 e fattore di sovraresistenza del materiale gamma_ov pari a 1,25 per gli acciai S235, S275 ed S355 e pari a 1,15 per gli acciai S420 ed S460); le tipologie strutturali del par. 7.5.2.1 (strutture intelaiate; controventi concentrici a diagonale tesa attiva, a V o a K, con la configurazione a K non dissipativa; controventi eccentrici; strutture a mensola o a pendolo inverso; intelaiate con controventi; intelaiate con tamponature); i fattori di comportamento del par. 7.5.2.2 (q0 dalla Tab. 7.3.II; rapporto alpha_u su alpha_1 pari a 1,1 per gli edifici a un piano, 1,2 per i telai a piu' piani con una sola campata, 1,3 per i telai a piu' piani e piu' campate, 1,2 per i controventi eccentrici a piu' piani, 1,0 per le strutture a mensola o a pendolo inverso); e le regole generali per gli elementi dissipativi del par. 7.5.3 con la Tab. 7.5.I (classe della sezione trasversale: CD"B" con 2 minore di q0 minore o uguale a 4 richiede sezioni di Classe 1 o 2, CD"A" con q0 maggiore di 4 richiede sezioni di Classe 1; per le colonne primarie dissipative dei telai il rapporto NEd su Npl,Rd non deve superare 0,3). NON esegue le verifiche di resistenza/duttilita' delle membrature e dei collegamenti, non progetta i collegamenti e non sostituisce il progettista. E' distinta dalla skill sull'acciaio statico (par. 4.2) e da quella sul fattore di comportamento q (par. 7.3.1).
default_prompt: |
  Sto impostando una struttura in acciaio in zona sismica secondo le NTC 2018 (par. 7.5). Quale tipologia
  strutturale e quale comportamento (dissipativo/non dissipativo) posso adottare? Quale fattore di sovraresistenza
  del materiale gamma_ov uso e quale rapporto alpha_u/alpha_1? Quale classe della sezione trasversale mi richiede
  la Tab. 7.5.I in funzione della classe di duttilita' e di q0? Cita i paragrafi.
