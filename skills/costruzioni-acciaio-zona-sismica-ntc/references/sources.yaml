# Fonte normativa per l'inquadramento delle regole generali per le costruzioni
# di acciaio in zona sismica (comportamento dissipativo/non dissipativo,
# caratteristiche dei materiali e fattore di sovraresistenza gamma_ov, tipologie
# strutturali, fattori di comportamento q0 e alpha_u/alpha_1, regole generali
# per elementi dissipativi e Tab. 7.5.I classe della sezione) secondo le NTC
# 2018 (DM 17/01/2018), par. 7.5. La skill inquadra le regole generali; non
# esegue le verifiche di resistenza/duttilita' ne' progetta i collegamenti.

