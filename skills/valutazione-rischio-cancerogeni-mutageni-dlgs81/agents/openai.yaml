display_name: "Rischio cancerogeni e mutageni sul lavoro (D.Lgs 81/2008 Titolo IX Capo II)"
short_description: Supporto documentale al RSPP/ASPP, al datore di lavoro e al tecnico della sicurezza per l'inquadramento della valutazione e gestione del rischio da agenti cancerogeni, mutageni e da sostanze tossiche per la riproduzione ai sensi del D.Lgs. 9 aprile 2008, n. 81, Titolo IX, Capo II (artt. 233-243), nel testo vigente aggiornato dal D.Lgs. 135/2024. Inquadra il campo di applicazione, con l'esclusione dell'amianto del Capo III; le definizioni di agente cancerogeno e mutageno (categorie 1A/1B del regolamento CLP 1272/2008 e allegato XLII) e di sostanza tossica per la riproduzione (priva di soglia o con valore soglia, allegato XLIII), con il valore limite, il valore limite biologico e la sorveglianza sanitaria; la gerarchia di sostituzione e riduzione (sostituzione se tecnicamente possibile, sistema chiuso, riduzione al piu' basso valore tecnicamente possibile, rispetto del valore limite); la valutazione del rischio riportata nel documento dell'art. 17 e l'integrazione del DVR (artt. 28 e 29); le misure tecniche, organizzative e procedurali (quantitativi minimi, limitazione del numero di esposti e aree con divieto di fumo, aspirazione localizzata, misurazione secondo l'allegato XLI, pulizia, procedure di emergenza, smaltimento in contenitori ermetici etichettati) e le misure igieniche (servizi igienici, indumenti protettivi separati, DPI); l'informazione e la formazione prima dell'adibizione e con ripetizione almeno quinquennale, con etichettatura CLP; la sorveglianza sanitaria (parere del medico competente, allontanamento ex art. 42) e il registro di esposizione con le cartelle sanitarie e di rischio, l'accesso di RSPP e RLS, l'invio all'INAIL e la conservazione fino a 40 anni per i cancerogeni e mutageni e almeno 5 anni per le sostanze tossiche per la riproduzione. NON redige il DVR ne' la valutazione del rischio, non esegue misurazioni ne' campionamenti, non applica i valori limite di esposizione, non riproduce gli Allegati XLI/XLII/XLIII/XLIII-bis ne' i regolamenti CLP/REACH, non tratta l'amianto (Capo III), gli agenti chimici (Capo I) ne' gli agenti biologici (Titolo X), e non sostituisce il datore di lavoro, l'RSPP ne' il medico competente.
default_prompt: |
  Nella mia attività si utilizzano agenti cancerogeni/mutageni: come inquadro il rischio secondo il
  D.Lgs. 81/2008 Titolo IX Capo II? Come si fa la valutazione e come si integra il DVR, quali misure
  tecniche e organizzative sono richieste, e quando scattano la sorveglianza sanitaria e il registro
  degli esposti? Cita gli articoli.
