# Fonte per l'inquadramento della VALUTAZIONE E GESTIONE DEL RISCHIO DA AGENTI CANCEROGENI, MUTAGENI E
# DA SOSTANZE TOSSICHE PER LA RIPRODUZIONE: campo di applicazione, definizioni, sostituzione/riduzione,
# valutazione del rischio (integrazione del DVR), misure tecniche/organizzative/procedurali e igieniche,
# informazione e formazione, sorveglianza sanitaria, registro di esposizione e cartelle sanitarie. Fonte:
# Testo unico sicurezza (D.Lgs. 81/2008), Titolo IX, Capo II, artt. 233-243 (testo vigente agg. D.Lgs.
# 135/2024).

