display_name: "Opere di sostegno: muri e paratie - verifiche NTC 2018 (par. 6.5)"
short_description: Supporto documentale al progettista strutturale e geotecnico per l'inquadramento delle verifiche delle opere di sostegno - muri di sostegno, paratie e strutture miste - secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.5. Inquadra le tipologie e il rinvio al par. 7.11.6 per il sismico; i criteri generali di progetto con il riempimento costipato e drenante e il drenaggio a tergo dei muri, i dispositivi complementari e il monitoraggio, gli effetti sulle costruzioni preesistenti e le indagini geotecniche estese alla stabilita' locale e globale del complesso opera-terreno; le azioni e il modello geometrico con i sovraccarichi a tergo, la riduzione della quota di valle pari al minore tra il dieci per cento dell'altezza, il dieci per cento della differenza di quota e cinquanta centimetri, e l'ipotesi di falda non inferiore ai terreni a bassa permeabilita' negli stati limite ultimi; le verifiche agli stati limite ultimi dei muri (scorrimento, carico limite della fondazione, ribaltamento, stabilita' globale e stati limite strutturali) con la stabilita' globale in Approccio 1 Combinazione 2 (A2+M2+R2) e le rimanenti verifiche in Approccio 2 (A1+M1+R3) e i coefficienti parziali della Tabella 6.5.I (capacita' portante 1,4, scorrimento 1,1, ribaltamento 1,15, resistenza a valle 1,4), con l'avvertenza di non contare in generale la resistenza passiva a valle nello scorrimento; le verifiche agli stati limite ultimi delle paratie (geotecnici, idraulici e strutturali) con la stabilita' globale in Approccio 1 Combinazione 2, gli stati limite idraulici come al par. 6.2.4.2 e le rimanenti verifiche in Approccio 1 con le due combinazioni e i coefficienti del gruppo R1 unitari, e la non planarita' delle superfici per angolo d'attrito terreno-parete maggiore di meta' dell'angolo di resistenza al taglio; e le verifiche di esercizio sugli spostamenti. NON calcola le spinte, le verifiche o i coefficienti, non dimensiona il muro o la paratia, non riproduce le Tabelle 6.2.I/6.2.II/6.8.I ne' la Circolare 21/1/2019 n. 7, non tratta il caso sismico (par. 7.11.6) e non sostituisce il progettista strutturale/geotecnico ne' la relazione geotecnica.
default_prompt: |
  Devo inquadrare le verifiche di un'opera di sostegno secondo le NTC 2018 (par. 6.5): quali stati
  limite vanno verificati per un muro (o una paratia), con quale approccio e con quali combinazioni e
  coefficienti parziali? Posso contare sulla resistenza passiva del terreno a valle nello scorrimento?
  Cita i paragrafi e la Tab. 6.5.I.
