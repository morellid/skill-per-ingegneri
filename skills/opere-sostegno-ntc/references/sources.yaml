# secondo le NTC 2018: criteri di progetto, azioni e modello geometrico, verifiche agli stati limite
# ultimi e di esercizio, approcci progettuali e coefficienti parziali. Fonte: DM 17 gennaio 2018
# (NTC 2018), par. 6.5.

