# Fonte per la MEDIAZIONE CIVILE E COMMERCIALE: condizione di procedibilità e materie obbligatorie,
# procedimento (domanda, primo incontro, svolgimento), conclusione (verbale, accordo, proposta) ed
# efficacia esecutiva dell'accordo. Fonte: D.Lgs. 4 marzo 2010, n. 28 (testo vigente post Cartabia).

sources:
  - id: dlgs-28-2010-artt-5-8-11-12
    title: "D.Lgs. 4 marzo 2010, n. 28 - artt. 5, 8, 11, 12 (mediazione civile e commerciale) (testo vigente al 2026-07-17)"
    type: decreto-legislativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2010-03-04;28!vig=2026-07-17
    accessed: 2026-07-17
    sha256: e09c1d946fd7e45485d81af5e5085e9c4a9968ab6c68cca64c7ab511a36a7ce0
    license: public-domain
    binary_path: not_in_repo/dlgs28.html
    md_path: references/fonti/dlgs-28-2010-artt-5-8-11-12.md
    excerpt_path: references/estratti/mediazione-checklist.md
    notes: |
      Codice redazionale 010G0050 (G.U. 5 marzo 2010). Pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: e09c1d94...). Artt. 5 (v10, grp2), 8 (v7,
      grp2), 11 (v6, grp2), 12 (v6, grp2) caricati via AJAX (caricaArticolo, dataPubblicazioneGazzetta
      2010-03-05) e trascritti verbatim (commi operativi) in references/fonti/dlgs-28-2010-artt-5-8-11-12.md:
      - Art. 5: condizione di procedibilità e materie in cui la mediazione è obbligatoria (condominio,
        diritti reali, divisione, successioni, patti di famiglia, locazione, comodato, affitto
        d'azienda, responsabilità medica/sanitaria, diffamazione a mezzo stampa, contratti
        assicurativi/bancari/finanziari, ecc.); improcedibilità eccepita/rilevata entro la prima
        udienza; condizione avverata se il primo incontro si conclude senza accordo (c. 4);
        provvedimenti urgenti/cautelari non preclusi (c. 5); esclusioni (c. 6).
      - Art. 8: procedimento (designazione del mediatore e primo incontro tra 20 e 40 giorni dal
        deposito; effetti sulla prescrizione/decadenza; partecipazione personale delle parti,
        delega per giustificati motivi; assistenza obbligatoria degli avvocati nei casi dell'art. 5
        c. 1 e nella mediazione demandata; verbale del primo incontro; esperti CTU).
      - Art. 11: conclusione (verbale con accordo allegato; proposta del mediatore, accettazione/
        rifiuto entro 7 giorni; valore dell'accordo; sottoscrizione e certificazione delle firme;
        deposito; conservazione atti per almeno un triennio; autentica per atti ex art. 2643 c.c.).
      - Art. 12: efficacia esecutiva ed esecuzione (accordo sottoscritto dalle parti e dagli
        avvocati = titolo esecutivo con certificazione di conformità a norme imperative/ordine
        pubblico; in mancanza di avvocati, omologazione con decreto del presidente del tribunale;
        controversie transfrontaliere; iscrizione ipoteca giudiziale).
      LIMITE DI RESA (Regola zero): articoli richiamati (art. 2, 5-bis/5-ter/5-quater, 6, 8-bis, 13,
      17) citati e non trascritti; tariffe/indennità degli organismi (DM parametri) non riprodotte.
      Testo vigente post riforma Cartabia (D.Lgs. 149/2022) e D.Lgs. 28/2023.
