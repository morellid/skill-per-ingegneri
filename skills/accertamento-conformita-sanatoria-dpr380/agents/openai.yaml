display_name: "Accertamento di conformita' / sanatoria edilizia - salva-casa (DPR 380/2001)"
short_description: Supporto documentale al progettista (geometra/architetto/ingegnere) e al tecnico incaricato per l'accertamento di conformita' (permesso o SCIA in sanatoria) degli interventi edilizi abusivi, ai sensi del D.P.R. 6 giugno 2001, n. 380, Titolo IV, artt. 36, 36-bis e 37, come modificati dal DL 69/2024 (salva-casa) conv. L. 105/2024. Stabilisce quale articolo si applica in base alla qualificazione dell'abuso: assenza di titolo o totale difformita' con doppia conformita' piena (conformita' urbanistica ed edilizia sia al momento della realizzazione sia al momento della domanda), oblazione pari al contributo di costruzione in misura doppia e decisione in 60 giorni con silenzio-rifiuto (art. 36); parziale difformita' e variazioni essenziali con la doppia conformita' attenuata del salva-casa (conformita' urbanistica alla domanda e requisiti edilizi alla realizzazione), la dichiarazione del professionista abilitato che attesta le conformita' e prova l'epoca, gli interventi anche strutturali prescrivibili dallo sportello unico, i profili sismici e paesaggistici, l'oblazione con incremento del 20 per cento o doppio del valore venale e la decisione in 45 giorni con silenzio-assenso (art. 36-bis); gli interventi in assenza o difformita' dalla SCIA con la sanzione pari al triplo dell'aumento del valore venale, minimo 1.032 euro, e il rinvio all'art. 36-bis (art. 37). NON redige la domanda ne' la dichiarazione di conformita', non qualifica l'abuso, non calcola l'oblazione ne' il valore venale, non tratta il condono e non sostituisce il progettista, lo sportello unico ne' gli enti competenti.
default_prompt: |
  Ho rilevato un abuso edilizio su un immobile: come inquadro la sanatoria (accertamento di conformita')
  secondo il DPR 380/2001 dopo il salva-casa? Quale articolo si applica tra 36, 36-bis e 37, che doppia
  conformita' serve, quale oblazione e in quanti giorni si decide (silenzio-rifiuto o silenzio-assenso)?
  Cita gli articoli.
