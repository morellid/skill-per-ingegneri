# Fonte per l'inquadramento dell'ACCERTAMENTO DI CONFORMITA' (permesso/SCIA in sanatoria) degli abusi
# edilizi: assenza di titolo o totale difformita' (art. 36), parziale difformita' e variazioni
# essenziali con la sanatoria semplificata "salva-casa" (art. 36-bis), interventi in assenza/difformita'
# dalla SCIA (art. 37). Fonte: Testo unico edilizia (DPR 380/2001), Titolo IV.

