    notes: |
      Testo consolidato (CELEX 02017R0745-20240709). Letti e trascritti verbatim in
      references/fonti/reg-ue-2017-745-mdr.md: la struttura dell'allegato II
      (documentazione tecnica, 6 capitoli), l'allegato III (documentazione tecnica
      sulla sorveglianza post-commercializzazione), l'art. 52 (procedure di
      valutazione della conformita' per le classi I e IIa, incluse le
      sottocategorie sterile/con funzione di misura/strumenti chirurgici
      riutilizzabili) e l'intestazione delle regole di classificazione (allegato
      VIII, definizioni di durata e dispositivi invasivi/attivi). Le 22 regole di
      classificazione dell'allegato VIII e i requisiti generali di sicurezza e
      prestazione (allegato I) sono citati come rinvio e NON riprodotti
      integralmente. Le norme armonizzate (a pagamento) e gli MDCG guidance sono
      citati, non riprodotti.
