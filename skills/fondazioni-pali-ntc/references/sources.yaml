# Fonte per l'inquadramento delle VERIFICHE DELLE FONDAZIONI SU PALI (e delle fondazioni miste a platea
# su pali) secondo le NTC 2018: stati limite ultimi e di esercizio, approcci progettuali, coefficienti
# parziali e fattori di correlazione, controlli d'integrita' e prove di carico. Fonte: DM 17 gennaio 2018
# (NTC 2018), par. 6.4.3.

