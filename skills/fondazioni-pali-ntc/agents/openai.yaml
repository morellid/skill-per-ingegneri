display_name: "Fondazioni su pali: verifiche SLU/SLE e coefficienti NTC 2018 (par. 6.4.3)"
short_description: Supporto documentale al progettista strutturale e geotecnico per l'inquadramento delle verifiche delle fondazioni su pali e delle fondazioni miste a platea su pali secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.4.3. Inquadra l'impostazione del progetto con gli effetti di gruppo e l'attrito negativo (coefficienti M1 della Tabella 6.2.II) e il rinvio al paragrafo 7.11.5.3.2 per il sismico; le verifiche agli stati limite ultimi dei pali - GEO (carico limite assiale, carico limite trasversale, sfilamento in trazione, stabilita' globale) e STR - con la stabilita' globale in Approccio 1 Combinazione 2 (A2+M2+R2) e le rimanenti verifiche in Approccio 2 (A1+M1+R3), con il coefficiente gamma_R non portato in conto negli stati limite strutturali; le resistenze a carico assiale con i coefficienti parziali della Tabella 6.4.II (base 1,15/1,35/1,3, laterale in compressione 1,15, totale 1,15/1,30/1,25, laterale in trazione 1,25 per pali infissi, trivellati e ad elica continua) e la determinazione della resistenza caratteristica con i fattori di correlazione delle Tabelle 6.4.III (prove di carico statico), 6.4.IV (verticali indagate) e 6.4.V (prove dinamiche); la resistenza della palificata con l'effetto di gruppo; i carichi trasversali con il coefficiente della Tabella 6.4.VI (gamma_T = 1,3); le verifiche di esercizio su cedimenti, sollevamenti e spostamenti trasversali; le fondazioni miste a platea su pali; i controlli d'integrita' (almeno il 5 per cento dei pali, minimo 2, e tutti i pali dei gruppi di grande diametro con non piu' di 4 pali) e le prove di carico di progetto su pali pilota (carico non inferiore a 2,5 volte l'azione di esercizio) e in corso d'opera (1,5 volte, o 1,2 volte con pali strumentati). NON esegue il calcolo delle resistenze, delle verifiche o dei coefficienti, non dimensiona i pali o la palificata, non riproduce le Tabelle 6.2.I/6.2.II/6.8.I ne' la Circolare 21/1/2019 n. 7, non tratta il caso sismico (par. 7.11.5.3.2) e non sostituisce il progettista strutturale/geotecnico ne' la relazione geotecnica.
default_prompt: |
  Devo inquadrare le verifiche di una fondazione su pali secondo le NTC 2018 (par. 6.4.3): quali stati
  limite vanno verificati, con quale approccio e con quali coefficienti parziali (Tab. 6.4.II e 6.4.VI)?
  Come si determina la resistenza caratteristica con i fattori di correlazione e quante prove di carico e
  controlli d'integrita' servono? Cita i paragrafi e le tabelle.
