schema_version: 1
skill: bandi-tipo-anac-checker
last_verified: 2026-05-02

# Fonti normative per la skill di verifica conformita' disciplinari di gara
# agli schemi ANAC (bandi-tipo) ai sensi del D.Lgs. 36/2023.
#
# Struttura normativa di riferimento:
# - D.Lgs. 36/2023 artt. 11, 74, 87, 90, 94-103, 117-120: clausole disciplinare obbligatorie
# - ANAC schemi di disciplinare 2023: template per SA qualificate, articolati per
#   tipo contratto (lavori / servizi+forniture) e criterio (PPB / OEPV)
#
# NOTA sugli schemi ANAC: ANAC ha pubblicato gli schemi di disciplinare per il
# D.Lgs. 36/2023 a partire da fine 2023. I PDF sono disponibili sul portale ANAC
# alla sezione "Bandi-tipo". Non e' possibile embedare l'intero testo degli schemi
# (documenti lunghi, aggiornati periodicamente); questa skill verifica la struttura
# e i requisiti normativi. Per confronto puntuale con il testo verbatim, l'utente
# deve scaricare l'ultima versione dal portale ANAC.

sources:
  - id: dlgs-36-2023-originale-gu-2023
    title: "D.Lgs. 31 marzo 2023 n. 36 - Codice dei contratti pubblici - GU n. 77 del 31/03/2023 Suppl. Ordinario n. 12 (riedito su GU n. 87 del 13/04/2023 Suppl. Ordinario n. 14)"
    type: decreto-legislativo
    url: https://www.gazzettaufficiale.it/eli/gu/2023/04/13/87/so/14/sg/pdf
    accessed: 2026-05-02
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-36-2023-gu87-so14.pdf
    excerpt_paths:
      - references/estratti/dlgs-36-artt-clausole-disciplinare.md
    notes: |
      Codice dei contratti pubblici, in vigore dal 1 aprile 2023, efficace dal
      1 luglio 2023. Per questa skill rilevano:
      - Art. 11: clausole sociali (CCNL settore e zona)
      - Art. 74: contenuto minimo del bando/disciplinare
      - Art. 87: DGUE (documento di gara unico europeo)
      - Art. 90: comunicazioni e accesso agli atti
      - Artt. 94-98: motivi di esclusione (automatici e non automatici)
      - Art. 99: self-cleaning
      - Artt. 100-103: requisiti di partecipazione (idoneita', capacita' econ., capacita' tecn.)
      - Art. 101 (bis, ter): soccorso istruttorio
      - Artt. 104-106: avvalimento
      - Art. 117: garanzia provvisoria
      - Art. 118: garanzia definitiva
      - Artt. 119-120: subappalto

