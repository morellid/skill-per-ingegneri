  - id: anac-bando-tipo-n1-2023-delibera-365-2025
    title: "ANAC - Bando tipo n. 1/2023 (aggiornato con Delibera n. 365 del 16 settembre 2025) - Schema disciplinare servizi e forniture OEPV sopra soglia"
    type: schema-anac
    url: https://www.anticorruzione.it/documents/91439/336190007/Bando+tipo+n.+1.2023+agg.+al+dl+31.12.2024+n.209+-+Schema+disciplinare+gara+-+del.365.2025.pdf/ec669e07-715b-d874-8f8c-f11da8614466?t=1759159831877
    accessed: 2026-05-10
    sha256: 8af1ec9dc5b645e1b2d88e700e44b5b65204c9582913eeb91a90afc665951241
    license: public-domain-italian-law
    binary_path: not_in_repo/anac-bando-tipo-n1-2023-delibera-365-2025.pdf
    md_path: references/fonti/anac-bando-tipo-n1-2023-delibera-365-2025.md
    excerpt_paths:
      - references/estratti/anac-bandi-tipo-struttura-2023.md
    notes: |
      Bando tipo n. 1/2023 aggiornato con Delibera ANAC n. 365 del 16/09/2025.
      PDF letto e verificato il 2026-05-10. SHA256 calcolato sul file scaricato.
      Riguarda servizi e forniture sopra soglia con criterio OEPV (offerta economicamente
      piu' vantaggiosa). Recepisce D.Lgs. 36/2023 come modificato da D.Lgs. 209/2024.
      ATTENZIONE: dalla pagina del portale ANAC risulta che questo bando tipo e' stato
      ulteriormente aggiornato con Delibera n. 148 del 1 aprile 2026. Verificare sul
      portale ANAC la versione piu' recente prima di usare la skill per una gara reale.
      URL pagina portale: https://www.anticorruzione.it/-/del.n.365-16.09.2025.bando.tipo.n.1/2023.agg.dl.31.12.2024.n.209
      Per la sezione criteri di aggiudicazione, usare in combinazione con la skill
      oepv-valutatore-offerte-tecniche (art. 108 D.Lgs. 36/2023).


