    excerpt_paths:
      - references/estratti/anac-bandi-tipo-clausole-ai-l132-2025.md
    notes: |
      Bando tipo n. 1/2023 - testo consolidato (clean) aggiornato a Delibera ANAC n. 148/2026.
      52 pagine. Riguarda servizi e forniture sopra soglia con criterio OEPV.
      Recepisce D.Lgs. 36/2023 come modificato da D.Lgs. 209/2024 e il parere del Consiglio di Stato n. 61
      del 13/01/2026. Approvato dal Consiglio dell'Autorita' con delibera n. 365 del 16 settembre 2025
      e modificato con delibera n. 148 del 1 aprile 2026.
      Pubblicato in GU Serie Generale n. 111 del 15 maggio 2026. Efficace dal 30 maggio 2026.
      PDF scaricato il 2026-05-18, SHA256 calcolato sul file. Per il dettaglio puntuale delle modifiche
      vedere anac-delibera-148-2026.md.
      URL pagina portale: https://www.anticorruzione.it/-/bando.tipo.n.1.2023-agg.2026
      NOVITA' principali rispetto a Delibera 365/2025:
      - Paragrafo 15.1: clausole obbligatorie di dichiarazione utilizzo sistemi AI (Reg. UE 2024/1689,
        L. 132/2025) con versione separata per servizi intellettuali (art. 13 L. 132/2025).
      - Paragrafo 14: integrazione casi sanabili soccorso istruttorio (avvalimento, garanzia provvisoria).
      - Paragrafo 28: clausola alternativa accesso atti in caso di inversione procedimentale.
      - Vari aggiustamenti tecnici recepiti dal parere CdS 61/2026.

  - id: anac-bando-tipo-n2-2026-del-153-2026
    title: "ANAC - Bando tipo n. 2/2026 - Schema disciplinare servizi di ingegneria e architettura (SIA) sopra soglia OEPV"
    type: schema-anac
    url: https://www.anticorruzione.it/documents/91439/396430602/Bando+tipo+n.+2-2026+-+del.153-15.04.2026.pdf/9806c83d-1aee-fc3a-9ef0-e6b0d22fbec2?t=1777986989937
    accessed: 2026-05-18
    sha256: 3c39962bc041200fc03a2cc20c727c42b22e096e999cc9dcb3ccd28f786c2b49
    license: public-domain-italian-law
    binary_path: not_in_repo/anac-bando-tipo-n2-2026-del-153-2026.pdf
    md_path: references/fonti/anac-bando-tipo-n2-2026.md
    excerpt_paths:
      - references/estratti/anac-bandi-tipo-clausole-ai-l132-2025.md
      - references/estratti/anac-bando-tipo-2-2026-sia-requisiti-bim.md
    notes: |
      Bando tipo n. 2/2026 - NUOVO schema specifico per Servizi di Ingegneria e Architettura (SIA).
      61 pagine. Approvato con Delibera ANAC n. 153 del 15 aprile 2026.
      Procedura aperta per servizi di architettura e ingegneria sopra soglia europea (art. 14 D.Lgs. 36/2023),
      criterio offerta economicamente piu' vantaggiosa (miglior rapporto qualita'/prezzo).
      Pubblicato in GU Serie Generale n. 111 del 15 maggio 2026. Efficace dal 30 maggio 2026.
      PDF scaricato il 2026-05-18, SHA256 calcolato sul file.
      URL pagina portale: https://www.anticorruzione.it/-/bando.tipo.n.2.2026
      NOVITA' caratterizzanti (specifiche SIA, distinte dal Bando 1/2023 per servizi/forniture generici):
      - Art. 41 c. 15-bis Codice: importo base diviso in 65% prezzo fisso non ribassabile + 35% ribassabile.
      - Tetto 30% punteggio offerta economica (art. 41 c. 15-bis lett. b).
      - Maggiorazione 10% compenso per progettazione con BIM (Allegato I.13 art. 2 c. 5).
      - Calcolo importo base ai sensi Allegato I.13 (DM 17.06.2016).
      - Clausola BIM obbligatoria per progettazione lavori >2M euro o soglia art. 14 c. 1 lett. a (beni culturali).
      - Requisiti speciali 6.1 lett. h-k per figure BIM (UNI 11337-7): BIM Manager, BIM Coordinator,
        BIM Specialist, CDE Manager.
      - Paragrafo 15.1: clausola AI obbligatoria nella versione "servizi intellettuali" (art. 13 L. 132/2025),
        perche' i SIA sono strutturalmente servizi intellettuali.
      - Paragrafo 16: in offerta tecnica obbligo di indicare attivita' strumentali svolte con AI; offerta
        di gestione informativa digitale (Capitolato informativo) se richiesto BIM.

