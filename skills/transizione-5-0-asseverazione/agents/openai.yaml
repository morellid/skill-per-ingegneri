display_name: Transizione 5.0 - Asseverazione tecnica
short_description: |
  Supporta EGE (UNI CEI 11339), ESCo (UNI CEI 11352), ingegneri sez. A/B
  e periti industriali nella redazione e verifica della certificazione
  tecnica ex ante ed ex post per il credito d'imposta Piano Transizione
  5.0 (DL 19/2024 art. 38 + DM MIMIT-MEF 24/7/2024). Calcola la riduzione
  dei consumi energetici (>=3% struttura produttiva o >=5% processo),
  imposta lo scenario controfattuale e produce le bozze testuali degli
  Allegati VIII / IX / X / XI della circolare MIMIT 25877/2024.
default_prompt: |
  Devo predisporre la certificazione ex ante per un progetto di
  innovazione Transizione 5.0. L'impresa investe 3,2 milioni di EUR
  in due nuove macchine utensili (Allegato A L. 232/2016) e in un
  software MES (Allegato B), con riduzione attesa dei consumi energetici
  del processo interessato del 7,5%. Sono iscritto come EGE UNI CEI 11339.
  Mi guidi nel calcolo del risparmio in tep secondo la circolare MIMIT
  25877/2024 e mi predisponi la bozza dell'Allegato VIII (Certificazione
  ex ante) e dell'Allegato IX (Relazione tecnica) citando articolo e
  comma del DM 24/7/2024 per ogni voce?
