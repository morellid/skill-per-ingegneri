    title: "GSE - Portale Transizione 5.0 (Regole operative, Manuale utente, FAQ)"
    type: portale-ente
    url: https://www.gse.it/servizi-per-te/attuazione-misure-pnrr/transizione-5-0
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Sito istituzionale GSE per il Piano Transizione 5.0. Contiene:
        - "Regole operative" GSE per la presentazione delle comunicazioni
        - "Manuale Utente Portale Transizione 5.0"
        - FAQ GSE complementari a quelle MIMIT
        - elenco moduli aggiornato (delega, terzieta', dichiarazioni)
      Accesso al portale TR5 esclusivamente tramite SPID nell'Area Clienti GSE.
      La skill non riproduce i manuali operativi GSE, che cambiano in modo
      frequente: rinvio strutturale per le procedure di trasmissione telematica.

  - id: circolare-mise-18-12-2014-tep
    title: "Circolare MISE 18 dicembre 2014 - Coefficienti di conversione in tep ex art. 19 L. 10/1991"
    type: circolare
    url: https://www.mimit.gov.it/it/normativa/circolari-note-direttive-e-atti-di-indirizzo/circolare-18-dicembre-2014-recante-disposizioni-integrative-per-il-meccanismo-dei-titoli-di-efficienza-energetica
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths:
      - references/estratti/circolare-mise-2014-tep.md
    notes: |
      Circolare di rinvio per i fattori di conversione in tep (tonnellate
      equivalenti di petrolio) usati nei programmi di misura dei risparmi
      energetici. Richiamata espressamente dall'art. 9 del DM Transizione 5.0
      e dal cap. 2 della circolare operativa MIMIT 25877/2024 (tab. 11).
      Citata dalla skill come rinvio strutturale: i coefficienti effettivi
      vanno applicati alla data di calcolo. Estratto sintetico per i fattori
      piu' usati (energia elettrica, gas naturale, gasolio).

