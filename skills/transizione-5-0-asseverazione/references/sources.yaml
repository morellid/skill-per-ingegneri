schema_version: 1
skill: transizione-5-0-asseverazione
last_verified: 2026-07-12

# Fonti normative principali per la skill di asseverazione tecnica
# del Piano Transizione 5.0 (credito d'imposta).
#
# Architettura normativa:
#   - DL 19/2024 art. 38 (legge istitutiva, convertito da L. 56/2024)
#   - DM 24/7/2024 (decreto interministeriale attuativo)
#   - Circolare operativa MIMIT 16/8/2024 prot. 25877 (chiarimenti tecnici)
#   - FAQ MIMIT (versione vigente, aggiornata periodicamente)
#   - GSE - Regole operative + Manuale portale TR5
#   - DL 38/2026 art. 8 (riconoscimento del credito alle pratiche
#     tecnicamente ammissibili) come modificato dal DL 42/2026 art. 1:
#     credito 89,77% del richiesto, limite 1.302,3 mln EUR per il 2026,
#     F24 entro 31/12/2026, contributo aggiuntivo co. 3-bis per FER e
#     spese di certificazione
#   - Avviso MIMIT 29/4/2026 (ricevute di conferma, codice tributo 7079)
#
# Nota operativa: i PDF della Gazzetta Ufficiale e del MIMIT possono essere
# scaricati manualmente per popolare hash e binary_path:
#   curl -Lo not_in_repo/dm-24-07-2024-transizione50.pdf \
#     "https://www.gazzettaufficiale.it/eli/gu/2024/08/06/183/sg/pdf"
#   shasum -a 256 not_in_repo/dm-24-07-2024-transizione50.pdf
#
# Si segnala che la materia e' altamente dinamica: il quadro 2026 (DL 38/2026
# e DL 42/2026, entrambi da convertire in legge) puo' essere modificato in
# sede di conversione; il decreto MIMIT sulle modalita' di erogazione del
# contributo co. 3-bis e l'eventuale decreto attuativo del "Nuovo Piano
# Transizione 5.0" non risultano pubblicati in GU alla data di last_verified.
# Verificare last_verified prima di applicare.

sources:
  - id: dl-19-2024-art-38
    title: "DL 2 marzo 2024, n. 19 - art. 38 - Piano Transizione 5.0 (convertito con modificazioni dalla L. 29 aprile 2024, n. 56)"
    type: decreto-legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legge:2024-03-02;19
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths:
      - references/estratti/dl-19-2024-art-38.md
    notes: |
      Articolo 38 (Disposizioni urgenti per il sostegno al "Piano Transizione 5.0"):
      istituisce il credito d'imposta, individua ambito soggettivo, oggetto
      degli investimenti agevolabili (commi 4-5), soglie di risparmio energetico
      minimo (3% struttura / 5% processo), aliquote per scaglioni e fascia di
      risparmio, dotazione finanziaria 6,3 mld EUR. Delega l'attuazione al DM
      MIMIT-MEF 24/7/2024. Testo consolidato vigente reperibile su Normattiva.

  - id: dm-24-07-2024-transizione50
    title: "DM MIMIT-MEF 24 luglio 2024 - Attuazione dell'art. 38 DL 19/2024 (Piano Transizione 5.0) - GU n. 183 del 06/08/2024"
    type: decreto-ministeriale
    url: https://www.gazzettaufficiale.it/eli/gu/2024/08/06/183/sg/pdf
    accessed: 2026-05-10
    sha256: 6ceb304bbe503860ef73c978cc4eabcbdfe41d5c0a3521af6be09efb581e9b53
    license: public-domain-italian-law
    binary_path: not_in_repo/dm-24-07-2024-transizione50.pdf
    md_path: references/fonti/dm-24-07-2024-transizione50.md
    excerpt_paths:
      - references/estratti/dm-24-07-2024-articoli-chiave.md
    notes: |
      Decreto interministeriale attuativo del Piano Transizione 5.0,
      codice redazionale 24A04160. Articoli rilevanti per la skill di
      asseverazione:
        - art. 4 (avvio/completamento progetto innovazione)
        - art. 5 (DNSH e attivita' escluse)
        - art. 6 (beni materiali/immateriali allegati A/B L. 232/2016)
        - art. 7 (autoproduzione FER per autoconsumo)
        - art. 8 (formazione personale)
        - art. 9 (criteri determinazione risparmi energetici)
        - art. 10 (intensita' beneficio - aliquote per scaglione)
        - art. 12 (procedura: prenotazione, ordini 20%, completamento)
        - art. 15 (certificazioni ex ante/ex post + soggetti abilitati EGE/ESCO/ingegneri/periti + polizza assicurativa)
        - art. 16 (perizia asseverata interconnessione/caratteristiche beni 4.0)
        - art. 17 (certificazione contabile)
        - art. 18 (DNSH)
        - art. 19-20 (vigilanza e controlli)

  - id: dl-38-2026-art-8
    title: "DL 27 marzo 2026, n. 38 - Disposizioni urgenti in materia fiscale ed economica - art. 8 (Misure fiscali in favore delle imprese) - GU n. 72 del 27/03/2026"
    type: decreto-legge
    url: https://www.gazzettaufficiale.it/eli/gu/2026/03/27/72/sg/pdf
    accessed: 2026-07-12
    sha256: 1453625e5dcff27685791d0637d303863543996c04f86da354d90c1c06b4a80c
    license: public-domain-italian-law
    binary_path: not_in_repo/dl-38-2026-gu72.pdf
    md_path: references/fonti/dl-38-2026-art-8.md
    excerpt_paths:
      - references/estratti/dl-38-42-2026-quadro-credito.md
    notes: |
      Codice redazionale 26G00057, in vigore dal 28/3/2026 (art. 19).
      L'art. 8 riconosce, ai sensi dell'art. 1 co. 770 secondo periodo
      L. 199/2025 (bilancio 2026), un contributo sotto forma di credito
      d'imposta alle imprese con comunicazioni di completamento ex art. 38
      co. 10 DL 19/2024 giudicate tecnicamente ammissibili dal GSE.
      Testo originario: 35% del credito richiesto, limite 537 mln EUR 2026.
      Il co. 1 e il co. 4 sono stati modificati dal DL 42/2026 art. 1
      (vedi source dl-42-2026-art-1): 89,77% e 1.302,3 mln EUR.
      Co. 3: compensazione F24 entro 31/12/2026; clausola di continuita'
      con art. 38 DL 19/2024 e DM 24/7/2024 "anche ai fini delle attivita'
      di controllo". Copertura sul Fondo ex art. 1 co. 770 L. 199/2025
      (art. 18 co. 2 lett. b).
      Il PDF e' l'intera GU n. 72; la trascrizione dell'art. 8 e dei
      passaggi rilevanti degli artt. 18-19 e' nel md_path.

  - id: dl-42-2026-art-1
    title: "DL 3 aprile 2026, n. 42 - art. 1 (Modifiche al decreto-legge 27 marzo 2026, n. 38) - GU n. 78 del 03/04/2026"
    type: decreto-legge
    url: https://www.gazzettaufficiale.it/eli/gu/2026/04/03/78/sg/pdf
    accessed: 2026-07-12
    sha256: 9f512d7a8025066d6b1682090178b9f4bfff4c72e116c82a6b1cb58d33b6e051
    license: public-domain-italian-law
    binary_path: not_in_repo/dl-42-2026-gu78.pdf
    md_path: references/fonti/dl-42-2026-art-1-modifiche-dl-38.md
    excerpt_paths:
      - references/estratti/dl-38-42-2026-quadro-credito.md
    notes: |
      Codice redazionale 26G00061, in vigore dal 4/4/2026.
      Art. 1 co. 1 lett. a: sostituisce l'art. 8 co. 1 DL 38/2026 (credito
      pari all'89,77% del richiesto per beni allegati A/B L. 232/2016 e
      spese di formazione, limite 1.302,3 mln EUR 2026); introduce il
      co. 3-bis (contributo per autoproduzione FER con accumulo nel
      rispetto DNSH e per spese di certificazione contabile/tecnica:
      57,7 mln 2026, 80 mln 2027, 60 mln 2028, erogazione MIMIT con
      decreto da adottare); porta il limite del co. 4 a 1.302,3 mln.
      Il PDF e' l'intera GU n. 78; la trascrizione dell'art. 1 co. 1
      lett. a e' nel md_path.

