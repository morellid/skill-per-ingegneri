  - id: legge-199-2025-art-1-co-770
    title: "L. 30 dicembre 2025, n. 199 - Bilancio di previsione dello Stato per il 2026 - art. 1 co. 770 (Fondo richiamato dal DL 38/2026)"
    type: legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:legge:2025-12-30;199
    accessed: 2026-07-12
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: l'art. 8 co. 1 DL 38/2026 (anche nel testo
      sostituito dal DL 42/2026) opera "ai sensi dell'articolo 1, comma
      770, secondo periodo, della legge 30 dicembre 2025, n. 199" e la
      copertura grava sul Fondo di cui al medesimo comma (art. 18 co. 2
