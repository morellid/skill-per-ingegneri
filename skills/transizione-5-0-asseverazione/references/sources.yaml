  - id: regolamento-ue-2020-852-tassonomia
    title: "Regolamento (UE) 2020/852 - Tassonomia delle attivita' ecosostenibili (art. 17 DNSH)"
    type: regolamento-ue
    url: https://eur-lex.europa.eu/eli/reg/2020/852/oj/ita
    accessed: 2026-04-29
    sha256: null
    license: public-domain-eu-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: il principio "Do No Significant Harm" (DNSH)
      richiamato dall'art. 5 e dall'art. 18 del DM Transizione 5.0 e' definito
      dall'art. 17 di questo regolamento. La skill rinvia alle schede tecniche
      DNSH dell'allegato VII della circolare operativa MIMIT 25877/2024 per
      l'applicazione operativa.

  - id: dpr-445-2000
    title: "DPR 28 dicembre 2000, n. 445 - Testo unico in materia di documentazione amministrativa"
    type: decreto-presidente-repubblica
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.del.presidente.della.repubblica:2000-12-28;445
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: la certificazione ex ante / ex post e' resa ai sensi
      degli artt. 46 e segg. del DPR 445/2000 (dichiarazioni sostitutive di
      atto di notorieta'). L'art. 76 DPR 445/2000 stabilisce le sanzioni penali
      per false dichiarazioni e mendacio. Citato espressamente nei modelli
      Allegati VIII e X della circolare MIMIT 25877/2024.

  - id: codice-penale-359-481
    title: "Codice penale - artt. 359 e 481 - Persone esercenti un servizio di pubblica necessita' / Falsita' ideologica in certificati"
    type: codice
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:regio.decreto:1930-10-19;1398
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: i modelli di certificazione ex ante/ex post
      qualificano espressamente il certificatore come "persona esercente
      un servizio di pubblica necessita'" ai sensi degli artt. 359 e 481
      del codice penale. Cio' aggrava la responsabilita' penale del
      certificatore in caso di falsa attestazione. La skill lo segnala come
      elemento fondamentale del rischio professionale.

  - id: legge-232-2016-allegati-A-B
    title: "L. 11 dicembre 2016, n. 232 - Legge di bilancio 2017 - Allegati A e B (beni 4.0)"
    type: legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:legge:2016-12-11;232
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: gli investimenti agevolabili dal Piano Transizione 5.0
      (art. 4 co. 1 lett. a DM 24/7/2024) sono i beni materiali (Allegato A) e
      immateriali (Allegato B) gia' definiti dalla L. 232/2016 per il Piano
      Industria 4.0. La skill richiede che i beni siano riconducibili a una
      voce dei due allegati e include un richiamo strutturale alla perizia
      asseverata di cui all'art. 1 co. 11 L. 232/2016 (oggi art. 16 DM Transizione
      5.0 + FAQ MIMIT 2.4): documento distinto dalla certificazione tecnica
      EGE/ESCO oggetto di questa skill.

  - id: dl-181-2023-art-12
    title: "DL 9 dicembre 2023 n. 181 - art. 12 co. 1 - Caratteristiche dei moduli fotovoltaici per autoconsumo"
    type: decreto-legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legge:2023-12-09;181
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: l'art. 12 co. 1 lett. a/b/c DL 181/2023 fissa i requisiti
      di filiera UE per i moduli fotovoltaici di autoproduzione FER (es. Piano
      Transizione 5.0 art. 7 DM 24/7/2024). La FAQ MIMIT 2.7 richiede in fase di
      comunicazione di completamento l'attestazione del produttore dei moduli FV
      coerente con questi requisiti. La skill cita la norma come riferimento
      formale ma non riproduce il contenuto operativo: per il dettaglio applicativo
      vedere il testo consolidato vigente su Normattiva e la FAQ MIMIT 2.7
      (estratto `faq-mimit-soggetti-certificatori.md`).

