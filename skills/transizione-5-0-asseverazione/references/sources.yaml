schema_version: 1
skill: transizione-5-0-asseverazione
last_verified: 2026-04-29

# Fonti normative principali per la skill di asseverazione tecnica
# del Piano Transizione 5.0 (credito d'imposta).
#
# Architettura normativa:
#   - DL 19/2024 art. 38 (legge istitutiva, convertito da L. 56/2024)
#   - DM 24/7/2024 (decreto interministeriale attuativo)
#   - Circolare operativa MIMIT 16/8/2024 prot. 25877 (chiarimenti tecnici)
#   - FAQ MIMIT (versione vigente, aggiornata periodicamente)
#   - GSE - Regole operative + Manuale portale TR5
#
# Nota operativa: i PDF della Gazzetta Ufficiale e del MIMIT possono essere
# scaricati manualmente per popolare hash e binary_path:
#   curl -Lo not_in_repo/dm-24-07-2024-transizione50.pdf \
#     "https://www.gazzettaufficiale.it/eli/gu/2024/08/06/183/sg/pdf"
#   shasum -a 256 not_in_repo/dm-24-07-2024-transizione50.pdf
#
# Si segnala che la materia e' altamente dinamica: la Legge di Bilancio
# 2025 (L. 207/2024) e successivi DM correttivi possono modificare aliquote,
# soglie, perimetro temporale. Verificare last_verified prima di applicare.

sources:
  - id: dl-19-2024-art-38
    title: "DL 2 marzo 2024, n. 19 - art. 38 - Piano Transizione 5.0 (convertito con modificazioni dalla L. 29 aprile 2024, n. 56)"
    type: decreto-legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legge:2024-03-02;19
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths:
      - references/estratti/dl-19-2024-art-38.md
    notes: |
      Articolo 38 (Disposizioni urgenti per il sostegno al "Piano Transizione 5.0"):
      istituisce il credito d'imposta, individua ambito soggettivo, oggetto
      degli investimenti agevolabili (commi 4-5), soglie di risparmio energetico
      minimo (3% struttura / 5% processo), aliquote per scaglioni e fascia di
      risparmio, dotazione finanziaria 6,3 mld EUR. Delega l'attuazione al DM
      MIMIT-MEF 24/7/2024. Testo consolidato vigente reperibile su Normattiva.

  - id: dm-24-07-2024-transizione50
    title: "DM MIMIT-MEF 24 luglio 2024 - Attuazione dell'art. 38 DL 19/2024 (Piano Transizione 5.0) - GU n. 183 del 06/08/2024"
    type: decreto-ministeriale
    url: https://www.gazzettaufficiale.it/eli/id/2024/08/06/24A04160/SG
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/dm-24-07-2024-transizione50.pdf
    excerpt_paths:
      - references/estratti/dm-24-07-2024-articoli-chiave.md
    notes: |
      Decreto interministeriale attuativo del Piano Transizione 5.0,
      codice redazionale 24A04160. Articoli rilevanti per la skill di
      asseverazione:
        - art. 4 (avvio/completamento progetto innovazione)
        - art. 5 (DNSH e attivita' escluse)
        - art. 6 (beni materiali/immateriali allegati A/B L. 232/2016)
        - art. 7 (autoproduzione FER per autoconsumo)
        - art. 8 (formazione personale)
        - art. 9 (criteri determinazione risparmi energetici)
        - art. 10 (intensita' beneficio - aliquote per scaglione)
        - art. 12 (procedura: prenotazione, ordini 20%, completamento)
        - art. 15 (certificazioni ex ante/ex post + soggetti abilitati EGE/ESCO/ingegneri/periti + polizza assicurativa)
        - art. 16 (perizia asseverata interconnessione/caratteristiche beni 4.0)
        - art. 17 (certificazione contabile)
        - art. 18 (DNSH)
        - art. 19-20 (vigilanza e controlli)

  - id: circolare-mimit-16-08-2024
    title: "Circolare operativa MIMIT 16 agosto 2024, prot. 25877 - Piano Transizione 5.0"
    type: circolare
    url: https://www.mimit.gov.it/images/stories/normativa/Circolare_Operativa_Transizione_5.0_mimit.AOO_PI.REGISTRO_UFFICIALEI.0025877.16-08-2024.pdf
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/circolare-mimit-25877-2024.pdf
    excerpt_paths:
      - references/estratti/circolare-mimit-criteri-risparmio.md
      - references/estratti/circolare-mimit-modelli-certificazioni.md
    notes: |
      Circolare operativa di chiarimento tecnico, fonte primaria per:
        - definizioni operative di "struttura produttiva" e "processo interessato"
          (cap. 2.1 con esempi grafici 1-17)
        - scenario controfattuale (cap. 2.2)
        - esempi numerici di calcolo (cap. 2.3, tabelle 3-8)
        - tabella indicatori di prestazione energetica per settore (cap. 2, tab. 2)
        - DNSH e attivita' escluse (cap. 4)
        - procedura prenotazione/avanzamento/completamento (cap. 5-7)
        - vigilanza e controlli (cap. 8)
        - esempi calcolo credito d'imposta (cap. 9)
        - allegato VIII: modello Certificazione Ex Ante
        - allegato IX: modello Relazione Tecnica Ex Ante
        - allegato X: modello Certificazione Ex Post
        - allegato XI: modello Relazione Tecnica Ex Post
        - allegato III: dichiarazione terzieta' valutatore indipendente

  - id: faq-mimit-transizione50
    title: "FAQ MIMIT Transizione 5.0 - aggiornamento 10 aprile 2025 (versione vigente al last_verified)"
    type: faq-ministeriale
    url: https://www.mimit.gov.it/images/stories/documenti/allegati/FAQ_Transizione_50_-_10_aprile_2025.pdf
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/faq-mimit-transizione50-10-04-2025.pdf
    excerpt_paths:
      - references/estratti/faq-mimit-soggetti-certificatori.md
    notes: |
      FAQ ufficiali MIMIT, sostituiscono e integrano le precedenti versioni
      (8/10/2024, 3/10/2024, 24/2/2025). Per la skill rilevano in particolare:
        - FAQ 2.3: soggetti abilitati al rilascio delle certificazioni
        - FAQ 2.4: perizia asseverata caratteristiche tecniche beni 4.0
        - FAQ 2.5/2.6/2.7: documentazione comunicazioni preventiva/completamento
        - FAQ 2.9: verifica DNSH
        - FAQ 2.10: modifiche al programma di investimento (sostanziali vs ammesse)
        - FAQ 2.13: intervento gia' completato
        - FAQ 2.15: ESCo come soggetto beneficiario (non solo certificatore)
      ATTENZIONE: il MIMIT aggiorna le FAQ periodicamente. Verificare la
      versione piu' recente al momento dell'asseverazione.

