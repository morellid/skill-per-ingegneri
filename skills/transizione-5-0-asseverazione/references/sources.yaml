      certificatore in caso di falsa attestazione. La skill lo segnala come
      elemento fondamentale del rischio professionale.

  - id: legge-232-2016-allegati-A-B
    title: "L. 11 dicembre 2016, n. 232 - Legge di bilancio 2017 - Allegati A e B (beni 4.0)"
    type: legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:legge:2016-12-11;232
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Rinvio strutturale: gli investimenti agevolabili dal Piano Transizione 5.0
      (art. 4 co. 1 lett. a DM 24/7/2024) sono i beni materiali (Allegato A) e
      immateriali (Allegato B) gia' definiti dalla L. 232/2016 per il Piano
      Industria 4.0. La skill richiede che i beni siano riconducibili a una
      voce dei due allegati e include un richiamo strutturale alla perizia
      asseverata di cui all'art. 1 co. 11 L. 232/2016 (oggi art. 16 DM Transizione
      5.0 + FAQ MIMIT 2.4): documento distinto dalla certificazione tecnica
      EGE/ESCO oggetto di questa skill.

