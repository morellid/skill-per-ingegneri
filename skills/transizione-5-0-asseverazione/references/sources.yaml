    notes: |
      L'art. 8 co. 3-bis DL 38/2026 (introdotto dal DL 42/2026 art. 1 co. 1
      lett. a n. 3) demanda a un decreto MIMIT le modalita' di erogazione
      del contributo per autoproduzione FER e spese di certificazione.
      Non risulta pubblicato in GU alla data di last_verified: integrarlo
      come fonte primaria quando disponibile.

