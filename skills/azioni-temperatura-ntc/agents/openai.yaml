display_name: "Azioni della temperatura (NTC 2018 par. 3.5)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento delle azioni della temperatura secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 3.5. Aiuta a inquadrare la temperatura dell'aria esterna Test (valori massimo estivo Tmax e minimo invernale Tmin con periodo di ritorno di 50 anni, ridotto a 5 anni per fasi fino a tre mesi e a 10 anni per fasi tra tre mesi e un anno; formule per le zone da I a IV in funzione dell'altitudine as in metri: Zona I Tmin uguale a meno 15 meno 4 as diviso 1000 e Tmax uguale a 42 meno 6 as diviso 1000; Zona II meno 8 meno 6 e 42 meno 2; Zona III meno 8 meno 7 e 42 meno 0,3; Zona IV meno 2 meno 9 e 42 meno 2; la zonazione della Fig. 3.5.1 e' un'immagine e l'utente identifica la zona); la temperatura dell'aria interna Tint pari a 20 gradi; la distribuzione della temperatura nella sezione con la componente uniforme Delta_Tu uguale a T meno T0 (temperatura iniziale T0 pari a 15 gradi) e le componenti lineari, con il contributo dell'irraggiamento solare della Tab. 3.5.I; le azioni termiche sugli edifici con la sola componente Delta_Tu della Tab. 3.5.II (piu' o meno 15 gradi per le strutture in cemento armato e cemento armato precompresso esposte, piu' o meno 10 se protette, piu' o meno 25 per l'acciaio esposto, piu' o meno 15 se protetto); e gli effetti con i coefficienti di dilatazione termica alpha_T della Tab. 3.5.III (alluminio 24, acciaio 12, calcestruzzo 10, legno 5, ecc., in dieci alla meno sei per grado). NON calcola gli effetti (dilatazioni, sollecitazioni) ne' esegue le verifiche, non studia la trasmissione del calore, non riproduce la Fig. 3.5.1 (zonazione, immagine), non tratta le azioni termiche sui ponti (par. 5.1.3.9 ed Eurocodici) ne' sulle strutture speciali, e non sostituisce il progettista strutturale. Completa la famiglia delle azioni del Capitolo 3.
default_prompt: |
  Devo definire le azioni della temperatura per il progetto strutturale secondo le NTC 2018 (par. 3.5): data la
  zona (I-IV) e l'altitudine, quali Tmax e Tmin dell'aria esterna assumo e con quale periodo di ritorno? Quanto
  vale Tint? Come determino la componente uniforme Delta_Tu = T - T0 (con T0 = 15 gradi) e, per gli edifici, la
  Delta_Tu della Tab. 3.5.II? Quale coefficiente di dilatazione alpha_T uso (Tab. 3.5.III)? Cita i paragrafi e
  le formule.
