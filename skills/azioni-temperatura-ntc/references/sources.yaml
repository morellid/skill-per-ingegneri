    md_path: references/fonti/ntc2018-par-3-5.md
    excerpt_path: references/estratti/azioni-temperatura-checklist.md
    notes: |
      Pubblicato in GU n. 42 del 20/02/2018 - Suppl. Ord. n. 8.
      SHA256 calcolato su not_in_repo/ntc2018-gu42.pdf il 2026-07-20 con doppio
      download riproducibile (stessa fonte GU delle altre skill NTC del repo).
      Par. 3.5 estratto con `pdftotext -layout` (pagine GU 59-61) e trascritto
      verbatim in references/fonti/ntc2018-par-3-5.md. I segni "-" (meno) delle
      formule Tmin/Tmax sono stati VERIFICATI sull'immagine del PDF (pdftoppm
      della pagina GU 60), perche' pdftotext rende i segni meno come spazi.
      Contenuti rilevanti:
      - par. 3.5.2 temperatura aria esterna: Tmax/Tmin con periodo di ritorno 50
        anni (TR >= 5 anni per fasi <= 3 mesi, TR >= 10 anni per fasi 3 mesi-1
        anno); formule per zone I-IV in funzione dell'altitudine as (in m):
        Zona I  [3.5.1] Tmin = -15 - 4*as/1000; [3.5.2] Tmax = 42 - 6*as/1000;
        Zona II [3.5.3] Tmin = -8 - 6*as/1000;  [3.5.4] Tmax = 42 - 2*as/1000;
        Zona III[3.5.5] Tmin = -8 - 7*as/1000;  [3.5.6] Tmax = 42 - 0,3*as/1000;
        Zona IV [3.5.7] Tmin = -2 - 9*as/1000;  [3.5.8] Tmax = 42 - 2*as/1000.
        Fig. 3.5.1 (zonazione) e' un'immagine: NON riprodotta, input utente.
      - par. 3.5.3 temperatura aria interna Tint = 20 gradi C.
      - par. 3.5.4 distribuzione: componente uniforme DeltaTu = T - T0 e
        componenti lineari DeltaTMy/DeltaTMz; T0 = 15 gradi C; irraggiamento
        solare Tab. 3.5.I (estate riflettente 0/18, chiara 2/30, scura 4/42 gradi
        per superfici Nord-Est / Sud-Ovest-orizzontali; inverno 0/0).
      - par. 3.5.5 azioni termiche sugli edifici: sola componente DeltaTu dalla
        Tab. 3.5.II (c.a./c.a.p. esposte +-15, protette +-10; acciaio esposte
        +-25, protette +-15 gradi C).
      - par. 3.5.6 azioni termiche speciali (ciminiere, tubazioni, sili, ecc.).
      - par. 3.5.7 effetti: coefficienti di dilatazione termica alpha_T Tab.
        3.5.III (alluminio 24, acciaio 12, cls 10, miste 12, cls alleggerito 7,
        muratura 6-10, legno // 5, legno ortogonale 30-70, in 10^-6/gradi C).
      Restano fuori scope: il calcolo degli effetti e le verifiche, lo studio
      della trasmissione del calore, le azioni termiche sui ponti (par. 5.1.3.9
      e Eurocodici) e sulle strutture speciali.
