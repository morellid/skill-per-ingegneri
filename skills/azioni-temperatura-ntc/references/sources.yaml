# Fonte normativa per l'inquadramento delle azioni della temperatura ai sensi
# delle NTC 2018 (DM 17/01/2018), par. 3.5. La skill inquadra temperatura
# esterna/interna, componenti uniforme e lineare, azioni sugli edifici ed
# effetti (dilatazione); non calcola gli effetti ne' esegue le verifiche.
# La Fig. 3.5.1 (zonazione) e' un'immagine: l'utente identifica la zona.

