    title: "D.Lgs. 9 aprile 2008, n. 81 (T.U. sicurezza) - Titolo IV, artt. 89, 90, 91, 92 (cantieri temporanei o mobili) (testo vigente al 2026-07-16)"
    type: decreto-legislativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2008-04-09;81!vig=2026-07-16
