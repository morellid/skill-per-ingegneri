# Fonte per il regime dei CANTIERI TEMPORANEI O MOBILI (Titolo IV): definizioni, obblighi del
# committente/responsabile dei lavori (designazione CSP/CSE quando piu' imprese, verifica
# idoneita' tecnico-professionale, notifica preliminare, sospensione del titolo), obblighi del
# coordinatore per la progettazione (PSC + fascicolo) e per l'esecuzione (vigilanza, sospensione
# delle lavorazioni). Fonte: D.Lgs. 81/2008, artt. 89-92.

sources:
