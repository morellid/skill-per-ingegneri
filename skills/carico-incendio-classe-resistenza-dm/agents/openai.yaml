display_name: "Carico d'incendio e classe di resistenza al fuoco (DM 9 marzo 2007)"
short_description: Supporto documentale al progettista antincendio/strutturale per determinare il carico d'incendio specifico di progetto e la classe di resistenza al fuoco richiesta agli elementi costruttivi secondo il DM 9 marzo 2007 (Prestazioni di resistenza al fuoco delle costruzioni nelle attivita' soggette al controllo del CNVVF). Aiuta a inquadrare il carico d'incendio specifico qf uguale a q diviso A, con q uguale alla somma di gi per Hi per mi per psi-i (Hi potere calorifico inferiore secondo UNI EN ISO 1716, mi 0,80 per legno e materiali cellulosici e 1,00 per gli altri, psi-i 0 per contenitori progettati per resistere al fuoco, 0,85 per contenitori non combustibili non progettati e 1 negli altri casi); il carico d'incendio specifico di progetto qf,d uguale a delta_q1 per delta_q2 per delta_n per qf, con delta_q1 in funzione della superficie del compartimento (Tabella 1, da 1,00 a 2,00), delta_q2 in funzione della classe di rischio dell'attivita' (Tabella 2, 0,80/1,00/1,20 per rischio basso/moderato/alto) e delta_n prodotto dei fattori delle misure di protezione presenti (Tabella 3); i livelli di prestazione da I a V; le classi 15, 20, 30, 45, 60, 90, 120, 180, 240 e 360 minuti; la classe richiesta per il livello II (30 o 60) e per il livello III in funzione di qf,d (Tabella 4); le curve nominali di incendio (standard theta_g uguale a 20 piu' 345 per il logaritmo in base 10 di 8t piu' 1, idrocarburi ed esterna) e la Tabella 5 per l'approccio con curve naturali. NON esegue il progetto prestazionale con curve naturali ne' le analisi termiche o meccaniche, non fornisce le proprieta' dei materiali ad alta temperatura (Eurocodici parte 1-2), non riproduce le regole tecniche verticali dei Vigili del Fuoco e non sostituisce il professionista antincendio ne' il progettista strutturale. E' complementare alla skill sulla resistenza al fuoco delle strutture (NTC 2018 par. 3.6.1), che rinvia a questo DM il calcolo del carico d'incendio.
default_prompt: |
  Devo determinare la classe di resistenza al fuoco richiesta a un compartimento secondo il DM 9 marzo 2007.
  Come calcolo il carico d'incendio specifico di progetto qf,d = dq1*dq2*dn*qf (Tabelle 1, 2 e 3)? Quale
  livello di prestazione si applica e come ricavo la classe (livello II: 30/60; livello III: Tabella 4)? Cita
  i punti e le tabelle del decreto.
