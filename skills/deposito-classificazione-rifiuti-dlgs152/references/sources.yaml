# Fonte per la CLASSIFICAZIONE dei rifiuti (urbani/speciali, pericolosi/non pericolosi) e per il
# DEPOSITO TEMPORANEO prima della raccolta (condizioni, limiti quantitativi e temporali, esonero
# da autorizzazione). Fonte: D.Lgs. 3 aprile 2006, n. 152, Parte quarta, artt. 183, 184, 185-bis.

