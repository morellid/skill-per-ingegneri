# Fonti per la consultazione del capitolo 8 delle NTC 2018 (costruzioni
# esistenti): classificazione degli interventi (riparazione/locale,
# miglioramento, adeguamento), soglie del rapporto zeta_E, livelli di
# conoscenza (LC1/LC2/LC3) e fattori di confidenza (FC).
#
# Architettura:
#   - NTC 2018 cap. 8: definizioni e prescrizioni cogenti (categorie di
#     intervento, casi di adeguamento obbligatorio a-e, soglie zeta_E,
#     obbligo di valutazione della sicurezza e verifica del sistema di
#     fondazione, LC1/LC2/LC3)
#   - Circolare 7/2019 cap. C8: valori numerici dei fattori di confidenza
#     (FC = 1,35/1,2/1,0), Tabella C8.5.IV, definizione di zeta_E (= ag*S),
#     esempi di intervento locale/miglioramento/adeguamento

