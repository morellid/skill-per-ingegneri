# Fonte unica autoritativa: Regolamento (UE) 2023/1230 del Parlamento europeo
# e del Consiglio del 14 giugno 2023 relativo alle macchine e che abroga la
# direttiva 2006/42/CE del Parlamento europeo e del Consiglio e la direttiva
# 73/361/CEE del Consiglio. Pubblicato nella Gazzetta ufficiale dell'Unione
# europea L 165 del 29 giugno 2023.
#
# Trattandosi di un Regolamento UE, il testo e' direttamente applicabile in
# Italia senza necessita' di recepimento (art. 288 TFUE). La data generale
# di applicazione del regolamento e' il 14 gennaio 2027 (art. 54 secondo
# comma), con eccezioni anticipate per gli articoli relativi alla notifica
# degli organismi (art. 26-42, dal 14/01/2024), per le sanzioni (art. 50
# par. 1, dal 14/10/2023), per le disposizioni transitorie e procedurali
# (art. 6 par. 7, 48 e 52, dal 13/07/2023), e per gli atti delegati e di
# esecuzione preparatori (art. 6 par. 2-6, 8, 11; art. 47; art. 53 par. 3,
# dal 14/07/2024). La direttiva 2006/42/CE rimane in vigore fino al
# 14 gennaio 2027 (art. 51 par. 2).
#
# Le norme armonizzate citate dal regolamento (es. UNI EN ISO 12100, UNI
# EN ISO 13849-1, UNI EN 60204-1) sono norme tecniche a pagamento UNI o
# CEN/CEI e NON sono incluse come fonti scaricate: la skill ne usa solo
# rinvii strutturali (numero, titolo, anno), senza riprodurne il testo. La
# lista delle norme che conferiscono presunzione di conformita' al
# regolamento (art. 20) e' pubblicata dalla Commissione tramite decisioni
# di esecuzione successive che evolvono nel tempo; non viene catalogata
# qui perche' la skill non ne riproduce il contenuto.
#
# Workflow obbligato (vedi AGENTS.md root, Regola zero):
#   1. SCARICARE -> binary_path
#   2. SALVARE l'hash -> sha256
#   3. CONVERTIRE in MD -> md_path (committato nella skill, transcrizione fedele)
#   4. USARE il MD per scrivere la skill

