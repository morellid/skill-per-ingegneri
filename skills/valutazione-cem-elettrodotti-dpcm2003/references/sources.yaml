    notes: |
      Codice redazionale 03A09749, GU Serie Generale n. 200 del 29/8/2003. Attua la
      legge quadro 22/2/2001 n. 36 (art. 4 c.1 lett. a). Trascritti verbatim in
      references/fonti/dpcm-8-7-2003.md gli artt. 1 (campo di applicazione), 2
      (definizioni, rinvio all'Allegato A), 3 (limite di esposizione 100 microtesla
      per l'induzione magnetica e 5 kV/m per il campo elettrico; valore di attenzione
      10 microtesla come mediana 24h in aree gioco, ambienti abitativi/scolastici e
      luoghi con permanenza >= 4 ore), 4 (obiettivo di qualita' 3 microtesla, mediana
      24h, per nuovi elettrodotti e nuove aree), 5 (tecniche di misura: norma CEI
      211-6; APAT-ARPA per le procedure), 6 (fasce di rispetto: riferimento
      all'obiettivo di qualita' e alla portata in corrente CEI 11-60; metodologia di
      calcolo DELEGATA all'APAT con approvazione del Ministero dell'ambiente), 7
      (aggiornamento conoscenze), 8 (abrogazioni) e l'Allegato A (definizioni).
      LIMITE DI FONTE: la metodologia di calcolo delle fasce di rispetto e delle
      Distanze di Prima Approssimazione (DPA), delegata dall'art. 6 c.2, e' stata
      approvata con DM Ambiente 29/5/2008 (non trascritto qui): la skill copre il
      quadro dei limiti e la loro verifica, NON il calcolo numerico della DPA.
