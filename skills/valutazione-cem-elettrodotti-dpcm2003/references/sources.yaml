# Fonte per la protezione della popolazione dai campi elettrici e magnetici a
# frequenza di rete (50 Hz) generati dagli elettrodotti: il D.P.C.M. 8/7/2003, che
# fissa limite di esposizione, valore di attenzione, obiettivo di qualita' e il
# quadro delle fasce di rispetto. La METODOLOGIA DI CALCOLO delle fasce/DPA e'
# delegata dall'art. 6 c.2 all'APAT (poi ISPRA) e approvata con DM 29/5/2008: NON e'
# riprodotta (la skill copre il quadro e la verifica dei limiti, non il calcolo DPA).

