    notes: |
      Codice redazionale 001G0429 (G.U. 20 ottobre 2001). Pagina indice Normattiva pinnata a
      !vig=2026-07-16 (hash stabile, doppio download: 98a209db...). Art. 24 (versione 7, idGruppo
      7) e art. 25 caricati via AJAX (caricaArticolo) e trascritti verbatim in
      references/fonti/dpr-380-2001-art-24-25.md.
      - Art. 24: l'agibilità (condizioni di sicurezza, igiene, salubrità, risparmio energetico,
        infrastrutturazione digitale + conformità al progetto) è attestata mediante SEGNALAZIONE
        CERTIFICATA (c. 1). Termine: entro 15 giorni dall'ultimazione dei lavori di finitura, al
        SUE, a cura del titolare del permesso/SCIA o aventi causa, per nuove costruzioni,
        ricostruzioni/sopraelevazioni, interventi su esistenti che influiscano sulle condizioni
        del c. 1 (c. 2). Sanzione 77-464 euro per mancata presentazione (c. 3). Agibilità parziale
        per edifici/porzioni funzionalmente autonomi o singole unità immobiliari a condizioni date
        (c. 4). Documentazione allegata (c. 5): asseverazione DL/professionista, collaudo statico
        art. 67 (o dichiarazione di regolare esecuzione), conformità barriere art. 77/82,
        aggiornamento catastale, dichiarazione impresa installatrice impianti, attestazione banda
        ultra larga. Deroghe igienico-sanitarie asseverabili dal progettista (c. 5-bis: altezza
        2,70->2,40 m; monostanza 28->20 mq 1 persona, 38->28 mq 2 persone; c. 5-ter adattabilità
        DM 236/1989). Utilizzo dalla presentazione, richiamo art. 19 c. 3 e 6-bis L. 241/1990
        (c. 6). Controlli anche a campione di Regioni/Province autonome/Comuni/Città metropolitane
        (c. 7). SCA in assenza di lavori per immobili legittimi privi di agibilità (c. 7-bis).
      - Art. 25: ABROGATO dal D.Lgs. 25 novembre 2016, n. 222 (la procedura di rilascio del
        certificato è stata sostituita dal modello della SCA di cui all'art. 24).
      LIMITE DI RESA (Regola zero): la modulistica regionale/comunale (modelli unificati SCA), i
      contenuti di collaudo statico (art. 67) e le regole tecniche di accessibilità (DM 236/1989)
      e impianti (DM 37/2008) non sono riprodotti: rinvio agli atti citati e alle skill correlate.
