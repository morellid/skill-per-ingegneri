    title: "D.P.R. 6 giugno 2001, n. 380 - art. 24 (agibilità) e art. 25 (abrogato) (testo vigente al 2026-07-16)"
    type: dpr
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.del.presidente.della.repubblica:2001-06-06;380!vig=2026-07-16
    accessed: 2026-07-16
    sha256: 98a209dab2743964d5eddeca5321261f5b12225c140367e17c53705e5b95acb2
    license: public-domain
    binary_path: not_in_repo/dpr380.html
    md_path: references/fonti/dpr-380-2001-art-24-25.md
