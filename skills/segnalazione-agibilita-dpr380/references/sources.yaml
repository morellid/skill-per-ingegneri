# Fonte per la SEGNALAZIONE CERTIFICATA DI AGIBILITÀ (SCA): presupposti, soggetti, termine di 15
# giorni, interventi soggetti, sanzione, agibilità parziale, documentazione allegata, deroghe
# igienico-sanitarie asseverabili, utilizzo dalla presentazione, controlli.
# Fonte: D.P.R. 6 giugno 2001, n. 380, art. 24 (art. 25 abrogato dal D.Lgs. 222/2016).

