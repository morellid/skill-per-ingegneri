# Fonte per l'inquadramento della VALUTAZIONE E GESTIONE DEL RISCHIO DA ESPOSIZIONE AD AGENTI BIOLOGICI:
# definizioni e classificazione degli agenti in quattro gruppi, valutazione del rischio (integrazione del
# DVR), misure tecniche/organizzative/procedurali e igieniche, sorveglianza sanitaria e registro degli
# esposti. Fonte: Testo unico sicurezza (D.Lgs. 81/2008), Titolo X, artt. 266-280.

