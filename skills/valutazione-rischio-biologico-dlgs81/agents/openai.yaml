display_name: "Rischio da agenti biologici sul lavoro (D.Lgs 81/2008 Titolo X)"
short_description: Supporto documentale al RSPP/ASPP, al datore di lavoro e al tecnico della sicurezza per l'inquadramento della valutazione e gestione del rischio da esposizione ad agenti biologici ai sensi del D.Lgs. 9 aprile 2008, n. 81, Titolo X (artt. 266-280). Inquadra il campo di applicazione e le definizioni di agente biologico, microrganismo e coltura cellulare; la classificazione degli agenti biologici nei quattro gruppi a seconda del rischio di infezione (gruppo 1 poche probabilita' di malattia, gruppo 2 malattie possibili con propagazione poco probabile e misure profilattiche/terapeutiche disponibili, gruppo 3 malattie gravi con propagazione possibile e misure disponibili, gruppo 4 malattie gravi con elevato rischio di propagazione e senza misure), con l'allegato XLVI per i gruppi 2/3/4 e la regola del gruppo piu' elevato in caso di dubbio; la valutazione del rischio integrata nel documento di valutazione dei rischi (art. 17) con la buona prassi microbiologica, la rivalutazione almeno triennale, le attivita' a rischio potenziale dell'allegato XLIV e il programma di emergenza per i gruppi 3 e 4; le misure tecniche, organizzative e procedurali (limitazione del numero di esposti, segnale di rischio biologico dell'allegato XLV, procedure di emergenza, raccolta e smaltimento dei rifiuti) e le misure igieniche (servizi con docce, indumenti protettivi separati, DPI disinfettati, divieti di mangiare/bere/fumare nelle aree a rischio); la sorveglianza sanitaria dell'art. 41 con vaccini per i non immuni e allontanamento dell'art. 42; e il registro degli esposti per gli agenti dei gruppi 3 e 4 e degli eventi accidentali, tenuto tramite l'RSPP con accesso del medico competente e del rappresentante per la sicurezza, con le comunicazioni all'organo di vigilanza e la conservazione fino a dieci anni o quaranta anni per gli agenti con infezioni latenti o gravi sequele. NON redige il DVR ne' la valutazione del rischio, non classifica i singoli agenti biologici, non riproduce gli Allegati XLIV/XLV/XLVI ne' definisce i livelli di contenimento, non tratta gli agenti chimici (Titolo IX Capo I) ne' i cancerogeni/mutageni (Titolo IX Capo II) e non sostituisce il datore di lavoro, l'RSPP ne' il medico competente.
default_prompt: |
  Nella mia attività i lavoratori sono esposti ad agenti biologici: come inquadro il rischio secondo il
  D.Lgs. 81/2008 Titolo X? Come si classificano gli agenti nei quattro gruppi, come si integra il DVR,
  quali misure tecniche e igieniche servono e quando scattano la sorveglianza sanitaria e il registro
  degli esposti? Cita gli articoli.
