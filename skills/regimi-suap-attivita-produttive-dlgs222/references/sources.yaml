# Fonte per l'individuazione del regime amministrativo (comunicazione, SCIA, SCIA unica,
# SCIA condizionata, silenzio-assenso, autorizzazione) applicabile all'avvio/modifica di
# un'attivita' privata (produttiva/commerciale) presso il SUAP: il D.Lgs 222/2016 e la
# sua Tabella A. La parte EDILIZIA (art. 3, Tabella A sez. edilizia) e' coperta dalla
# skill modulistica-edilizia-unificata: questa skill copre le ATTIVITA' PRODUTTIVE.

sources:
  - id: dlgs-222-2016
    title: "D.Lgs. 25 novembre 2016, n. 222 (SCIA 2) - artt. 1, 2, 5 e Tabella A (regimi amministrativi delle attivita' private) (testo vigente al 2026-07-16)"
    type: decreto-legislativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2016-11-25;222!vig=2026-07-16
