    license: public-domain
    binary_path: not_in_repo/dlgs-222-2016-vig.html
    md_path: references/fonti/dlgs-222-2016.md
    excerpt_path: references/estratti/regimi-suap-checklist.md
    notes: |
      Codice redazionale 16G00237. Pagina indice Normattiva pinnata a !vig=2026-07-16
      (hash stabile, doppio download: 7169e0b7...). Caricati via AJAX (caricaArticolo) e
      trascritti verbatim: art. 1 (oggetto), art. 2 (regimi amministrativi delle attivita'
      private - rinvio alla Tabella A; effetti di comunicazione, SCIA, SCIA unica art.
      19-bis c.2, SCIA condizionata art. 19-bis c.3, autorizzazione/silenzio-assenso;
      possibilita' di ricondurre attivita' non elencate), art. 5 (livelli ulteriori di
      semplificazione di regioni/enti locali). Trascritti verbatim anche la LEGENDA dei
      regimi della Tabella A (con i tempi: SCIA controlli entro 60 gg, 30 nell'edilizia)
      e un ESTRATTO rappresentativo di righe della Tabella A.
      LIMITE DI RESA: la Tabella A completa (elenco attivita' x regime, ~245 KB di testo)
      NON e' riprodotta integralmente: il regime esatto di ciascuna attivita' va letto
      sulla Tabella A dell'atto. La skill copre il quadro e il metodo di lettura, non la
      classificazione puntuale di ogni singola attivita'.
