display_name: "Elementi non strutturali e impianti in zona sismica (NTC 2018 par. 7.2.3-7.2.4)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della progettazione sismica degli elementi strutturali secondari, degli elementi costruttivi non strutturali (tamponature, controsoffitti, parapetti, rivestimenti) e degli impianti secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafi 7.2.3 e 7.2.4. Aiuta a inquadrare gli elementi strutturali secondari (rigidezza e resistenza alle azioni orizzontali trascurabili nell'analisi; progettati per i soli carichi verticali e per seguire gli spostamenti allo SLC; la scelta non puo' trasformare una struttura irregolare in regolare e il loro contributo totale a rigidezza e resistenza orizzontale non puo' superare il 15% dell'analogo contributo degli elementi primari); gli elementi costruttivi non strutturali (capacita' maggiore della domanda sismica per ogni stato limite; ripartizione delle responsabilita' tra progettista della struttura, direttore dei lavori e fornitore o installatore per elementi costruiti o assemblati in cantiere; se la distribuzione e' fortemente irregolare in pianta si incrementa di un fattore 2 l'eccentricita' accidentale, se in altezza si incrementa di un fattore 1,4 la domanda sismica sugli elementi verticali dei livelli con riduzione; la forza sismica orizzontale Fa uguale al prodotto tra l'accelerazione adimensionalizzata Sa e il peso Wa dell'elemento diviso il fattore di comportamento qa dell'elemento, formula 7.2.1, con Sa e qa da documenti di comprovata validita'); e gli impianti (capacita' maggiore della domanda sismica; responsabilita' di produttore, installatore e progettista strutturale; richiedono uno studio specifico gli impianti che eccedano il 30% del carico permanente del campo di solaio o del pannello a cui sono appesi o il 10% del carico permanente totale della struttura). NON calcola Fa ne' esegue le verifiche, non determina Sa e qa, non calcola la domanda o gli spostamenti (par. 7.3) ne' lo spettro (par. 3.2), e non sostituisce il progettista. Complementa le skill sui criteri di modellazione sismica (par. 7.2.6), sulla regolarita' strutturale (par. 7.2.1), sugli spostamenti di interpiano allo SLD (par. 7.3.6.1) e sullo spettro di risposta (par. 3.2).
default_prompt: |
  Devo inquadrare la verifica sismica di elementi non strutturali e impianti secondo le NTC 2018 (par. 7.2.3 e
  7.2.4): con quale forza orizzontale si determina la domanda su una tamponatura o un controsoffitto (Fa = Sa Wa
  / qa, formula 7.2.1) e cosa sono Sa, Wa e qa? Quando alcuni elementi possono essere considerati secondari
  (limite del 15%)? Come si tiene conto di una distribuzione irregolare in pianta (fattore 2) o in altezza
  (fattore 1,4)? Un impianto pesante quando richiede uno studio specifico (soglie 30%/10%)? Cita i paragrafi e la
  formula.
