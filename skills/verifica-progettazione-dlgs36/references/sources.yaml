# Fonte per l'inquadramento della VERIFICA DELLA PROGETTAZIONE e della VALIDAZIONE del progetto posto a
# base di gara nei contratti pubblici di lavori: oggetto e tempi, ruolo del RUP e incompatibilita',
# effetti (deposito sismico e denuncia al genio civile assolti), validazione, rinvio all'Allegato I.7.
# Fonte: Codice dei contratti pubblici (D.Lgs. 36/2023), art. 42.

