    notes: |
      Codice redazionale 23G00044, idGruppo 5. Pagina indice Normattiva pinnata a !vig=2026-07-17 (hash
      stabile, doppio download: 0e9a1938...; e' lo stesso indice usato dalle altre skill D.Lgs. 36/2023).
      Articolo 42 (versione 1) caricato via AJAX (caricaArticolo), formato AKN, e trascritto verbatim in
      references/fonti/dlgs-36-2023-art-42.md (commi 1-5): oggetto della verifica (rispondenza al
      documento d'indirizzo e conformita' alla normativa) e tempi in relazione al livello progettuale,
      con regole per l'affidamento congiunto e il PPP (c. 1); ruolo del RUP e incompatibilita' della
      verifica con progettazione, coordinamento sicurezza, direzione lavori e collaudo (c. 2); effetti
      della verifica positiva - assolvimento degli obblighi di deposito/autorizzazione sismica e di
      denuncia al genio civile, deposito nell'Archivio informatico nazionale delle opere pubbliche (c.
      3); validazione come atto formale sottoscritto dal RUP con riferimento al rapporto di verifica e
      alle controdeduzioni del progettista, i cui estremi vanno nel bando/lettera d'invito (c. 4);
      rinvio all'Allegato I.7 per contenuti, modalita' e soggetti della verifica e oneri nelle risorse
      dell'opera (c. 5).
      LIMITE DI RESA: la skill inquadra oggetto, tempi, soggetti ed effetti della verifica/validazione;
      NON esegue la verifica ne' redige il rapporto o l'atto di validazione, NON riproduce l'Allegato
      I.7 (soglie di importo e soggetti verificatori) ne' gli obblighi sismici del DPR 380, e NON
      sostituisce il RUP, il soggetto verificatore ne' il progettista.
