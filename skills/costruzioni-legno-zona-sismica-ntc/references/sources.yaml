# Fonte normativa per l'inquadramento delle regole generali per le costruzioni
# di legno in zona sismica (aspetti concettuali/CD, materiali e proprieta' delle
# zone dissipative, pannelli di rivestimento, tipologie e fattori di
# comportamento q0, precisazioni sulla duttilita' dei mezzi di unione,
# disposizioni costruttive e verifiche) secondo le NTC 2018 (DM 17/01/2018),
# par. 7.7. La skill inquadra le regole generali; non esegue le verifiche di
# resistenza/duttilita' ne' progetta i collegamenti.

