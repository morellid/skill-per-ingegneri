display_name: "Legno in zona sismica: regole generali (NTC 2018 par. 7.7)"
short_description: Supporto documentale al progettista strutturale per inquadrare le regole generali delle costruzioni di legno in zona sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.7. Aiuta a inquadrare gli aspetti concettuali del par. 7.7.1 (comportamento strutturale dissipativo con classe di duttilita' CD"A" o CD"B", oppure non dissipativo; zone dissipative nei collegamenti e membrature lignee a comportamento elastico; nella progettazione in capacita' le componenti non dissipative dimensionate sulla capacita' della zona dissipativa amplificata del fattore di sovraresistenza, con valori comunque non inferiori a 1,3 per la CD"A" e a 1,1 per la CD"B"); i materiali del par. 7.7.2 (rinvio al par. 4.4; unioni incollate in generale non dissipative; spessori minimi dei pannelli di rivestimento: particelle 13 mm, compensato 9 mm, OSB 12 mm se a coppia o 15 mm se singoli); le tipologie e i fattori di comportamento del par. 7.7.3 (q0 dalla Tab. 7.3.II, giustificato dal Progettista); le precisazioni sulla duttilita' del par. 7.7.3.1 (almeno tre cicli, duttilita' statica pari a 4 per la CD"B" e a 6 per la CD"A", riduzione di resistenza non oltre il 20 per cento; diametro dei mezzi di unione non oltre 12 mm con spessore delle membrature almeno 10 volte il diametro, oppure chiodi non oltre 3,1 mm con rivestimento almeno 4 volte il diametro); e le disposizioni costruttive e le verifiche dei par. 7.7.5-7.7.7 (giunti di carpenteria con coefficiente parziale aggiuntivo 1,3; resistenza ridotta del 20 per cento per il degrado ciclico). NON esegue le verifiche di resistenza/duttilita' degli elementi e dei collegamenti, non progetta i collegamenti e non sostituisce il progettista. E' distinta dalla skill sul legno statico (par. 4.4) e da quella sul fattore di comportamento q (par. 7.3.1).
default_prompt: |
  Sto impostando un edificio in legno in zona sismica secondo le NTC 2018 (par. 7.7). Quale comportamento
  strutturale e quale classe di duttilita' (CD"A"/CD"B") posso adottare, e come localizzo le zone dissipative?
  Quali spessori minimi devono avere i pannelli di rivestimento e quali requisiti di duttilita' (diametri d,
  spessori 10d/4d, rapporti 4/6) devono rispettare i mezzi di unione? Cita i paragrafi.
