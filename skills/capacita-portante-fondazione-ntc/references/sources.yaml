    md_path: references/fonti/circ-7-2019-mit.md
    excerpt_path: references/estratti/fhwa-capacita-portante-ntc.md
    notes: |
      Stesso PDF e stesso hash gia' censiti dalle altre skill NTC del repo.
      Sezione trascritta nel md_path: par. C6.4.2.1 (collasso per carico
