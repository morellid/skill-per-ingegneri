      dipendenza della resistenza da drenaggio, falda, geometria,
      eccentricita', meccanismo).

  - id: fhwa-nhi-06-089
    title: "FHWA NHI-06-089 - Soils and Foundations, Reference Manual Volume II (U.S. DOT - Federal Highway Administration, dicembre 2006)"
    type: manuale-tecnico-governativo
    url: https://www.fhwa.dot.gov/engineering/geotech/pubs/nhi06089.pdf
    accessed: 2026-07-12
    sha256: 181a02c8c1ba7310d4c299f8bfb4f154d441d77f136f93879a0fd53ae2d64ccb
    license: public-domain-us-government
    binary_path: not_in_repo/fhwa-nhi-06-089.pdf
    md_path: references/fonti/fhwa-nhi-06-089.md
    excerpt_path: references/estratti/fhwa-capacita-portante-ntc.md
    notes: |
      Volume II della stessa pubblicazione FHWA gia' usata (Volume I) dalla
      skill cedimenti-edometrici-ntc; opera del Governo federale USA
      (pubblico dominio). SHA256 riproducibile (doppio download verificato).
      Sezioni trascritte nel md_path:
        - 8.4.2 (eq. 8-1 carico limite; eq. 8-2/8-3/8-4/8-5 fattori
          Nc/Nq/Ngamma, espressioni AASHTO 2004 with 2006 Interims; prime
          righe della Table 8-2 per cross-check)
        - 8.4.3 (eq. 8-6 forma generale con fattori correttivi e nota sul
          termine di sovraccarico)
        - 8.4.3.1 (eq. 8-7/8-8/8-9 dimensioni efficaci; limiti di
          eccentricita' 1/6 terreno - 1/4 roccia; Table 8-4 fattori di
          forma con nota di non cumulabilita' con l'inclinazione del carico)
        - 8.4.3.2 (Table 8-5 fattori di falda con interpolazione)
        - 8.4.3.3 (Table 8-6 dq, con condizioni e omissione conservativa)
      Ruolo: "altro codice internazionale" ex cap. 12 NTC 2018 per la
      formulazione del carico limite. Il modulo
      tasks/lib/capacita_portante.py implementa le sole equazioni/tabelle
      trascritte e rifiuta i casi non coperti (carico inclinato, base
      inclinata, pendio, stratificazione, rottura locale, eccentricita'
      oltre 1/6).
