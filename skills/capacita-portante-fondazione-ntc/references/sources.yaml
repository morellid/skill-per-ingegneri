    notes: |
      Stesso PDF e stesso hash gia' censiti dalle altre skill NTC del repo.
      Sezioni trascritte nel md_path: par. 6.2.4.1.1 (Tab. 6.2.I,
      coefficienti A1), 6.2.4.1.2 (Tab. 6.2.II, M1 = 1,0), 6.4.2 e 6.4.2.1
      (verifiche SLU fondazioni superficiali, Approccio 2, Tab. 6.4.I:
      gamma_R = 2,3 carico limite / 1,1 scorrimento), cap. 12 ("altri
      codici internazionali", aggancio per la fonte FHWA).

  - id: circ-7-2019-mit
    title: "Circolare 21 gennaio 2019 n. 7 C.S.LL.PP. - Istruzioni per l'applicazione delle NTC 2018"
    type: circolare
    url: https://www.gazzettaufficiale.it/eli/gu/2019/02/11/35/so/5/sg/pdf
    accessed: 2026-07-12
    sha256: f7c3b8d1f443aadb6b3e020b6b6c19813683492ecaadd2c15bf6bf1939aaed7c
