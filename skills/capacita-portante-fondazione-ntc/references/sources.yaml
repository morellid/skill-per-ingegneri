# Fonti per il calcolo della capacita' portante di fondazioni superficiali.
#
# Architettura:
#   - NTC 2018 par. 6.4.2.1 + Tab. 6.2.I/6.2.II/6.4.I: quadro della verifica
#     GEO a carico limite (Ed <= Rd, Approccio 2 A1+M1+R3, gamma_R = 2,3)
#   - Circ. 7/2019 par. C6.4.2.1: effetto dell'azione e resistenza come
#     forze normali al piano di posa; fattori che influenzano la resistenza
#   - FHWA NHI-06-089 par. 8.4: formulazione del carico limite (eq. 8-1..8-9,
#     Table 8-4/8-5/8-6), usata come "altro codice internazionale" ai sensi
#     del cap. 12 NTC 2018 (le NTC non forniscono la formula in forma chiusa)

sources:
  - id: ntc2018-dm-17-01-2018
