# Fonte per la qualificazione dell'intervento in area vincolata rispetto all'autorizzazione
# paesaggistica: esclusa (Allegato A), soggetta a procedimento SEMPLIFICATO (interventi di
# lieve entita', Allegato B) o soggetta al procedimento ORDINARIO (art. 146 del Codice).
# Il D.P.R. 31/2017 e' il regolamento attuativo dell'art. 12 DL 83/2014 e dell'art. 146 c. 9
# del Codice dei beni culturali e del paesaggio (D.Lgs. 42/2004).

sources:
  - id: dpr-31-2017
    title: "D.P.R. 13 febbraio 2017, n. 31 - Regolamento su interventi esclusi dall'autorizzazione paesaggistica o soggetti a procedura semplificata (Allegati A e B) (testo vigente al 2026-07-16)"
    type: decreto-presidente-repubblica
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.presidente.repubblica:2017-02-13;31!vig=2026-07-16
    accessed: 2026-07-16
