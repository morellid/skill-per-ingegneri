display_name: "Valutazione del rischio chimico - agenti chimici pericolosi (D.Lgs. 81/2008)"
short_description: Supporto documentale al datore di lavoro, all'RSPP e al tecnico della sicurezza per la valutazione del rischio chimico da agenti chimici pericolosi e le relative misure di prevenzione e protezione, ai sensi del D.Lgs. 9 aprile 2008, n. 81, Titolo IX, Capo I, artt. 222-227. Inquadra le definizioni di agente chimico e agente chimico pericoloso secondo la classificazione CLP (Reg. CE 1272/2008), il valore limite di esposizione professionale dell'Allegato XXXVIII e la distinzione tra pericolo e rischio (art. 222); la valutazione dei rischi che confluisce nel DVR dell'art. 28, con proprieta' pericolose, schede di sicurezza REACH (Reg. CE 1907/2006), livello/modo/durata dell'esposizione, valori limite, effetto combinato di piu' agenti, attivita' nuove da valutare preventivamente e aggiornamento (art. 223); le misure e i principi generali con la deroga per il rischio basso e irrilevante che esclude gli artt. 225/226/229/230 (art. 224); le misure specifiche con sostituzione e ordine di priorita' (controlli tecnici, misure collettive, DPI, sorveglianza sanitaria), le misurazioni con le metodiche dell'Allegato XLI, il superamento del valore limite e la comunicazione all'organo di vigilanza (art. 225); le disposizioni per incidenti ed emergenze con procedure, esercitazioni, sistemi d'allarme e piano (art. 226); l'informazione e formazione dei lavoratori con l'accesso alle schede di sicurezza e l'etichettatura di contenitori e condutture (art. 227). NON redige il DVR ne' la valutazione, non esegue misurazioni ne' algoritmi di stima, non riproduce gli Allegati XXXVIII/XLI ne' i regolamenti CLP/REACH e non sostituisce il datore di lavoro, l'RSPP, il medico competente o il chimico.
default_prompt: |
  Nella mia azienda si usano agenti chimici pericolosi: come inquadro la valutazione del rischio
  chimico secondo il D.Lgs. 81/2008? Quando posso considerarlo rischio basso e irrilevante, quali
  misure vanno adottate in ordine di priorita' e cosa devo fare in caso di superamento del valore
  limite? Cita gli articoli.
