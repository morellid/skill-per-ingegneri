    notes: |
      Codice redazionale 008G0104, idGruppo 41 (Titolo IX, Capo I - Protezione da agenti chimici).
      Pagina indice Normattiva pinnata a !vig=2026-07-17 (hash stabile, doppio download: 18fbc542...; e'
      lo stesso indice usato dalle altre skill D.Lgs. 81/2008). Articoli 222 (v4), 223 (v4), 224 (v1),
      225 (v2), 226 (v1), 227 (v2) caricati via AJAX (caricaArticolo), formato AKN, e trascritti
      verbatim in references/fonti/dlgs-81-2008-222-227.md: definizioni di agenti chimici e agenti
      chimici pericolosi (classificazione CLP Reg. CE 1272/2008), valore limite di esposizione
      professionale (Allegato XXXVIII), pericolo/rischio (222); valutazione dei rischi nel DVR (art. 28)
      con proprieta' pericolose, schede di sicurezza REACH (Reg. CE 1907/2006), livello/modo/durata
      dell'esposizione, VLEP e valori limite biologici, effetto combinato, attivita' nuove preventive,
      aggiornamento (223); misure e principi generali di prevenzione con deroga per rischio basso e
      irrilevante che esclude gli artt. 225, 226, 229, 230 (224); misure specifiche - sostituzione e
      gerarchia (controlli tecnici, misure collettive, DPI, sorveglianza sanitaria), misurazioni
      (Allegato XLI), superamento del VLEP, sostanze infiammabili/instabili, comunicazione all'organo di
      vigilanza (225); incidenti ed emergenze - procedure, esercitazioni, DPI, sistemi d'allarme, piano
      (226); informazione e formazione - dati della valutazione, schede di sicurezza, etichettatura di
      contenitori e condutture (227). Il testo tra doppi tondi (( )) segnala le modifiche successive
      (es. D.Lgs. 39/2016 di adeguamento al CLP).
      LIMITE DI RESA: la skill inquadra obblighi, contenuti e gerarchia delle misure; NON redige il DVR
      ne' la valutazione del rischio chimico, NON esegue misurazioni ne' applica algoritmi di stima del
      rischio, NON riproduce gli Allegati XXXVIII/XLI ne' i regolamenti CLP/REACH, e NON sostituisce il
      datore di lavoro, l'RSPP, il medico competente ne' il chimico.
