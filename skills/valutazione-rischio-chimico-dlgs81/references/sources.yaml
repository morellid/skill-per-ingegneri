# Fonte per l'inquadramento della VALUTAZIONE DEL RISCHIO CHIMICO da agenti chimici pericolosi:
# definizioni, valutazione dei rischi (nel DVR), misure generali e specifiche di prevenzione/protezione,
# incidenti ed emergenze, informazione e formazione. Fonte: Testo unico sicurezza (D.Lgs. 81/2008),
# Titolo IX, Capo I, artt. 222-227.

