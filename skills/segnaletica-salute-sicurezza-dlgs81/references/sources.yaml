# Fonte per l'inquadramento della SEGNALETICA DI SALUTE E SICUREZZA sul luogo di lavoro: campo di
# applicazione, definizioni (cartelli, colori, segnali luminosi/acustici, comunicazioni verbali,
# segnali gestuali), obblighi del datore di lavoro, informazione e formazione, sanzioni. Fonte:
# Testo unico sicurezza (D.Lgs. 81/2008), Titolo V, artt. 161-165.

