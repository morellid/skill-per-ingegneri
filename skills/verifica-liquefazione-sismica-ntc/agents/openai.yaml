display_name: "Verifica alla liquefazione sismica del terreno (NTC 2018 par. 7.11.3.4)"
short_description: Supporto documentale al progettista geotecnico/strutturale per inquadrare la verifica di stabilita' del sito nei confronti della liquefazione del terreno in condizioni sismiche secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.11.3.4. Aiuta a inquadrare le generalita' e la definizione di liquefazione (perdita di resistenza al taglio o accumulo di deformazioni plastiche in terreni saturi prevalentemente sabbiosi, sollecitati da azioni cicliche e dinamiche in condizioni non drenate) e le conseguenze (interventi di consolidamento o trasferimento del carico a strati non suscettibili; per le fondazioni profonde valutazione della riduzione della capacita' portante e degli incrementi nei pali); le condizioni di esclusione della verifica, che consentono di ometterla quando ricorre almeno una tra accelerazione massima attesa al piano campagna in campo libero minore di 0,1 g, profondita' media stagionale della falda superiore a 15 m con fondazioni superficiali, sabbie pulite con (N1)60 maggiore di 30 oppure qc1N maggiore di 180 (SPT e CPT normalizzate a 100 kPa), oppure distribuzione granulometrica esterna ai fusi della Fig. 7.11.1 (a per Uc minore di 3,5 e b per Uc maggiore di 3,5); e i metodi di analisi quando nessuna condizione e' soddisfatta, con il coefficiente di sicurezza definito dal rapporto tra la resistenza disponibile alla liquefazione e la sollecitazione indotta dal terremoto di progetto, valutato con metodi storico-empirici e con adeguatezza del margine motivata dal progettista. NON calcola il coefficiente di sicurezza (CRR/CSR e correlazioni derivano da letteratura e prove in sito/laboratorio, non dalle NTC), non progetta gli interventi di consolidamento e non sostituisce il progettista geotecnico. E' distinta dalle skill sulla stabilita' dei pendii (par. 6.3) e sulle verifiche geotecniche SLU (par. 6.2.4).
default_prompt: |
  Devo stabilire se per il mio sito sismico e' necessaria la verifica a liquefazione secondo le NTC 2018 (par.
  7.11.3.4). Quali sono le condizioni che consentono di omettere la verifica (a_max < 0,1 g, falda > 15 m,
  (N1)60 > 30 o qc1N > 180, granulometria fuori Fig. 7.11.1)? Se nessuna e' soddisfatta, come si imposta la
  verifica con il coefficiente di sicurezza (resistenza/sollecitazione)? Cita i paragrafi.
