# Fonte normativa per l'inquadramento della verifica di stabilita' nei confronti
# della liquefazione del terreno in condizioni sismiche secondo le NTC 2018 (DM
# 17/01/2018), par. 7.11.3.4: generalita', condizioni di esclusione della
# verifica, metodi di analisi (coefficiente di sicurezza). La skill inquadra i
# criteri; non calcola il coefficiente di sicurezza ne' progetta gli interventi.

