display_name: AI Act Compliance (IT)
short_description: Conformita' al Reg. UE 2024/1689 (AI Act) per il mercato italiano. Classificazione sistemi, obblighi provider/deployer, GPAI, trasparenza. (Versione italiana - per l'inglese vedere il repo separato ai-act-skill.)
default_prompt: |
  Classifica questo sistema AI sotto l'AI Act. In Italia? Vietato?
