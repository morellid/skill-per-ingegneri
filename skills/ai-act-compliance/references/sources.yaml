    notes: |
      Pubblicato sulla Gazzetta Ufficiale UE L 2024/1689 del 12 luglio 2024.
      Testo italiano scaricato da EUR-Lex come PDF unico (779 pagine).
      SHA256 calcolato al fetch del 2026-04-25.
      Licenza: testi legislativi dell'UE sono in pubblico dominio ai sensi
      della decisione 2011/833/UE della Commissione europea e della
      politica di riutilizzo di EUR-Lex.
      Struttura rilevante per la skill:
      - Art. 5: pratiche di IA vietate (8 pratiche + eccezioni)
      - Art. 6-7: classificazione sistemi IA ad alto rischio (Allegato I e III)
      - Art. 9: sistema di gestione dei rischi (ciclo continuo)
      - Allegato III: 8 settori / casi d'uso ad alto rischio elencati
      - Art. 26-27: obblighi dei deployer + FRIA (fondamental rights impact assessment)
      - Art. 50: obblighi di trasparenza (5 categorie)
      - Art. 51-55: fornitori di modelli GPAI + rischio sistemico (>= 10^25 FLOPs)
      Il fetch automatico di EUR-Lex da CI potrebbe essere bloccato da rate
      limiting o bot detection: il file e' referenziato solo via hash e non
      viene scaricato automaticamente dal workflow auto-fetch-sources.yml
      (licenza public-domain-eu-law non e' nella lista FREE_LICENSES del workflow).
