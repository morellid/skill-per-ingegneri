display_name: "Composte acciaio-cls in zona sismica: regole generali (NTC 2018 par. 7.6)"
short_description: Supporto documentale al progettista strutturale per inquadrare le regole generali delle costruzioni composte di acciaio-calcestruzzo in zona sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.6. Aiuta a inquadrare i comportamenti strutturali del par. 7.6 (a) non dissipativo secondo il par. 4.3; b) dissipativo con zone dissipative in membrature composte; c) dissipativo con zone dissipative in acciaio, con integrita' del calcestruzzo compresso); le caratteristiche dei materiali del par. 7.6.1 (calcestruzzo non inferiore a C20/25 o LC20/22 e non superiore a C40/50 o LC40/44; acciaio per c.a. B450C, con B450A nei casi del par. 7.4.2.2; acciaio strutturale secondo i par. 7.5 e 11.3.4); le tipologie strutturali e i fattori di comportamento del par. 7.6.2 (tipologie intelaiate, con controventi concentrici in acciaio, con controventi eccentrici a connessioni in acciaio, a mensola o a pendolo inverso, intelaiate controventate; pareti o nuclei in c.a. rinviati al par. 7.4; q0 dalla Tab. 7.3.II); la rigidezza della sezione composta del par. 7.6.3 (coefficiente di omogeneizzazione n=Ea/Ecm=7 per il calcestruzzo compresso; momento d'inerzia non fessurato I1 e fessurato I2); e i criteri per le strutture dissipative del par. 7.6.4 (capacity design con EU,Rd=1,1 gamma_ov Epl,Rd; Rj,d>=RU,Rd; per le colonne primarie dei telai il rapporto NEd/Npl,Rd non oltre 0,3). NON esegue le verifiche di resistenza/duttilita' delle membrature e dei collegamenti, non progetta i collegamenti e non sostituisce il progettista. E' distinta dalla skill sulle composte statiche (par. 4.3), da quella sull'acciaio sismico (par. 7.5) e da quella sul fattore di comportamento q (par. 7.3.1).
default_prompt: |
  Sto impostando una struttura composta acciaio-calcestruzzo in zona sismica secondo le NTC 2018 (par. 7.6).
  Quale comportamento (dissipativo/non dissipativo) e quali materiali posso usare (classi di calcestruzzo,
  acciaio B450C)? Quale tipologia strutturale e quale q0 (Tab. 7.3.II)? Quale coefficiente di omogeneizzazione n
  uso per la rigidezza e quali sono i capisaldi del capacity design (EU,Rd, NEd/Npl,Rd)? Cita i paragrafi.
