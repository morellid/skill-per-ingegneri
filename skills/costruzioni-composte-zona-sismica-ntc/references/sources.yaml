# Fonte normativa per l'inquadramento delle regole generali per le costruzioni
# composte di acciaio-calcestruzzo in zona sismica (comportamenti dissipativo/
# non dissipativo, caratteristiche dei materiali, tipologie strutturali e
# fattori di comportamento q0, rigidezza della sezione composta e capisaldi del
# capacity design) secondo le NTC 2018 (DM 17/01/2018), par. 7.6. La skill
# inquadra le regole generali; non esegue le verifiche di resistenza/duttilita'
# ne' progetta i collegamenti.

