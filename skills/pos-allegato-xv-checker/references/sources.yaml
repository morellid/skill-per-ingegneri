sources:
  - id: dlgs-81-2008-consolidato-inl-2025-01
    title: "D.Lgs. 9 aprile 2008 n. 81 - Testo coordinato - Edizione gennaio 2025 (INL)"
    type: decreto-legislativo-coordinato
    url: https://www.ispettorato.gov.it/files/2025/01/TU-81-08-Ed.-Gennaio-2025-1.pdf
    accessed: 2026-04-25
    sha256: f593e1806de920dc16def37920c5623cda2450075ed56051852f2caf6045899a
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-81-2008-consolidato-inl-2025-01.pdf
    excerpt_paths:
      - references/estratti/allegato-xv-testo.md
      - references/estratti/dlgs-81-art-96-97.md
    notes: |
      Testo coordinato del D.Lgs. 81/2008 aggiornato a gennaio 2025, edizione a cura di INL
      (Ispettorato Nazionale del Lavoro), coordinamento di Gianfranco Amato (INL) e
      Fernando Di Fiore (ATS Pavia). Include modifiche introdotte dalla L. 203/2024
      (art. 12, 38, 41, 65, 304, introduzione art. 14-bis, in vigore dal 12/01/2025).
      L'edizione coordinata INL non e' ufficiale: per uso autoritativo cross-checkare
      contro Normattiva (www.normattiva.it) o Gazzetta Ufficiale.
      Il testo del decreto e degli allegati e' riproducibile liberamente ai sensi
      dell'art. 5 L. 633/1941 (atti ufficiali dello Stato).
      Note editoriali, sanzioni in sintesi, circolari INL e interpelli sono commenti
      editoriali non riprodotti integralmente negli estratti - solo citati.

  - id: dlgs-81-2008-originale-gu-2008
    title: "D.Lgs. 9 aprile 2008 n. 81 - Testo originale - GU n. 101 del 30/04/2008 Suppl. Ordinario n. 108"
    type: decreto-legislativo
    url: https://www.gazzettaufficiale.it/eli/gu/2008/04/30/101/so/108/sg/pdf
    accessed: 2026-04-25
    sha256: bcc0e075c0db79d2999da82900e7dffc1118a53a3aa1f6e152498c455038db4d
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-81-2008-originale.pdf
    excerpt_paths: []
    notes: |
      Testo originale pubblicato in Gazzetta Ufficiale. Utile come riferimento storico
      e per disambiguazioni, ma la versione consolidata (id: dlgs-81-2008-consolidato-inl-2025-01)
      e' quella da usare per la verifica di conformita' POS in quanto riflette tutte
      le modifiche apportate dal 2008 al 2025.

  - id: normattiva-portale-dlgs-81
    title: "Portale Normattiva - D.Lgs. 81/2008 - versione multivigente"
    type: portale-normativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2008-04-09;81
    accessed: 2026-04-25
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Portale autoritativo della Presidenza del Consiglio dei Ministri per la consultazione
      del testo consolidato "vigente" del decreto. Non scaricabile come PDF unico ma
      consultabile articolo per articolo con storicizzazione delle modifiche.
      Usare per cross-check puntuale su articoli specifici prima di release o in caso
      di dubbio su un'affermazione normativa.

