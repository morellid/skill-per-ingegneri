display_name: "Azioni eccezionali da esplosione (NTC 2018 par. 3.6.2)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento delle azioni eccezionali da esplosione secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 3.6.2 (Esplosioni). Aiuta a inquadrare l'ambito (costruzioni con miscele esplosive di polveri o gas in aria o con materiali esplosivi; escluse le esplosioni esterne alla costruzione); la classificazione delle azioni (Tab. 3.6.I: categoria 1 effetti trascurabili, 2 localizzati, 3 generalizzati); e la modellazione come pressioni statiche equivalenti: per la Categoria 1 nessuna verifica; per la Categoria 2, ove siano presenti idonei pannelli di sfogo, la pressione statica equivalente nominale pd in kN/m quadro pari al valore maggiore fra pd uguale a 3 piu' pv [3.6.5a] e pd uguale a 3 piu' pv mezzi piu' 0,04 diviso il quadrato del rapporto Av su V [3.6.5b] (con pv pressione a cui cedono le aperture di sfogo, Av area delle aperture, V volume dell'ambiente), con il vincolo 0,05 minore o uguale ad Av su V minore o uguale a 0,15 al metro [3.6.6], valide per volume non superiore a 1000 metri cubi e con la pressione agente simultaneamente su tutte le pareti, mentre tutti gli elementi chiave e le loro connessioni devono essere progettati per pd uguale a 20 kN/m quadro da ogni direzione; per la Categoria 3 studi piu' approfonditi; e i criteri di progettazione (danneggiamenti localizzati accettabili, misure di protezione come superfici collassabili, giunti strutturali e prevenzione dei crolli). NON calcola le sollecitazioni ne' dimensiona o verifica gli elementi, non svolge i modelli teorici delle onde di pressione ne' gli studi di Categoria 3, non tratta le esplosioni esterne, l'incendio (par. 3.6.1) ne' gli urti (par. 3.6.3, skill dedicate), e non sostituisce il progettista strutturale. Completa la famiglia delle azioni eccezionali (par. 3.6).
default_prompt: |
  Devo definire le azioni eccezionali da esplosione secondo le NTC 2018 (par. 3.6.2): come classifico l'azione
  (Tab. 3.6.I) e, per la Categoria 2 con pannelli di sfogo, come calcolo la pressione statica equivalente pd
  (valore maggiore fra 3 + pv e 3 + pv/2 + 0,04/(Av/V)^2)? Quali vincoli valgono su Av/V e sul volume? Quale
  pressione assumo per gli elementi chiave? Cita i paragrafi e le formule.
