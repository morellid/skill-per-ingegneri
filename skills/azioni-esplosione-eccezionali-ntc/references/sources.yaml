# Fonte normativa per l'inquadramento delle azioni eccezionali da esplosione ai
# sensi delle NTC 2018 (DM 17/01/2018), par. 3.6.2. La skill inquadra
# classificazione, modellazione (pressioni statiche equivalenti) e criteri; non
# calcola le sollecitazioni ne' dimensiona/verifica gli elementi.

