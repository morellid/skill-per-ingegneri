display_name: "Azioni eccezionali da urto (NTC 2018 par. 3.6.3)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento delle azioni eccezionali da urto secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 3.6.3 (Urti). Aiuta a inquadrare la classificazione delle azioni (Tab. 3.6.II: categoria 1 effetti trascurabili, 2 localizzati, 3 generalizzati; le azioni si applicano agli elementi con conseguenze di categoria 2 e 3); gli urti da traffico veicolare sotto ponti o altre strutture (le due componenti non simultanee parallela Fd,x e ortogonale Fd,y uguale a 0,50 Fd,x [3.6.7]; le forze statiche equivalenti della Tab. 3.6.III con 1000 kN per autostrade e strade extraurbane, 750 kN per le strade locali, 500 kN per le strade urbane, 50 kN per le automobili e 150 kN per i veicoli merci oltre 3,5 t nelle aree di parcheggio e autorimesse; i punti di applicazione sulle membrature verticali a 0,5 m per le automobili o 1,25 m sopra la superficie di marcia; per gli elementi orizzontali sopra la strada F uguale a r per Fd,x [3.6.8] con r uguale a 1,0 fino a 5 m di altezza del sottovia, decrescente linearmente da 1,0 a 0 fra 5 e 6 m e nullo oltre 6 m; per i carrelli elevatori F uguale a 5 W [3.6.9]); gli urti da traffico veicolare sopra i ponti con la forza orizzontale equivalente di 100 kN sugli elementi di sicurezza; gli urti da traffico ferroviario con le azioni statiche equivalenti in funzione della distanza d dall'asse del binario (4000 e 1500 kN per d fino a 5 m, 2000 e 750 kN per d fra 5 e 15 m, zero oltre 15 m, applicate a 1,80 m dal piano del ferro); e il rinvio per gli urti di imbarcazioni e aeromobili (Cap. 12). NON calcola le sollecitazioni ne' dimensiona o verifica gli elementi o i sistemi di protezione, non svolge le analisi di rischio (ferrovia) ne' le procedure per imbarcazioni e aeromobili, non tratta le esplosioni (par. 3.6.2) ne' l'incendio (par. 3.6.1, skill dedicata), e non sostituisce il progettista strutturale. Completa la famiglia delle azioni eccezionali (par. 3.6).
default_prompt: |
  Devo definire le azioni eccezionali da urto secondo le NTC 2018 (par. 3.6.3): per un elemento esposto a urti
  di veicoli sotto un ponte, quale forza statica equivalente Fd,x assumo (Tab. 3.6.III) e quanto vale Fd,y? A
  quale altezza si applica sulle membrature verticali? Per un elemento orizzontale sopra la strada come uso F =
  r*Fd,x [3.6.8]? E per gli urti da traffico ferroviario in funzione della distanza d? Cita i paragrafi e le
  tabelle.
