display_name: "Opere di materiali sciolti e fronti di scavo (NTC 2018 par. 6.8)"
short_description: Supporto documentale al progettista geotecnico per l'inquadramento della progettazione e della verifica delle opere di materiali sciolti (rilevati, argini di difesa per fiumi, canali e litorali, rinfianchi, rinterri, terrapieni, colmate) e dei fronti di scavo secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.8. Aiuta a inquadrare l'ambito (manufatti di materiali sciolti e opere con funzioni di drenaggio, filtro, transizione, fondazione, tenuta o protezione; esclusi gli sbarramenti di ritenuta idraulica, oggetto di normativa specifica); i criteri generali di progetto (requisiti prestazionali, caratteristiche dei terreni di fondazione, scelta e qualificazione dei materiali naturali o di provenienza diversa, posa in opera con spessore massimo degli strati, grado di compattazione e deformabilita'); le verifiche di sicurezza allo stato limite ultimo con la condizione 6.2.1 e la Combinazione 2 (A2+M2+R2) dell'Approccio 1, impiegando i coefficienti parziali delle Tabelle 6.2.I per le azioni, 6.2.II per i parametri geotecnici e 6.8.I per le resistenze (coefficiente parziale gamma_R uguale a 1,1 per il gruppo R2), con lo studio della stabilita' globale dell'insieme manufatto-terreno di fondazione nelle diverse fasi costruttive, a fine costruzione e in esercizio, le verifiche locali sugli elementi di rinforzo, l'influenza dei manufatti su pendii e, per le opere di ritenuta idraulica, la stabilita' dei paramenti con attenzione al sifonamento e all'erosione; le verifiche di esercizio sugli spostamenti; gli aspetti costruttivi (posa in strati, geosintetici e componenti artificiali certificati secondo le norme europee armonizzate); i controlli e il monitoraggio (spostamenti e pressioni interstiziali); e i fronti di scavo (indagini geotecniche in funzione di profondita', ampiezza, destinazione e carattere permanente o provvisorio; profilo di scavo; influenza su pendii, pressioni interstiziali e costruzioni preesistenti; obbligo di una struttura di sostegno delle pareti per scavi in trincea a fronte verticale di altezza superiore ai 2 m con permanenza di personale o in prossimita' di manufatti esistenti, con verifiche SLU e SLE, e azioni di terreno, acqua e sovraccarichi nelle condizioni piu' sfavorevoli). NON calcola le verifiche ne' dimensiona il manufatto, il fronte di scavo o la struttura di sostegno, non definisce il modello geotecnico, non tratta gli sbarramenti di ritenuta idraulica (dighe in terra), la sicurezza dei lavoratori negli scavi (D.Lgs 81/2008 Titolo IV) ne' la progettazione sismica, e non sostituisce il progettista. Complementa le skill sulle opere di sostegno (par. 6.5), sulla stabilita' dei pendii (par. 6.3) e sulla relazione geologica e geotecnica.
default_prompt: |
  Devo inquadrare la progettazione e la verifica di un'opera di materiali sciolti (rilevato/argine/terrapieno) o
  di un fronte di scavo secondo le NTC 2018 (par. 6.8): con quale approccio e combinazione si eseguono le
  verifiche SLU (Combinazione 2 A2+M2+R2) e quali coefficienti parziali si usano (Tab. 6.2.I, 6.2.II e 6.8.I con
  gamma_R = 1,1)? In quali condizioni va studiata la stabilita' globale? Per i fronti di scavo, quando serve una
  struttura di sostegno delle pareti (fronte verticale oltre 2 m con permanenza di personale o vicino a
  manufatti) e con quali verifiche? Cita i paragrafi e la tabella.
