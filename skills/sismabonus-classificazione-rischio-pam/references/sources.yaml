  # --- Decreti istitutivi e modificativi del Sismabonus ----------------

  - id: dm-58-2017
    title: "DM Min. Infrastrutture e Trasporti 28/2/2017 n. 58 - Linee guida per la classificazione del rischio sismico delle costruzioni nonche' modalita' per l'attestazione, da parte di professionisti abilitati, dell'efficacia degli interventi effettuati"
    type: decreto
    url: https://www.mit.gov.it/nfsmitgov/files/media/normativa/2017-03/Decreto%20Ministeriale%20numero%2058%20del%2028-02-2017.pdf
    accessed: 2026-05-10
    sha256: 4b03025c0c9c0a81860ad454e3448ec325569002e8b3332d3abf20ae78851267
    license: public-domain
    binary_path: not_in_repo/dm-58-2017.pdf
    excerpt_path: references/estratti/dm-58-2017-art-3.md
    md_path: references/fonti/dm-58-2017-art-3.md
    notes: |
      Decreto istitutivo del sismabonus tecnico (rinvio aliquote a legge
      finanziaria). Allegato A originale (poi sostituito dal DM 65/2017)
      contiene le Linee Guida per la classificazione del rischio sismico.
      PDF scaricato 2026-05-10 da URL diretto MIT. SHA256 calcolato sul
      file scaricato. ATTENZIONE: il PDF e' un documento scansionato (non
      testuale). pdftotext non riesce ad estrarre il testo. Il contenuto
      rilevante (Allegato A) e' sostituito integralmente dal DM 65/2017,
      trascritto in references/fonti/dm-65-2017-all-a.md.

  - id: dm-65-2017-all-a
    title: "DM MIT 7/3/2017 n. 65 - Allegato A: Linee guida per la classificazione del rischio sismico delle costruzioni (testo letterale vigente)"
    type: allegato
    url: https://www.mit.gov.it/nfsmitgov/files/media/normativa/2017-03/DM%2065%20del%2007-03-2017%20All%20A.pdf
    accessed: 2026-05-10
    sha256: 8392e1dddd5ff99de3fab805e86414bd61ac8fc022a95ba2731c485a48fa5878
    license: public-domain
    binary_path: not_in_repo/dm-65-2017-allegato-a.pdf
    excerpt_path: references/estratti/dm-58-2017-allegato-a-formula-pam.md
    md_path: references/fonti/dm-65-2017-all-a.md
    notes: |
      ALLEGATO A del DM 58/2017 sostituito dal DM 65/2017. Testo letterale
      di riferimento per la procedura di classificazione (PAM, IS-V,
      tabelle classi, capping al passo 2.1.3, classe finale, salto
      classi). PDF di 594 KB scaricato direttamente dal sito MIT;
      hash SHA256 calcolato al fetch del 2026-05-10 - coincide con il
      valore calcolato il 2026-05-07. PDF testuale (non scansionato):
      testo estratto integralmente via pdftotext e trascritto in
      references/fonti/dm-65-2017-all-a.md.

  - id: dm-24-2020
    title: "DM MIT 9/1/2020 n. 24 - Modifiche all'Allegato A del DM 58/2017"
    type: decreto
    url: https://www.mit.gov.it/nfsmitgov/files/media/normativa/2020-01/DM%20n%2024%20del%2009-01-2020.pdf
    accessed: 2026-05-10
    sha256: 028d77270f06f7a6985b12bf0d42aae0558e9211508fb4c3083c10b2592517ff
    license: public-domain
    binary_path: not_in_repo/dm-24-2020.pdf
    excerpt_path: null
    md_path: references/fonti/dm-24-2020.md
    notes: |
      PDF scaricato 2026-05-10 da URL diretto MIT. SHA256 calcolato sul
      file scaricato. ATTENZIONE: il PDF e' un documento scansionato (2
      pagine). pdftotext non produce testo estraibile. Trascrizione
      effettuata via lettura visiva delle immagini PNG estratte con
      pdftoppm a 200dpi (2026-05-11). Il decreto modifica art. 2 comma 1,
      art. 3 comma 3, art. 3 comma 6 del DM 58/2017 (correzioni formali e
      modalita' di presentazione SCIA), e sostituisce Allegato A e Allegato B.
      Il testo dell'Allegato A non e' incluso nel PDF disponibile sul sito
      MIT: l'impatto sulla procedura di classificazione convenzionale non e'
      verificabile dal solo PDF scaricato. Il Testo coordinato disponibile
      sul sito MIT e' anch'esso scansionato.

  - id: dm-329-2020
    title: "DM MIT 6/8/2020 n. 329 - Modifica all'art. 3 del DM 58/2017 e sostituzione dell'Allegato B"
    type: decreto
    url: https://www.mit.gov.it/nfsmitgov/files/media/normativa/2020-08/Decreto%20SismaBonus.pdf
    accessed: 2026-05-07
    sha256: 9031321161c6d7e3eaa71228a9f9c333f2f1f08d209ad7d6bb73fcd0438837a5
    license: public-domain
    binary_path: not_in_repo/dm-329-2020.pdf
    excerpt_path: null
    md_path: references/fonti/dm-329-2020.md
    notes: |
      PDF testuale (non scansionato), letto con pdftotext (2026-05-11).
      Modifica l'art. 3 del DM 58/2017 inserendo i commi 4-bis, 4-ter,
      4-quater (super-sismabonus 110%, polizza assicurativa obbligatoria,
      SAL con modello allegato 1) e SOSTITUISCE l'Allegato B (modello di
      asseverazione tecnica del professionista). NON modifica l'Allegato A.
      Fuori scope diretto della skill (tocca asseverazione e adempimenti
      fiscali, non la procedura di calcolo PAM/IS-V). Hash SHA256 calcolato
      al fetch del 2026-05-07.

  # --- Riferimenti tecnici NTC 2018 ------------------------------------

  - id: ntc-2018
    title: "DM 17/1/2018 - Aggiornamento delle Norme Tecniche per le Costruzioni (NTC 2018)"
    type: decreto
    url: https://www.mit.gov.it/normativa/decreto-ministeriale-numero-8-del-17012018
    accessed: 2026-05-10
    sha256: null
    license: public-domain
    binary_path: null
    excerpt_path: null
    notes: |
      FETCH FALLITO 2026-05-10: la pagina MIT risponde con HTTP 404.
      Fonte di prerequisito (il professionista usa NTC 2018 cap. 3.2 e
      cap. 8 per calcolare PGA_C e TR_C che sono INPUT della skill): la
      skill non cita direttamente le NTC 2018 nei propri calcoli.
      binary_path e sha256 impostati a null perche' il PDF non e' stato
      recuperato. Nessun estratto necessario per il funzionamento della skill.

  - id: circ-7-2019
    title: "Circolare Min. Infrastrutture e Trasporti 21/1/2019 n. 7 - Istruzioni per l'applicazione delle NTC 2018"
    type: circolare
    url: https://www.gazzettaufficiale.it/eli/gu/2019/02/11/35/so/5/sg/pdf
    accessed: 2026-05-10
    sha256: null
    license: public-domain
    binary_path: null
    excerpt_path: null
    notes: |
      FETCH NON COMPLETATO 2026-05-10: il PDF e' un supplemento ordinario
      GU di grandi dimensioni, non scaricato. Fonte di prerequisito (il
      professionista usa cap. C8 per livelli di conoscenza LC1/LC2/LC3 e
      fattori confidenza FC per calcolare PGA_C e TR_C, input della skill).
      La skill non cita direttamente la Circolare nei propri calcoli.
      binary_path e sha256 impostati a null. Nessun estratto necessario
      per il funzionamento della skill.

  # --- Materiali di confronto / esempio (non normativi) ----------------

  - id: class-2017-attestato-esempio
    title: "ClaSS 2017 - Attestato di Classificazione Sismica - esempio output (S.I.S. Software Ingegneria Strutturale)"
    type: altro
    url: https://infowebsrl.it/Newsletter/SIS_ingegneria/1/Pdf/Esempio_ClaSS_SIS.pdf
    accessed: 2026-05-07
    sha256: 5a9ceccf7fd37529da7a3e894fde31cc52720ceadea833484b19378cefe3f985
    license: other
    binary_path: not_in_repo/class-2017-esempio.pdf
    excerpt_path: null
    notes: |
      Output di esempio di software certificato italiano per
      classificazione DM 58/2017 (ClaSS 2017 di S.I.S.). Usato come
      riferimento qualitativo per le tabelle classi PAM/IS-V e per
      lo schema di attestato. NON e' fonte normativa (linee guida
      operative del produttore software). Da usare come benchmark
      qualitativo per la validazione di campo Livello 2 insieme ad
      altri software (CDM Win STS, EdiSis Newsoft, MasterSap-SismiClass
      AMV). Hash SHA256 calcolato al fetch del 2026-05-07 (PDF di
      874 KB scaricato dall'URL pubblico InfoWebSrl).
