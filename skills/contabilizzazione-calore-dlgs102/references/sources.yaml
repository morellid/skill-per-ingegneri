    notes: |
      Codice redazionale 14G00113, GU n. 165 del 18/7/2014 (attuazione della
      direttiva 2012/27/UE). Il binario e' la pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download). L'articolo 9 (Misurazione e
      fatturazione dei consumi energetici) e' caricato via AJAX (caricaArticolo:
      versione 8, idGruppo 2, flagTipoArticolo 0, codiceRedazionale 14G00113,
      dataPubblicazioneGazzetta 2014-07-18) e trascritto verbatim in
      references/fonti/dlgs-102-2014-art-9.md. Il nucleo operativo della skill e' il
      comma 5 (contabilizzazione del calore e ripartizione delle spese) e i commi
      5-bis/5-ter/5-quater; i commi 1-4 (sistemi di misurazione intelligenti) sono
      riprodotti ma demandati a provvedimenti ARERA. Le norme tecniche UNI 10200
      (ripartizione) e UNI EN 15459 (efficienza in termini di costi) sono citate come
      rinvio e NON riprodotte (standard a pagamento).
