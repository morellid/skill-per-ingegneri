display_name: "Standard urbanistici, zone omogenee e distanze (DM 1444/1968)"
short_description: Supporto documentale al tecnico (geometra, ingegnere, architetto, urbanista) per inquadrare i limiti inderogabili del DM 2 aprile 1968 n. 1444 nella formazione o revisione degli strumenti urbanistici e nella verifica di conformita' urbanistica. Aiuta a inquadrare le zone territoriali omogenee dell'art. 2 (A storiche o di pregio; B edificate, parzialmente edificate se la superficie coperta e' almeno il 12,5 per cento e la densita' territoriale supera 1,5 mc/mq; C nuovi complessi; D industriali; E agricole; F attrezzature di interesse generale); gli standard urbanistici dell'art. 3 (dotazione minima di 18 mq per abitante: 4,50 istruzione, 2,00 interesse comune, 9,00 verde e sport, 2,50 parcheggi; 25 mq di superficie lorda per abitante); le quantita' per zona dell'art. 4 (zone C 18 mq o 12 mq per comuni fino a 10.000 abitanti, zone E 6 mq, zone F 1,5 piu' 1 piu' 15 mq per abitante) e per gli insediamenti produttivi dell'art. 5 (zone D almeno il 10 per cento, commerciale e direzionale 80 mq ogni 100 mq); i limiti di densita' edilizia dell'art. 7 (zone A fino a 5 mc/mq, zone B 7, 6 o 5 mc/mq secondo la popolazione, zone E 0,03 mc/mq); i limiti di altezza dell'art. 8; e i limiti di distanza tra i fabbricati dell'art. 9 (distanza minima assoluta di 10 metri tra pareti finestrate per i nuovi edifici, distanza pari all'altezza del fabbricato piu' alto nelle zone C, maggiorazioni per strade interposte di 5, 7,50 o 10 metri per lato). NON redige lo strumento urbanistico, non riproduce le articolazioni regionali o comunali ne' le modifiche normative successive e la giurisprudenza, e non sostituisce il pianificatore ne' il progettista. E' distinta dalla skill sulle distanze del codice civile (artt. 873-907, diritto privato).
default_prompt: |
  Devo verificare la conformita' urbanistica di un intervento rispetto al DM 2 aprile 1968 n. 1444. Come si
  classificano le zone territoriali omogenee (art. 2) e come si computano gli standard urbanistici (art. 3:
  18 mq/abitante)? Quali sono i limiti di densita' edilizia (art. 7), di altezza (art. 8) e soprattutto di
  distanza tra i fabbricati (art. 9: 10 m tra pareti finestrate)? Cita gli articoli.
