    notes: |
      Il regolamento (UE) 2020/878 sostituisce integralmente l'allegato II del
      REACH (Reg. CE 1907/2006). Letta e trascritta verbatim in
      references/fonti/reg-ue-2020-878-sds.md la Parte A (prescrizioni generali
      0.1-0.3: scopo, compilazione da persona competente, divieto di indicazioni
      minimizzanti, datazione/revisione, formato) e la struttura completa delle
      16 SEZIONI con le rispettive sotto-sezioni (1.1-16). L'obbligo e le
      condizioni di fornitura della SDS (art. 31 REACH: sostanze/miscele
      classificate pericolose, PBT/vPvB, SVHC in Candidate List, casi su
      richiesta) sono citati come rinvio e NON riprodotti (articolo non
      trascritto). La classificazione CLP (Reg. 1272/2008), i sistemi di
      trasporto (ADR/RID/IMDG/IATA) e la dir. 98/24/CE richiamati nell'allegato
      sono citati, non riprodotti.
