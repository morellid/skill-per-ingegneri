# Fonte per l'inquadramento degli obblighi in materia di DISPOSITIVI DI PROTEZIONE INDIVIDUALE
# (DPI): definizioni, obbligo d'uso, requisiti, obblighi del datore di lavoro e dei lavoratori,
# criteri per l'individuazione e l'uso. Fonte: Testo unico sicurezza (D.Lgs. 81/2008), Titolo III,
# Capo II, artt. 74-79.

