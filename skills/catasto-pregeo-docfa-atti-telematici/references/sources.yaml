# Fonti per la skill di assistenza alla redazione e trasmissione telematica
# degli atti di aggiornamento del Catasto Terreni (Pregeo 10) e del Catasto
# Fabbricati (Docfa 4).
#
# La skill non riproduce ne' il manuale operativo Pregeo 10 ne' il manuale
# Docfa, che cambiano frequentemente; rinvia ad essi e codifica solo:
#   - inquadramento giuridico (DPR 380/2001 art. 30, DM 28/1998, DPR 445/2000)
#   - tipologie atti Pregeo 10 (Circolare 3/2009, Circolare 44/E 2016)
#   - novita' deposito telematico frazionamenti dal 1/7/2025 (Risoluzione 40/E 2025)
#   - struttura delle dichiarazioni Docfa (Vademecum Docfa v1.0 7/2022)
#
# Tutti i PDF sono pubblico dominio (atti AdE) e archiviati in not_in_repo/.
# Hash SHA256 calcolato all'atto del download.

sources:
  - id: dpr-380-2001-art-30
    title: "DPR 6 giugno 2001, n. 380 - Testo Unico edilizia - art. 30 (Lottizzazione abusiva) commi 5 e 5-bis"
    type: decreto-presidente-repubblica
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.del.presidente.della.repubblica:2001-06-06;380
    accessed: 2026-05-01
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths:
      - references/estratti/dpr-380-2001-art-30.md
    notes: |
      Comma 5: il deposito presso il Comune dei tipi di frazionamento e' presupposto
      di approvazione catastale. Comma 5-bis (introdotto dall'art. 25 D.Lgs. 1/2024):
      a partire dal 1/7/2025, per gli atti presentati telematicamente, il deposito
      lo effettua direttamente l'Agenzia delle entrate sul Portale dei Comuni.
      Cfr. anche Risoluzione AdE 40/E del 9/6/2025.

  - id: dlgs-1-2024-art-25
    title: "D.Lgs. 8 gennaio 2024, n. 1 - art. 25 - Razionalizzazione adempimenti tributari (introduce art. 30 co. 5-bis DPR 380/2001)"
    type: decreto-legislativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2024-01-08;1
    accessed: 2026-05-01
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Art. 25 (Semplificazione adempimenti tecnici correlati ai trasferimenti
      immobiliari) introduce il comma 5-bis nell'art. 30 DPR 380/2001 che
      ha ridisegnato il deposito comunale dei frazionamenti.

  - id: dm-28-1998-unita-immobiliare
