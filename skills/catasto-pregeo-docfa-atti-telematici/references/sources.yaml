      AdE 2/E del 1/2/2016 e dal Vademecum Docfa cap. 1.3.4.

  - id: dm-138-1998-superficie-catastale
    title: "DPR 23 marzo 1998, n. 138 - Allegato C - Norme tecniche per la determinazione della superficie catastale delle UIU a destinazione ordinaria"
    type: decreto-presidente-repubblica
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.del.presidente.della.repubblica:1998-03-23;138
