  - id: ade-vademecum-docfa-v1
    title: "Vademecum Do.C.Fa. - Versione 1.0 - luglio 2022 - Direzione Centrale Servizi Catastali, Cartografici e di Pubblicita' Immobiliare"
    type: vademecum
    url: https://www.agenziaentrate.gov.it/portale/documents/20143/257980/Vademecum_Docfa_ver1.0.pdf/eb1424b2-94d8-0327-df82-e3c45d62407b
    accessed: 2026-05-01
    sha256: 7ee7fbe724921d589448bc5d6f3322cc40e284c1d3498a37594162c6c299d6a0
    license: public-domain-italian-law
    binary_path: not_in_repo/vademecum-docfa-ver1.pdf
    md_path: references/fonti/ade-vademecum-docfa-v1.md
    excerpt_paths:
      - references/estratti/vademecum-docfa-categorie-causali.md
      - references/estratti/vademecum-docfa-elaborato-planimetrico.md
    notes: |
      Strumento di supporto e riferimento nazionale per la redazione degli
      atti di aggiornamento del Catasto Fabbricati. Persegue uniformita' nel
      trattamento e favorisce l'automazione. Indice principale:
        - cap. 1.1 unita' immobiliare urbana, BCC/BCNC, beni di Gruppo F
        - cap. 1.2 categorie catastali Gruppi A, B, C, D, E + categorie
          fittizie F/1-F/7
        - cap. 1.3 classamento, consistenza, rendita catastale
        - cap. 2 dichiarazione Docfa (Quadro A accatastamento, Quadro B
          variazione, Quadro U dati UIU, Quadro D relazione tecnica, Quadro
          dati del dichiarante)
        - cap. 3 elaborato planimetrico, elenco subalterni, planimetria,
          superficie catastale ex DPR 138/1998
        - cap. 4 modelli 1N (categorie ordinarie A/B/C) e 2N (categorie
          speciali D/E)

