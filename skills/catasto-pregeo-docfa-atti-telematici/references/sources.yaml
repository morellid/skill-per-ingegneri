  - id: legge-208-2015-imbullonati
    title: "L. 28 dicembre 2015, n. 208 - art. 1 commi 21-24 - Esclusione macchinari da stima diretta categorie D ed E (cd. 'imbullonati')"
    type: legge
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:legge:2015-12-28;208
    accessed: 2026-05-01
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Esclude dalla stima diretta della rendita degli immobili D ed E i macchinari,
      congegni, attrezzature e altri impianti funzionali allo specifico processo
