    excerpt_paths:
      - references/estratti/risoluzione-40-2025-deposito-telematico.md
    notes: |
      Risoluzione che chiarisce: (1) ambito oggettivo del deposito telematico
      ex art. 30 co. 5-bis DPR 380/2001 - solo Tipi di Frazionamento (FR),
      Atti Misti (FM) e Tipi Mappali con stralcio di corte (SC); (2) obbligo
      di Pregeo 10 versione 10.6.5 - APAG 2.15 dal 1/7/2025; (3) nuova
      dichiarazione sostitutiva nel libretto delle misure (riga 9); (4) il
      deposito presso il Comune e' effettuato dall'AdE via PEC unica
      depositofrazionamenticatastali@pec.agenziaentrate.it; (5) per atti
      diversi da FR/FM/SC permane la disciplina previgente.

