    notes: |
      Codice redazionale 15G00121, GU n. 161 del 14/7/2015 - S.O. n. 38 (in
      vigore dal 29/7/2015). Il binario e' la pagina indice Normattiva pinnata
      a !vig=2026-07-14 (hash stabile, doppio download: f117b299...). Gli
      articoli 2 (ambito), 3 (definizioni: stabilimento di soglia inferiore /
      superiore, gestore, sostanza pericolosa, incidente rilevante), 13
      (notifica), 14 (politica di prevenzione - PPIR), 15 (rapporto di
      sicurezza) e 28 (sanzioni) sono caricati via AJAX (caricaArticolo) e
      trascritti verbatim in references/fonti/dlgs-105-2015.md. Gli allegati 1
      (soglie e regola della sommatoria, nota 4), 2, 3, 5 (modulo di notifica) e
      B (linee guida PPIR/SGS) e i richiami al Reg. CLP 1272/2008 sono citati
      come riferimento e NON riprodotti (le soglie sostanza-specifiche vanno
      lette sull'allegato 1). La direttiva 2012/18/UE (eur-lex) e' citata, non
      riprodotta.
