# Fonte per le FASI del procedimento espropriativo, la DICHIARAZIONE DI PUBBLICA UTILITÀ, la
# determinazione dell'INDENNITÀ (provvisoria/urgente), l'OCCUPAZIONE D'URGENZA, il DECRETO DI
# ESPROPRIO e l'ACQUISIZIONE SANANTE. Fonte: D.P.R. 8 giugno 2001, n. 327 (T.U. espropriazione).

