    notes: |
      Edizione coordinata gennaio 2025 dell'Ispettorato Nazionale del Lavoro
      (INL). PDF di 675 pagine che riporta il D.Lgs. 81/2008 con tutte le
      modifiche e integrazioni al gennaio 2025.
      SHA256 calcolato al fetch del 2026-04-25 (medesimo file e hash
      verificati in parallelo dalla skill pos-allegato-xv-checker v0.1.0,
      id: dlgs-81-2008-consolidato-inl-2025-01).
      Sezioni rilevanti per questa skill:
      - Art. 17 c. 1 lett. a): obbligo non delegabile del datore di lavoro
        di effettuare la valutazione dei rischi e di elaborare il DVR.
      - Art. 28: contenuto minimo del DVR (relazione su rischi, misure
        preventive, programma, procedure, ruoli, mansioni esposte a rischi
        specifici).
      - Art. 29: modalita' di effettuazione della valutazione dei rischi
        (collaborazione con RSPP e MC, previa consultazione dell'RLS,
        tempistiche di revisione e aggiornamento).
      Licenza: testi legislativi italiani sono in pubblico dominio ai sensi
      dell'art. 5 L. 633/1941 (non soggetti a diritto d'autore). Il documento
      INL non aggiunge contenuto creativo proprio: solo coordinamento redazionale.
      Il fetch automatico da CI e' possibile (ispettorato.gov.it e' accessibile)
      ma la licenza public-domain-italian-law causa skip da verify-sources.py:
      la coerenza dell'hash e' verificabile manualmente o via workflow dedicato.
