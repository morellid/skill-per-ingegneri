# Fonte per gli adempimenti per le COSTRUZIONI IN ZONE SISMICHE: denuncia dei lavori e
# deposito del progetto (art. 93), autorizzazione preventiva all'inizio dei lavori (art.
# 94) e classificazione degli interventi strutturali rilevanti/di minore rilevanza/privi
# di rilevanza (art. 94-bis). Fonte: Testo unico dell'edilizia (DPR 380/2001), Capo IV.

