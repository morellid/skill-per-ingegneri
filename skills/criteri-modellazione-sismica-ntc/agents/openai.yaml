display_name: "Criteri di modellazione sismica della struttura (NTC 2018 par. 7.2.6)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento dei criteri di modellazione della struttura e dell'azione sismica ai fini della progettazione sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.2.6. Aiuta a inquadrare la modellazione della struttura (modello tridimensionale che rappresenti masse, rigidezza e resistenza, con attenzione alle forze d'inerzia verticali su travi di grande luce e sbalzi; leggi costitutive elastiche per comportamento non dissipativo o dissipativo con coefficiente di comportamento q; considerazione della fessurazione, con rigidezza flessionale e a taglio di elementi in muratura, calcestruzzo armato e acciaio-calcestruzzo riducibile sino al 50% di quella dei corrispondenti elementi non fessurati; orizzontamenti considerabili infinitamente rigidi nel piano medio se in calcestruzzo armato, oppure in latero-cemento con soletta in c.a. di almeno 40 mm o in struttura mista con soletta in c.a. di almeno 50 mm collegata da connettori a taglio; elementi non strutturali non collaboranti, come tamponature e tramezzi, rappresentati unicamente in termini di massa, con contributo di rigidezza e resistenza considerato solo se ha effetti negativi sulla sicurezza) e la modellazione dell'azione sismica (forze statiche equivalenti, spettri di risposta o storie temporali; con analisi di risposta sismica locale o di interazione terreno-struttura lo spettro con 5% di smorzamento deve essere almeno pari al 70% di quello per sottosuolo di tipo A e la risultante di taglio e sforzo normale alla fondazione almeno pari al 70% di quella a base fissa; divieto di storie temporali artificiali per tali analisi; eccentricita' accidentale del centro di massa non inferiore a 0,05 volte la dimensione media dell'edificio misurata perpendicolarmente alla direzione dell'azione sismica, costante per entita' e direzione su tutti gli orizzontamenti). NON costruisce il modello ne' esegue l'analisi, non determina q, non tratta la risposta sismica locale (par. 3.2.3.6) ne' le fondazioni miste (par. 6.4.3), e non sostituisce il progettista. Complementa le skill sulla regolarita' strutturale (par. 7.2.1), sugli spostamenti di interpiano allo SLD (par. 7.3.6.1), sul periodo proprio T1 (par. 7.3.3.2) e sullo spettro di risposta (par. 3.2).
default_prompt: |
  Devo impostare il modello sismico di un edificio secondo le NTC 2018 (par. 7.2.6): come si tiene conto della
  fessurazione (rigidezza riducibile sino al 50%)? Quando un orizzontamento si puo' considerare infinitamente
  rigido nel piano (soletta c.a. 40/50 mm)? Come si modellano le tamponature non collaboranti (solo massa)? Come
  si valuta l'eccentricita' accidentale del centro di massa (>= 0,05 della dimensione media perpendicolare) e i
  limiti del 70% per la risposta sismica locale e l'interazione terreno-struttura? Cita il paragrafo.
