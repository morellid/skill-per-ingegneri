    notes: |
      Codice redazionale 006G0171, idGruppo 25, dataPubblicazioneGazzetta 2006-04-14. Pagina indice
      Normattiva pinnata a !vig=2026-07-17 (hash stabile, doppio download: c2175fe5...; e' lo stesso
      indice usato dalle altre skill D.Lgs. 152/2006). Articoli 124 (versione 3) e 125 (versione 1)
      caricati via AJAX (caricaArticolo), formato AKN, e trascritti verbatim in
      references/fonti/dlgs-152-2006-124-125.md. Art. 124 (criteri generali): obbligo di autorizzazione
      preventiva di tutti gli scarichi (c. 1); titolare/scarico finale/consorzio (c. 2); regime delle
      reflue domestiche/reti fognarie e termali definito dalle regioni (cc. 3-5); autorizzazione
      provvisoria degli impianti di depurazione (c. 6); competenza (provincia o ente di governo
      dell'ambito se in pubblica fognatura) e termine di 90 giorni (c. 7); validita' 4 anni, rinnovo un
      anno prima, mantenimento provvisorio, sostanze pericolose art. 108 e rinnovo tacito per le
      domestiche (c. 8); scarichi in corsi a portata nulla (c. 9); prescrizioni tecniche per
      localizzazione/ambiente (c. 10); spese di istruttoria a carico del richiedente con deposito (c.
      11); nuova autorizzazione per trasferimento/cambio d'uso/ampliamento/ristrutturazione con scarico
      diverso, comunicazione se invariato (c. 12). Art. 125 (domanda scarichi industriali): contenuto -
      caratteristiche quantitative/qualitative, volume annuo, ricettore, punto di prelievo di controllo,
      sistema di scarico e operazioni connesse, misurazione del flusso, apparecchiature e sistemi di
      depurazione (c. 1); per le sostanze della tabella 3/A dell'Allegato 5, capacita' di produzione e
      fabbisogno orario d'acqua (c. 2). Il testo tra doppi tondi (( )) segnala le modifiche successive.
      LIMITE DI RESA: la skill inquadra obblighi, competenze, termini e contenuto della domanda; NON
      redige la domanda ne' progetta l'impianto di depurazione, NON applica i valori limite di emissione
      dell'Allegato 5 alla Parte III (Tabelle 1/2/3/3-A/4), NON tratta l'AUA/AIA come procedura, e NON
      sostituisce il tecnico, il gestore del servizio idrico integrato ne' l'autorita' competente.
