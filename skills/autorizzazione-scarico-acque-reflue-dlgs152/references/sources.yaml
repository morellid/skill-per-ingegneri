# Fonte per l'inquadramento dell'AUTORIZZAZIONE ALLO SCARICO DI ACQUE REFLUE: criteri generali
# (obbligo di autorizzazione preventiva, titolare, competenze, termini e validita', rinnovo,
# prescrizioni, spese) e contenuto della domanda per gli scarichi industriali. Fonte: Codice
# dell'ambiente (D.Lgs. 152/2006), Parte III, artt. 124 e 125.

