display_name: "Autorizzazione allo scarico di acque reflue (D.Lgs. 152/2006 artt. 124-125)"
short_description: Supporto documentale al tecnico ambientale/impianti e al titolare dello scarico per l'autorizzazione allo scarico di acque reflue e per la domanda di autorizzazione degli scarichi industriali, ai sensi del D.Lgs. 3 aprile 2006, n. 152 (Codice dell'ambiente), Parte III, artt. 124 e 125. Inquadra i criteri generali - obbligo di autorizzazione preventiva di tutti gli scarichi, rilascio al titolare dell'attivita' o dello scarico finale o al consorzio, regime delle reflue domestiche/reti fognarie e termali definito dalle regioni, autorizzazione provvisoria degli impianti di depurazione, competenza della provincia o dell'ente di governo dell'ambito se lo scarico e' in pubblica fognatura con termine di 90 giorni, validita' di 4 anni e rinnovo da chiedere un anno prima con mantenimento provvisorio se la domanda e' tempestiva e rinnovo espresso entro 6 mesi per le sostanze pericolose dell'art. 108, prescrizioni tecniche per localizzazione e ambiente, spese di istruttoria a carico del richiedente, nuova autorizzazione per trasferimento/cambio d'uso/ampliamento con scarico diverso (art. 124) - e il contenuto della domanda per gli scarichi industriali - caratteristiche quantitative e qualitative, volume annuo, ricettore, punto di prelievo, sistema di scarico, misurazione del flusso, apparecchiature e sistemi di depurazione, con capacita' di produzione e fabbisogno idrico per le sostanze della tabella 3/A dell'Allegato 5 (art. 125). NON redige la domanda ne' progetta l'impianto di depurazione, non applica i valori limite di emissione dell'Allegato 5, non tratta l'AUA/AIA come procedure e non sostituisce il tecnico, il gestore del servizio idrico integrato o l'autorita' competente.
default_prompt: |
  Devo autorizzare uno scarico di acque reflue: come inquadro l'autorizzazione secondo il D.Lgs.
  152/2006? Serve l'autorizzazione, a chi si presenta la domanda e in quanto tempo, quanto dura e
  quando va rinnovata, e cosa deve contenere la domanda per uno scarico industriale? Cita gli
  articoli.
