schema_version: 1
skill: dnsh-pnrr-checker
last_verified: 2026-05-10

# Fonti normative e operative per la verifica DNSH PNRR e per supporto PNC
# solo su base misura-specifica documentata.
# Architettura:
#   - Reg. UE 2020/852 art. 17: definizione DNSH nella tassonomia UE
#   - Reg. UE 2021/241 artt. 5 e 18: obbligo DNSH per RRF/PNRR
#   - Circolare RGS n. 22/2024: aggiornamento Guida operativa DNSH
#   - Guida operativa RGS DNSH terza edizione 2024: schede tecniche, checklist, mappature
#   - DL 77/2021 art. 14: estensione di governance/procedure PNRR al PNC
#   - fonti settoriali PNC: rilevanza del DNSH o richiamo operativo nella singola misura
#
# I PDF RGS sono stati scaricati in not_in_repo/ e hashati. Le fonti EUR-Lex
# sono rinvii web ufficiali a testo consolidato/HTML e non vengono versionate.

sources:
  - id: reg-ue-2020-852-tassonomia-art-17
    title: "Regolamento (UE) 2020/852 - Tassonomia delle attivita' ecosostenibili - art. 17 DNSH"
    type: regolamento-ue
    url: https://eur-lex.europa.eu/eli/reg/2020/852/oj/ita
    accessed: 2026-05-04
    sha256: null
    license: public-domain-eu-law
    binary_path: null
    excerpt_paths:
      - references/estratti/reg-ue-2020-852-art-17.md
    notes: |
      Fonte primaria per la definizione di "danno significativo" rispetto ai
      sei obiettivi ambientali: mitigazione, adattamento, acque/risorse marine,
      economia circolare, prevenzione e riduzione inquinamento, biodiversita'.

  - id: reg-ue-2021-241-rrf-dnsh
    title: "Regolamento (UE) 2021/241 - Dispositivo per la ripresa e la resilienza - artt. 5 e 18"
    type: regolamento-ue
    url: https://eur-lex.europa.eu/eli/reg/2021/241/oj/ita
    accessed: 2026-05-04
    sha256: null
    license: public-domain-eu-law
    binary_path: null
    excerpt_paths:
      - references/estratti/reg-ue-2021-241-art-5-18.md
    notes: |
      Fonte primaria RRF: il dispositivo finanzia solo misure conformi al
      principio DNSH; i Piani nazionali devono spiegare come le misure rispettano
      il principio.

  - id: circolare-rgs-22-2024-dnsh
    title: "Circolare RGS n. 22 del 14 maggio 2024 - Aggiornamento Guida operativa DNSH"
    type: circolare
    url: https://www.rgs.mef.gov.it/VERSIONE-I/circolari/2024/circolare_n_22_2024/
    accessed: 2026-05-10
    sha256: 6f3f94e38ba0046250abfbb793ef432c6ab437f7218ec7e6593674c9d8681cb5
    license: public-domain-italian-public-sector
    binary_path: not_in_repo/circolare-rgs-22-2024-dnsh.pdf
    md_path: references/fonti/circolare-rgs-22-2024.md
    excerpt_paths:
      - references/estratti/circolare-rgs-22-2024.md
    notes: |
      PDF letto 2026-05-10 (3 pagine integrali). Circolare di aggiornamento
      della Guida operativa DNSH. Motivata dalla riprogrammazione CID n. 16051/23
      del 8 dicembre 2023. Introduce recepimento Reg. Delegato (UE) 2023/2486,
      specifica elementi di comprova ReGiS (3 fasi) e collegamento CAM art. 57
      D.lgs. 36/2023.

  - id: guida-operativa-dnsh-2024
    title: "Guida operativa per il rispetto del principio di non arrecare danno significativo all'ambiente (DNSH) - terza edizione, allegata alla circolare RGS n. 22/2024"
    type: guida-operativa
    url: https://www.rgs.mef.gov.it/_Documenti/VERSIONE-I/CIRCOLARI/2024/22/Guida-Operativa_terza-edizione.pdf
    accessed: 2026-05-10
    sha256: f924cb6d94740f3cd03bf405a65ec9eef822626330c2cd1664255589c9ce2c29
    license: public-domain-italian-public-sector
    binary_path: not_in_repo/guida-operativa-dnsh-terza-edizione.pdf
    md_path: references/fonti/guida-operativa-dnsh-2024.md
    excerpt_paths:
      - references/estratti/guida-operativa-dnsh-2024.md
    notes: |
      PDF letto 2026-05-10 (pp. 1-23 integrali: introduzione metodologica
      completa). Schede tecniche 1-34 (pp. 37-327) indicizzate ma non lette
      nel dettaglio. Fonte operativa principale: principio DNSH, 6 obiettivi,
      Regime 1/2, struttura schede (sezioni A-F), check list (SI/NO/NA),
      3 fasi ReGiS, CAM (art. 57 D.lgs. 36/2023), analisi rischio climatico
      (soglia 10 MLN euro), mappature 1 e 2.

  - id: circolare-rgs-33-2022-dnsh
    title: "Circolare RGS n. 33 del 13 ottobre 2022 - Aggiornamento Guida operativa DNSH"
    type: circolare-storica
    url: https://www.rgs.mef.gov.it/VERSIONE-I/circolari/2022/circolare_n_33_2022/
    accessed: 2026-05-04
    sha256: null
    license: public-domain-italian-public-sector
    binary_path: null
    excerpt_paths: []
