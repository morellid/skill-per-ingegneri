# Fonte per l'inquadramento della PROGETTAZIONE DELLE COSTRUZIONI COMPOSTE DI ACCIAIO-CALCESTRUZZO (travi
# con soletta collaborante, colonne composte) secondo le NTC 2018: materiali e coefficienti parziali,
# classificazione delle sezioni, resistenza delle sezioni composte, sistema di connessione a taglio
# (connettori a piolo) e colonne composte. Fonte: DM 17 gennaio 2018 (NTC 2018), par. 4.3.

