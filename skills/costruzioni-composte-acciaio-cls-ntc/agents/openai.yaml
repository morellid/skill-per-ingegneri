display_name: "Costruzioni composte acciaio-cls: connettori e verifiche (NTC 2018 par. 4.3)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della progettazione delle costruzioni composte di acciaio-calcestruzzo (travi con soletta collaborante, colonne composte; caso non sismico) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 4.3. Aiuta a inquadrare gli stati limite aggiuntivi della connessione (resistenza allo SLU ed esercizio allo SLE) e le fasi costruttive; la classificazione delle sezioni composte secondo lo schema delle sezioni in acciaio (paragrafo 4.2.3, con distribuzioni di tensioni plastiche o elastiche per le classi 1 e 2 ed elastiche per le classi 3 e 4) e l'analisi con l'omogeneizzazione per la viscosita' e l'analisi fessurata; le resistenze di progetto fd uguale a fk diviso gamma_M con gamma_C uguale a 1,5 per il calcestruzzo, gamma_A uguale a 1,05 per l'acciaio da carpenteria, gamma_S uguale a 1,15 per l'acciaio da armatura e gamma_V uguale a 1,25 per le connessioni allo stato limite ultimo (gamma_M uguale a 1 allo stato limite di esercizio e nelle situazioni eccezionali), con la classe del calcestruzzo tra C20/25 e C60/75; la resistenza a flessione delle travi con soletta collaborante con il metodo elastico, plastico (compressione del calcestruzzo pari a 0,85 fcd) ed elasto-plastico e la resistenza a taglio verticale affidata alla trave metallica; il sistema di connessione a taglio con il grado di connessione K uguale a N diviso Nf e la resistenza dei pioli con testa pari al minore fra PRd,a uguale a 0,8 ftk pi greco d al quadrato diviso 4, il tutto diviso gamma_V, e PRd,c uguale a 0,29 alpha d al quadrato per la radice di fck per Ecm, diviso gamma_V (con ftk non superiore a 500 MPa, diametro d tra 16 e 25 mm, alpha uguale a 0,2 per hsc su d piu' 1 per hsc su d tra 3 e 4 e 1,0 oltre), con le riduzioni per lamiera grecata; e le colonne composte. NON calcola le resistenze ne' esegue le verifiche, non dimensiona la sezione ne' la connessione, non riproduce le figure/tabelle-immagine (Fig. 4.3.3/4.3.4, Tab. 4.3.II) ne' i materiali dei paragrafi 11.2/11.3 ne' gli Eurocodici (UNI EN 1994), non tratta la progettazione sismica (paragrafo 7.6), e non sostituisce il progettista strutturale. Completa la famiglia costruzioni di X con calcestruzzo (4.1), acciaio (4.2), legno (4.4) e muratura (4.5).
default_prompt: |
  Devo inquadrare la progettazione (non sismica) di una struttura composta acciaio-calcestruzzo secondo le
  NTC 2018 (par. 4.3): quali coefficienti parziali gamma_C, gamma_A, gamma_S e gamma_V devo usare per fd =
  fk/gamma_M? Come classifico la sezione composta e quale metodo di calcolo del momento resistente
  (elastico/plastico/elasto-plastico) e' ammesso? Come determino la resistenza dei connettori a piolo (PRd,a
  e PRd,c) e le riduzioni per lamiera grecata? Cita i paragrafi e le formule.
