display_name: "Costruzioni di acciaio: materiali, classi e verifiche (NTC 2018 par. 4.2)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della progettazione delle costruzioni di acciaio (caso non sismico) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 4.2. Aiuta a inquadrare la scelta dei materiali (gradi da S235 a S460, con le tensioni caratteristiche di snervamento fyk e di rottura ftk delle Tabelle 4.2.I per i profili a sezione aperta e 4.2.II per quelli a sezione cava); la classificazione delle sezioni trasversali nelle classi 1 duttili (capacita' rotazionale Ctheta maggiore o uguale a 3), 2 compatte (Ctheta maggiore o uguale a 1,5), 3 semi-compatte e 4 snelle (con sezione efficace), e i metodi di calcolo della capacita' resistente (elastico, plastico, elasto-plastico) e di analisi globale ammessi per ciascuna classe; gli effetti del secondo ordine (analisi del primo ordine ammessa se alpha_cr maggiore o uguale a 10 in campo elastico e 15 in campo plastico); le verifiche agli stati limite ultimi con la resistenza di progetto Rd uguale a Rk diviso il coefficiente parziale gamma_M e la Tabella 4.2.VII (gamma_M0 uguale a 1,05 per la resistenza delle sezioni, gamma_M1 uguale a 1,05 e 1,10 per i ponti per la stabilita', gamma_M2 uguale a 1,25 per la frattura delle sezioni tese indebolite dai fori), le resistenze di progetto a trazione (resistenza plastica della sezione lorda A per fyk diviso gamma_M0 e resistenza a rottura della sezione netta 0,9 per Anet per ftk diviso gamma_M2), compressione, flessione (con il modulo plastico, elastico o efficace secondo la classe) e taglio (Av per fyk diviso radice di 3 per gamma_M0); e le verifiche di stabilita' delle membrature (aste compresse con Nb,Rd uguale a chi per A per fyk diviso gamma_M1 e la snellezza normalizzata, con instabilita' trascurabile per snellezza normalizzata minore di 0,2 e snellezza limitata a 200 per le membrature principali e 250 per le secondarie; travi inflesse con la verifica a svergolamento chi_LT). NON calcola le resistenze ne' esegue le verifiche, non dimensiona membrature e collegamenti, non riproduce le tabelle b/t di classificazione delle sezioni (Tab. 4.2.III-V) ne' le curve di instabilita' (Tab. 4.2.VIII) che nel PDF sono figure, non riproduce i materiali del paragrafo 11.3.4 ne' gli Eurocodici (UNI EN 1993), non tratta la progettazione sismica (paragrafo 7.5), e non sostituisce il progettista strutturale.
default_prompt: |
  Devo inquadrare la progettazione (non sismica) di una struttura in acciaio secondo le NTC 2018 (par. 4.2):
  come scelgo il grado (S235-S460) e ricavo fyk/ftk (Tab. 4.2.I/II)? Come classifico la sezione (classi 1-4)
  e quale metodo di calcolo posso usare? Quali coefficienti gamma_M (Tab. 4.2.VII) e quali resistenze di
  progetto SLU (trazione, compressione, flessione, taglio) e verifiche di stabilita' (Nb,Rd, chi, snellezza)
  devo considerare? Cita i paragrafi e le tabelle.
