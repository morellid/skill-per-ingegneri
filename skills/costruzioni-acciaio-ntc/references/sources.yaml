# Fonte per l'inquadramento della PROGETTAZIONE DELLE COSTRUZIONI DI ACCIAIO secondo le NTC 2018: materiali
# (gradi S235-S460, fyk/ftk), classificazione delle sezioni in classi 1-4, coefficienti parziali gamma_M,
# resistenze di progetto e verifiche agli stati limite ultimi (resistenza e stabilita' delle membrature).
# Fonte: DM 17 gennaio 2018 (NTC 2018), par. 4.2.

