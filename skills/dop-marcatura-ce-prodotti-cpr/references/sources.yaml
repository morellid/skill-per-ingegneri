# Fonte per l'inquadramento della REDAZIONE DELLA DICHIARAZIONE DI PRESTAZIONE (DoP) E DELLA MARCATURA CE
# dei prodotti da costruzione secondo il Regolamento (UE) n. 305/2011 (CPR): obbligo e deroghe alla DoP,
# contenuto della DoP e caratteristiche essenziali, regole della marcatura CE, obblighi degli operatori
# economici, modello di DoP (Allegato III) e sistemi di valutazione e verifica della costanza della
# prestazione (VVCP, Allegato V).

