display_name: "DoP e marcatura CE dei prodotti da costruzione (Reg. UE 305/2011)"
short_description: Supporto documentale al fabbricante, all'ufficio tecnico-qualita' e al tecnico per l'inquadramento della redazione della Dichiarazione di Prestazione (DoP) e dell'apposizione della marcatura CE dei prodotti da costruzione secondo il Regolamento (UE) n. 305/2011 (CPR). Aiuta a inquadrare quando la DoP e' obbligatoria (prodotto che rientra in una norma armonizzata o con una valutazione tecnica europea) e le deroghe dell'articolo 5 (esemplare unico o su ordinazione non in serie, fabbricazione in cantiere, metodi tradizionali o di conservazione del patrimonio); il contenuto della DoP secondo l'articolo 6 e il modello dell'Allegato III (riferimento del prodotto-tipo, sistema o sistemi di valutazione e verifica della costanza della prestazione dell'Allegato V, norma armonizzata o valutazione tecnica europea, uso previsto, elenco delle caratteristiche essenziali, prestazione espressa in livelli, classi o descrizione, e la sigla NPD, nessuna prestazione determinata, per le caratteristiche non dichiarate), con le informazioni REACH da fornire assieme, e la fornitura della DoP in forma cartacea, elettronica o su sito web; le regole di apposizione della marcatura CE degli articoli 8 e 9 (marcatura apposta solo se e' stata redatta la DoP, marcatura unica di conformita', e gli elementi che seguono la marcatura: anno, nome e indirizzo del fabbricante, codice del prodotto-tipo, numero della DoP, livello o classe della prestazione, riferimento alla specifica tecnica armonizzata, numero dell'organismo notificato e uso previsto); i sistemi di valutazione e verifica della costanza della prestazione dell'Allegato V (1+, 1, 2+, 3 e 4, con i compiti del fabbricante, del controllo della produzione in fabbrica e dell'organismo notificato di certificazione del prodotto, di certificazione del controllo della produzione o del laboratorio di prova); e gli obblighi degli operatori economici degli articoli 11-16 (fabbricante con la documentazione tecnica conservata per dieci anni, mandatario che non redige la documentazione tecnica, importatore, distributore, e la regola per cui chi immette col proprio nome o marchio o modifica il prodotto assume gli obblighi del fabbricante). NON redige la DoP, non individua la norma armonizzata applicabile ne' il sistema di valutazione e verifica del singolo prodotto, non esegue prove o valutazioni, non tratta in dettaglio la valutazione tecnica europea (artt. 19-27) ne' gli organismi notificati (artt. 39-56), non riproduce il modello di DoP aggiornato dal Reg. delegato (UE) 574/2014, e non sostituisce la norma armonizzata di prodotto ne' il fabbricante.
default_prompt: |
  Devo inquadrare la redazione della Dichiarazione di Prestazione (DoP) e la marcatura CE di un prodotto da
  costruzione secondo il Reg. UE 305/2011 (CPR): quando la DoP e' obbligatoria e quali deroghe esistono?
  Cosa deve contenere la DoP (art. 6, modello Allegato III) e come tratto le caratteristiche non dichiarate
  (NPD)? Quali elementi seguono la marcatura CE (art. 9)? Cosa cambia tra i sistemi VVCP 1+, 1, 2+, 3 e 4
  (Allegato V) e quali obblighi ho come fabbricante, importatore o distributore? Cita gli articoli e gli
  allegati.
