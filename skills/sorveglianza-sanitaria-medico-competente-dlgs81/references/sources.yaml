# (visite mediche, giudizio di idoneita' alla mansione, ricorso): D.Lgs. 81/2008, artt. 25,
# 38-41. La sorveglianza sanitaria e' obbligatoria nei casi previsti dalla normativa e in base
# alla valutazione dei rischi (DVR).

