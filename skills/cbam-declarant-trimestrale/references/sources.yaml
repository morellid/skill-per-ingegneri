  - id: reg-ue-2023-956-cbam-consolidato
    title: "Regolamento (UE) 2023/956 del Parlamento europeo e del Consiglio del 10 maggio 2023 che istituisce un meccanismo di adeguamento del carbonio alle frontiere - testo consolidato al 20/10/2025 (integrato dal Reg. 2025/2083)"
    type: regolamento-ue
    url: https://eur-lex.europa.eu/legal-content/IT/TXT/?uri=CELEX:02023R0956-20251020
    download_url: https://eur-lex.europa.eu/legal-content/IT/TXT/PDF/?uri=CELEX:02023R0956-20251020
    accessed: 2026-05-18
    sha256: ca5465e5c73347b290cebc53aff6ae6c7a6ea0c0793efb02b836a9bf89561289
    license: public-domain
    binary_path: not_in_repo/reg-ue-2023-956-cbam-consolidato.pdf
    md_path: references/fonti/reg-ue-2023-956-cbam-consolidato.md
    excerpt_path: references/estratti/reg-ue-2023-956-articoli-fase-definitiva.md
    # eur-lex.europa.eu restituisce body vuoto agli IP datacenter di GitHub
    # Actions (Azure westus3) per i download PDF di testi consolidati; il fetch
    # da browser/postazione operatore funziona regolarmente. Il check di drift
    # automatico e' deliberatamente saltato; aggiornamento manuale a cura
    # dell'agent ad ogni nuova versione consolidata.
    ci_fetch_blocked: "eur-lex.europa.eu restituisce body vuoto agli IP datacenter GitHub Actions per PDF di testi consolidati"
    notes: |
      Testo consolidato che incorpora le modifiche introdotte dal Reg. (UE) 2025/2083
      (Omnibus). Versione 02023R0956 - IT - 20.10.2025 - 001.001, distribuita da EUR-Lex
      come strumento di documentazione (non fa fede; la versione facente fede e' quella
      pubblicata in GU UE L 130 del 16.5.2023 e GU UE L del 17.10.2025 per le modifiche).
      Le citazioni nella skill rinviano sempre al numero di articolo del Reg. 956/2023
      come consolidato.

  - id: reg-ue-2025-2083-cbam-omnibus
    title: "Regolamento (UE) 2025/2083 del Parlamento europeo e del Consiglio dell'8 ottobre 2025 che modifica il regolamento (UE) 2023/956 per quanto riguarda la semplificazione e il rafforzamento del meccanismo di adeguamento del carbonio alle frontiere"
    type: regolamento-ue
    url: https://eur-lex.europa.eu/legal-content/IT/TXT/?uri=OJ:L_202502083
    download_url: https://eur-lex.europa.eu/legal-content/IT/TXT/PDF/?uri=OJ:L_202502083
    accessed: 2026-05-18
    sha256: ba1a997d5bfb23dbf149ff412fc2c943d4afc3ce6b7d1044c9ea8f81320bc5c5
    license: public-domain
    binary_path: not_in_repo/reg-ue-2025-2083-cbam-omnibus.pdf
    md_path: references/fonti/reg-ue-2025-2083-cbam-omnibus.md
    excerpt_path: references/estratti/reg-ue-2025-2083-considerando-chiave.md
    # Vedi nota su reg-ue-2023-956-cbam-consolidato: eur-lex.europa.eu blocca
    # i fetch dai runner GitHub Actions per i PDF di GU UE. Aggiornamento
    # manuale a cura dell'agent (e' un atto definitivo, non soggetto a drift).
    ci_fetch_blocked: "eur-lex.europa.eu restituisce body vuoto agli IP datacenter GitHub Actions per PDF di Gazzetta Ufficiale UE"
    notes: |
      Atto modificativo (cosiddetto "Omnibus CBAM") pubblicato in GU UE L del 17.10.2025.
      Introduce in particolare: soglia unica di massa 50 t (Art. 2bis, Allegato VII),
      deroga transitoria di importazione fino al 31 marzo 2026 con domanda gia' presentata
      (Art. 17.7bis), sanzioni proporzionate per importatori non autorizzati che superano
      la soglia (Art. 26.2bis), piattaforma centrale comune per vendita certificati
      (dal 1° febbraio 2027), spostamento al 30 settembre del termine per la dichiarazione
      CBAM annuale (prima volta 2027 per anno 2026).

