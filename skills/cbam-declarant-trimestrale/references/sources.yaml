    title: "Agenzia delle Dogane e dei Monopoli - Direzione Dogane - Circolare n. 36/2025 del 24/12/2025 - Reg. UE 956/2023 CBAM: avvio della fase definitiva - adempimenti ed istruzioni"
    type: circolare
    url: https://www.adm.gov.it/portale/documents/20182/240075633/869339.24-12-2025-Circolare+36+dogane.pdf
