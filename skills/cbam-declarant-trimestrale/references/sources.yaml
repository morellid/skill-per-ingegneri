    license: public-domain
    binary_path: not_in_repo/circ-adm-36-2025-cbam.pdf
    md_path: references/fonti/circ-adm-36-2025-cbam.md
    excerpt_path: references/estratti/circ-adm-36-2025-codici-taric.md
    notes: |
      Circolare operativa di ADM (prot. ADM.ADMUC.REGISTRO UFFICIALE.0869339.24-12-2025.U)
      che attua a livello nazionale il Reg. CBAM nella fase definitiva. Definisce:
      codici documento TARIC Y128 (numero conto CBAM), Y134-Y137 (deroghe), Y237, Y238
      (deroga 31/3/2026); rinvio al MASE come Autorita' nazionale competente; procedure
      per le articolazioni territoriali in caso di importazione non consentita.
      Pagina indice di riferimento: https://www.adm.gov.it/portale/cbam-carbon-border-adjustment-mechanism

  - id: avviso-adm-cbam-211025
    title: "Agenzia delle Dogane e dei Monopoli - Direzione Dogane - Avviso del 21/10/2025 - Avvio del periodo definitivo del CBAM - Reg. (UE) 2023/956 - Obblighi per gli operatori economici"
    type: avviso-amministrativo
    url: https://www.adm.gov.it/portale/documents/20182/217032198/Avviso+CBAM-21102025.pdf
    accessed: 2026-05-18
    sha256: 90c430f5d416f228a8255cb685d7bd59df493ae5675d45a3a134b4b7587de7e2
    license: public-domain
    binary_path: not_in_repo/avviso-adm-cbam-211025.pdf
    md_path: references/fonti/avviso-adm-cbam-211025.md
    excerpt_path: references/estratti/avviso-adm-conseguenze-non-conformita.md
    notes: |
      Avviso ADM sintetico (1 pagina) pubblicato in concomitanza con la pubblicazione
      del Reg. 2025/2083, indirizzato a importatori e rappresentanti doganali indiretti.
      Avverte dell'avvio fase definitiva 1° gennaio 2026 e delle conseguenze in caso di
      mancata qualifica di dichiarante CBAM autorizzato: blocco merci alla frontiera,
      rifiuto sdoganamento, sanzioni.
      Pagina indice di riferimento: https://www.adm.gov.it/portale/cbam-carbon-border-adjustment-mechanism
