# Fonte per l'inquadramento della CLASSIFICAZIONE DEI RIFIUTI: definizioni essenziali (rifiuto, rifiuti
# urbani, produttore, detentore, deposito temporaneo) e classificazione secondo origine (urbani/speciali)
# e pericolosita' (pericolosi/non pericolosi) con l'elenco europeo dei codici (EER). Fonte: Codice
# dell'ambiente (D.Lgs. 152/2006), Parte IV, artt. 183 e 184.

