    title: "D.Lgs. 3 aprile 2006, n. 152 (Norme in materia ambientale) - artt. 183 (definizioni, estratto) e 184 (classificazione dei rifiuti) (testo vigente al 2026-07-17)"
    type: decreto-legislativo
