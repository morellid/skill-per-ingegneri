    notes: |
      Codice redazionale 006G0171, idGruppo 34, dataPubblicazioneGazzetta 2006-04-14. Pagina indice
      Normattiva pinnata a !vig=2026-07-17 (hash stabile, doppio download: c2175fe5...; e' lo stesso
      indice usato dalle altre skill D.Lgs. 152/2006). Articoli 183 (versione 17) e 184 (versione 9)
      caricati via AJAX (caricaArticolo), formato AKN, e trascritti verbatim in
      references/fonti/dlgs-152-2006-183-184.md. Dell'art. 183 (Definizioni) sono trascritte solo le
      lettere rilevanti per la classificazione (a rifiuto, b-ter rifiuti urbani, f produttore, h
      detentore, bb deposito temporaneo prima della raccolta con rinvio all'art. 185-bis). Dell'art. 184
      (Classificazione) sono trascritti i commi 1-5 per intero (urbani/speciali secondo l'origine,
      pericolosi/non pericolosi secondo le caratteristiche dell'Allegato I, elenco europeo dei rifiuti -
      Allegato D - vincolante per i pericolosi, attribuzione dei codici e delle caratteristiche di
      pericolo a cura del produttore sulla base delle Linee guida SNPA); il comma 5-bis (ambito
      militare) e' richiamato in sintesi. Il testo tra doppi tondi (( )) segnala le modifiche successive
      (es. D.Lgs. 116/2020, recepimento dir. 2018/851).
      LIMITE DI RESA: la skill inquadra criteri e definizioni della classificazione; NON attribuisce il
      codice EER ne' la classe di pericolo del singolo rifiuto, NON redige l'analisi di caratterizzazione
      ne' compila registri/FIR/MUD, NON riproduce gli Allegati D/I/L-quater/L-quinquies ne' le Linee
      guida SNPA, e NON sostituisce il produttore, il tecnico ambientale ne' il laboratorio.
