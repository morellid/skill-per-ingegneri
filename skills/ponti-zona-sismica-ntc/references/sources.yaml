# Fonte normativa per l'inquadramento delle regole generali dei ponti in zona
# sismica (campo di applicazione, criteri generali di progettazione dissipativo/
# non dissipativo con dissipazione limitata alle pile, valori del fattore di
# comportamento q0/nu_k/lambda(alfa) e regolarita' KR, modello strutturale e
# requisiti dell'analisi statica lineare) secondo le NTC 2018 (DM 17/01/2018),
# par. 7.9. La skill inquadra le regole generali; non esegue le verifiche di
# duttilita'/resistenza ne' i dettagli costruttivi.

sources:
  - id: ntc2018-par-7-9
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018) - par. 7.9 (ponti in zona sismica)"
    type: decreto
