display_name: "Ponti in zona sismica: regole generali (NTC 2018 par. 7.9)"
short_description: Supporto documentale al progettista strutturale per inquadrare le regole generali dei ponti in zona sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.9. Aiuta a inquadrare il campo di applicazione del par. 7.9.1 (ponti a pile e travate, continue o appoggiate, con pile a fusto unico); i criteri generali di progettazione del par. 7.9.2 (comportamento non dissipativo secondo il Capitolo 4, oppure dissipativo con meccanismo dissipativo stabile e dissipazione limitata alle pile, comportamento inelastico flessionale ed esclusione della rottura per taglio; pali di fondazione con sollecitazioni sismiche divise per 1,5 e dettagli CD"B" per dieci diametri; perdita dei copriferri allo 0,35 per cento; impalcato, apparecchi di appoggio, fondazioni e spalle mantenuti elastici); i valori del fattore di comportamento del par. 7.9.2.1 (q0 pari a 1,0 nel caso non dissipativo; nel caso dissipativo q0 dalla Tab. 7.3.II con lambda(alfa)=1 se alfa>=3 e (alfa/3)^0,5 se 3>alfa>=1; per gli elementi duttili in calcestruzzo armato q0 valido solo se la compressione normalizzata nu_k=NEd/(Ac fck) non supera 0,3 e comunque nu_k<=0,6; regolarita' con KR=1 se rmax/rmin e' minore di 2 e KR=2/r altrimenti; ponti a geometria irregolare con q=1,5, fino a 3,5 solo con analisi non lineare); e il modello e i requisiti dell'analisi statica lineare dei par. 7.9.3-7.9.4.1 (eccentricita' accidentale 0,03 volte la dimensione dell'impalcato; attenzione ai moti rigidi per obliquita' oltre 20 gradi o B/L oltre 2,0; massa efficace delle pile non oltre un quinto della massa dell'impalcato). NON esegue le verifiche di duttilita'/resistenza delle pile, non progetta i dettagli costruttivi e non sostituisce il progettista. E' distinta dalle skill sui carichi da traffico dei ponti (par. 5.1.3 e 5.2.2) e da quella sul fattore di comportamento q per gli edifici (par. 7.3.1).
default_prompt: |
  Sto impostando la progettazione sismica di un ponte a pile e travate secondo le NTC 2018 (par. 7.9). Quale
  comportamento (dissipativo/non dissipativo) e dove localizzo la dissipazione? Quale fattore di comportamento
  q0 uso (con nu_k e lambda(alfa)) e come verifico la regolarita' (KR)? Quando posso usare l'analisi statica
  lineare? Cita i paragrafi.
