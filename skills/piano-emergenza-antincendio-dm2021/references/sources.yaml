    sha256: null
    license: public-domain
    binary_path: null
    md_path: references/fonti/piano-emergenza.md
    notes: |
      Codice redazionale 21A05748, GU Serie Generale n. 237 del 4/10/2021, in vigore dal
      4/10/2022. Attua l'art. 46 c.3 lett. a) n.4 e lett. b) del D.Lgs 81/2008 (sostituisce
      per la gestione emergenze/formazione il DM 10/3/1998). Trascritti verbatim gli artt.
      1-8: campo di applicazione (art. 1), gestione della sicurezza antincendio in esercizio
      ed in emergenza con i CASI IN CUI E' OBBLIGATORIO IL PIANO DI EMERGENZA - luoghi con
      >= 10 lavoratori; luoghi aperti al pubblico con > 50 persone contemporanee; attivita'
      dell'Allegato I al DPR 151/2011 (art. 2 c.2); informazione e formazione (art. 3);
      designazione addetti antincendio (art. 4); formazione/aggiornamento addetti (art. 5);
      requisiti docenti (art. 6); disposizioni transitorie (art. 7); entrata in vigore
      (art. 8). I criteri operativi di dettaglio (contenuti del piano di emergenza, livelli)
      sono negli Allegati I-II-III, richiamati e non riprodotti integralmente.
