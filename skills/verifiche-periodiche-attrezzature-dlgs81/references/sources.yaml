# Fonte per il regime dei CONTROLLI e delle VERIFICHE PERIODICHE delle attrezzature di lavoro:
# obblighi del datore di lavoro (art. 71), controlli iniziali/periodici/straordinari da persona
# competente (commi 8-10) e verifiche periodiche delle attrezzature dell'Allegato VII (prima
# verifica INAIL, successive ASL/ARPA/soggetti abilitati - commi 11-14). Fonte: D.Lgs. 81/2008.

