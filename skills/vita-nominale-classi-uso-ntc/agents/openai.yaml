display_name: "Vita nominale, classi d'uso e periodo di riferimento (NTC 2018 par. 2.4)"
short_description: Supporto documentale al progettista per l'inquadramento della vita nominale di progetto (VN), delle classi d'uso (CU) e del periodo di riferimento per l'azione sismica (VR) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 2.4. Aiuta a fissare i tre parametri di base di ogni progetto strutturale: la vita nominale di progetto VN (numero di anni in cui l'opera, soggetta a manutenzione, mantiene i livelli prestazionali; valori minimi della Tab. 2.4.I: 10 anni per le costruzioni temporanee e provvisorie, 50 anni per i livelli di prestazioni ordinari, 100 anni per i livelli di prestazioni elevati; per la fase di costruzione di durata PN la VN e' non inferiore a PN e comunque non inferiore a 5 anni; le verifiche sismiche di opere temporanee o in fase di costruzione possono omettersi se la condizione permane per meno di 2 anni); la classe d'uso (Classe I presenza occasionale ed edifici agricoli, Classe II normali affollamenti, Classe III affollamenti significativi, Classe IV funzioni pubbliche o strategiche importanti); e il periodo di riferimento per l'azione sismica VR uguale al prodotto tra la vita nominale VN e il coefficiente d'uso CU (formula 2.4.1), con coefficiente d'uso CU della Tab. 2.4.II pari a 0,7 per la Classe I, 1,0 per la Classe II, 1,5 per la Classe III e 2,0 per la Classe IV (anche superiore a 2 per attivita' a rischio di incidente rilevante). NON definisce lo spettro di risposta ne' i periodi di ritorno TR degli stati limite (par. 3.2), non tratta le opere esistenti ne' le combinazioni delle azioni (par. 2.5) e non sostituisce il progettista. E' a monte della skill sullo spettro di risposta (par. 3.2).
default_prompt: |
  Devo fissare, all'avvio di un progetto strutturale, i parametri di base secondo le NTC 2018 (par. 2.4): quale
  vita nominale di progetto VN adottare per la mia costruzione (Tab. 2.4.I: 10/50/100 anni)? In quale classe
  d'uso ricade (I-IV) e con quale coefficiente d'uso CU (Tab. 2.4.II: 0,7/1,0/1,5/2,0)? Come ricavo il periodo di
  riferimento per l'azione sismica VR = VN x CU (formula 2.4.1) e a cosa serve a valle (par. 3.2)? Cita i
  paragrafi, le tabelle e la formula.
