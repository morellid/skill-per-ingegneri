display_name: "Opere in sotterraneo: gallerie, caverne, pozzi (NTC 2018 par. 6.7)"
short_description: Supporto documentale al progettista geotecnico e strutturale per l'inquadramento della progettazione e della verifica delle opere in sotterraneo (gallerie, caverne, pozzi) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.7. Aiuta a inquadrare l'ambito (opere costruite nel sottosuolo mediante scavo del terreno o della roccia, stabilizzazione della cavita' a breve e lungo termine e rivestimento finale); le prescrizioni generali (modello geologico e geotecnico; elementi da specificare e giustificare: geometria, ubicazione e tracciato, metodi e tecniche di scavo tradizionale o meccanizzato, interventi di stabilizzazione e strutture di rivestimento di prima fase e definitive, opere di protezione agli imbocchi, intercettazione delle acque e controllo delle pressioni interstiziali, provvedimenti antifrana, sicurezza per gas tossici o esplosivi, cavita' e venute d'acqua, messa a dimora dei materiali di risulta); la caratterizzazione geologica (litotipi, faglie e discontinuita', sismotettonica, franosita', cavita' carsiche, idrogeologia) e geotecnica (indagini in sito e in laboratorio, potenzialita' spingenti e rigonfianti, pressioni interstiziali, modello geotecnico, metodo osservazionale); i criteri di progetto (previsione quantitativa degli effetti indotti al contorno e in superficie, in particolare per gallerie poco profonde in ambienti urbanizzati; dimensionamento dei rivestimenti di prima fase e definitivi; opere di protezione agli imbocchi; stabilita' globale dei pendii in zona di versante); le analisi progettuali e le verifiche di sicurezza (stati limite ultimi GEO per la resistenza del terreno o dell'ammasso e STR per gli elementi di stabilizzazione e rivestimento, effetti sui manufatti esistenti, stati limite idraulici UPL e HYD, stabilita' di versanti e fronti agli imbocchi con i criteri dei paragrafi 6.3 e 6.8, Approccio 1 con Combinazione 1 A1+M1+R1 e Combinazione 2 A2+M2+R2 e coefficienti gamma_R dei gruppi R1 e R2 pari all'unita', verifiche strutturali con i valori caratteristici secondo il paragrafo 6.2.4.1.3 e verifiche idrauliche secondo il paragrafo 6.2.4.2, metodo osservazionale con convergenza radiale, deformazione longitudinale del fronte e spostamenti di superficie); e il controllo e il monitoraggio. NON calcola le verifiche ne' dimensiona l'opera o i rivestimenti, non definisce il modello geologico/geotecnico, non tratta la sicurezza dei lavoratori in sotterraneo, le macchine di scavo (TBM) come prodotti ne' la progettazione sismica, e non sostituisce il progettista. Complementa le skill sulla stabilita' dei pendii (par. 6.3), sui fronti di scavo e materiali sciolti (par. 6.8) e sulla relazione geologica e geotecnica.
default_prompt: |
  Devo inquadrare la progettazione e la verifica di un'opera in sotterraneo (galleria/caverna/pozzo) secondo le
  NTC 2018 (par. 6.7): quali stati limite ultimi vanno considerati (GEO, STR, UPL, HYD) e come si valutano gli
  effetti sui manufatti esistenti? Con quale approccio e combinazioni si eseguono le verifiche SLU (Approccio 1
  con Comb. 1 A1+M1+R1 e Comb. 2 A2+M2+R2) e quanto valgono i gamma_R dei gruppi R1 e R2? Come si verificano la
  stabilita' dei versanti e dei fronti agli imbocchi (par. 6.3 e 6.8)? Quali grandezze prevede il metodo
  osservazionale? Cita i paragrafi.
