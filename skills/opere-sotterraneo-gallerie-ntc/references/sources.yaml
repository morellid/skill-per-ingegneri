# Fonte normativa per l'inquadramento della progettazione e verifica delle opere
# in sotterraneo (gallerie, caverne, pozzi) ai sensi delle NTC 2018 (DM
# 17/01/2018), par. 6.7. La skill inquadra caratterizzazione, criteri, verifiche
# SLU/SLE e monitoraggio; non calcola le verifiche ne' dimensiona l'opera o i
# rivestimenti.

