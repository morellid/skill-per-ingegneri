display_name: "Azioni da traffico sui ponti ferroviari (NTC 2018 par. 5.2.2)"
short_description: Supporto documentale al progettista strutturale per inquadrare le azioni da traffico sui ponti ferroviari secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 5.2.2. Aiuta a inquadrare i modelli di carico verticali (il modello LM 71 con quattro assi da 250 kN a interasse di 1,60 m piu' un carico distribuito di 80 kN/m; i modelli SW/0 con 133 kN/m, a 15,0 m, c 5,3 m ed SW/2 con 150 kN/m, a 25,0 m, c 7,0 m della Tab. 5.2.I; il treno scarico da 10 kN/m e i carichi sui marciapiedi da 10 kN/m quadro), tutti da moltiplicare per il coefficiente di adattamento alpha (1,1 per LM71 e SW/0, 1,0 per SW/2 nelle ferrovie ordinarie); gli effetti dinamici tramite i coefficienti Phi2 uguale a 1,44 diviso la radice di L_phi meno 0,2 piu' 0,82 (con 1,00 minore o uguale a Phi2 minore o uguale a 1,67) per linee con elevato standard manutentivo e Phi3 uguale a 2,16 diviso la radice di L_phi meno 0,2 piu' 0,73 (con 1,00 minore o uguale a Phi3 minore o uguale a 2,00) per ridotto standard, con L_phi lunghezza caratteristica della Tab. 5.2.II e Phi non applicato al treno scarico e ai treni reali; e le azioni orizzontali (forza centrifuga secondo le formule 5.2.9 e 5.2.10, serpeggio come forza concentrata di 100 kN, avviamento pari a 33 kN/m per L non oltre 1000 kN e frenatura pari a 20 kN/m per L non oltre 6000 kN, 35 kN/m per L per il modello SW/2). NON esegue le combinazioni delle azioni, l'analisi dinamica con treni reali (velocita' superiore a 200 km/h o ponti non convenzionali) ne' le verifiche, e non sostituisce il progettista strutturale. E' distinta dalla skill sulle azioni da traffico dei ponti stradali (par. 5.1.3).
default_prompt: |
  Sto progettando un ponte ferroviario e devo definire le azioni da traffico secondo le NTC 2018 (par. 5.2.2).
  Quali sono i modelli di carico verticali (LM71, SW/0, SW/2, treno scarico) e il coefficiente di adattamento
  alpha? Come si valuta il coefficiente dinamico Phi2/Phi3 (con la lunghezza caratteristica L_phi) e quali sono
  le azioni orizzontali (forza centrifuga, serpeggio, avviamento e frenatura)? Cita i paragrafi e le formule.
