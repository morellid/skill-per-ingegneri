  - id: d-lgs-42-2004-codice-beni-culturali
    title: "D.Lgs. 22 gennaio 2004 n. 42 - Codice dei beni culturali e del paesaggio - rinvio strutturale"
    type: rinvio-normativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2004-01-22;42
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Citato dalla skill esclusivamente come **rinvio strutturale** per
      la coesistenza dell'autorizzazione paesaggistica (artt. 146 e ss.)
      e della valutazione di interesse culturale con i moduli edilizi.
      La skill segnala l'eventuale necessita' di autorizzazione
      paesaggistica o autorizzazione ex art. 21 (beni vincolati) come
      allegato/pre-requisito al modulo edilizio, ma non valuta il merito
      paesaggistico ne' redige la relazione paesaggistica (DPR 31/2017).

  - id: dpr-31-2017-paesaggistica-semplificata
    title: "DPR 13 febbraio 2017 n. 31 - Regolamento autorizzazione paesaggistica semplificata"
    type: rinvio-normativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.del.presidente.della.repubblica:2017-02-13;31
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Citato dalla skill esclusivamente come **rinvio strutturale** per
      la classificazione degli interventi liberi (Allegato A) e
      semplificati (Allegato B) ai fini paesaggistici. La skill
      richiama l'eventuale obbligo di autorizzazione paesaggistica come
      pre-requisito al deposito del modulo edilizio nei Comuni in
      vincolo, ma non sostituisce la valutazione paesaggistica.

  - id: dlgs-81-2008-rinvio-sicurezza-cantiere
    title: "D.Lgs. 9 aprile 2008 n. 81 - Testo unico salute e sicurezza sul lavoro - rinvio strutturale"
