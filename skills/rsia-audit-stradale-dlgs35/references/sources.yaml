  - id: dlgs-213-2021
    title: "D.Lgs. 15 novembre 2021, n. 213 - Attuazione della direttiva (UE) 2019/1936 che modifica la direttiva 2008/96/CE sulla gestione della sicurezza delle infrastrutture stradali"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/gu/2021/12/16/298/sg/pdf
    accessed: 2026-05-15
    sha256: 29add9f98e6669b3c439cdb90f8740e7edde80213c274fc2c285bca647b06efc
    license: public-domain
    binary_path: not_in_repo/dlgs-213-2021.pdf
    md_path: references/fonti/dlgs-213-2021.md
    excerpt_path: references/estratti/dlgs-213-2021.md
    notes: |
      Decreto che recepisce la Direttiva (UE) 2019/1936 e modifica il D.Lgs 35/2011.
      Estende il campo di applicazione oltre la rete TEN-T (autostrade + strade
      principali extraurbane) e introduce la valutazione di sicurezza a livello
      di rete (Network Safety Assessment).
      Pubblicato in G.U. Serie Generale n. 298 del 16.12.2021. Il PDF scaricato
      contiene l'intera Gazzetta (172 pagine); il decreto si trova all'interno.

