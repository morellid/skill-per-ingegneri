    md_path: references/fonti/dir-2008-96-ce.md
    excerpt_path: references/estratti/dir-2008-96-ce.md
    notes: |
      Direttiva quadro UE recepita in Italia con D.Lgs 35/2011. Testo italiano
      reso disponibile dal Ministero delle Infrastrutture (mit.gov.it).
      Definisce le quattro procedure principali: valutazione di impatto sulla
      sicurezza stradale (RSIA), controllo della sicurezza stradale (RSA),
      gestione della sicurezza della rete in esercizio, ispezione di sicurezza.

