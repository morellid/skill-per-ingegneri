# Fonte per l'AUTORIZZAZIONE INTEGRATA AMBIENTALE (AIA/IPPC): domanda, procedura di rilascio,
# contenuto e condizioni (VLE su BAT, monitoraggio), rinnovo e riesame, rispetto delle condizioni
# e controlli/ispezioni. Fonte: D.Lgs. 3 aprile 2006, n. 152, Parte II, Titolo III-bis.

sources:
