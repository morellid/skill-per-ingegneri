display_name: "Carichi permanenti e sovraccarichi variabili (NTC 2018 par. 3.1)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento dei carichi permanenti e dei sovraccarichi variabili per categoria d'uso delle costruzioni civili e industriali secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 3.1. Fornisce i pesi propri dei materiali strutturali con i pesi dell'unita' di volume della Tabella 3.1.I (calcestruzzo armato 25,0 kN/m3, acciaio 78,5, laterizio, legno, acqua, ecc.); i carichi permanenti non strutturali con la correlazione del carico equivalente distribuito g2 dei tramezzi al peso proprio lineare G2 delle partizioni (0,40, 0,80, 1,20, 1,60, 2,00 kN/m2 per G2 fino a cinque kN/m; oltre, posizionamento effettivo sul solaio); i sovraccarichi variabili qk distribuiti, Qk concentrati e Hk orizzontali per le categorie d'uso della Tabella 3.1.II (residenziale A, uffici B1/B2, ambienti suscettibili di affollamento C1-C5, commerciale D1/D2, magazzini e industriale E1/E2, rimesse e parcheggi F/G, coperture H/I/K, scale e balconi), con i carichi atipici da valutare caso per caso; le riduzioni dei sovraccarichi con il coefficiente alpha_A per l'area di influenza (cinque settimi di psi_0 piu' dieci diviso l'area, non superiore a 1,0 e non inferiore a 0,6 per le categorie C e D) e con il coefficiente alpha_n per il numero di piani caricati negli edifici con piu' di due piani, non combinabili tra loro; e le regole per i sovraccarichi concentrati Qk (impronte di carico, verifiche locali) e per i sovraccarichi orizzontali lineari Hk (applicati a 1,20 m dal piano di calpestio e ai parapetti al bordo superiore). NON calcola i carichi di progetto ne' combina le azioni, non dimensiona gli elementi, non tratta i carichi da ponte (cap. 5), l'azione sismica (par. 3.2) ne' il vento e la neve (par. 3.3/3.4), non riproduce la Tabella 2.5.I dei coefficienti psi ne' la Circolare 21/1/2019 n. 7, e non sostituisce il progettista strutturale.
default_prompt: |
  Devo impostare l'analisi dei carichi di un edificio secondo le NTC 2018 (par. 3.1): quali sono i pesi
  propri dei materiali (Tab. 3.1.I) e i sovraccarichi variabili qk/Qk/Hk per le categorie d'uso (Tab.
  3.1.II)? Come tratto i tramezzi come carico distribuito g2 e quando posso ridurre il sovraccarico per
  area di influenza o numero di piani? Cita i paragrafi e le tabelle.
