# Fonte per l'inquadramento dei CARICHI PERMANENTI (pesi propri strutturali e non strutturali) e dei
# SOVRACCARICHI VARIABILI (carichi imposti) per categoria d'uso delle costruzioni civili e industriali:
# pesi dell'unita' di volume, carico equivalente dei divisori, valori dei sovraccarichi per categoria,
# riduzioni per area di influenza e numero di piani, carichi concentrati e orizzontali. Fonte: DM 17
# gennaio 2018 (NTC 2018), par. 3.1.

sources:
  - id: ntc2018-par-3-1
    title: "NTC 2018 - DM 17 gennaio 2018 (Aggiornamento delle Norme tecniche per le costruzioni) - par. 3.1 Opere civili e industriali (carichi)"
    type: decreto
    # PDF del Supplemento Ordinario n. 8 alla G.U. n. 42 del 20 febbraio 2018 (stessa fonte usata dalle
    # altre skill NTC: combinazioni, carichi atmosferici, capacita' portante, cedimenti, opere di
    # sostegno, fondazioni su pali).
    url: https://www.gazzettaufficiale.it/eli/gu/2018/02/20/42/so/8/sg/pdf
    accessed: 2026-07-17
    sha256: dda1e397d56d71aa0f5bc457c3ba9b77064a468699dfc37bd056ac6c47105a46
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    md_path: references/fonti/ntc2018-par-3-1.md
    excerpt_path: references/estratti/carichi-sovraccarichi-checklist.md
    notes: |
      Decreto Ministeriale 17 gennaio 2018, "Aggiornamento delle Norme tecniche per le costruzioni"
      (NTC 2018), pubblicato nel Supplemento Ordinario n. 8 alla Gazzetta Ufficiale n. 42 del 20 febbraio
      2018. PDF scaricato dalla Gazzetta Ufficiale (hash stabile, doppio download: dda1e397...; e' la
      stessa fonte usata dalle altre skill NTC del repo). Il par. 3.1 (Opere civili e industriali) e'
      stato estratto con pdftotext -layout (pp. 41-44) e trascritto verbatim in
      references/fonti/ntc2018-par-3-1.md, con i simboli resi in modo corretto (alpha_A, alpha_n, psi_0)
      laddove l'estrazione automatica li aveva alterati e le costanti numeriche e le tabelle riportate
      come nel testo. Contenuto: generalita' (3.1.1); pesi propri dei materiali strutturali con la Tab.
      3.1.I dei pesi dell'unita' di volume (calcestruzzo armato 25,0 kN/m3, acciaio 78,5, ecc.) (3.1.2);
      carichi permanenti non strutturali, con la correlazione del carico equivalente distribuito g2 dei
      tramezzi al peso proprio lineare G2 delle partizioni (0,40/0,80/1,20/1,60/2,00 kN/m2 per G2 fino a
      5,00 kN/m; oltre, posizionamento effettivo) (3.1.3); sovraccarichi qk/Qk/Hk con la Tab. 3.1.II dei
      valori per le categorie d'uso A-K (residenziale, uffici B1/B2, affollamento C1-C5, commerciale D1/D2,
      magazzini/industriale E1/E2, rimesse/parcheggi F/G, coperture H/I/K, scale e balconi) (3.1.4);
      riduzioni dei sovraccarichi con il coefficiente alpha_A per l'area di influenza (5/7 psi_0 + 10/A <=
      1,0, non minore di 0,6 per C e D) e alpha_n per il numero di piani caricati ((2 + (n-2) psi_0)/n),
      non combinabili (3.1.4.1); sovraccarichi concentrati Qk per verifiche locali con le impronte di
      carico (3.1.4.2); sovraccarichi orizzontali lineari Hk applicati a 1,20 m e ai parapetti al bordo
      superiore (3.1.4.3).
      LIMITE DI RESA: la skill inquadra i valori dei carichi permanenti e dei sovraccarichi per categoria,
      il carico equivalente dei divisori e le riduzioni; NON calcola i carichi di progetto ne' combina le
      azioni, NON dimensiona gli elementi, NON tratta i carichi da ponte (cap. 5) ne' l'azione sismica
      (3.2) o del vento/neve (3.3/3.4), e NON sostituisce il progettista strutturale ne' la Circolare
      21/1/2019 n. 7.
