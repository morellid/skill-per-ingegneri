display_name: Cedimenti edometrici - SLE NTC 2018 par. 6.2.4
short_description: Calcolo code-driven del cedimento di consolidazione primaria per strati (FHWA NHI-06-088 par. 7.5.2, eq. 7-2/7-4/7-6, codice internazionale ex cap. 12 NTC 2018) + verifica documentale della verifica SLE cedimenti (NTC 6.2.4.3). Dato h0/e0/Cc/Cr/sigma_0'/sigma_p'/delta_sigma' restituisce OCR, caso NC/OC/UC, equazione applicata, S in m e mm; casi non coperti rifiutati.
default_prompt: |
  Calcolami il cedimento di consolidazione primaria di uno strato di argilla.
  h0 = 2 m, e0 = 0.8, Cc = 0.30, Cr = 0.05.
  sigma_0' = 100 kPa (tensione efficace iniziale al centro dello strato),
  sigma_p' = 150 kPa (preconsolidazione da prova edometrica),
  delta_sigma' = 200 kPa (incremento medio per la fondazione).
  Indicami caso (NC/OC/UC), equazione FHWA applicata, OCR e S in mm.
