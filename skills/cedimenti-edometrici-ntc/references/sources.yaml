  - id: fhwa-nhi-06-088
    title: "FHWA NHI-06-088 - Soils and Foundations, Reference Manual Volume I (U.S. DOT - Federal Highway Administration, dicembre 2006)"
    type: manuale-tecnico-governativo
    url: https://www.fhwa.dot.gov/engineering/geotech/pubs/nhi06088.pdf
    accessed: 2026-07-12
    sha256: f970902490ea97b07225f0eea51402dfe4c4988229aab8a0f0336429357340b4
    license: public-domain-us-government
    binary_path: not_in_repo/fhwa-nhi-06-088.pdf
    md_path: references/fonti/fhwa-nhi-06-088.md
    excerpt_path: references/estratti/fhwa-consolidazione-primaria.md
    notes: |
      Manuale del corso NHI 132012, 462 pagine, testo selezionabile.
      Opera del Governo federale USA: la Technical Report Documentation
      Page riporta "No restrictions" alla voce distribuzione. SHA256
      riproducibile (verificato con doppio download dall'URL ufficiale).
      Sezioni trascritte nel md_path:
        - par. 7.5.2 (pagg. 7-24/7-28): classificazione NC/OC/UC via
          OCR = pc/po; eq. 7-2/7-3 (NC), 7-4/7-5 (OC con pf > pc),
          7-6/7-7 (sottoconsolidato); indicazioni sui sublayer e sulla
          combinazione delle equazioni per profili misti
        - par. 5.4.6.1 (pag. 5-33): correlazioni per Cc (Table 5-5) con
          l'avvertenza "should not be used for final design"
      Ruolo: "altro codice internazionale" ex cap. 12 NTC 2018 per la
      formulazione del cedimento di consolidazione primaria, che NTC e
      Circolare non forniscono in forma chiusa. Il modulo
      tasks/lib/cedimento_edometrico.py implementa le sole equazioni
      trascritte (7-2, 7-4, 7-6) e rifiuta i casi non coperti.

