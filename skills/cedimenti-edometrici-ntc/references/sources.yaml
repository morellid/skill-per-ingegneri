schema_version: 1
skill: cedimenti-edometrici-ntc
last_verified: 2026-05-09

# Fonti normative e didattiche per la stima del cedimento edometrico
# (compressione monodimensionale) per verifiche SLE NTC 2018 par. 6.2.4.
# NTC 2018 fornisce il framework SLE ma non riproduce la formula chiusa:
# la skill applica la formulazione classica della meccanica dei terreni,
# di dominio pubblico tecnico (Terzaghi 1925, Skempton 1944), come strumento
# di pre-dimensionamento.

sources:
  - id: ntc2018-dm-17-01-2018
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018)"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/id/2018/2/20/18A00716/sg
    accessed: 2026-05-09
    sha256: REPLACE_WHEN_DOWNLOADED
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    excerpt_path: references/estratti/ntc2018-par-6-2.md
    notes: |
      Pubblicato in GU n. 42 del 20/02/2018 - Suppl. Ord. n. 8.
      Articoli rilevanti per questa skill:
      - par. 6.2.2 (analisi dell'interazione terreno-fondazione): il
        progettista sceglie il metodo di calcolo idoneo all'opera e ai
        terreni (analitico, numerico, semiempirico).
      - par. 6.2.4 (verifiche agli stati limite di esercizio): il
        cedimento calcolato deve essere confrontato con il cedimento
        ammissibile dichiarato dal progettista, in funzione di tipologia
        di opera, materiali, vincoli funzionali ed estetici.
      NTC NON riproduce la formula chiusa della compressione
      monodimensionale: rinvia a metodi di letteratura consolidati.
      La skill applica la formulazione classica con citazione esplicita.
      Hash SHA256 da calcolare al fetch via ./scripts/fetch-sources.sh.

  - id: circ-7-2019-mit
    title: "Circolare Ministero Infrastrutture e Trasporti n. 7 del 21/01/2019 - Istruzioni per l'applicazione delle NTC 2018"
    type: circolare
    url: https://www.gazzettaufficiale.it/eli/id/2019/02/11/19A00855/sg
    accessed: 2026-05-09
    sha256: REPLACE_WHEN_DOWNLOADED
    license: public-domain
    binary_path: not_in_repo/circ-7-2019.pdf
    excerpt_path: references/estratti/circ-7-2019-c-6-2.md
    notes: |
      Suppl. Ord. n. 5 alla GU n. 35 dell'11/02/2019.
      Sezioni rilevanti: par. C6.2 con commento applicativo a NTC par.
      6.2 e rinvio a metodi di letteratura per il calcolo dei cedimenti.

  - id: formulazione-edometrica-classica
    title: "Formulazione classica del cedimento edometrico (Terzaghi 1925, Skempton 1944) - dominio pubblico tecnico"
    type: linea-guida
    url: null
    accessed: 2026-05-09
    sha256: null
    license: public-domain
    binary_path: null
    excerpt_path: references/estratti/formulazione-edometrica-classica.md
    notes: |
      Formulazione di dominio pubblico tecnico, ampiamente trattata in
      tutti i testi standard di meccanica dei terreni e geotecnica
      (Terzaghi 1925 "Erdbaumechanik", Skempton 1944, e successivi).
      La skill cita la formulazione e ne fornisce un estratto sintetico
      in `references/estratti/formulazione-edometrica-classica.md`.

  - id: lancellotta-geotecnica
    title: "Lancellotta R., 'Geotecnica' - testo didattico standard"
    type: linea-guida
    url: https://www.zanichelli.it/ricerca/prodotti/geotecnica-lancellotta
    accessed: 2026-05-09
    sha256: null
    license: proprietary-paid
    binary_path: null
    excerpt_path: null
    notes: |
      Testo didattico standard di geotecnica nelle universita' italiane.
      Riferimento per la formulazione completa, i metodi di
      determinazione di Cc, Cr, sigma_p' da prove edometriche
      (metodo Casagrande, metodo Janbu) e per casi reali di confronto.
      Testo a pagamento, NON incorporato nella skill: citato come
      riferimento per il progettista geotecnico che voglia approfondire
      o validare i risultati.
