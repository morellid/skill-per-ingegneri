display_name: "Relazione di calcolo e codici di calcolo automatico (NTC 2018 cap. 10)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della redazione dei progetti strutturali esecutivi e delle relazioni di calcolo, e in particolare delle analisi svolte con l'ausilio di codici di calcolo automatico (software FEM), secondo le NTC 2018 (D.M. 17 gennaio 2018), Capitolo 10 (par. 10.1 e 10.2). Aiuta a inquadrare gli elaborati del progetto strutturale esecutivo (relazione di calcolo, relazione sui materiali, elaborati grafici e particolari, piano di manutenzione, relazione sui risultati sperimentali), fermo restando che il progettista resta responsabile dell'intera progettazione; i doveri nell'uso dei codici di calcolo (controllo dell'affidabilita' dei codici e dell'attendibilita' dei risultati, esame preliminare della documentazione del software con basi teoriche, algoritmi, campi d'impiego e casi prova con file di input); i contenuti della relazione di calcolo (tipo di analisi statica/dinamica e lineare/non lineare con motivazioni, metodo, combinazioni e percorsi di carico; origine e caratteristiche dei codici con titolo, autore, produttore, versione e licenza; modalita' di presentazione dei risultati con i contenuti minimi, disegni e schemi di deformate/sollecitazioni/inviluppi, tabulati in allegato); il giudizio motivato di accettabilita' dei risultati (controlli di attendibilita', confronto con calcoli semplici, equilibrio tra reazioni vincolari e carichi); e la valutazione indipendente del calcolo per opere di particolare importanza. NON esegue l'analisi ne' le verifiche, non redige la relazione al posto del progettista, non valuta uno specifico software e non sostituisce il progettista. E' trasversale a qualunque progetto strutturale.
default_prompt: |
  Devo redigere la relazione di calcolo di un edificio analizzato con un software FEM secondo le NTC 2018
  (Capitolo 10): quali elaborati deve comprendere il progetto strutturale esecutivo (par. 10.1)? Come devo
  documentare l'uso del codice di calcolo (affidabilita' dei codici, attendibilita' dei risultati, documentazione
  del software) e quali sono i contenuti minimi della relazione di calcolo (par. 10.2.1)? Come imposto il giudizio
  motivato di accettabilita' dei risultati (confronto con calcoli semplici, equilibrio reazioni/carichi) e quando
  serve una valutazione indipendente (par. 10.2.2)? Cita i paragrafi.
