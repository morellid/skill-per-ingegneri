    notes: |
      Codice redazionale 008G0104, GU n. 101 del 30/4/2008 - S.O. n. 108. Il
      binario e' la pagina indice Normattiva pinnata a !vig=2026-07-14 (hash
      stabile, doppio download: 0664b393...). Gli articoli 287 (campo di
      applicazione), 288 (definizioni: atmosfera esplosiva), 289 (prevenzione e
      protezione), 290 (valutazione dei rischi di esplosione), 293 (aree/zone,
      allegati XLIX e L), 294 (documento sulla protezione contro le esplosioni),
      296 (verifiche installazioni elettriche, DPR 462/2001) e 297 (sanzioni)
      sono caricati via AJAX (caricaArticolo) e trascritti verbatim in
      references/fonti/dlgs-81-2008.md. Gli allegati XLIX (classificazione
      zone), L (prescrizioni minime) e LI (segnaletica) e la direttiva
      1999/92/CE (recepita) sono citati come riferimento e NON riprodotti. La
      direttiva prodotti 2014/34/UE (marcatura degli apparecchi, eur-lex) NON e'
      oggetto di questa skill: qui si tratta la protezione dei lavoratori.
