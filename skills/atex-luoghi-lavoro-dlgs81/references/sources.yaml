# Fonte per la protezione dei lavoratori dai rischi da atmosfere esplosive
# (ATEX luoghi di lavoro): campo di applicazione, definizioni, obblighi del
# datore di lavoro, valutazione del rischio di esplosione, classificazione
# delle zone e documento sulla protezione contro le esplosioni.

