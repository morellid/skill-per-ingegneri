    notes: |
      Codice redazionale 001G0429. Pagina indice Normattiva pinnata a !vig=2026-07-17 (hash
      stabile, doppio download: bac3f7b1...; stesso indice usato dalle altre skill DPR 380).
      Articoli caricati via AJAX (caricaArticolo, flagTipoArticolo 0, dataPubblicazioneGazzetta
      2001-10-20) e trascritti verbatim in references/fonti/dpr-380-2001-6-6bis-22-23.md:
      art. 6 "Attivita' edilizia libera" (idGruppo 2, idSottoArticolo 1, versione 19; interventi
      senza titolo lett. a-e-sexies, con lettere/commi abrogati riportati come da fonte, e
      aggiornamenti 66 e 69), art. 6-bis "CILA" (idGruppo 2, idSottoArticolo 2, versione 1;
      comunicazione asseverata per interventi residuali non in artt. 6/10/22, sanzione 1.000
      euro ridotta di due terzi se spontanea), art. 22 "SCIA" (idGruppo 6, versione 7; ex art.
      19 L. 241/1990: manutenzione straordinaria strutturale, restauro/risanamento strutturale,
      ristrutturazione diversa dall'art. 10 c. 1 lett. c, varianti a permessi), art. 23 "SCIA in
      alternativa al permesso di costruire" (idGruppo 6, versione 7; ristrutturazione art. 10 c.
      1 lett. c e nuova costruzione/ristrutturazione urbanistica in attuazione di piani, termine
      30 giorni prima dell'inizio lavori, relazione del progettista, contributo di costruzione
      art. 16). Il testo tra doppi tondi (( )) e le note di abrogazione sono riportati come da
      fonte.
      LIMITE DI RESA: la skill inquadra i regimi e i loro presupposti; NON qualifica in concreto
      l'intervento (rinvio all'art. 3, skill definizioni-interventi-edilizi-dpr380), NON tratta
      il permesso di costruire (skill permesso-costruire-dpr380), NON riproduce il glossario
      dell'edilizia libera (DM 2/3/2018) ne' la modulistica edilizia unificata (skill
      modulistica-edilizia-unificata); gli artt. 3, 10, 16, 37, 44 e l'art. 19 L. 241/1990 sono
      citati come rinvio. Restano ferme le discipline regionali e le normative di settore
      (sismica, paesaggio, vincoli).
