display_name: "Resistenza al fuoco delle strutture (NTC 2018 par. 3.6.1)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della resistenza al fuoco delle strutture secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 3.6.1 (Incendio). Aiuta a inquadrare le definizioni (capacita' portante R, tenuta E e isolamento I in caso di incendio; resistenza al fuoco; compartimento antincendio; carico d'incendio e carico d'incendio specifico di progetto qf,d uguale a qf per delta_q1 per delta_q2 per delta_n, con delta_q1 maggiore o uguale a 1,00 in funzione della superficie del compartimento, delta_q2 maggiore o uguale a 0,80 in funzione del tipo di attivita' e delta_n maggiore o uguale a 0,20 in funzione delle misure di protezione; il calcolo di dettaglio dei fattori e' nel DM 9 marzo 2007); le richieste di prestazione con i livelli da I a V della Tab. 3.5.IV (nessun requisito, evacuazione, gestione dell'emergenza, limitato danneggiamento, totale funzionalita'); le classi di resistenza al fuoco 15, 20, 30, 45, 60, 90, 120, 180, 240 e 360 minuti riferite alle curve nominali; e la procedura di analisi (individuazione dell'incendio di progetto con curva nominale o naturale, con la curva nominale standard theta_g uguale a 20 piu' 345 per il logaritmo in base 10 di 8t piu' 1 in gradi Celsius, la curva degli idrocarburi e la curva esterna; analisi dell'evoluzione della temperatura; analisi del comportamento meccanico con le azioni della combinazione eccezionale; verifiche di sicurezza sul tempo pari alla classe). NON calcola il carico d'incendio (i fattori delta sono nel DM 9 marzo 2007) ne' esegue le analisi termiche o meccaniche, non fornisce le proprieta' dei materiali ad alta temperatura (Eurocodici parte 1-2), non stabilisce le classi o i livelli specifici delle regole tecniche dei Vigili del Fuoco (D.Lgs 139/2006) e non sostituisce il progettista strutturale ne' il professionista antincendio. E' distinta dalla skill sui procedimenti di prevenzione incendi (DPR 151/2011).
default_prompt: |
  Devo inquadrare la resistenza al fuoco delle strutture secondo le NTC 2018 (par. 3.6.1): quali sono le
  richieste di prestazione (livelli I-V, Tab. 3.5.IV) e le classi di resistenza al fuoco? Come si struttura il
  carico d'incendio specifico di progetto qf,d = qf*dq1*dq2*dn? Quale curva nominale d'incendio uso (standard
  theta_g = 20 + 345 log10(8t+1)) e in che cosa consiste la verifica (tempo pari alla classe, combinazione
  eccezionale)? Cita i paragrafi e le formule.
