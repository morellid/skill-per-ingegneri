    notes: |
      Codice redazionale 002G0139, GU n. 139 del 15/6/2002 - S.O. n. 126. Il
      binario e' la pagina indice Normattiva pinnata a !vig=2026-07-16 (hash
      stabile, doppio download: 8fc7d98b...). Caricati via AJAX (caricaArticolo) e
      trascritti verbatim in references/fonti/dpr-115-2002.md gli artt. 49
      (elenco spettanze), 50 (misura degli onorari - rinvio alle tabelle del DM),
      51 (onorari variabili e aumento urgenza 20%), 52 (aumento fino al doppio /
      riduzione), 53 (incarichi collegiali +40%), 54 (adeguamento triennale
      ISTAT), 55 (indennita' e spese di viaggio), 56 (spese per l'adempimento),
      57 (commissario ad acta), 58 (indennita' di custodia), 168 (decreto di
      pagamento) e 170 (opposizione ex art. 15 D.Lgs 150/2011).
      LIMITE DI FONTE: le TABELLE TARIFFARIE numeriche (importo della vacazione,
      onorari fissi/variabili, scaglioni a percentuale) sono stabilite con DM del
      Ministro della giustizia (art. 50; DM 30/5/2002 e adeguamenti ISTAT ex art.
      54). Il DM 30/5/2002 NON risulta su Normattiva (URN -> atto non trovato):
      gli IMPORTI non sono riprodotti e vanno letti sulle tabelle vigenti del DM.
      La skill copre il quadro/procedura, non il calcolo numerico dell'importo.
