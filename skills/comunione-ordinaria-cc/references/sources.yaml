# Fonte per l'inquadramento della COMUNIONE ORDINARIA (comproprietà di beni): norme regolatrici,
# quote, uso e disposizione, obblighi/spese, amministrazione, regolamento, innovazioni,
# impugnazioni, scioglimento e divisione. Fonte: Codice civile (R.D. 262/1942), artt. 1100-1116.

