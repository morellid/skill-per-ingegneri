display_name: "Comunione ordinaria nel Codice civile (c.c. artt. 1100-1116)"
short_description: Supporto documentale all'inquadramento della comunione ordinaria (comproprietà di beni: terreni, immobili, cose comuni) nel Codice civile (R.D. 262/1942, Capo I del Titolo VII), artt. 1100-1116. Inquadra le quote presunte eguali (art. 1101), l'uso della cosa comune senza alterarne la destinazione né impedire il pari uso (art. 1102), la disposizione della quota (art. 1103), le spese con rinunzia liberatoria (art. 1104), l'amministrazione a maggioranza per valore delle quote (art. 1105), il regolamento e l'amministratore anche estraneo (art. 1106), l'impugnazione del regolamento a 30 giorni (art. 1107), le innovazioni e gli atti eccedenti con maggioranza dei due terzi del valore e il consenso unanime per alienazioni/diritti reali/locazioni ultra-novennali (art. 1108), l'impugnazione delle deliberazioni a 30 giorni a pena di decadenza (art. 1109), il rimborso spese (art. 1110), lo scioglimento sempre domandabile e il patto di indivisione max 10 anni (art. 1111), le cose non divisibili, la divisione in natura e il rinvio alla divisione ereditaria (artt. 1112-1116). NON redige atti, non quantifica quote/spese, non tratta il condominio (artt. 1117 ss.) né la comunione legale tra coniugi e non sostituisce l'avvocato/CTU.
default_prompt: |
  Ho un bene in comunione ordinaria (comproprietà) con altre persone: come inquadro i nostri
  diritti secondo il Codice civile? Chi decide cosa e con quali maggioranze (uso, spese,
  amministrazione, innovazioni, vendita), come si impugna una delibera e come posso uscire dalla
  comunione o dividere il bene? Cita gli articoli.
