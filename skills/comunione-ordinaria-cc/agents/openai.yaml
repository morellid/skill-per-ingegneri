display_name: "Comunione e divisione di beni immobili per il tecnico/CTU (c.c. artt. 1100-1116)"
short_description: Supporto documentale per l'ingegnere/geometra/CTU che opera su beni immobili in comunione ordinaria (comproprietà di terreni, fabbricati, cose comuni) nel Codice civile (R.D. 262/1942, Capo I del Titolo VII), artt. 1100-1116. Fulcro tecnico la divisione: comoda divisibilità del bene in parti corrispondenti alle quote e progetto di divisione in natura (art. 1114), attribuzione con conguaglio o vendita quando non è comodamente divisibile (rinvio alla divisione ereditaria, art. 1116). A supporto inquadra le quote presunte eguali (art. 1101), l'uso della cosa comune senza alterarne la destinazione né impedire il pari uso (art. 1102), la ripartizione delle spese per quote (art. 1104), le maggioranze per l'amministrazione (art. 1105) e per le innovazioni/opere sulla cosa comune con i due terzi del valore e il consenso unanime per alienazioni/diritti reali/locazioni ultra-novennali (art. 1108), lo scioglimento sempre domandabile e il patto di indivisione max 10 anni (art. 1111), le cose non divisibili (art. 1112) e l'intervento dei creditori (art. 1113). NON dà consulenza legale, non redige atti (atto di divisione, domanda giudiziale), non esegue la stima in concreto (è l'oggetto della perizia), non tratta il condominio (artt. 1117 ss.) e non sostituisce l'avvocato o il giudice.
default_prompt: |
  Sono il tecnico (CTU/CTP) incaricato su un immobile in comunione: come inquadro il mio lavoro nel
  Codice civile? Come valuto se il bene è comodamente divisibile e imposto il progetto di divisione
  in natura, cosa succede se non è divisibile (conguaglio o vendita), e quali maggioranze servono
  per le opere/innovazioni sulla cosa comune? Cita gli articoli.
