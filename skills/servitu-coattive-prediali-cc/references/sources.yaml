    notes: |
      Codice redazionale 042U0262 (GU n. 79 del 4/4/1942). Pagina indice Normattiva pinnata a
      !vig=2026-07-17 (hash stabile, doppio download: f817bc32...; indice completo del codice,
      circa 1,6 MB; stesso indice usato dalle altre skill sul Codice civile). Articoli caricati
      via AJAX (caricaArticolo, flagTipoArticolo 2, dataPubblicazioneGazzetta 1942-04-04) e
      trascritti verbatim in references/fonti/cc-servitu-coattive.md: art. 1027 (contenuto del
      diritto, idGruppo 125), art. 1031 (costituzione, idGruppo 125), art. 1032 (modi di
      costituzione: sentenza/atto amministrativo, modalita' e indennita', idGruppo 126), art.
      1033 (acquedotto coattivo - obbligo di dare passaggio alle acque, idGruppo 127), art. 1051
      (passaggio coattivo del fondo intercluso, idGruppo 130), art. 1052 (passaggio coattivo del
      fondo non intercluso, idGruppo 130; con nota Corte cost. 167/1999 su accessibilita'
      portatori di handicap), art. 1053 (indennita', idGruppo 130), art. 1055 (cessazione
      dell'interclusione, idGruppo 130), art. 1056 (elettrodotto coattivo, idGruppo 131), art.
      1057 (vie funicolari/teleferiche, idGruppo 131).
      LIMITE DI RESA: la skill inquadra le servitu' coattive civilistiche e i loro presupposti;
      NON riproduce le LEGGI SPECIALI richiamate dagli artt. 1033/1056/1057 (T.U. acque R.D.
      1775/1933, norme sugli elettrodotti), citate come rinvio, ne' quantifica l'indennita' (art.
      1038, richiamato dall'art. 1053) o redige atti/domande giudiziali. Distinta dalla servitu'
      di elettrodotto amministrativa (espropriazione, DPR 327/2001) e dalle distanze legali
      (artt. 873 ss., skill distanze-legali-costruzioni-cc).
