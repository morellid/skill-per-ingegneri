# Fonte per l'inquadramento delle SERVITU' PREDIALI COATTIVE di piu' diretto interesse
# tecnico: nozione e costituzione, passaggio coattivo (fondo intercluso e non intercluso),
# acquedotto coattivo, elettrodotto coattivo e vie funicolari. Fonte: Codice civile
# (R.D. 262/1942), Libro III, Titolo VI (Delle servitu' prediali).

sources:
