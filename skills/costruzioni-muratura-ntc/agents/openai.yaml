display_name: "Costruzioni in muratura: materiali, verifiche e coefficienti (NTC 2018 par. 4.5)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della progettazione delle costruzioni in muratura (caso non sismico) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 4.5. Aiuta a inquadrare la classificazione degli elementi resistenti in base alla percentuale di foratura (elementi pieni, semipieni e forati delle Tabelle 4.5.Ia e 4.5.Ib) e la categoria I/II degli elementi; le caratteristiche meccaniche della muratura (resistenza caratteristica a compressione fk e a taglio fvk, moduli di elasticita', con controllo sperimentale per fk maggiore o uguale a 8 MPa); l'organizzazione strutturale con il comportamento scatolare, i cordoli e gli incatenamenti, gli spessori minimi dei muri portanti (150, 200, 240 mm per gli elementi artificiali pieni, semipieni e forati; 240, 400, 500 mm per la pietra squadrata, listata e non squadrata) e la snellezza convenzionale non superiore a 20; le resistenze di progetto fd uguale a fk diviso il coefficiente parziale gamma_M e fvd uguale a fvk diviso gamma_M, con la Tabella 4.5.II che fornisce gamma_M da 2,0 a 3,0 in funzione della categoria degli elementi I o II, del tipo di malta e della classe di esecuzione 1 o 2; le verifiche agli stati limite ultimi (pressoflessione fuori piano e nel piano, taglio, carichi concentrati) con il metodo semplificato per i carichi laterali (coefficiente Phi della Tabella 4.5.III, fattore di vincolo rho della Tabella 4.5.IV, eccentricita'); le verifiche semplificate per gli edifici semplici con gamma_M uguale a 4,2 e i relativi limiti (fino a 3 piani per la muratura ordinaria e 4 per l'armata, interpiano non superiore a 3,5 m, snellezza non superiore a 12, carico variabile non superiore a 3,00 kN/m2, rapporto fra i lati in pianta non inferiore a 1/3) con la verifica sigma uguale a N diviso 0,65 A minore o uguale a fk diviso gamma_M; e la muratura armata (barre di diametro non inferiore a 5 mm, percentuali di armatura, malta non inferiore a 10 MPa, conglomerato non inferiore a C12/15, gamma_s uguale a 1,15). NON calcola le resistenze ne' esegue le verifiche, non dimensiona la muratura, non tratta la progettazione sismica (par. 7.8), la resistenza al fuoco (par. 4.5.11), il cap. 11.10 (materiali) ne' gli Eurocodici (par. 4.6), non riproduce la Circolare 21/1/2019 n. 7, e non sostituisce il progettista strutturale.
default_prompt: |
  Devo inquadrare la progettazione (non sismica) di un edificio in muratura secondo le NTC 2018 (par. 4.5):
  come classifico gli elementi resistenti per foratura (Tab. 4.5.I) e la categoria I/II? Quale coefficiente
  gamma_M uso per le resistenze di progetto fd = fk/gamma_M (Tab. 4.5.II)? Quali spessori minimi e quale
  snellezza devo rispettare, quali verifiche SLU e quando posso usare le verifiche semplificate per edifici
  semplici (gamma_M = 4,2)? Cita i paragrafi e le tabelle.
