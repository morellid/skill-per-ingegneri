# 2018: materiali e categorie degli elementi, organizzazione strutturale, resistenze di progetto e
# coefficienti parziali, verifiche agli stati limite e verifiche semplificate, muratura armata. Fonte: DM
# 17 gennaio 2018 (NTC 2018), par. 4.5.

