# Fonte per la disciplina del SUBAPPALTO nei contratti pubblici: nozione e soglie, attivita'
# non configuranti subappalto, condizioni di affidamento, trasmissione del contratto,
# responsabilita' solidale, pagamento diretto al subappaltatore, autorizzazione della
# stazione appaltante e subappalto a cascata. Fonte: Codice dei contratti pubblici
# (D.Lgs. 36/2023), art. 119.

sources:
