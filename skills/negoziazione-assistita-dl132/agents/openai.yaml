display_name: "Negoziazione assistita da avvocati (D.L. 132/2014 conv. L. 162/2014, artt. 2-5)"
short_description: Supporto documentale al procedimento di negoziazione assistita da avvocati secondo il D.L. 132/2014 (conv. L. 162/2014), artt. 2-5. Inquadra la convenzione di negoziazione (cooperazione in buona fede, termine 1-3 mesi prorogabile 30 gg, oggetto su diritti disponibili, forma scritta a pena di nullita', almeno un avvocato per parte, certificazione delle firme - art. 2), i casi di condizione di procedibilita' (risarcimento danno da circolazione di veicoli e natanti; domande di pagamento non eccedenti 50.000 euro) con le esclusioni e il rilievo entro la prima udienza (art. 3), l'invito, l'avvertimento sulle spese e il mancato accordo (art. 4) e l'esecutivita' dell'accordo (titolo esecutivo, ipoteca giudiziale, trascrizione, illecito deontologico impugnare l'accordo - art. 5). NON redige la convenzione/invito/accordo, non fornisce consulenza legale, non sostituisce l'avvocato ne' il giudice.
default_prompt: |
  Per una controversia: la negoziazione assistita e' condizione di procedibilita' (art. 3 D.L.
  132/2014, danni da circolazione o pagamenti <= 50.000 euro)? Quali requisiti deve avere la
  convenzione (termine, forma, oggetto; art. 2) e che valore/efficacia ha l'accordo raggiunto
  (titolo esecutivo; art. 5)?
