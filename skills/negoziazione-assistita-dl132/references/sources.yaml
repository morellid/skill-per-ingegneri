    notes: |
      Codice redazionale 14G00147, GU n. 212 del 12/9/2014; convertito con
      modificazioni dalla L. 10 novembre 2014, n. 162. Il binario e' la pagina indice
      Normattiva pinnata a !vig=2026-07-17 (hash stabile, doppio download:
      9642e055...). Gli articoli del Capo II "Procedura di negoziazione assistita da
      uno o piu' avvocati" usati dalla skill - 2 (convenzione), 3 (improcedibilita' /
      condizione di procedibilita'), 4 (non accettazione dell'invito e mancato
      accordo), 5 (esecutivita' dell'accordo e trascrizione) - sono caricati via AJAX
      (caricaArticolo: idGruppo 2, flagTipoArticolo 0, codiceRedazionale 14G00147,
      dataPubblicazioneGazzetta 2014-09-12) e trascritti verbatim in
      references/fonti/dl-132-2014-negoziazione.md. Le porzioni tra (( )) sono le
      modifiche successive gia' consolidate (es. riforma Cartabia, D.Lgs. 149/2022).
      Articoli citati come rinvio e NON trascritti perche' fuori scope o coperti da
      altre skill: art. 6 (soluzione consensuale di separazione/divorzio), artt. 9-11
      (obblighi, antiriciclaggio, raccolta dati), il D.Lgs. 28/2010 (mediazione
      civile) e gli artt. 96, 480, 642, 696-bis c.p.c. richiamati.
