# Fonte normativa per l'inquadramento del progetto e della verifica dei tiranti
# di ancoraggio ai sensi delle NTC 2018 (DM 17/01/2018), par. 6.6. La skill
# inquadra criteri, verifica SLU a sfilamento, fattori di correlazione e prove
# di carico; non calcola la resistenza ne' dimensiona il tirante.

sources:
  - id: ntc2018-par-6-6
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018) - par. 6.6 Tiranti di ancoraggio"
    type: decreto
