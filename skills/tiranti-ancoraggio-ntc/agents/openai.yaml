display_name: "Tiranti di ancoraggio: progetto e verifica (NTC 2018 par. 6.6)"
short_description: Supporto documentale al progettista geotecnico e strutturale per l'inquadramento del progetto e della verifica dei tiranti di ancoraggio secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.6. Aiuta a inquadrare i criteri di progetto (ancoraggi provvisori o permanenti, attivi o presollecitati e passivi; nel progetto vanno indicati orientazione, lunghezza, numero, resistenza di progetto Rad e programma di tesatura; la conferma sperimentale con prove di trazione in sito e' sempre necessaria); la verifica di sicurezza allo stato limite ultimo di sfilamento della fondazione dell'ancoraggio con la condizione Ed minore o uguale a Rad e la combinazione A1+M1+R3, con la resistenza di progetto Rad uguale alla resistenza caratteristica Rak divisa per il coefficiente parziale gamma_R della Tab. 6.6.I (gamma_R uguale a 1,1 per gli ancoraggi temporanei e 1,2 per quelli permanenti); la determinazione di Rak dalle prove di progetto (minore fra il valor medio diviso xi_a1 e il valor minimo diviso xi_a2, con xi dalla Tab. 6.6.II in funzione del numero di ancoraggi di prova) oppure dal calcolo analitico (minore fra il valor medio diviso xi_a3 e il valor minimo diviso xi_a4, con xi dalla Tab. 6.6.III in funzione del numero di profili di indagine, con i coefficienti parziali M1 senza applicare gamma ai parametri del terreno); gli aspetti costruttivi (sistemi qualificati par. 11.5.2, diametro dei fori non inferiore al nominale, tesatura dopo l'esaurimento della presa e dell'indurimento); e le prove di carico, sia le prove di progetto su ancoraggi preliminari (numero minimo pari a 1 se gli ancoraggi sono meno di 30, 2 tra 31 e 50, 3 tra 51 e 100, 7 tra 101 e 200, 8 tra 201 e 500, 10 oltre 500) sia le prove in corso d'opera su tutti gli ancoraggi con un ciclo di carico e scarico pari a 1,2 volte l'azione di progetto Pd delle verifiche di esercizio. NON calcola la resistenza allo sfilamento ne' dimensiona il tirante o la sua armatura, non esegue ne' interpreta le prove di carico, non tratta i sistemi di ancoraggio come prodotti (par. 11.5.2), le paratie e i muri (par. 6.5) ne' la progettazione sismica, e non sostituisce il progettista. Complementa la skill sulle opere di sostegno (par. 6.5).
default_prompt: |
  Devo inquadrare il progetto e la verifica di un tirante di ancoraggio secondo le NTC 2018 (par. 6.6): come si
  imposta la verifica SLU a sfilamento (Ed <= Rad) e quale combinazione (A1+M1+R3) uso? Come determino la
  resistenza di progetto Rad = Rak/gamma_R (Tab. 6.6.I) e la resistenza caratteristica Rak dalle prove (Tab.
  6.6.II) o dal calcolo (Tab. 6.6.III)? Quante prove di carico servono e a quale forza (1,2 Pd)? Cita i
  paragrafi e le tabelle.
