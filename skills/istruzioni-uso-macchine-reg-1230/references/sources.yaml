    notes: |
      Reg. (UE) 2023/1230 (Regolamento Macchine, sostituisce la dir. 2006/42/CE
      dal 14/1/2027). Letti e trascritti verbatim in
      references/fonti/reg-ue-2023-1230-istruzioni.md il punto 1.7.4 dell'allegato
      III (RES): 1.7.4.1 principi generali di redazione (uso previsto e uso
      scorretto ragionevolmente prevedibile; operatori non professionali) e
      1.7.4.2 contenuto delle istruzioni (elenco a-u, comprese le informazioni
      sull'emissione di rumore aereo, punto u.i-iii), oltre alla deroga
      linguistica per la manutenzione destinata a personale specializzato. Gli
      obblighi generali dell'art. 10 §7-8 (fornitura delle istruzioni, formato
      digitale con diritto alla copia cartacea gratuita su richiesta, accesso
      alla dichiarazione UE di conformita') sono citati come rinvio. Gli altri
      RES dell'allegato III, le norme armonizzate UNI/CEN (a pagamento) e il
      fascicolo tecnico (allegato IV, coperto dalla skill
      fascicolo-tecnico-macchine-reg-1230) NON sono riprodotti.
