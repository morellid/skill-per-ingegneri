display_name: "Spostamenti di interpiano allo SLD (NTC 2018 par. 7.3.6.1)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della verifica di deformabilita' allo stato limite di danno (SLD), cioe' i limiti di spostamento di interpiano degli elementi strutturali, secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafi 7.3.6 e 7.3.6.1 (verifiche di rigidezza RIG). Aiuta a inquadrare il quadro delle verifiche (Tab. 7.3.III: per gli elementi strutturali primari la verifica di rigidezza si esegue allo SLD per le classi d'uso I e II e allo SLO per le classi d'uso III e IV); i limiti di spostamento di interpiano, con il prodotto tra fattore di comportamento q e spostamento di interpiano dr rapportato all'altezza di piano h: q per dr minore o uguale a 0,0050 h per tamponature fragili collegate rigidamente [7.3.11a], minore o uguale a 0,0075 h per tamponature duttili collegate rigidamente [7.3.11b], minore o uguale a drp e comunque a 0,0100 h per tamponature progettate per non subire danni [7.3.12], minore o uguale a 0,0020 h per muratura ordinaria [7.3.13], minore o uguale a 0,0030 h per muratura armata [7.3.14] e strettamente minore di 0,0025 h per muratura confinata [7.3.15]; la definizione di dr (differenza tra gli spostamenti del solaio superiore e inferiore, calcolati con analisi lineare al paragrafo 7.3.3.3 o non lineare al paragrafo 7.3.4, sul modello di calcolo non comprensivo delle tamponature) e di h (altezza di piano); e le regole di applicazione (per le classi d'uso III e IV, riferite allo SLO, i limiti sono i 2/3 di quelli indicati; in caso di coesistenza di diversi tipi di tamponamento o struttura portante nel medesimo piano si assume il limite piu' restrittivo; se gli spostamenti di interpiano superano 0,005 h le verifiche della capacita' di spostamento si estendono a tutte le tamponature, alle tramezzature interne e agli impianti). NON calcola gli spostamenti ne' esegue l'analisi (par. 7.3.3.3/7.3.4), non determina q, non tratta le verifiche di resistenza (RES) o duttilita' (DUT), gli elementi non strutturali (par. 7.3.6.2) ne' gli impianti (par. 7.3.6.3), e non sostituisce il progettista. Complementa le skill sulla regolarita' strutturale (par. 7.2.1), sul periodo proprio T1 (par. 7.3.3.2) e sullo spettro di risposta (par. 3.2).
default_prompt: |
  Devo inquadrare la verifica di deformabilita' allo SLD di un edificio secondo le NTC 2018 (par. 7.3.6.1): a
  quale stato limite si riferisce la verifica di rigidezza in funzione della classe d'uso (SLD per CU I-II, SLO
  per CU III-IV)? Qual e' il limite di spostamento di interpiano (q*dr rispetto all'altezza h) per tamponature
  fragili (0,0050 h), duttili (0,0075 h), progettate per non danneggiarsi (0,0100 h) o per muratura ordinaria/
  armata/confinata (0,0020/0,0030/0,0025 h)? Come si definisce dr (modello senza tamponature) e come si applicano
  le regole dei 2/3, della coesistenza e dell'estensione delle verifiche? Cita i paragrafi e le formule.
