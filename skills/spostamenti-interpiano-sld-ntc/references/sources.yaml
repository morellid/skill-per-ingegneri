    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018) - par. 7.3.6 e 7.3.6.1 (verifiche di rigidezza allo SLD, spostamenti di interpiano)"
    type: decreto
