    accessed: 2026-07-21
    sha256: dda1e397d56d71aa0f5bc457c3ba9b77064a468699dfc37bd056ac6c47105a46
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    md_path: references/fonti/ntc2018-par-7-3-6-1-sld.md
    excerpt_path: references/estratti/spostamenti-interpiano-checklist.md
    notes: |
      Pubblicato in GU n. 42 del 20/02/2018 - Suppl. Ord. n. 8.
      SHA256 calcolato su not_in_repo/ntc2018-gu42.pdf il 2026-07-21 con doppio
      download riproducibile (stessa fonte GU delle altre skill NTC del repo);
      hash validato live dalla CI del repo su ogni PR.
      Par. 7.3.6 e 7.3.6.1 estratti con `pdftotext -layout` (pagine PDF 225-226,
      pp. GU 221-222) e trascritti verbatim in
      references/fonti/ntc2018-par-7-3-6-1-sld.md. I sei limiti [7.3.11a]-[7.3.15]
      e gli operatori relazionali (<= per a-d, < per e) verificati anche
      sull'immagine renderizzata della pagina PDF 226 (pdftoppm -r 150 -png),
      perche' pdftotext restituisce il simbolo <= in modo non affidabile.
      Contenuti rilevanti:
      - par. 7.3.6 quadro (Tab. 7.3.III): per gli elementi strutturali primari
        (ST) la verifica di rigidezza (RIG) si esegue allo SLD per le CU I e II e
        allo SLO per le CU III e IV.
      - par. 7.3.6.1 verifiche di rigidezza (RIG): limiti di spostamento di
        interpiano q*dr rapportato all'altezza di piano h, con q fattore di
        comportamento e dr differenza tra gli spostamenti del solaio superiore e
        inferiore (analisi lineare par. 7.3.3.3 o non lineare par. 7.3.4, modello
        senza tamponature):
        * [7.3.11a] q*dr <= 0,0050 h - tamponature fragili collegate rigidamente;
        * [7.3.11b] q*dr <= 0,0075 h - tamponature duttili collegate rigidamente;
        * [7.3.12]  q*dr <= drp <= 0,0100 h - tamponature progettate per non
          subire danni;
        * [7.3.13]  q*dr <= 0,0020 h - muratura ordinaria;
        * [7.3.14]  q*dr <= 0,0030 h - muratura armata;
        * [7.3.15]  q*dr < 0,0025 h - muratura confinata (segno strettamente
          minore).
      - regole: per le CU III e IV (SLO) i limiti sono i 2/3 di quelli indicati;
        in caso di coesistenza di tipi diversi nel medesimo piano si assume il
        limite piu' restrittivo; se dr > 0,005 h (caso b) le verifiche di
        capacita' di spostamento si estendono a tutte le tamponature, alle
        tramezzature interne e agli impianti.
      Restano fuori scope: il calcolo degli spostamenti e l'esecuzione
      dell'analisi (par. 7.3.3.3/7.3.4), la determinazione di q, le verifiche di
      resistenza (RES) e di duttilita' (DUT) e le verifiche di elementi non
      strutturali (par. 7.3.6.2) e impianti (par. 7.3.6.3).
