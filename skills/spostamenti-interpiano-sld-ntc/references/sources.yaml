# Fonte normativa per l'inquadramento della verifica di deformabilita' allo
# stato limite di danno (SLD) - limiti di spostamento di interpiano - degli
# elementi strutturali secondo le NTC 2018 (DM 17/01/2018), par. 7.3.6 e
# 7.3.6.1. La skill inquadra i limiti; non calcola gli spostamenti ne' esegue
# l'analisi.

