display_name: "Ponteggi fissi: progetto, documentazione e Pi.M.U.S. (D.Lgs. 81/2008)"
short_description: Supporto documentale al tecnico (ingegnere/architetto/geometra), all'impresa/datore di lavoro e al preposto per i ponteggi fissi a elementi portanti prefabbricati e per il Pi.M.U.S. (piano di montaggio, uso e smontaggio), ai sensi del D.Lgs. 9 aprile 2008, n. 81, Titolo IV, Capo II, Sezione V, artt. 131-138. Stabilisce quando il ponteggio va eretto in base a un progetto (altezza superiore a 20 metri, configurazioni fuori schema-tipo, opere provvisionali di notevole importanza e complessita') con calcolo di resistenza e stabilita' e disegno esecutivo firmati da ingegnere o architetto abilitato (art. 133); inquadra l'esenzione dal calcolo entro schema-tipo e le modifiche sul disegno (artt. 132, 134); la documentazione da tenere ed esibire in cantiere - autorizzazione ministeriale, progetto e disegni, Pi.M.U.S. per lavori in quota (Allegato XXII) - agli organi di vigilanza (artt. 133, 134); il Pi.M.U.S. redatto dal datore di lavoro a mezzo di persona competente, la sorveglianza del preposto e la formazione teorico-pratica degli addetti (art. 136, Allegato XXI); l'autorizzazione ministeriale con relazione tecnica e rinnovo decennale (artt. 131-132, 135); la manutenzione del preposto e le norme particolari su parapetto, fermapiede e distacco tavole (artt. 137-138). NON redige il progetto/relazione/Pi.M.U.S., non esegue il calcolo, non rilascia l'autorizzazione, non riproduce gli Allegati XVIII/XIX/XXI/XXII o le norme UNI EN 12810/12811/74 e non sostituisce il professionista abilitato, il datore di lavoro, il preposto o gli enti di vigilanza.
default_prompt: |
  Devo montare un ponteggio fisso in cantiere: come inquadro gli adempimenti secondo il D.Lgs.
  81/2008? Quando serve un progetto e chi deve firmarlo, cosa devo tenere in cantiere, e quando/da
  chi va redatto il Pi.M.U.S. con quale formazione per gli addetti? Cita gli articoli.
