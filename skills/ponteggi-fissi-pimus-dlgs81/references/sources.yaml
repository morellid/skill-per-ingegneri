    notes: |
      Codice redazionale 008G0104, idGruppo 23 (Sezione V - Ponteggi fissi). Pagina indice Normattiva
      pinnata a !vig=2026-07-17 (hash stabile, doppio download: 18fbc542...; e' lo stesso indice usato
      dalle altre skill D.Lgs. 81/2008). Articoli 131 (v2), 132 (v1), 133 (v1), 134 (v1), 135 (v1), 136
      (v2), 137 (v2), 138 (v2) caricati via AJAX (caricaArticolo), formato AKN, e trascritti verbatim in
      references/fonti/dlgs-81-2008-131-138.md: autorizzazione alla costruzione ed all'impiego chiesta
      dal fabbricante e rinnovo decennale (131); contenuti della relazione tecnica, schemi-tipo (132);
      progetto - calcolo di resistenza e stabilita' e disegno esecutivo firmati da ingegnere o
      architetto abilitato - per ponteggi oltre 20 m, configurazioni fuori schema o opere provvisionali
      complesse (133); documentazione in cantiere, Pi.M.U.S. per lavori in quota (Allegato XXII),
      modifiche sul disegno entro schema-tipo (134); marchio del fabbricante (135); Pi.M.U.S. redatto
      dal datore di lavoro a mezzo di persona competente, obblighi del datore di lavoro, sorveglianza
      del preposto e formazione teorico-pratica (Allegato XXI) (136); manutenzione e revisione del
      preposto (137); norme particolari - parapetto 95 cm, fermapiede 15 cm, distacco tavole 20 cm
      (138). Il testo tra doppi tondi (( )) segnala le modifiche del D.Lgs. 106/2009 (artt. 131, 136,
      137, 138).
      LIMITE DI RESA: la skill inquadra obblighi, soggetti e contenuti; NON redige il progetto, la
      relazione tecnica o il Pi.M.U.S., NON esegue il calcolo di resistenza e stabilita', NON rilascia
      l'autorizzazione ministeriale, NON riproduce gli allegati XVIII/XIX/XXI/XXII ne' le norme UNI EN
      12810/12811/74, e NON sostituisce il professionista abilitato, il datore di lavoro, il preposto
      ne' gli organi di vigilanza.
