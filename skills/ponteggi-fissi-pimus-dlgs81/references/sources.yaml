# Fonte per l'inquadramento dei PONTEGGI FISSI a elementi portanti prefabbricati e del Pi.M.U.S.:
# autorizzazione ministeriale e relazione tecnica del fabbricante, progetto firmato da ingegnere/
# architetto, documentazione di cantiere, piano di montaggio/uso/smontaggio, sorveglianza del preposto
# e formazione, manutenzione e norme particolari. Fonte: Testo unico sicurezza (D.Lgs. 81/2008),
# Titolo IV, Capo II, Sezione V, artt. 131-138.

