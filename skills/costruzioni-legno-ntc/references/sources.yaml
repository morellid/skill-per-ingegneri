# Fonte per l'inquadramento della PROGETTAZIONE DELLE COSTRUZIONI DI LEGNO (non sismica) secondo le NTC
# 2018: classi di durata del carico e classi di servizio, resistenze di progetto con kmod e coefficienti
# parziali gamma_M, deformabilita' (kdef) e stati limite di esercizio, verifiche agli stati limite ultimi
# (resistenza e stabilita'), collegamenti e robustezza. Fonte: DM 17 gennaio 2018 (NTC 2018), par. 4.4.

sources:
  - id: ntc2018-par-4-4
    title: "NTC 2018 - DM 17 gennaio 2018 (Aggiornamento delle Norme tecniche per le costruzioni) - par. 4.4 Costruzioni di legno"
    type: decreto
    # PDF del Supplemento Ordinario n. 8 alla G.U. n. 42 del 20 febbraio 2018 (stessa fonte usata dalle
    # altre skill NTC: carichi, combinazioni, capacita' portante, cedimenti, opere di sostegno, fondazioni
    # su pali, costruzioni di muratura).
    url: https://www.gazzettaufficiale.it/eli/gu/2018/02/20/42/so/8/sg/pdf
    accessed: 2026-07-19
    sha256: dda1e397d56d71aa0f5bc457c3ba9b77064a468699dfc37bd056ac6c47105a46
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    md_path: references/fonti/ntc2018-par-4-4.md
    excerpt_path: references/estratti/costruzioni-legno-checklist.md
    notes: |
      Decreto Ministeriale 17 gennaio 2018, "Aggiornamento delle Norme tecniche per le costruzioni"
      (NTC 2018), pubblicato nel Supplemento Ordinario n. 8 alla Gazzetta Ufficiale n. 42 del 20 febbraio
      2018. PDF scaricato dalla Gazzetta Ufficiale (hash stabile, doppio download riproducibile:
      dda1e397...; e' la stessa fonte usata dalle altre skill NTC del repo). Il par. 4.4 (Costruzioni di
      legno) e' stato estratto con pdftotext -layout (pp. 132-141) e trascritto verbatim in
      references/fonti/ntc2018-par-4-4.md, con i simboli resi in modo corretto (sigma, gamma_M, lambda,
      lambda_rel, tau, beta_c) e le costanti numeriche e le tabelle riportate come nel testo. Contenuto:
      valutazione della sicurezza (4.4.1) e analisi strutturale (4.4.2); classi di durata del carico con
      la Tab. 4.4.I (permanente/lunga/media/breve/istantaneo) (4.4.4); classi di servizio 1/2/3 con la
      Tab. 4.4.II (4.4.5); resistenza di progetto Xd = kmod Xk / gamma_M con la Tab. 4.4.III del
      coefficiente gamma_M (colonna A/B: legno massiccio 1,50/1,45, lamellare 1,45/1,35, LVL/OSB 1,40/1,30,
      unioni 1,50/1,40, eccezionali 1,00) e la Tab. 4.4.IV del coefficiente kmod, con kmod di combinazione
      pari all'azione di minor durata (4.4.6); stati limite di esercizio con la Tab. 4.4.V del coefficiente
      kdef, la deformazione a lungo termine con il fattore 1/(1+kdef) e le frecce limite (istantanea
      <= L/300, finale <= L/200) (4.4.7); stati limite ultimi con le verifiche di resistenza (trazione e
      compressione parallela/perpendicolare alla fibratura, flessione con km = 0,7 sezioni rettangolari /
      1,0 altre, tenso/pressoflessione, taglio, torsione con ksh) e le verifiche di stabilita' (kcrit,m per
      lo svergolamento, kcrit,c per l'instabilita' di colonna con beta_c = 0,2 massiccio / 0,1 lamellare)
      (4.4.8); collegamenti (4.4.9), elementi e sistemi strutturali (4.4.10-4.4.11), robustezza (4.4.12),
      durabilita' (4.4.13), resistenza al fuoco con rinvio a UNI EN 1995-1-2 e gamma_M eccezionali
      (4.4.14), regole per l'esecuzione con lo scostamento massimo 1/500 lamellare e 1/300 massiccio
      (4.4.15).
      LIMITE DI RESA: la skill inquadra classi, coefficienti, resistenze di progetto, deformabilita' e
      criteri di verifica; NON calcola le resistenze ne' esegue le verifiche, NON dimensiona gli elementi
      ne' i collegamenti, NON riproduce le proprieta' dei materiali (fk, moduli elastici) del par. 11.7
      ne' gli Eurocodici (UNI EN 1995), NON tratta la progettazione sismica (par. 7.7), e NON sostituisce
      il progettista strutturale ne' la Circolare 21/1/2019 n. 7.
