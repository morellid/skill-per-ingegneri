display_name: "Costruzioni di legno: classi, resistenze e verifiche (NTC 2018 par. 4.4)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della progettazione delle costruzioni di legno (caso non sismico) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 4.4. Aiuta a inquadrare l'assegnazione delle classi di durata del carico (Tabella 4.4.I: permanente, lunga, media, breve, istantaneo) e delle classi di servizio (Tabella 4.4.II, in funzione di temperatura e umidita' relativa); il calcolo delle resistenze di progetto con la relazione Xd uguale a kmod per Xk diviso il coefficiente parziale gamma_M, dove kmod (Tabella 4.4.IV) dipende dal materiale, dalla classe di servizio e dalla classe di durata (e nelle combinazioni si assume il valore dell'azione di minor durata) e gamma_M (Tabella 4.4.III) vale ad esempio 1,50 per il legno massiccio, 1,45 per il lamellare incollato, 1,40 per LVL e OSB e 1,50 per le unioni, con la colonna B ridotta per le produzioni continuative controllate e 1,00 per le combinazioni eccezionali; le verifiche agli stati limite di esercizio con la deformabilita' a lungo termine tramite il fattore uno su uno piu' kdef (Tabella 4.4.V) e le frecce limite (istantanea inferiore a L su 300, finale inferiore a L su 200); le verifiche agli stati limite ultimi di resistenza (trazione e compressione parallela e perpendicolare alla fibratura, flessione con km uguale a 0,7 per le sezioni rettangolari e 1,0 per le altre, tenso e pressoflessione, taglio, torsione con ksh) e di stabilita' (kcrit per lo svergolamento delle travi inflesse e per l'instabilita' delle colonne compresse, con il coefficiente di imperfezione beta_c uguale a 0,2 per il legno massiccio e 0,1 per il lamellare); i collegamenti, la robustezza, la resistenza al fuoco (rinvio a UNI EN 1995-1-2) e le regole per l'esecuzione. NON calcola le resistenze ne' esegue le verifiche, non dimensiona gli elementi ne' i collegamenti, non riproduce le proprieta' dei materiali (fk, moduli elastici) del paragrafo 11.7 ne' gli Eurocodici (UNI EN 1995), non tratta la progettazione sismica (paragrafo 7.7), non riproduce la Circolare 21/1/2019 n. 7, e non sostituisce il progettista strutturale.
default_prompt: |
  Devo inquadrare la progettazione (non sismica) di una struttura in legno secondo le NTC 2018 (par. 4.4):
  come assegno la classe di durata del carico (Tab. 4.4.I) e la classe di servizio (Tab. 4.4.II)? Come
  ricavo le resistenze di progetto con Xd = kmod*Xk/gamma_M (Tab. 4.4.III e 4.4.IV)? Quali sono le frecce
  limite SLE (L/300, L/200) e come tratto la deformazione a lungo termine con kdef? Quali verifiche SLU di
  resistenza (km) e di stabilita' (kcrit, beta_c) devo considerare? Cita i paragrafi e le tabelle.
