# Fonte per l'inquadramento della PROGETTAZIONE DELLE COSTRUZIONI DI CALCESTRUZZO (c.a., c.a.p., non armato)
# secondo le NTC 2018: classi di resistenza, resistenze di progetto e coefficienti parziali, diagrammi di
# calcolo, verifiche agli stati limite ultimi (pressoflessione, taglio, torsione) e di esercizio
# (fessurazione, limitazione delle tensioni). Fonte: DM 17 gennaio 2018 (NTC 2018), par. 4.1.

