display_name: "Costruzioni di calcestruzzo: materiali e verifiche (NTC 2018 par. 4.1)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della progettazione delle costruzioni di calcestruzzo (cemento armato, cemento armato precompresso, non armato; caso non sismico) secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 4.1. Aiuta a inquadrare le classi di resistenza del calcestruzzo (Tab. 4.1.I, da C8/10 a C90/105) e i metodi di analisi (elastica lineare, plastica, non lineare) con il limite dell'asse neutro x/d non superiore a 0,45 per fck fino a 50 MPa e 0,35 oltre; le resistenze di progetto dei materiali: calcestruzzo a compressione fcd uguale ad alpha_cc per fck diviso gamma_c (alpha_cc uguale a 0,85, gamma_c uguale a 1,5, riducibile a 1,4 per produzione continuativa controllata, e ridotta a 0,80 fcd per elementi piani gettati in opera con spessore inferiore a 50 mm), calcestruzzo a trazione fctd uguale a fctk diviso gamma_c, e acciaio fyd uguale a fyk diviso gamma_s con gamma_s uguale a 1,15 sempre; i diagrammi di calcolo tensione-deformazione (parabola-rettangolo, triangolo-rettangolo, rettangolo o stress block, con epsilon_c2 uguale a 0,20 per cento ed epsilon_cu uguale a 0,35 per cento per le classi fino a C50/60) e il calcestruzzo confinato; le verifiche agli stati limite ultimi (pressoflessione, taglio con il modello a traliccio e inclinazione dei puntoni tra 1 e 2,5, torsione, punzonamento); e le verifiche agli stati limite di esercizio con la fessurazione (stati limite di decompressione, formazione e apertura delle fessure con i valori limite w1 uguale a 0,2 mm, w2 uguale a 0,3 mm, w3 uguale a 0,4 mm secondo le condizioni ambientali e la sensibilita' delle armature) e la limitazione delle tensioni (sigma_c non superiore a 0,60 fck in combinazione caratteristica e 0,45 fck in combinazione quasi permanente, sigma_s non superiore a 0,8 fyk). NON calcola le resistenze ne' esegue le verifiche, non dimensiona ne' arma gli elementi, non riproduce le proprieta' dei materiali (fck, fctk, fyk, moduli) dei paragrafi 11.2 e 11.3 ne' gli Eurocodici (UNI EN 1992), non tratta la progettazione sismica (paragrafo 7.4) ne' i calcestruzzi speciali (leggeri 4.1.12, fibrorinforzati 11.2.12), e non sostituisce il progettista strutturale. E' complementare alla skill code-driven predimensionamento-flessione-ca-ntc.
default_prompt: |
  Devo inquadrare la progettazione (non sismica) di una struttura in cemento armato secondo le NTC 2018
  (par. 4.1): quali coefficienti parziali gamma_c e gamma_s e quali resistenze di progetto fcd = alpha_cc
  fck/gamma_c, fctd e fyd = fyk/gamma_s devo usare? Quali deformazioni (epsilon_c2, epsilon_cu) nel
  diagramma di calcolo? Quali verifiche SLU (pressoflessione, taglio, torsione) e SLE (limitazione delle
  tensioni 0,60/0,45 fck e 0,8 fyk, fessurazione w1/w2/w3) devo considerare? Cita i paragrafi e le formule.
