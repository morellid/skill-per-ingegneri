# Fonte per la verifica della trasmittanza termica U delle strutture opache
# secondo i limiti per zona climatica del DM 26/06/2015 "requisiti minimi".
#
# Architettura:
#   - DM 26/06/2015 (requisiti minimi): fornisce i VALORI LIMITE di U per zona
#     climatica (Appendice A per l'edificio di riferimento; Appendice B per gli
#     edifici esistenti sottoposti a riqualificazione energetica) e l'obbligo di
#     verifica U <= U_limite (Allegato 1 par. 5.2).
#   - Il METODO di calcolo di U (U = 1/R_tot, legge di Fourier) e' fisica tecnica
#     di pubblico dominio; i valori di lambda dei materiali e delle resistenze
#     superficiali R_si/R_se provengono da norme UNI a pagamento (UNI/TS 11300,
#     UNI EN ISO 6946/10456) e NON sono riprodotti: sono input dell'utente.

