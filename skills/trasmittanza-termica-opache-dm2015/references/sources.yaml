    notes: |
      GU Serie Generale n. 162 del 15/07/2015 - Supplemento Ordinario n. 39
      (codice redazionale 15A05198; il SO contiene i tre DM 26/06/2015, questa
      fonte e' il decreto "requisiti minimi"). SHA256 verificato il 2026-07-14
      con doppio download (riproducibile). Testo estraibile via pdftotext.
      Sezioni lette: Allegato 1 par. 5.2 e Cap. 5; Appendice A cap. 1.1
      Tabelle 1-5; Appendice B cap. 1.1 Tabelle 1-4. Decreto tuttora in vigore;
      i limiti della colonna 2021 sono quelli correnti.
