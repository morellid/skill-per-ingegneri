display_name: "Permesso di costruire: presupposti, procedimento e decadenza (DPR 380/2001 artt. 11, 12, 15, 20)"
short_description: Supporto documentale al regime del permesso di costruire secondo il D.P.R. 380/2001 (Testo unico edilizia), artt. 11, 12, 15, 20. Inquadra le caratteristiche del titolo (soggetti legittimati, trasferibilita' con l'immobile, irrevocabilita', onerosita' ex art. 16, salvezza dei diritti dei terzi; art. 11), i presupposti per il rilascio (conformita' agli strumenti urbanistici, esistenza o previsione delle opere di urbanizzazione primaria, misure di salvaguardia; art. 12), l'efficacia temporale e la decadenza (inizio lavori entro 1 anno, ultimazione entro 3 anni, proroga, decadenza per contrastanti previsioni urbanistiche; art. 15) e il procedimento (sportello unico, asseverazione del progettista, responsabile del procedimento, termini 60/30 giorni, interruzione, conferenza di servizi, silenzio-assenso, sanzioni per false attestazioni; art. 20). NON redige la domanda o l'asseverazione, non decide se serva il PdC anziche' SCIA/CILA (rinvio a modulistica-edilizia-unificata), non calcola il contributo di costruzione, non sostituisce il SUE, il progettista o il Comune.
default_prompt: |
  Per un permesso di costruire (DPR 380/2001): sussistono i presupposti per il rilascio - conformita'
  urbanistica e opere di urbanizzazione (art. 12)? Quali sono le caratteristiche del titolo (art. 11)?
  Quali termini e quale silenzio-assenso nel procedimento (art. 20) e quali termini di inizio/ultimazione
  e cause di decadenza (art. 15)?
