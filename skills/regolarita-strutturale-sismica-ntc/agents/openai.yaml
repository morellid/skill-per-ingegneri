display_name: "Regolarità strutturale in pianta e in altezza (NTC 2018 par. 7.2.1)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento della valutazione della regolarita' di una costruzione in pianta e in altezza ai fini della progettazione sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.2.1, e delle sue conseguenze sul metodo di analisi e sul fattore di comportamento (paragrafi 7.3.1 e 7.3.3.1). Aiuta a inquadrare i criteri di regolarita' in pianta (masse e rigidezze approssimativamente simmetriche rispetto a due direzioni ortogonali e forma in pianta compatta con contorno convesso, rientranze ammesse se l'area tra perimetro e linea convessa circoscritta non supera il 5% dell'orizzontamento; rapporto tra i lati del rettangolo circoscritto inferiore a 4; orizzontamento rigido nel proprio piano, cioe' diaframma rigido, con resistenza sufficiente); i criteri di regolarita' in altezza (sistemi resistenti alle azioni orizzontali estesi per tutta l'altezza; massa e rigidezza costanti o graduali, con variazioni di massa non superiori al 25% e rigidezza che non si riduce piu' del 30% ne' aumenta piu' del 10% da un orizzontamento al sovrastante; rapporto capacita'/domanda allo SLV che non differisce piu' del 30% tra orizzontamenti adiacenti; restringimenti con continuita', con rientro non superiore al 10% della dimensione sottostante ne' al 30% del primo orizzontamento); i casi particolari (struttura scatolare rigida alla base con controlli riferiti alla sola struttura soprastante; ponti al paragrafo 7.9.2.1); e le conseguenze della regolarita' in altezza sul fattore di comportamento (fattore KR uguale a 1 per costruzioni regolari in altezza e 0,8 per costruzioni non regolari in altezza, con q_lim uguale a q0 per KR, paragrafo 7.3.1) e sul metodo di analisi (l'analisi lineare statica e' applicabile solo se il periodo T1 non supera 2,5 TC o TD e la costruzione e' regolare in altezza, paragrafo 7.3.3.1). NON calcola la struttura ne' esegue l'analisi, non determina q0 (Tab. 7.3.II) ne' le classi di duttilita' (par. 7.2.2), non calcola T1 (par. 7.3.3.2) ne' tratta la regolarita' dei ponti (par. 7.9.2.1), e non sostituisce il progettista. Complementa le skill sullo spettro di risposta (par. 3.2), sul periodo proprio T1 (par. 7.3.3.2) e sulle combinazioni di carico (par. 2.5.3).
default_prompt: |
  Devo inquadrare la valutazione della regolarita' di un edificio ai fini sismici secondo le NTC 2018 (par.
  7.2.1): quali sono i criteri di regolarita' in pianta (a-c) e in altezza (d-g) e le relative soglie (rientranze
  5%, rapporto lati < 4, variazioni di massa 25%, rigidezza 30%/10%, capacita'/domanda 30%, rientri 10%/30%)?
  Quali conseguenze ha la (ir)regolarita' in altezza sul fattore di comportamento (KR = 1 o 0,8) e
  sull'ammissibilita' dell'analisi lineare statica (T1 <= 2,5 TC o TD e regolare in altezza)? Cita i paragrafi.
