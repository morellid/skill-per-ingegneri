    notes: |
      Portale Normattiva (Presidenza Consiglio Ministri) - testo consolidato vigente.
      Non scaricabile come PDF unico; il sito e' a contenuto dinamico (JavaScript).
      sha256: null e' coerente con binary_path: null (fonte HTML non scaricabile come binario).
      Usare per verificare eventuali modifiche successive al testo originale 2008,
      in particolare per: Art. 5 co. 2 (soglie progettazione), Allegato I/II vigenti.
      Il testo originale letto dal PDF MIMIT e' consistente con le soglie del testo vigente
      per gli articoli chiave (Art. 5 co. 2 lett. a: 400 mq, 6 kW; lett. g: 50 kW).

# Norme tecniche richiamate dal DM 37/2008 (non embedabili - proprietary)
secondary_sources_to_evaluate:
  - id: dm-19-maggio-2010
    title: "Decreto 19 maggio 2010 - Sostituzione Allegato I e II del DM 37/2008"
    type: decreto
    notes: |
      Sostituisce Allegato I (modello DdC per imprese installatrici) e Allegato II
      (modello DdC per uffici tecnici interni) del DM 37/2008.
      Da aggiungere come fonte per la prossima versione della skill che descriva
      esplicitamente il modello di Allegato I vigente.

  - id: dm-192-2022-mimit
    title: "DM 16 novembre 2022 n. 192 - Modifiche al DM 37/2008 per infrastrutture digitali"
    type: decreto
    notes: |
      Modifica DM 37/2008: espande Art. 1 co. 2 lett. b) alle infrastrutture digitali in fibra
      ottica e aggiunge Art. 5-bis sulle infrastrutture fisiche passive per impianti cat. b).
      Pubblicato in GU: da verificare (numero e data GU non confermati da fonte primaria letta).
      Da aggiungere come fonte per la prossima versione della skill che tratti la cat. b)
      estesa e i nuovi obblighi dichiarativi per infrastrutture ultra-broadband (PNRR).
      Attenzione: il numero 192 e la data 16 novembre 2022 sono da verificare su Normattiva
      o GU prima di usare questa informazione in contenuto della skill.

  - id: cei-64-8
    title: "CEI 64-8 - Impianti elettrici utilizzatori a tensione nominale non superiore a 1000 V"
    type: norma-cei
    notes: |
      Norma tecnica a pagamento. Riferimento per la regola dell'arte per cat. a).
      Non embedabile: licenza CEI proprietaria. Per la skill: citare solo la denominazione.

  - id: uni-7129
    title: "UNI 7129 - Impianti a gas per uso domestico e similare alimentati da rete di distribuzione"
    type: norma-uni
    notes: |
      Norma tecnica a pagamento, principale riferimento per cat. e) (gas). Non embedabile.
      Per la skill: citare solo la denominazione come norma da dichiarare nella DdC.
