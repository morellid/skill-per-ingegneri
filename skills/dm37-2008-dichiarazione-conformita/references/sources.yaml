# Norme tecniche richiamate dal DM 37/2008 (non embedabili - proprietary)
secondary_sources_to_evaluate:
  - id: cei-64-8
    title: "CEI 64-8 - Impianti elettrici utilizzatori a tensione nominale non superiore a 1000 V in corrente alternata e a 1500 V in corrente continua"
    type: norma-cei
    notes: |
      Norma tecnica a pagamento. Il DM 37/2008 non la cita esplicitamente ma la categoria a)
      la richiama implicitamente come "regola dell'arte". Gli installatori devono dichiararla
      nella DdC come norma applicata. Non embedabile: licenza CEI proprietaria.
      Per la skill: citare solo la denominazione, non il testo.

  - id: uni-7129
    title: "UNI 7129 - Impianti a gas per uso domestico e similare alimentati da rete di distribuzione"
    type: norma-uni
    notes: |
      Norma tecnica a pagamento, principale riferimento per categoria e) (gas). Non embedabile.
      Sostituisce il precedente richiamo nell'abrogata L. 46/1990. Per la skill: citare
      solo la denominazione come norma da dichiarare nella DdC.

