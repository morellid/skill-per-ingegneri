      attuazione del modello idoneo, organismo di vigilanza, elusione fraudolenta, non
      omessa vigilanza), 7 (sottoposti; contenuti ed efficace attuazione del modello) e
      25-septies (idSottoArticolo=7: omicidio colposo e lesioni gravi/gravissime con
      violazione delle norme sulla salute e sicurezza sul lavoro; sanzioni pecuniarie e
      interdittive).

