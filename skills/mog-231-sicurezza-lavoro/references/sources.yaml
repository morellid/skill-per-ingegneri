# Fonti per il Modello di Organizzazione e Gestione (MOG) con efficacia esimente della
# responsabilita' amministrativa dell'ente per i reati di omicidio colposo e lesioni
# gravi/gravissime commessi con violazione delle norme antinfortunistiche:
#  1) D.Lgs. 231/2001 (artt. 5, 6, 7 - responsabilita' ed esimente; 25-septies - reato);
#  2) D.Lgs. 81/2008 art. 30 (requisiti del MOG con efficacia esimente).

