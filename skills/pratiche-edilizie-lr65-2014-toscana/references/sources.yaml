  - id: regione-toscana-suap-aprea
    title: "Regione Toscana - Portale APREA (SUE/SUAP unificato)"
    type: portale-normativo
    url: https://www.regione.toscana.it/pratiche-edilizie
    accessed: 2026-05-02
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Portale della Regione Toscana per le pratiche edilizie e SUAP. Molti Comuni toscani
      aderiscono al sistema APREA per la gestione telematica delle pratiche SUE.
      Verificare se il Comune di intervento usa APREA o un portale proprio.
      URL esatto e servizi disponibili possono variare: verificare sul sito regionale.
