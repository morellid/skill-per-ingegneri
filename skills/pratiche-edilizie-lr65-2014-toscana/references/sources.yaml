    md_path: references/fonti/dl-66-2026-piano-casa.md
    excerpt_paths:
      - references/estratti/dl-66-2026-piano-casa-erp.md
    notes: |
      Piano Casa 2026. In vigore dall'8/05/2026. Rilevante per la skill:
      - Art. 8 co. 1: estende agli interventi ERP del Capo II le disposizioni di cui
        all'art. 10 co. 7-ter del DL 76/2020 (conv. L. 120/2020), consentendo la SCIA
        in luogo del PdC per demolizione/ricostruzione in contesti di edilizia residenziale
        pubblica e sociale.
      - Art. 8 co. 2: conferenza di servizi semplificata (L. 241/1990 art. 14-bis) per
        l'approvazione degli interventi, con termine di 30 giorni (40 se tutele art. 14-quinquies).
      - Art. 9: programmi infrastrutturali di edilizia integrata (Capo III) - disciplina
        speciale parallela che NON modifica gli artt. 10 o 22 del DPR 380/2001.
      PDF condiviso con skill modulistica-edilizia-unificata (PR #177). SHA256 verificato.
