    binary_path: not_in_repo/dlgs-199-2021.pdf
    excerpt_paths:
      - references/estratti/dlgs-199-2021-art-30-31-32.md
    notes: |
      Articoli 30 (Autoconsumatore Individuale a Distanza), 31 (CER) e 32 (Gruppi di
      Autoconsumatori) sono i riferimenti soggettivi delle tre forme di CACER.
      L'estratto riporta in forma sintetica i requisiti soggettivi e oggettivi citati
      dalla skill.

  - id: dm-mase-414-2023
    title: "DM MASE 7 dicembre 2023 n. 414 - Modalita' di individuazione di una tariffa incentivante per la remunerazione degli impianti a fonti rinnovabili inseriti nelle CACER e per la concessione di un contributo PNRR per i Comuni con popolazione fino a 5.000 abitanti"
    type: decreto-ministeriale
    url: https://www.mase.gov.it/sites/default/files/archivio/DM_CER_414_07122023.pdf
    accessed: 2026-05-06
    sha256: PLACEHOLDER_TO_BE_COMPUTED_AT_FETCH
    license: public-domain-italian-law
    binary_path: not_in_repo/dm-mase-414-2023.pdf
    excerpt_paths:
      - references/estratti/dm-mase-414-2023.md
    notes: |
      Decreto MASE che disciplina la TIP per le CACER (durata 20 anni, parte fissa
      per fascia di potenza + correttivo zonale) e il contributo PNRR a fondo perduto
      (intensita' fino al 40% del costo ammissibile, riservato a impianti in Comuni
      con popolazione < 5.000 abitanti, cumulabile con TIP ridotta nei limiti del
      decreto). Articoli rilevanti: 3 (definizioni), 4 (requisiti soggettivi CER),
      5 (atto costitutivo e statuto), 7 (TIP), 8 (contributo PNRR), 11 (cumulabilita').

  - id: delibera-arera-727-2022-tiad
    title: "Delibera ARERA 727/2022/R/eel - Testo Integrato Autoconsumo Diffuso (TIAD)"
    type: delibera-autorita
    url: https://www.arera.it/atti-e-provvedimenti/dettaglio/it/22/727-22
    accessed: 2026-05-06
    sha256: PLACEHOLDER_TO_BE_COMPUTED_AT_FETCH
    license: public-domain-italian-law
    binary_path: not_in_repo/delibera-arera-727-2022-tiad.pdf
    excerpt_paths:
      - references/estratti/tiad-arera-727-2022.md
    notes: |
      Il TIAD definisce le configurazioni di autoconsumo diffuso, regola i flussi
      verso il GSE e i corrispettivi di restituzione delle componenti tariffarie
      (TR) sull'energia condivisa. La definizione operativa di energia condivisa
      come minimo orario tra immessa CACER e prelevata CACER e' centrale per la
      simulazione. Verificare aggiornamenti successivi (delibere di revisione TIAD).

