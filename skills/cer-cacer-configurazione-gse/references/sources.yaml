    notes: |
      Articoli rilevanti per la skill:
      - art. 30 c. 1 lett. a) n. 2: Autoconsumatore Individuale a Distanza (AID);
      - art. 30 c. 2 (con lett. a) per il vincolo "stesso edificio o condominio"):
        Autoconsumatori che agiscono collettivamente (GAC);
      - art. 31: Comunita' di Energia Rinnovabile (CER);
      - art. 32: ARERA, contratti tra clienti finali in configurazioni di
        autoconsumo, ruolo del referente.
      L'estratto riporta in forma sintetica i requisiti soggettivi e oggettivi
      citati dalla skill.

  - id: dm-mase-414-2023
    title: "DM MASE 7 dicembre 2023 n. 414 - Modalita' di individuazione di una tariffa incentivante per la remunerazione degli impianti a fonti rinnovabili inseriti nelle CACER e per la concessione di un contributo PNRR (testo originario; soglia di popolazione 5.000 ab. successivamente estesa dal DM 127/2025)"
    type: decreto-ministeriale
    url: https://www.mase.gov.it/sites/default/files/archivio/DM_CER_414_07122023.pdf
    accessed: 2026-05-06
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/dm-mase-414-2023.pdf
    excerpt_paths:
      - references/estratti/dm-mase-414-2023.md
    notes: |
      Decreto MASE che disciplina la TIP per le CACER (durata 20 anni, parte
      fissa per fascia di potenza + correttivo zonale) e il contributo PNRR a
      fondo perduto. Articoli rilevanti: 3 (definizioni), 4 (requisiti
      soggettivi CER), 5 (atto costitutivo e statuto), 7 (TIP), 8 (contributo
      PNRR), 11 (cumulabilita'). Il testo del decreto e' stato modificato dal
      DM MASE 127/2025 (vedi sotto): soglia popolazione Comune passata da
      < 5.000 ab. a < 50.000 ab.; aggancio del termine 30/6/2026 al
      "completamento dei lavori"; aggancio del termine 24 mesi/31-12-2027 alla
      "data di completamento dei lavori"; quota di anticipazione passata dal
      10% al 30%; introduzione/aggiornamento del meccanismo a tre fasi
      (anticipazione + quota intermedia 40% + saldo).

  - id: dm-mase-127-2025
    title: "DM MASE 16 maggio 2025 n. 127 - Modifiche al DM 7/12/2023 n. 414 (Decreto CACER): estensione del perimetro PNRR ai Comuni con popolazione fino a 50.000 abitanti, nuove scadenze e nuovo schema di erogazione (anticipazione 30% + quota intermedia 40% + saldo)"
    type: decreto-ministeriale
    url: null
    accessed: 2026-05-06
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/dm-mase-127-2025.pdf
    excerpt_paths:
      - references/estratti/dm-mase-414-2023.md
    notes: |
      Decreto del Ministro dell'ambiente e della sicurezza energetica n. 127
      del 16 maggio 2025, pubblicato in Gazzetta Ufficiale il 25 giugno 2025.

      URL CANONICO DA RECUPERARE: in questa versione della skill l'URL del
      provvedimento sul portale MASE/Normattiva non e' confermato. Fonti
      autoritative su cui si basano le sintesi di questa skill, da consultare
      finche' l'URL del decreto non e' verificato:
      - GSE - Allegato 1 Regole Operative CACER (id `gse-regole-operative-cacer`,
        versione 16/7/2025), che recepisce le modifiche del DM 127/2025;
      - MASE - documento procedimenti PIF del 13/6/2025
        (https://www.mase.gov.it/portale/documents/d/guest/2025-06-13_procedimenti_pif-pdf).

      Modifiche principali al regime PNRR del DM 414/2023 (verificate sulle fonti
      GSE/MASE sopra):
      - perimetro soggettivo esteso ai Comuni con popolazione < 50.000 abitanti
        (in luogo di < 5.000 abitanti);
      - completamento dei lavori entro il 30 giugno 2026;
      - entrata in esercizio entro 24 mesi dalla data di completamento dei
        lavori e comunque entro il 31 dicembre 2027;
      - quota di anticipazione richiedibile aumentata dal 10% al 30% del
        contributo massimo erogabile;
      - introduzione/aggiornamento di una "quota intermedia" pari al 40% del
        contributo, richiedibile dopo aver sostenuto il 40% delle spese
        ammissibili e comunicato la data di avvio dei lavori (par. 2.2.3.2
        delle Regole Operative GSE CACER);
      - estensione alle persone fisiche dell'esclusione del fattore di riduzione F
        di cui all'Allegato 1 par. 3 del Decreto CACER, ai fini della TIP.

