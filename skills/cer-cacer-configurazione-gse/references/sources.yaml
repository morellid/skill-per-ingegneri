  - id: dl-19-2026-pnrr
    title: "DL 19 febbraio 2026 n. 19 (Decreto PNRR 2026), art. 27 - Modifiche al regime CACER PNRR del DM 414/2023 come modificato dal DM 127/2025"
    type: decreto-legge
    url: null
    accessed: 2026-05-07
    sha256: null
    license: public-domain-italian-law
    binary_path: not_in_repo/dl-19-2026.pdf
    excerpt_paths:
      - references/estratti/dm-mase-414-2023.md
    notes: |
      Decreto-legge 19 febbraio 2026 n. 19 ("Decreto PNRR 2026"). L'art. 27
      ridefinisce il regime CACER PNRR e in particolare:

      - sposta il termine del **30 giugno 2026** dalla "conclusione dei lavori"
        (regime DM 127/2025) alla "**stipula degli accordi di concessione**" da
        parte del GSE con i beneficiari;
      - aggancia il termine di **24 mesi** per l'entrata in esercizio alla
        "**comunicazione dell'accordo di concessione**", e non piu' alla data
        di completamento dei lavori;
      - mantiene il termine massimo del **31 dicembre 2027** per l'entrata in
        esercizio, indipendentemente dalla data di stipula dell'accordo;
      - consolida il GSE come soggetto che stipula gli accordi e gestisce i
        controlli per i target PNRR (in luogo del MASE per la gestione
        operativa).

      L'URL canonico (Normattiva, Gazzetta Ufficiale o portale governativo) va
      verificato in fase di fetch-sources. Fonti tecniche secondarie usate per
      la sintesi (consultazione 2026-05-07):
      - https://biblus.acca.it/facility-cacer/
      - https://www.rinnovabili.it/energia/comunita-energetiche-rinnovabili/contributi-pnrr-cacer-nuove-regole-gse/
      - https://www.leganet.net/decreto-pnrr-2026-d-l-19-2026-silenzio-assenso-conferenza-di-servizi-e-appalti-tutte-le-novita-per-gli-enti-locali/

      ATTENZIONE: il regime CACER PNRR ha subito tre modifiche significative in
      circa 18 mesi (DM 414/2023 -> DM 127/2025 -> DL 19/2026). Verificare
      sempre la **versione vigente** delle Regole Operative GSE prima dell'uso
      operativo della skill.

