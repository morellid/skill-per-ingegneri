# Fonte per l'inquadramento della CLASSIFICAZIONE, VALUTAZIONE DELLA CONFORMITA' E MARCATURA CE dei
# dispositivi di protezione individuale (DPI) come prodotti secondo il Regolamento (UE) 2016/425:
# categorie di rischio I/II/III, procedure di valutazione della conformita' (moduli A, B, C, C2, D),
# obblighi del fabbricante, dichiarazione di conformita' UE e marcatura CE.

