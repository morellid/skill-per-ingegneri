display_name: "Marcatura CE dei dispositivi di protezione individuale - DPI (Reg. UE 2016/425)"
short_description: Supporto documentale al fabbricante, all'ufficio tecnico e al tecnico per l'inquadramento della classificazione, della valutazione della conformita' e della marcatura CE dei dispositivi di protezione individuale (DPI) come prodotti secondo il Regolamento (UE) 2016/425. Aiuta a inquadrare la classificazione del DPI nelle categorie di rischio dell'Allegato I (categoria I per i soli rischi minimi come lesioni meccaniche superficiali, prodotti di pulizia poco aggressivi o contatto con acqua, superfici calde non oltre 50 gradi, luce solare e condizioni atmosferiche non estreme; categoria II per i rischi diversi da quelli delle categorie I e III; categoria III per i soli rischi che possono causare morte o danni irreversibili come sostanze e miscele pericolose, carenza di ossigeno, agenti biologici nocivi, radiazioni ionizzanti, alta temperatura oltre 100 gradi, bassa temperatura sotto meno 50 gradi, cadute dall'alto, scosse elettriche e lavoro sotto tensione, annegamento, tagli da seghe a catena, getti ad alta pressione, ferite da proiettile o coltello, rumore nocivo); la procedura di valutazione della conformita' applicabile per categoria (articolo 19: categoria I con il controllo interno della produzione modulo A dell'Allegato IV; categoria II con l'esame UE del tipo modulo B dell'Allegato V seguito dalla conformita' al tipo modulo C dell'Allegato VI; categoria III con l'esame UE del tipo modulo B e in aggiunta il modulo C2 dell'Allegato VII o il modulo D dell'Allegato VIII, con deroga per i DPI su misura di categoria III); gli obblighi del fabbricante (articolo 8: requisiti essenziali dell'Allegato II, documentazione tecnica dell'Allegato III, dichiarazione UE, marcatura CE, conservazione decennale, identificazione e istruzioni) e del mandatario (articolo 9); la dichiarazione di conformita' UE con la struttura tipo dell'Allegato IX (articolo 15); e le regole di apposizione della marcatura CE (articoli 16-17), con il numero dell'organismo notificato per i DPI di categoria III. NON progetta ne' certifica il DPI, non esegue le prove ne' l'esame UE del tipo, non riproduce in dettaglio i requisiti essenziali (Allegato II) ne' i moduli (Allegati IV-VIII), non individua le norme armonizzate applicabili, non tratta gli organismi notificati, e non sostituisce l'organismo notificato ne' il fabbricante. E' distinta dalla skill dpi-protezione-individuale-dlgs81, che riguarda l'uso e la scelta dei DPI da parte del datore di lavoro.
default_prompt: |
  Devo inquadrare la marcatura CE di un dispositivo di protezione individuale (DPI) come prodotto secondo il
  Reg. UE 2016/425: in quale categoria di rischio (I, II o III) rientra il DPI in base all'Allegato I? Quale
  procedura di valutazione della conformita' devo seguire (modulo A; B+C; B+C2 o D) e quando interviene un
  organismo notificato (art. 19)? Cosa deve contenere la dichiarazione di conformita' UE (art. 15, Allegato
  IX) e come appongo la marcatura CE (artt. 16-17)? Cita gli articoli e gli allegati.
