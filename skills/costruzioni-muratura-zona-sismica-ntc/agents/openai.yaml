display_name: "Muratura in zona sismica: regole generali (NTC 2018 par. 7.8.1)"
short_description: Supporto documentale al progettista strutturale per inquadrare le regole generali delle costruzioni di muratura in zona sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.8.1. Aiuta a inquadrare la premessa del par. 7.8.1.1 (muratura moderatamente dissipativa e classe di duttilita' CD"B"; coefficienti parziali di sicurezza del Capitolo 4 riducibili del 20 per cento e comunque non inferiori a 2); i requisiti dei materiali del par. 7.8.1.2 (oltre al par. 4.5.2 e salvo agS non superiore a 0,075g: vuoti non oltre il 45 per cento, resistenza caratteristica a rottura nella direzione portante fbk almeno 5 MPa o resistenza media normalizzata fb almeno 6 MPa, resistenza perpendicolare almeno 1,5 MPa, malta almeno 5 MPa, con limiti per giunti sottili e a secco); le modalita' costruttive e i fattori di comportamento del par. 7.8.1.3 (muratura ordinaria, armata o confinata; q uguale a q0 per KR; rapporto alpha_u su alpha_1 pari a 1,7 per l'ordinaria, 1,5 per l'armata e 1,3 con progettazione in capacita', 1,6 per la confinata e 1,3 con progettazione in capacita', comunque non oltre 2,5); e i criteri di progetto e requisiti geometrici del par. 7.8.1.4 (piante compatte e simmetriche, pareti continue in elevazione senza pareti in falso, distanza massima tra due solai non oltre 5 metri, e la Tab. 7.8.I con spessore minimo, snellezza massima h0 su t e rapporto minimo l su h' delle pareti resistenti al sisma). NON esegue le verifiche dei pannelli murari (pressoflessione nel piano e fuori piano, taglio), non progetta l'armatura e non sostituisce il progettista. E' distinta dalla skill sulla muratura statica (par. 4.5) e da quella sul fattore di comportamento q (par. 7.3.1).
default_prompt: |
  Sto impostando un edificio in muratura in zona sismica secondo le NTC 2018 (par. 7.8.1). Quali requisiti
  devono avere i materiali (fbk, malta, percentuale di vuoti)? Quale classe di duttilita' e quale rapporto
  alpha_u/alpha_1 uso per la muratura ordinaria/armata/confinata? Quali sono i requisiti geometrici delle pareti
  (Tab. 7.8.I: spessore minimo, snellezza h0/t, rapporto l/h')? Cita i paragrafi.
