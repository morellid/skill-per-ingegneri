# Fonte normativa per l'inquadramento delle regole generali per le costruzioni
# di muratura in zona sismica (premessa/CD"B", requisiti dei materiali,
# modalita' costruttive e fattori di comportamento alpha_u/alpha_1, criteri di
# progetto e requisiti geometrici Tab. 7.8.I) secondo le NTC 2018 (DM
# 17/01/2018), par. 7.8.1. La skill inquadra le regole generali; non esegue le
# verifiche ne' progetta l'armatura.

