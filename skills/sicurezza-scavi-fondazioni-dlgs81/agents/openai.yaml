display_name: "Sicurezza degli scavi e delle fondazioni in cantiere (D.Lgs. 81/2008)"
short_description: Supporto documentale al coordinatore per la sicurezza (CSP/CSE), al direttore dei lavori e all'impresa per la sicurezza degli scavi e delle fondazioni in cantiere (splateamenti, sbancamenti, pozzi, trincee, cunicoli), ai sensi del D.Lgs. 9 aprile 2008, n. 81, Titolo IV, Capo II, Sezione III, artt. 118-121. Inquadra, per splateamento e sbancamento, l'inclinazione/tracciato delle fronti contro i franamenti, il divieto di scavo manuale per scalzamento alla base oltre 1,50 metri, l'armatura/consolidamento del terreno, i divieti nel campo d'azione dell'escavatore e la delimitazione della zona di pericolo (art. 118); per pozzi, scavi e cunicoli, le armature di sostegno per pozzi e trincee oltre 1,50 metri, le tavole di rivestimento sporgenti almeno 30 centimetri, le armature dei cunicoli e nelle sottomurazioni, l'impalcato di protezione nei pozzi di fondazione oltre 3 metri, l'assistenza esterna e il recupero dell'infortunato, il sollevamento del materiale secondo l'Allegato XVIII (art. 119); il divieto di depositi di materiali presso il ciglio degli scavi salvo puntellature (art. 120); la presenza di gas negli scavi con le misure contro gas tossici/asfissianti/infiammabili/esplosivi, i DPI delle vie respiratorie e il sistema di salvataggio con sorveglianza esterna, la bonifica con ventilazione, il divieto di fiamme e il lavoro in coppia (art. 121). NON redige il POS/PSC ne' la relazione geotecnica, non dimensiona le armature ne' calcola la stabilita' delle pareti, non riproduce l'Allegato XVIII e non sostituisce il coordinatore, il direttore dei lavori, il progettista o il preposto.
default_prompt: |
  Ho uno scavo in cantiere (trincea/pozzo) e devo inquadrarne la sicurezza secondo il D.Lgs. 81/2008:
  quando servono le armature/sbadacchiature, quali soglie di profondita' contano, posso depositare il
  materiale a bordo scavo e cosa fare se c'e' rischio di gas? Cita gli articoli.
