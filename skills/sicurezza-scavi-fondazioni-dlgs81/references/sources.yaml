# Fonte per l'inquadramento della SICUREZZA DEGLI SCAVI E DELLE FONDAZIONI in cantiere: splateamenti e
# sbancamenti, armature/sbadacchiature di pozzi, trincee e cunicoli, deposito di materiali sul ciglio,
# presenza di gas negli scavi. Fonte: Testo unico sicurezza (D.Lgs. 81/2008), Titolo IV, Capo II,
# Sezione III, artt. 118-121.

