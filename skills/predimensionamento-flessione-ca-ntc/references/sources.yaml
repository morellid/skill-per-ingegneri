schema_version: 1
skill: predimensionamento-flessione-ca-ntc
last_verified: 2026-05-09

# Fonti normative per il pre-dimensionamento SLU in flessione semplice di
# sezioni rettangolari in c.a. ai sensi delle NTC 2018 (DM 17/01/2018) e
# Circolare esplicativa 21/01/2019 n. 7.

sources:
  - id: ntc2018-dm-17-01-2018
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018)"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/id/2018/2/20/18A00716/sg
    accessed: 2026-05-09
    sha256: REPLACE_WHEN_DOWNLOADED
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    excerpt_path: references/estratti/ntc2018-par-4-1-2.md
    notes: |
      Pubblicato in GU n. 42 del 20/02/2018 - Suppl. Ord. n. 8.
      Articoli rilevanti per questa skill:
      - par. 4.1.2.1 (resistenze e diagrammi tensione/deformazione c.a.):
        f_cd = alpha_cc * fck / gamma_c (eq. 4.1.4), Tab. 4.1.II coefficienti
        parziali gamma_c = 1.5 (PERS) e gamma_s = 1.15 (PERS).
        Stress-block rettangolare equivalente: lambda = 0.8 e eta = 1
        per fck <= 50 MPa (Classe 1).
        Per fck > 50 MPa (Classe 2): NTC eq. 4.1.10-4.1.11 introducono
        lambda < 0.8 e eta < 1 - **fuori scope skill v0.1**.
      - par. 4.1.2.1.1.2: acciaio - Es = 200000 MPa, eps_yd = f_yd / Es.
      - par. 4.1.2.1.1.3: acciaio - f_yd = fyk / gamma_s.
      - par. 4.1.2.3.4.2: flessione semplice SLU - equilibrio sezione,
        eps_cu = 0.0035 (Classe 1), formula M_Rd = A_s * f_yd * z con
        z = d - 0.4 x (per stress-block lambda = 0.8).
      - par. 7.4.4 e 7.4.6 (sismica CD"A" / CD"B"): limiti rho_min/rho_max,
        gerarchia delle resistenze - **NON applicati dalla skill**, da
        verificare separatamente dal progettista.
      Il file binario va scaricato e l'hash SHA256 calcolato con
      ./scripts/fetch-sources.sh, oppure manualmente: sha256sum del PDF.

  - id: circ-7-2019-mit
    title: "Circolare Ministero Infrastrutture e Trasporti n. 7 del 21/01/2019 - Istruzioni per l'applicazione delle NTC 2018"
    type: circolare
    url: https://www.gazzettaufficiale.it/eli/id/2019/02/11/19A00855/sg
    accessed: 2026-05-09
    sha256: REPLACE_WHEN_DOWNLOADED
    license: public-domain
    binary_path: not_in_repo/circ-7-2019.pdf
    excerpt_path: references/estratti/circ-7-2019-c-4-1-2.md
    notes: |
      Suppl. Ord. n. 5 alla GU n. 35 dell'11/02/2019.
      Sezioni rilevanti: par. C4.1.2 (commento applicativo a NTC par. 4.1.2)
      con la raccomandazione x/d <= 0.45 per assicurare duttilita' adeguata
      della sezione (sezione sotto-armata, acciaio snerva ben prima della
      rottura del calcestruzzo). La skill produce un'avvertenza quando
      x/d > 0.45 senza bloccare il calcolo (la formula M_Rd resta valida
      finche' eps_s >= eps_yd).
