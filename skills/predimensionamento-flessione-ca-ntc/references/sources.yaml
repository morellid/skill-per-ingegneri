# Fonti normative per il pre-dimensionamento SLU in flessione semplice di
# sezioni rettangolari in c.a. ai sensi delle NTC 2018 (DM 17/01/2018) e
# Circolare esplicativa 21/01/2019 n. 7.
#
# SHA256 calcolati localmente su PDF scaricati in not_in_repo/:
#   sha256sum not_in_repo/ntc2018-gu42.pdf  -> dda1e397...
#   sha256sum not_in_repo/circ-7-2019.pdf   -> f7c3b8d1...

sources:
  - id: ntc2018-dm-17-01-2018
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018)"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/gu/2018/02/20/42/so/8/sg/pdf
    accessed: 2026-05-11
    sha256: dda1e397d56d71aa0f5bc457c3ba9b77064a468699dfc37bd056ac6c47105a46
    license: public-domain
    binary_path: not_in_repo/ntc2018-gu42.pdf
    md_path: references/fonti/ntc2018-dm-17-01-2018.md
    excerpt_path: references/estratti/ntc2018-par-4-1-2.md
    notes: |
      Pubblicato in GU n. 42 del 20/02/2018 - Suppl. Ord. n. 8. File 372 pagine.
      SHA256 verificato su not_in_repo/ntc2018-gu42.pdf (9.9 MB).
      Paragrafi rilevanti per questa skill (letti dal PDF, trascritti in md_path):
      - par. 4.1.1.1: ridistribuzione momenti, limite x/d <= 0,45 per travi continue
        (fck <= 50 MPa) - NON limite universale per flessione semplice (eq. [4.1.1])
      - par. 4.1.2.1.1.1: fcd = alpha_cc * fck / gamma_c (eq. [4.1.3]),
        alpha_cc = 0,85; gamma_c = 1,5
      - par. 4.1.2.1.1.3: fyd = fyk / gamma_s (eq. [4.1.5]), gamma_s = 1,15
      - par. 4.1.2.1.2.1: modelli sigma-eps calcestruzzo; per fck <= 50 MPa:
        eps_cu = 0,0035 (0,35%); modello stress-block rettangolare (Fig. 4.1.1(c))
        con lambda = 0,8, eta = 1 (da EN 1992-1-1, recepiti dal NTC)
      - par. 4.1.2.3.4.1: ipotesi di base (sezioni piane, trazione cls nulla)
      - par. 4.1.2.3.4.2: MRd >= MEd (eq. [4.1.18a]); formula MRd dalla applicazione
        delle ipotesi + stress-block per flessione semplice singolarmente armata

  - id: circ-7-2019-mit
    title: "Circolare Ministero Infrastrutture e Trasporti n. 7 del 21/01/2019 - Istruzioni per l'applicazione delle NTC 2018"
    type: circolare
    url: https://www.gazzettaufficiale.it/eli/gu/2019/02/11/35/so/5/sg/pdf
    accessed: 2026-05-11
    sha256: f7c3b8d1f443aadb6b3e020b6b6c19813683492ecaadd2c15bf6bf1939aaed7c
    license: public-domain
    binary_path: not_in_repo/circ-7-2019.pdf
    md_path: references/fonti/circ-7-2019-mit.md
    excerpt_path: references/estratti/circ-7-2019-c-4-1-2.md
    notes: |
      Suppl. Ord. n. 5 alla GU n. 35 dell'11/02/2019. File 348 pagine.
      SHA256 verificato su not_in_repo/circ-7-2019.pdf.
      Sezioni rilevanti per questa skill (lette dal PDF, trascritte in md_path):
      - par. C4.1.2.1.2.1: commento su calcestruzzo confinato; non ridefinisce
        lambda/eta per cls non confinato in flessione semplice
      - par. C4.1.2.3.4.2: commento su verifiche resistenza e duttilita';
        non introduce limite numerico x/d per singola sezione
      NOTA: il limite x/d <= 0,45 NON compare nella Circolare 7/2019 (verificato
      con grep su testo estratto). Proviene da NTC 2018 par. 4.1.1.1 (ridistribuzione
      momenti nelle travi continue).
