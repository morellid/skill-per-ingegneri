# Fonte per stabilire se un'attivita' e' soggetta ai controlli di prevenzione incendi
# (Allegato I) e in quale categoria (A, B, C), e quale procedimento del Comando dei Vigili
# del fuoco si applica: valutazione del progetto (art. 3), SCIA e controlli (art. 4),
# certificato di prevenzione incendi, rinnovo periodico (art. 5), deroghe (art. 7).
# Il D.P.R. 151/2011 e' il regolamento di semplificazione della disciplina dei procedimenti
# di prevenzione incendi (art. 49 DL 78/2010; D.Lgs. 139/2006).

sources:
