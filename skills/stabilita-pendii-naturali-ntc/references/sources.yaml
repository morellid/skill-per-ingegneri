# Fonte normativa per l'inquadramento della verifica di stabilita' dei pendii
# naturali ai sensi delle NTC 2018 (DM 17/01/2018), par. 6.3. La skill inquadra
# criteri, modellazione e verifica (F = tau_f/tau su valori caratteristici); non
# calcola il coefficiente di sicurezza ne' esegue le verifiche.

