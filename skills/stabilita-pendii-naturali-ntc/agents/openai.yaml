display_name: "Stabilità dei pendii naturali (NTC 2018 par. 6.3)"
short_description: Supporto documentale al progettista geotecnico e al geologo per l'inquadramento dello studio e della verifica di stabilita' dei pendii naturali secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 6.3. Aiuta a inquadrare l'ambito (pendii naturali, anche in condizioni sismiche con rinvio al par. 7.11.3.5, e interventi di stabilizzazione); le prescrizioni generali e le indagini (osservazioni e rilievi di superficie, notizie storiche, movimenti in atto, dati idrogeologici e pluviometrici, verifiche basate su specifiche indagini geotecniche); la modellazione geologica e geotecnica del pendio (rilievo plano-altimetrico esteso a monte e a valle, successione stratigrafica, pressioni interstiziali, superficie o superfici di scorrimento, numero minimo di verticali di indagine, modello geotecnico di sottosuolo del par. 6.2.2); la verifica di sicurezza con il coefficiente di sicurezza pari al rapporto fra la resistenza al taglio disponibile tau_f e la tensione di taglio agente tau lungo la superficie di scorrimento, impiegando i parametri geotecnici e le azioni al loro valore caratteristico (a differenza degli altri interventi geotecnici, per i pendii naturali NON si applicano i coefficienti parziali A1/A2, M ed R), con le verifiche lungo le superfici accertate per i pendii in frana o la ricerca della superficie critica a cui corrisponde il grado di sicurezza piu' basso negli altri casi, assumendo le condizioni piu' sfavorevoli per le pressioni interstiziali e con il margine di sicurezza accettabile giustificato dal progettista in base al livello di conoscenze, all'affidabilita' dei dati, al modello di calcolo e alle conseguenze di un'eventuale frana; gli interventi di stabilizzazione; e i controlli e il monitoraggio (spostamenti, pressioni interstiziali, soglie di attenzione e di allarme). NON calcola il coefficiente di sicurezza ne' esegue le verifiche (metodi dell'equilibrio limite o numerici), non definisce il modello geologico/geotecnico ne' progetta gli interventi, non tratta la stabilita' sismica (par. 7.11.3.5) ne' le opere in materiali sciolti e i fronti di scavo (par. 6.8), e non sostituisce il progettista o il geologo. Complementa le skill sulle opere di sostegno (par. 6.5), sui tiranti di ancoraggio (par. 6.6) e sulla relazione geologica e geotecnica.
default_prompt: |
  Devo inquadrare lo studio e la verifica di stabilita' di un pendio naturale secondo le NTC 2018 (par. 6.3):
  come si definisce il coefficiente di sicurezza (F = tau_f/tau) e con quali valori dei parametri e delle azioni
  (caratteristici, senza coefficienti parziali A1/A2/M/R)? Lungo quali superfici vanno eseguite le verifiche per
  un pendio in frana e per uno non in frana (ricerca della superficie critica)? Come vanno trattate le pressioni
  interstiziali e chi giustifica il margine di sicurezza? Cosa prevede il monitoraggio (soglie di attenzione e
  di allarme)? Cita i paragrafi.
