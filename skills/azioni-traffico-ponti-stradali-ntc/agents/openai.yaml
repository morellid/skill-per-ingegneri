display_name: "Azioni da traffico sui ponti stradali (NTC 2018 par. 5.1.3)"
short_description: Supporto documentale al progettista strutturale di ponti per l'inquadramento della definizione delle azioni da traffico (e delle altre azioni) sui ponti stradali secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 5.1.3. Aiuta a inquadrare la suddivisione della superficie carrabile in corsie convenzionali (Tab. 5.1.I: per larghezza w inferiore a 5,40 m una corsia da 3,00 m, per w fra 5,4 e 6,0 m due corsie da w mezzi, per w da 6,0 m in su un numero di corsie pari alla parte intera di w diviso 3, ciascuna da 3,00 m); gli Schemi di Carico da 1 a 5 (Schema 1 tandem a due assi piu' carico distribuito per verifiche globali e locali, Schema 2 asse singolo, Schemi 3 e 4 carichi isolati sui marciapiedi, Schema 5 folla compatta 5,0 kN/m quadro con valore di combinazione 2,5 kN/m quadro) e gli Schemi 6.a/b/c per luci oltre 300 m; le intensita' Qik e qik per corsia (Tab. 5.1.II: corsia 1 con 300 kN e 9,00 kN/m quadro, corsia 2 con 200 kN e 2,50, corsia 3 con 100 kN e 2,50, altre corsie 0 e 2,50); le categorie stradali (ponti a carichi interi e ponti pedonali con il solo Schema 5); l'azione di frenamento q3 pari a 0,6 per 2 Q1k piu' 0,10 q1k w1 L, compresa fra 180 e 900 kN; la forza centrifuga q4 in funzione del raggio (Tab. 5.1.III); le altre azioni (neve e vento q5, temperatura q7, urto e parapetti q8 con parapetti alti almeno 1,10 m e azione orizzontale 1,5 kN/m); e i gruppi di azioni e i coefficienti parziali e di combinazione (Tab. 5.1.IV, 5.1.V, 5.1.VI). NON calcola le sollecitazioni ne' esegue le verifiche, non individua la disposizione piu' gravosa dei carichi mobili, non dimensiona l'impalcato, non riproduce le figure (Fig. 5.1.1/5.1.2/5.1.3), non tratta i ponti ferroviari (paragrafo 5.2), la fatica (paragrafo 5.1.4) ne' la progettazione sismica dei ponti (paragrafo 7.9), e non sostituisce il progettista strutturale. Apre la famiglia dei ponti (Capitolo 5) delle skill NTC.
default_prompt: |
  Devo definire le azioni da traffico per il progetto di un ponte stradale secondo le NTC 2018 (par. 5.1.3):
  data la larghezza della superficie carrabile, quante corsie convenzionali considero e con quale larghezza
  (Tab. 5.1.I)? Quali Schemi di Carico applico e quali intensita' Qik/qik assegno a ciascuna corsia (Tab.
  5.1.II)? Come determino l'azione di frenamento q3 e la forza centrifuga q4? Cita i paragrafi e le formule.
