# Fonte normativa per l'inquadramento delle azioni da traffico (e delle altre
# azioni) sui ponti stradali ai sensi delle NTC 2018 (DM 17/01/2018), par. 5.1.
# La skill non riproduce le figure (Fig. 5.1.1/5.1.2/5.1.3) che definiscono la
# geometria degli Schemi di Carico e delle impronte: rinvia al testo/EC1.

sources:
  - id: ntc2018-par-5-1
    title: "Decreto Ministeriale 17 gennaio 2018 - Aggiornamento delle Norme tecniche per le costruzioni (NTC 2018) - par. 5.1 Ponti stradali"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/gu/2018/02/20/42/so/8/sg/pdf
    accessed: 2026-07-20
    sha256: dda1e397d56d71aa0f5bc457c3ba9b77064a468699dfc37bd056ac6c47105a46
