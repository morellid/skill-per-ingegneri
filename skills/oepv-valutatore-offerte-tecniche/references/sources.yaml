schema_version: 1
skill: oepv-valutatore-offerte-tecniche
last_verified: 2026-05-10

# Fonti normative per la skill di supporto alla valutazione OEPV (offerta economicamente
# piu' vantaggiosa) nelle procedure di appalto pubblico ai sensi del D.Lgs. 36/2023.
#
# Struttura normativa di riferimento:
# - Art. 107-108 D.Lgs. 36/2023: principi e criteri di aggiudicazione OEPV
# - Art. 93 D.Lgs. 36/2023: commissione giudicatrice
# - ANAC Linea Guida n. 2 (Delibera n. 424/2018): metodologia valutazione
#   (non vincolante sotto D.Lgs. 36/2023, ma ancora di riferimento operativo)
#
# NOTA: l'issue originale (#5) citava "Allegato II.4 D.Lgs 36/2023" per la
# "matrice criteri/sottocriteri OEPV". Questo riferimento e' errato:
# l'Allegato II.4 del D.Lgs. 36/2023 riguarda la "Qualificazione delle stazioni
# appaltanti e delle centrali di committenza", non la valutazione delle offerte.
# La normativa corretta per OEPV e' l'art. 108 D.Lgs. 36/2023.

sources:
  - id: dlgs-36-2023-originale-gu-2023
    title: "D.Lgs. 31 marzo 2023 n. 36 - Codice dei contratti pubblici - GU n. 87 del 13/04/2023 Suppl. Ordinario n. 14"
    type: decreto-legislativo
    url: https://www.gazzettaufficiale.it/eli/gu/2023/04/13/87/so/14/sg/pdf
    accessed: 2026-05-10
    sha256: b139f0515a8aa018a25b7a31acce39fc39329cdc07aedd17e870dd9dc91025ff
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-36-2023-gu87-so14.pdf
    md_path: references/fonti/dlgs-36-2023-artt93-107-108.md
    excerpt_paths:
      - references/estratti/dlgs-36-art93.md
      - references/estratti/dlgs-36-art107-108.md
    notes: |
      Codice dei contratti pubblici, in vigore dal 1 aprile 2023, efficace dal
      1 luglio 2023. PDF scaricato dalla GU il 2026-05-10, SHA256 calcolato.
      Testo verbatim di art. 93, 107 e 108 trascritto in references/fonti/.
      Per questa skill rilevano:
      - Art. 93: composizione, requisiti e incompatibilita' della commissione (7 commi)
      - Art. 107: principi generali di selezione (3 commi) - NON contiene criteri OEPV
      - Art. 108: criteri di aggiudicazione (OEPV obbligatorio co.2, limiti punteggio
        economico 10%/30% co.4, bonus parita' di genere co.7, criterio collegato
        all'oggetto co.6, divieto punti per opere extra co.11)
      Il D.Lgs. 36/2023 NON ha un allegato specifico per le formule di valutazione
      OEPV. La metodologia di calcolo e' delegata agli atti di gara e alla prassi.

