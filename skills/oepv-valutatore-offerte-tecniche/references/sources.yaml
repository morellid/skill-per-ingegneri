  - id: anac-linea-guida-n2-delibera-424-2018
    title: "ANAC - Linee guida n. 2 - Offerta economicamente piu' vantaggiosa - Delibera n. 424 del 2 maggio 2018"
    type: linea-guida-anac
    url: https://www.anticorruzione.it/documents/91439/221cee7f-adba-5368-6d25-69fd2884aa91
    accessed: 2026-05-10
    sha256: 719e06f3ec3ce5b36d1f606adaa874377438a83f92fc2e47bf9c6dde7c93d1f8
    license: public-domain-italian-law
    binary_path: not_in_repo/anac-lg-n2-delibera-424-2018.pdf
    md_path: references/fonti/anac-lg-n2-delibera-424-2018.md
    excerpt_paths:
      - references/estratti/anac-lg-n2-metodologia-oepv.md
    notes: |
      Linee guida ANAC n. 2 aggiornate con delibera n. 424 del 2/5/2018.
      PDF scaricato il 2026-05-10, SHA256 calcolato. Testo verbatim trascritto
      in references/fonti/anac-lg-n2-delibera-424-2018.md (Sezioni III, IV, V, VI.1).
      STATO NORMATIVO: vincolanti sotto D.Lgs. 50/2016 (vecchio codice).
      Sotto D.Lgs. 36/2023 (nuovo codice, efficace 1/7/2023) non sono state
      rinnovate ne' formalmente ritirate per la materia OEPV. La prassi nei
      disciplinari di gara e la giurisprudenza TAR/CdS continuano a fare
      riferimento alla metodologia aggregativo-compensatore e al riproporzionamento
      descritti in queste linee guida. Usare come riferimento metodologico di
      prassi, non come fonte vincolante. In caso di contrasto con art. 108
      D.Lgs. 36/2023, il decreto prevale.

  - id: dlgs-198-2006-art46bis
    title: "D.Lgs. 11 aprile 2006 n. 198 - Codice delle pari opportunita' - art. 46-bis (certificazione parita' di genere)"
    type: rinvio-normativo
    url: https://www.normattiva.it/uri-res/N2Ls?urn:nir:stato:decreto.legislativo:2006-04-11;198
    accessed: 2026-05-02
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Richiamato dall'art. 108 co. 7 D.Lgs. 36/2023 per il bonus parita' di genere.
      Art. 46-bis definisce la certificazione della parita' di genere (UNI/PdR 125:2022
      o equivalente). La stazione appaltante deve assegnare il "maggiore punteggio
      possibile" alle imprese certificate. Il riferimento e' rinvio strutturale: la
      skill segnala l'obbligo ma non valuta la certificazione specifica.

  - id: anac-bando-tipo-n2-2026-del-153-2026
    title: "ANAC - Bando tipo n. 2/2026 - Schema disciplinare servizi di ingegneria e architettura (SIA) sopra soglia OEPV - Delibera n. 153 del 15 aprile 2026"
    type: schema-anac
    url: https://www.anticorruzione.it/documents/91439/396430602/Bando+tipo+n.+2-2026+-+del.153-15.04.2026.pdf/9806c83d-1aee-fc3a-9ef0-e6b0d22fbec2?t=1777986989937
    accessed: 2026-05-18
    sha256: 3c39962bc041200fc03a2cc20c727c42b22e096e999cc9dcb3ccd28f786c2b49
    license: public-domain-italian-law
    binary_path: not_in_repo/anac-bando-tipo-n2-2026-del-153-2026.pdf
    md_path: references/fonti/anac-bando-tipo-n2-2026-del-153-2026.md
    excerpt_paths:
      - references/estratti/anac-bando-tipo-n2-2026-sia-oepv-bim.md
    notes: |
      Bando tipo n. 2/2026 - nuovo schema specifico per Servizi di Ingegneria e Architettura (SIA).
      61 pagine. Approvato con Delibera ANAC n. 153 del 15 aprile 2026.
      Procedura aperta per servizi di architettura e ingegneria sopra soglia europea (art. 14 D.Lgs. 36/2023),
      criterio offerta economicamente piu' vantaggiosa (miglior rapporto qualita'/prezzo).
      Pubblicato in GU Serie Generale n. 111 del 15 maggio 2026. Efficace dal 30 maggio 2026.
      PDF scaricato il 2026-05-18, SHA256 calcolato sul file (coincide con SHA256 verificato in
      skill bandi-tipo-anac-checker, da cui e' stata copiata la fonte MD gia' letta e convertita).
      URL pagina portale: https://www.anticorruzione.it/-/bando.tipo.n.2.2026
      RILEVANZA per questa skill (oepv-valutatore-offerte-tecniche):
      - Para. 18: schema OEPV codificato per SIA (criteri A-professionalita', B-metodologia, CAM, BIM);
        tetto massimo 30% punteggio economico (art. 41 c. 15-bis lett. b Codice);
        formula non lineare per ribasso economico (18.3).
      - Para. 6.1 lett. h-k: BIM come requisito speciale obbligatorio per procedure con BIM obbligatorio
        (soglia 2M euro lavori o beni culturali); figure UNI 11337-7 (BIM Manager, Coordinator,
        Specialist, CDE Manager); certificazione UNI 11337-7 valorizzabile come criterio premiale OEPV.
      - Para. 15.1: clausola AI obbligatoria nella versione "servizi intellettuali" (art. 13 L. 132/2025);
        la commissione verifica la coerenza tra dichiarazione in domanda e indicazione in offerta tecnica.
      - Para. 16: in offerta tecnica obbligo di indicare attivita' strumentali svolte con AI.

