    notes: |
      Codice redazionale 005G0104. Pagina indice Normattiva pinnata a !vig=2026-07-17 (hash
      stabile, doppio download: a54022ef...; stesso indice usato dalla skill
      documento-informatico-firme-cad). Articoli caricati via AJAX (caricaArticolo,
      flagTipoArticolo 0, idGruppo 2, dataPubblicazioneGazzetta 2005-05-16) e trascritti
      verbatim in references/fonti/dlgs-82-2005-domicilio-digitale.md: art. 3-bis "Identita'
      digitale e Domicilio digitale" (idSottoArticolo 2, versione 12: obbligo per PA/
      professionisti/imprese di dotarsi di domicilio digitale in INI-PEC o IPA c. 1; facolta'
      di elezione in INAD c. 1-bis; domicilio digitale speciale c. 4-quinquies), art. 6
      "Utilizzo del domicilio digitale" (idSottoArticolo 1, versione 5: le comunicazioni ai
      domicili digitali producono gli effetti della raccomandata A/R ed equivalgono alla
      notificazione a mezzo posta c. 1; notifica diretta degli atti c. 1-quater), art. 6-bis
      "INI-PEC" (idSottoArticolo 2, versione 4: indice imprese/professionisti presso il MISE/
      MIMIT, mezzo esclusivo di comunicazione), art. 6-ter "IPA" (idSottoArticolo 3, versione
      4: indice PA/gestori di pubblici servizi/societa' a controllo pubblico, gestito da AgID),
      art. 6-quater "INAD" (idSottoArticolo 4, versione 5: indice persone fisiche/professionisti/
      altri enti non obbligati, gestito da AgID). Il testo tra doppi tondi (( )) e le note di
      abrogazione/aggiornamento sono riportati come da fonte; le note esplicative lunghe degli
      AGGIORNAMENTI (21, 28) dell'art. 3-bis sono abbreviate con l'indicazione esplicita [...].
      LIMITE DI RESA: la skill inquadra gli istituti e i tre indici; NON elegge/registra il
      domicilio digitale, NON effettua notifiche, NON riproduce le Linee guida AgID attuative
      ne' i decreti (es. DM MISE 19/3/2013 per INI-PEC); gli artt. 2, 18-bis, 22, 23-bis, 62
      (ANPR), 64/64-bis (identita' digitale, SPID/CIE, punto di accesso) sono citati come rinvio.
