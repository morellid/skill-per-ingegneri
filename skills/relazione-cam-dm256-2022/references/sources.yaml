    title: "DM 23 giugno 2022 n. 256 - Criteri ambientali minimi per l'affidamento del servizio di progettazione di interventi edilizi, e per l'affidamento di lavori per la nuova costruzione, ristrutturazione e manutenzione di edifici pubblici (GU n. 183 del 06/08/2022)"
    type: decreto-ministeriale
    url: https://www.gazzettaufficiale.it/eli/id/2022/08/06/22A04478/SG
    accessed: 2026-05-01
    sha256: null
