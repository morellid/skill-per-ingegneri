    notes: |
      AVVISO: il download diretto dalla URL della GU restituisce una pagina HTML,
      non un PDF valido. Il testo del decreto (articoli 1-3) e' estratto nella
      relativa excerpt_path. Per il testo integrale dell'Allegato (criteri CAM)
      usare la source dm-256-2022-allegato (binary_path: not_in_repo/dm-256-2022-allegato.pdf).
      In vigore dal 4 dicembre 2022 (centoventi giorni dalla GU del 6/8/2022, Art. 3).
      Sostituisce il DM 11/10/2017 (CAM edilizia precedenti), abrogato dalla stessa data.
      Art. 1: ambito applicativo (servizi di progettazione, lavori, affidamento congiunto).
      Art. 2: definizioni (rinvia a T.U. edilizia DPR 380/2001 per le tipologie di intervento;
              definisce SRI - Solar Reflectance Index).
      Art. 3: abrogazioni e norme finali (centoventi giorni dalla GU).

