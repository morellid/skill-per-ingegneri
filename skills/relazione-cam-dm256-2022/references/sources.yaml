# Fonti normative principali per la skill di redazione/verifica della
# Relazione Tecnica dei Requisiti Ambientali CAM (DM 23/06/2022 n. 256).
#
# Architettura normativa:
#   - DM 23/06/2022 n. 256 (decreto principale): ambito applicativo (Art. 1),
#     definizioni (Art. 2), abrogazioni e norme finali (Art. 3).
#     In vigore dal 4 dicembre 2022 (centoventi giorni dalla GU 6/8/2022).
#   - Allegato DM 256/2022: testo integrale dei criteri CAM (base + premianti)
#     Sezione 2: Criteri per l'affidamento del SERVIZIO DI PROGETTAZIONE
#       - 2.1 Selezione dei candidati
#       - 2.2 Clausole contrattuali (2.2.1 Relazione CAM)
#       - 2.3-2.6 Specifiche tecniche obbligatorie (oggetto della Relazione CAM)
#       - 2.7 Criteri premianti (OEPV)
#     Sezione 3: Criteri per l'affidamento dei LAVORI PER INTERVENTI EDILIZI
#       - 3.1 Clausole contrattuali obbligatorie
#       - 3.2 Criteri premianti (OEPV)
#     Sezione 4: Criteri per l'affidamento CONGIUNTO progettazione e lavori
#       - 4.1 Specifiche tecniche (rinvia a 2.3-2.6)
#       - 4.2 Clausole contrattuali (rinvia a 3.1)
#       - 4.3 Criteri premianti (rinvia a 2.7 e 3.2, piu' 4.3.1-4.3.8)
#   - D.Lgs. 36/2023 art. 57: obbligo di applicazione dei CAM negli appalti PA
#
# Nota: il DM 256/2022 ha sostituito il precedente DM 11/10/2017 (CAM edilizia).
# Verificare last_verified prima di applicare su una gara reale: il Ministero
# dell'Ambiente aggiorna i CAM periodicamente.

