# Fonte normativa per l'inquadramento delle costruzioni con isolamento sismico
# (scopo e strategie, requisiti, dispositivi, indicazioni progettuali,
# modellazione e analisi, verifiche SLE/SLV/SLC) secondo le NTC 2018 (DM
# 17/01/2018), par. 7.10. La skill inquadra il framework; non esegue l'analisi
# ne' progetta i dispositivi, e non riproduce le prescrizioni del par. 11.9.

