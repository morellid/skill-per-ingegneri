display_name: "Costruzioni con isolamento sismico (NTC 2018 par. 7.10)"
short_description: Supporto documentale al progettista strutturale per l'inquadramento delle costruzioni con isolamento e/o dissipazione sismica secondo le NTC 2018 (D.M. 17 gennaio 2018), paragrafo 7.10. Aiuta a inquadrare lo scopo e le strategie dell'isolamento alla base (allungare il periodo fondamentale per portarlo nel campo delle minori accelerazioni, oppure limitare la massima forza orizzontale, con eventuale dissipazione di energia); i requisiti generali (sovrastruttura e sottostruttura in campo sostanzialmente elastico, con i particolari costruttivi delle costruzioni con accelerazione al suolo agS non superiore a 0,075g; affidabilita' superiore del sistema; dispositivi conformi al par. 11.9); le indicazioni progettuali (ispezionabilita' e sostituibilita', ricentraggio, carico verticale sul singolo isolatore di compressione o al piu' nullo con trazione inferiore al minore tra due volte il modulo di taglio e 1 MPa negli elastomerici, diaframma rigido sopra e sotto, spazio libero attorno); la modellazione e l'analisi (sovrastruttura e sottostruttura elastiche lineari, sistema di isolamento visco-elastico lineare o non lineare, deformabilita' verticale se il rapporto tra rigidezza verticale e orizzontale equivalente e' inferiore a 800, condizioni del modello lineare equivalente, esclusione dell'analisi statica non lineare, analisi statica lineare con periodo equivalente compreso tra tre volte il periodo a base fissa e 3 secondi); e le verifiche SLD (spostamenti d'interpiano inferiori ai due terzi dei limiti del par. 7.3.6.1), SLV (fattore di comportamento non superiore a 1,50 per gli edifici e pari a 1 per i ponti, coefficiente di sicurezza almeno 1,5 per le parti non dissipative) e SLC (dispositivi che sostengono senza rotture gli spostamenti allo SLC). NON esegue l'analisi o le verifiche, non progetta o qualifica i dispositivi (par. 11.9) e non sostituisce il progettista. Complementa le skill su spettro di risposta, combinazione delle componenti sismiche, fattore di comportamento e spostamenti di interpiano.
default_prompt: |
  Devo impostare il progetto di un edificio con isolamento sismico alla base secondo le NTC 2018 (par. 7.10):
  quali strategie di isolamento posso adottare e quali requisiti devono rispettare sovrastruttura e sottostruttura
  (campo elastico, agS <= 0,075g)? A quali condizioni posso usare un modello lineare equivalente e l'analisi
  statica lineare (Tis tra 3 volte il periodo a base fissa e 3 s, KV >= 800 Kesi, no push-over)? Come imposto le
  verifiche allo SLD (interpiano < 2/3 dei limiti del par. 7.3.6.1), allo SLV (q <= 1,50 per gli edifici) e allo
  SLC dei dispositivi? Cita i paragrafi.
