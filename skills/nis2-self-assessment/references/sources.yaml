      = 31 luglio 2027; art. 1 co. 2 - obbligo notifica incidenti
      significativi (Allegati 3 e 4 Det. 379907/2025) decorre dal
      1 gennaio 2027; art. 1 co. 3 - per i soggetti gia' inseriti nel
      2025 restano fermi i termini ordinari dell'art. 3 Det. 379907/2025
      (18 mesi misure / 9 mesi notifica dalla comunicazione di
      inserimento); art. 2 - termini analoghi per gestori TLD/registrar
      ai sensi art. 29 D.Lgs. 138/2024 (entro 31/07/2027).

  - id: acn-det-155238-2026
    title: "Agenzia per la Cybersicurezza Nazionale - Determinazione n. 155238 del 20 aprile 2026 - Modello per la categorizzazione delle attivita' e dei servizi dei soggetti NIS (art. 40 co. 5 lett. i D.Lgs. 138/2024)"
    type: determinazione
    url: https://www.acn.gov.it/portale/documents/d/guest/detacn_categorizzazione_260409-v8_signed
    download_url: https://www.acn.gov.it/portale/documents/d/guest/detacn_categorizzazione_260409-v8_signed
    accessed: 2026-07-11
    sha256: 7db5fd25e9020f68a8417eed2035d9cfa89f4a7f2b5b97b2ed978392c2dc4d2d
    license: public-domain-italian-law
    binary_path: not_in_repo/acn-det-155238-2026.pdf
    md_path: references/fonti/acn-det-155238-2026.md
    excerpt_paths:
      - references/estratti/acn-det-155238-2026-categorizzazione.md
    notes: |
      Determinazione firmata digitalmente dal Direttore Generale ACN
      Bruno Frattasi il 13/04/2026 (protocollo n. 155238 del 20/04/2026),
      adottata ai sensi dell'art. 30 co. 2 D.Lgs. 138/2024 secondo le
      modalita' dell'art. 40 co. 5, sentito il Tavolo NIS nella riunione
      del 09/04/2026. Si applica dal 01/05/2026 (art. 8 co. 2). PDF di 4
      pagine, 8 articoli. Adotta il modello di categorizzazione (allegati
      1 e 2): 10 macro-aree con denominazione, descrizione e categoria di
      rilevanza pre-assegnata; 4 categorie di rilevanza (impatto alto,
      medio, basso, minimo) (art. 2). Allegato 1 per i soggetti delle
      tipologie nn. 1, 2, 5, 6, 7, 10 all. I, nn. 1-5 all. II e n. 1
      all. IV del decreto NIS; allegato 2 per tutti gli altri (art. 2
      co. 2-3). Art. 3: elencazione e categorizzazione di tutte le
      attivita'/servizi via piattaforma digitale; deroga alla categoria
      pre-assegnata ammessa con valutazione d'impatto documentata e
      conservata (co. 3). Art. 4: chi ha classificato dati/servizi ex
      art. 3 DD ACN 21007/24 (Regolamento Cloud PA) usa quel modello.
      Art. 5: attivita'/servizi con obblighi PSNC (DL 105/2019) =
      impatto alto, fuori dall'art. 3.

