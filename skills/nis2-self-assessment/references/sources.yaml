  - id: acn-det-164179-2025-allegato2
    title: "ACN - Determinazione 164179/2025 - Allegato 2 - Misure di sicurezza di base per i soggetti essenziali (versione superata)"
    type: determinazione
    url: https://www.acn.gov.it/portale/documents/d/guest/detacn_nis_specifiche_2025_164179_allegato2
