    binary_path: not_in_repo/acn-allegato-4-v2.pdf
    excerpt_paths:
      - references/estratti/acn-incidenti-significativi.md
    notes: |
      Incidenti significativi di base per soggetti essenziali. Quattro
      codici: IS-1 (perdita riservatezza), IS-2 (perdita integrita' con
      impatto esterno), IS-3 (violazione SLA misura DE.CM-01), IS-4
      (accesso non autorizzato o abuso privilegi a dati - non presente
      per gli importanti). Definizioni qualitative; soglie quale-
      quantitative definite dal soggetto ai sensi della misura DE.CM-01
      (Allegato 2).

