    notes: |
      Incidenti significativi di base per soggetti importanti. Tre
      codici: IS-1 (perdita di riservatezza esterna), IS-2 (perdita di
      integrita' con impatto esterno), IS-3 (violazione SLA stabiliti
      ai sensi misura DE.CM-01). Definizioni qualitative; le soglie
      quale-quantitative sono definite dal soggetto stesso ai sensi
      della misura DE.CM-01 (Allegato 1). Per gli operatori telco si
      applicano in aggiunta le soglie nazionali di cui all'art. 6 co. 2
      della determinazione (durata + percentuale utenti).

