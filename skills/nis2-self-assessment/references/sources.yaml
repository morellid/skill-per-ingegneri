      - references/estratti/acn-det-155238-2026-categorizzazione.md
    notes: |
      Determinazione adottata dal Direttore Generale ACN Bruno Frattasi
      il 13/04/2026 ai sensi dell'art. 7 co. 6 e art. 40 co. 5 lett. b)
      D.Lgs. 138/2024. Aggiorna e sostituisce la Det. ACN 379887/2025
      (art. 24 co. 1). Si applica dal 15/04/2026; Capo V (categorizzazione
      attivita' e servizi) differito al 01/05/2026 (art. 24 co. 3). 24
      articoli + 6 capi: I Definizioni e disposizioni generali (artt. 1-7),
      II Censimento e associazione utenze (artt. 8-10), III Registrazione
      ed elaborazione elenco (artt. 11-15), IV Aggiornamento informazioni
      (artt. 16-19), V Elencazione e categorizzazione attivita' e servizi
      (artt. 20-21), VI Disposizioni finali (artt. 22-24). Articoli chiave
      per la skill: art. 1 lett. ll) - definizione "fornitori rilevanti NIS"
      (2 criteri alternativi); art. 16 co. 1 - finestra aggiornamento
      annuale 15 aprile - 31 maggio; art. 16 co. 3 lett. g) - elenco
      fornitori rilevanti come parte dell'aggiornamento annuale; art. 18 -
      5 informazioni richieste per fornitore (denominazione, CF, Paese,
      codici CPV Reg. CE 2195/2002, criterio di rilevanza). Esenzione
      DORA (art. 16 co. 13) NON copre l'obbligo fornitori rilevanti.

