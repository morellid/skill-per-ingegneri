# Fonti secondarie da catalogare in iterazioni successive
secondary_sources_to_evaluate:
  - id: enisa-tech-guidance-2024-2690
    title: "ENISA - Technical implementation guidance on the cybersecurity risk-management measures of Regulation (EU) 2024/2690"
    url: https://www.enisa.europa.eu/
    notes: |
      Linee guida tecniche ENISA sul Reg. UE 2024/2690. Non catalogate
      in v0.1.0-alpha: la skill cita ENISA solo come rinvio strutturale
      per i soggetti coperti dal Reg. UE 2024/2690 (cloud, DNS, data
      center, ecc.). Da catalogare con SHA256 e estratti dedicati quando
      la skill estende l'analisi oltre l'ambito ACN italiano.

  - id: framework-nazionale-cybersecurity-2025
    title: "Framework Nazionale per la Cybersecurity e la Data Protection (FNCS) - edizione 2025"
    url: https://www.cybersecurityframework.it/
    notes: |
      Framework di riferimento usato dalla Determinazione ACN 379907/2025
      per strutturare le misure di base. Tassonomia funzioni/categorie/
      sottocategorie/requisiti. Realizzato dal Centro di ricerca CIS
      Sapienza + Cybersecurity National Lab CINI in collaborazione con
      ACN (cfr. premesse Det. 379907/2025). Non e' una norma in senso
      stretto ma l'ACN lo richiama come riferimento operativo. Da
      catalogare in iterazioni successive se la skill amplia il dettaglio
      dei requisiti del Framework.

  - id: legge-90-2024-cybersicurezza
    title: "Legge 28 giugno 2024, n. 90 - Disposizioni in materia di rafforzamento della cybersicurezza nazionale"
    url: https://www.gazzettaufficiale.it/eli/id/2024/07/02/24G00108/sg
    notes: |
      Legge che precede di pochi mesi il D.Lgs. 138/2024 e introduce
      obblighi cyber per la PA e operatori di servizi essenziali, oltre
      a inasprire reati informatici nel codice penale. Sovrapposizione
      parziale con NIS2 per gli ambiti PA. Non riferimento principale
      della skill, ma da cross-checkare per soggetti pubblici.

  - id: racc-2003-361-ce-pmi
    title: "Raccomandazione 2003/361/CE della Commissione del 6 maggio 2003 relativa alla definizione delle microimprese, piccole e medie imprese - Allegato"
    url: https://eur-lex.europa.eu/legal-content/IT/TXT/?uri=CELEX:32003H0361
    notes: |
      Definizioni dimensionali richiamate dall'art. 3 co. 2 e dall'art.
      6 co. 1 lett. a) D.Lgs. 138/2024. Art. 2 par. 1 dell'Allegato:
      media impresa = meno di 250 occupati e (fatturato annuo non
      superiore a 50M EUR oppure totale di bilancio annuo non superiore
      a 43M EUR). Art. 2 par. 2: piccola impresa = meno di 50 occupati
      e (fatturato O bilancio annuo non superiori a 10M EUR). Art. 6
      par. 2: regole per imprese collegate/associate. Art. 3 par. 4:
      escluso dall'ambito NIS via art. 3 co. 3 D.Lgs. 138/2024. La
      definizione e' stabile nel tempo; cataloghiamo solo se la skill
      affronta casi complessi di imprese collegate.
