  - id: acn-modello-categorizzazione-guida
    title: "ACN - Linee guida NIS - Modello di categorizzazione - Guida alla lettura"
    type: linea-guida
    url: https://www.acn.gov.it/portale/documents/d/guest/modello-di-categorizzazione-nis-guida-alla-lettura
    accessed: 2026-07-11
    sha256: c2ccc470a07ce0bd01f94276667f18e82a79de13bd498d5861b5a8f1ba72bd1b
    license: public-domain-italian-law
    binary_path: not_in_repo/acn-modello-categorizzazione-guida.pdf
    md_path: references/fonti/acn-modello-categorizzazione-guida.md
    excerpt_paths:
      - references/estratti/acn-det-155238-2026-categorizzazione.md
    notes: |
      "Linee Guida NIS - Modello di categorizzazione - Guida alla
      lettura", versione 1.0, aprile 2026. PDF con copertina + pagine
      numerate 1-13. Documento esplicativo (non normativo) della Det.
      155238/2026. Contenuti chiave: processo facoltativo in 3 fasi
      (identificazione attivita'/servizi; mappatura in macro-aree, una
      sola macro-area per attivita'; attribuzione categoria di
      rilevanza); metodologie top-down/bottom-up/combinata; granularita'
      (al piu' un numero di attivita'/servizi per macro-area pari al
      numero di categorie di rilevanza); l'attribuzione e' una Business
      Impact Analysis (BIA) semplificata sulle tre dimensioni della
      sicurezza informatica (riservatezza, integrita', disponibilita',
      esplicitate in Appendice B); finalita' = misure di sicurezza a
      lungo termine differenziate per categoria (art. 31 co. 2 lett. a
      decreto NIS); coordinamento PA/Regolamento Cloud (classi ordinari/
      critici/strategici); Appendice B con motivazioni delle
      pre-assegnazioni e 5 criteri di attribuzione.

