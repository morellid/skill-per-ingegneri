  - id: dlgs-138-2024
    title: "Decreto Legislativo 4 settembre 2024, n. 138 - Recepimento della direttiva (UE) 2022/2555 (NIS 2) relativa a misure per un livello comune elevato di cibersicurezza nell'Unione"
    type: decreto
    url: https://www.gazzettaufficiale.it/eli/gu/2024/10/01/230/sg/pdf
    accessed: 2026-04-29
    sha256: 056dfbb1ddd34c163585250ae5631270ed8d27ce16ac5b30576cff4e88169e36
    license: public-domain-italian-law
    binary_path: not_in_repo/dlgs-138-2024.pdf
    md_path: references/fonti/dlgs-138-2024.md
    excerpt_paths:
      - references/estratti/dlgs-138-2024-perimetro.md
      - references/estratti/dlgs-138-2024-misure-art23.md
      - references/estratti/dlgs-138-2024-incident-art25.md
      - references/estratti/dlgs-138-2024-sanzioni-art38.md
      - references/estratti/dlgs-138-2024-allegati-i-iv.md
    notes: |
      Pubblicato in GU Serie Generale n. 230 del 01/10/2024, in vigore dal
      16/10/2024. Abroga il D.Lgs. 65/2018 (recepimento NIS originale).
      Riferimento normativo principale: art. 2 (definizioni), art. 3
      (ambito di applicazione), art. 5 (giurisdizione), art. 6 (perimetro
      essenziali/importanti), art. 7 (identificazione/elencazione e
      registrazione piattaforma ACN), art. 23 (organi di amministrazione
      e direttivi), art. 24 (obblighi misure di gestione del rischio),
      art. 25 (notifica incidenti significativi), art. 38 (sanzioni
      amministrative). Allegati I e II = settori (alta criticita' /
      altri critici); III = PA; IV = ulteriori tipologie di soggetti.

