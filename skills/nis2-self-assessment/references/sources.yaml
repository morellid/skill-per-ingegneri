      Cybersecurity 2025, 18 categorie, ~ 35 sottocategorie. PDF di 16
      pagine. La struttura per funzioni/categorie e' coerente con la
      379907/2025 ma il dettaglio dei requisiti e il numero di
      sottocategorie e' aumentato nella nuova versione.

  - id: dl-105-2019-psnc
    title: "Decreto-Legge 21 settembre 2019, n. 105, convertito con modificazioni dalla legge 18 novembre 2019, n. 133 - Disposizioni urgenti in materia di Perimetro di sicurezza nazionale cibernetica (PSNC)"
    type: decreto
    url: https://www.normattiva.it/uri-res/N2Ls?urn%3Anir%3Astato%3Adecreto.legge%3A2019-09-21%3B105
    accessed: 2026-04-29
    sha256: null
    license: public-domain-italian-law
    binary_path: null
    excerpt_paths: []
    notes: |
      Istituisce il Perimetro di Sicurezza Nazionale Cibernetica.
      Rilevante per la skill solo per coordinamento notifiche: l'art. 1
      co. 8 del DL 105/2019, come modificato dall'art. 44 D.Lgs. 138/2024,
      stabilisce che "La notifica d'incidente ai sensi del comma 3,
      lettera a), effettuata dai soggetti inclusi nel perimetro di
      sicurezza nazionale cibernetica che rientrano nell'ambito di
      applicazione del decreto legislativo di recepimento della direttiva
      (UE) 2022/2555 assolve agli obblighi in materia di notifica di
      incidente di cui all'articolo 25 del decreto legislativo medesimo".
      Citazione tramite art. 44 D.Lgs. 138/2024 (gia' nel PDF principale).
      Per i sistemi non PSNC dei soggetti dual (PSNC + non NIS) si
      applicano le disposizioni del Capo IV NIS2 ex art. 1 co. 8-bis.
      Catalogato senza binario: l'affermazione di assolvenza e' tracciabile
      gia' al testo del D.Lgs. 138/2024 (estratto in `dlgs-138-2024-incident-art25.md`).

