    binary_path: not_in_repo/acn-allegato-1-v2.pdf
    excerpt_paths:
      - references/estratti/acn-misure-base-importanti.md
    notes: |
      Misure per soggetti importanti, organizzate secondo il Framework
      Nazionale Cybersecurity ed. 2025 in 6 funzioni (GOVERN, IDENTIFY,
      PROTECT, DETECT, RESPOND, RECOVER), categorie, sottocategorie e
      requisiti operativi. Conteggio dal PDF: 37 sottocategorie con 87
      requisiti operativi puntuali.

  - id: acn-det-379907-allegato-2
    title: "ACN - Determinazione 379907/2025 - Allegato 2 - Misure di sicurezza di base per i soggetti essenziali"
    type: determinazione
    url: https://www.acn.gov.it/portale/documents/d/guest/allegato-2-v2
    accessed: 2026-04-29
    sha256: c8466e38fe5347bb0a6f612b6f15c9b4dbdb4ee4a8ee56a8652ab0134ac3fb2b
    license: public-domain-italian-law
    binary_path: not_in_repo/acn-allegato-2-v2.pdf
    excerpt_paths:
      - references/estratti/acn-misure-base-essenziali.md
    notes: |
      Misure per soggetti essenziali, organizzate secondo il Framework
      Nazionale Cybersecurity ed. 2025 in 6 funzioni, categorie,
      sottocategorie e requisiti. Conteggio diretto dal PDF: 43
      sottocategorie con 112 requisiti operativi puntuali numerati.
      Differenze rispetto a conteggi di fonti secondarie non
      verificate (es. "116 requisiti") non sono ulteriormente
      indagate in questa alpha.

  - id: acn-det-379907-allegato-3
    title: "ACN - Determinazione 379907/2025 - Allegato 3 - Incidenti significativi di base per i soggetti importanti"
    type: determinazione
    url: https://www.acn.gov.it/portale/documents/d/guest/allegato-3-v2
    accessed: 2026-04-29
    sha256: d05b0038c68c5565edc22b3f6c9337d13ea81b7872c9487d584c030b80c8a8ca
    license: public-domain-italian-law
    binary_path: not_in_repo/acn-allegato-3-v2.pdf
    excerpt_paths:
      - references/estratti/acn-incidenti-significativi.md
    notes: |
      Incidenti significativi di base per soggetti importanti. Tre
      codici: IS-1 (perdita di riservatezza esterna), IS-2 (perdita di
      integrita' con impatto esterno), IS-3 (violazione SLA stabiliti
      ai sensi misura DE.CM-01). Definizioni qualitative; le soglie
      quale-quantitative sono definite dal soggetto stesso ai sensi
      della misura DE.CM-01 (Allegato 1). Per gli operatori telco si
      applicano in aggiunta le soglie nazionali di cui all'art. 6 co. 2
      della determinazione (durata + percentuale utenti).

  - id: acn-det-379907-allegato-4
    title: "ACN - Determinazione 379907/2025 - Allegato 4 - Incidenti significativi di base per i soggetti essenziali"
    type: determinazione
    url: https://www.acn.gov.it/portale/documents/d/guest/allegato-4-v2
    accessed: 2026-04-29
