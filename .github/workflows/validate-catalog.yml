name: validate-catalog

# Verifica su PR che il frontmatter di tutte le SKILL.md sia conforme alla
# convenzione del catalogo (vedi AGENTS.md sezione "Regole non negoziabili" #9)
# e che i file generati (catalog.yaml + .claude-plugin/marketplace.json)
# siano stati rigenerati e committati.
#
# Due step:
#   1. uv run scripts/build_catalog.py - valida tutti i frontmatter e
#      rigenera catalog.yaml + .claude-plugin/marketplace.json. Esce
#      diverso da zero se manca un campo obbligatorio, supera un limite
#      (es. summary > 280 char), ha area non dichiarata in areas.yaml,
#      tag non kebab-case, ecc.
#   2. git diff --exit-code sui file generati - verifica che i file
#      committati coincidano con quelli appena rigenerati. Se differiscono,
#      il contributore ha modificato un SKILL.md o areas.yaml senza
#      committare i file generati aggiornati.

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
      - 'areas.yaml'
      - 'catalog.yaml'
      - '.claude-plugin/marketplace.json'
      - 'scripts/build_catalog.py'
      - '.github/workflows/validate-catalog.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Build e valida catalog.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Run build_catalog.py
        run: uv run scripts/build_catalog.py

      - name: Verify generated files are up-to-date
        run: |
          if ! git diff --exit-code catalog.yaml .claude-plugin/marketplace.json; then
            echo ""
            echo "::error::catalog.yaml o .claude-plugin/marketplace.json non sono allineati al frontmatter delle SKILL.md."
            echo ""
            echo "Esegui localmente:"
            echo "  uv run scripts/build_catalog.py"
            echo "e committa entrambi i file aggiornati nella PR."
            exit 1
          fi
          echo "OK: catalog.yaml e .claude-plugin/marketplace.json sono allineati."
