name: source-grounding

# Verifica la conformita' alla Regola zero (vedi AGENTS.md):
#   1. nessun placeholder negli SHA256 di references/sources.yaml
#   2. ogni binary_path dichiarato deve essere effettivamente scaricabile
#      dall'URL pubblico, e l'hash calcolato deve coincidere con quello in sources.yaml
#   3. ogni md_path dichiarato deve esistere e non essere vuoto
#      (Step 3 della Regola zero: il MD della fonte e' committato nella skill)
#
# Limite intrinseco: la CI puo' verificare il check sintattico (placeholder,
# hash mismatch, file MD presenti e non vuoti) ma NON puo' verificare se il
# contenuto del MD di fonte sia effettivamente la transcrizione del PDF
# (vs un'invenzione dei training data dell'agent). Quel check e' semantico
# e richiede review umana o agent indipendente che legga il PDF.
# Vedi `methodology/source-grounding-remediation.md` "Criteri di chiusura issue".
#
# La CI ha rete libera (a differenza degli ambienti di sviluppo che possono
# avere allowlist sandbox), quindi puo' fare il fetch reale delle fonti
# normative italiane (Gazzetta Ufficiale, Normattiva, eur-lex, MIT, ecc.)
# e validare gli hash dichiarati.
#
# Job:
#   - check-no-placeholders:  rifiuta sha256 placeholder (REPLACE_*, PENDING_FETCH, vuoti)
#   - check-md-fonti-present: per ogni md_path dichiarato non null, verifica file presente e non vuoto
#   - validate-sources:       scarica i binari e verifica gli hash delle skill modificate nel PR/push
#                             (nessuna verifica se nessun file di skill e' cambiato)
#
# Per la verifica manuale di tutte le skill (o di una sola), usare il workflow
# verify-all-sources.yml (Actions -> verify-all-sources -> Run workflow).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/references/sources.yaml'
      - 'skills/**'
      - '.github/workflows/source-grounding.yml'
      - 'scripts/fetch-sources.sh'
      - 'AGENTS.md'
      - 'CLAUDE.md'

permissions:
  contents: read

jobs:
  check-no-placeholders:
    name: No placeholder SHA256
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject placeholder SHA256 in sources.yaml
        run: |
          set -euo pipefail
          PATTERNS='REPLACE_WHEN_DOWNLOADED|REPLACE_WITH_ACTUAL_HASH|PENDING_FETCH|TODO_HASH|XXX_HASH'
          violations=0
          while IFS= read -r f; do
            if grep -nE "sha256:.*(${PATTERNS})" "$f" > /tmp/hits.txt 2>/dev/null; then
              if [ -s /tmp/hits.txt ]; then
                echo "::error file=$f::placeholder SHA256 trovato in $f"
                cat /tmp/hits.txt
                violations=$((violations + $(wc -l < /tmp/hits.txt)))
              fi
            fi
            # rifiuta sha256 con valore vuoto: "sha256:", "sha256: ", "sha256: \"\""
            EMPTY_SHA_REGEX='^[[:space:]]*sha256:[[:space:]]*$|^[[:space:]]*sha256:[[:space:]]*""[[:space:]]*$|^[[:space:]]*sha256:[[:space:]]*'"''"'[[:space:]]*$'
            if grep -nE "$EMPTY_SHA_REGEX" "$f" > /tmp/empty.txt 2>/dev/null; then
              if [ -s /tmp/empty.txt ]; then
                echo "::error file=$f::sha256 vuoto in $f"
                cat /tmp/empty.txt
                violations=$((violations + $(wc -l < /tmp/empty.txt)))
              fi
            fi
          done < <(find skills -path '*/references/sources.yaml' -type f)
          if [ "$violations" -gt 0 ]; then
            echo ""
            echo "Trovate $violations violazioni della Regola zero (vedi AGENTS.md)."
            echo "Le skill devono avere SHA256 reali calcolati sui binari scaricati."
            echo "Esegui ./scripts/fetch-sources.sh <skill> per scaricare e calcolare gli hash."
            exit 1
          fi
          echo "OK: nessun placeholder SHA256."

  check-md-fonti-present:
    name: MD di fonte presenti (Regola zero Step 3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install --quiet pyyaml

      - name: Verify md_path target exists for each declared source
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          import pathlib
          import yaml

          repo = pathlib.Path('.')
          violations = []
          for sources_yaml in repo.glob('skills/*/references/sources.yaml'):
              skill_dir = sources_yaml.parent.parent
              skill = skill_dir.name
              with sources_yaml.open(encoding='utf-8') as fh:
                  data = yaml.safe_load(fh) or {}
              for src in data.get('sources', []) or []:
                  sid = src.get('id', '<unknown>')
                  md_path = src.get('md_path')
                  if not md_path or md_path == 'null':
                      continue
                  target = skill_dir / md_path
                  if not target.is_file() or target.stat().st_size == 0:
                      violations.append((skill, sid, md_path))

          if violations:
              for skill, sid, md_path in violations:
                  print(f"::error::[{skill}/{sid}] md_path '{md_path}' "
                        f"dichiarato in sources.yaml ma file mancante o vuoto "
                        f"(Regola zero Step 3 - AGENTS.md)")
              print()
              print(f"Trovate {len(violations)} fonti con md_path mancante o vuoto.")
              print("Step 3 della Regola zero richiede che ogni fonte pubblica abbia")
              print("references/fonti/<id>.md committato come transcrizione del PDF.")
              print("Vedi methodology/generazione-skill.md Step 2.5.")
              sys.exit(1)
          print("OK: tutti gli md_path dichiarati puntano a file esistenti e non vuoti.")
          PY

  validate-sources:
    name: Validate sources are reachable and hash matches
    runs-on: ubuntu-latest
    needs: [check-no-placeholders, check-md-fonti-present]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install --quiet pyyaml

      - name: Fetch and verify sources
        run: |
          set -euo pipefail
          mkdir -p not_in_repo

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "SHA base non disponibile - verifica tutte le skill"
            python3 .github/workflows/scripts/verify-sources.py
          else
            # NB: { grep ... || true; } evita che grep esca 1 (nessun match)
            # faccia abortire la pipeline sotto `set -euo pipefail`. Una PR
            # docs-only (es. sync del README, modifiche ad AGENTS.md/CLAUDE.md)
            # triggera questo workflow ma non tocca skills/: in quel caso
            # CHANGED deve risultare vuoto e il job uscire pulito.
            CHANGED=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null \
              | { grep '^skills/' || true; } \
              | sed 's|^skills/\([^/]*\)/.*|\1|' \
              | sort -u \
              | tr '\n' ' ' \
              | sed 's/[[:space:]]*$//')

            if [ -z "$CHANGED" ]; then
              echo "Nessun file di skill modificato - verifica fonti saltata."
              exit 0
            fi

            echo "Skill modificate: $CHANGED"
            # shellcheck disable=SC2086 - espansione intenzionale su piu' argomenti
            python3 .github/workflows/scripts/verify-sources.py $CHANGED
          fi

  validate-script-runs:
    name: scripts/validate.sh passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validate.sh --all
        run: bash scripts/validate.sh --all
